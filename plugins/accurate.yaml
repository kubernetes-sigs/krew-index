apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: accurate
spec:
  version: v1.9.0
  homepage: https://github.com/cybozu-go/accurate
  platforms:
    - selector:
        matchLabels:
