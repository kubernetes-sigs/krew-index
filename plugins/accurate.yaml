        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/cybozu-go/accurate/releases/download/v1.9.0/kubectl-accurate_v1.9.0_darwin_arm64.tar.gz
      sha256: 1587829f97beb1cf178fb92c42ede3266b96a611dc64f3b783e122a79152a440
      bin: kubectl-accurate
      files:
        - from: kubectl-accurate
