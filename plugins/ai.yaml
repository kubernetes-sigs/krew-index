apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: ai
spec:
  version: v0.0.30
  homepage: https://github.com/GoogleCloudPlatform/kubectl-ai
  shortDescription: AI-powered Kubernetes assistant
  description: |
    This plugin provides a natural language interface to carry out kubernetes
    related tasks. The plugin can plan and execute multiple steps given a high
    level description of a task.
    It's important to note that this plugin does not replace kubectl. Instead,
    it makes kubectl accessible to non-kubernetes users and makes kubectl users
    more productive because now they don't have to remember all the syntax and
    commands to perform common tasks.
  caveats: |
    This plugin uses AI models (LLM) to plan and execute tasks. It supports
    multiple LLM providers such as Gemini, Azure-OpenAI, Ollama, llamacpp.
    You can get the API key for the default provider (Gemini) from
    https://aistudio.google.com/app/apikey.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/GoogleCloudPlatform/kubectl-ai/releases/download/v0.0.30/kubectl-ai_Linux_x86_64.tar.gz
    sha256: ef09fc76e0998e6083190fa6aa5b0bb4ee2ba668bfd420205f8e0f0c25b3c981
    bin: kubectl-ai
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/GoogleCloudPlatform/kubectl-ai/releases/download/v0.0.30/kubectl-ai_Linux_arm64.tar.gz
    sha256: e81cc133f5f8b2f48dc1a9132ff0c2417a9b7f1f7e4ae7223b6f93e0e4490b60
    bin: kubectl-ai
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/GoogleCloudPlatform/kubectl-ai/releases/download/v0.0.30/kubectl-ai_Darwin_x86_64.tar.gz
    sha256: 57005ac7f1b6f70921638098432b80fb904f794f6f73317f15b23a69c40d506f
    bin: kubectl-ai
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/GoogleCloudPlatform/kubectl-ai/releases/download/v0.0.30/kubectl-ai_Darwin_arm64.tar.gz
    sha256: 520c0ffc7128a1bc16a0ee1aa705e88a40cee65791ee3a0cfe0b6270f40785d6
    bin: kubectl-ai
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/GoogleCloudPlatform/kubectl-ai/releases/download/v0.0.30/kubectl-ai_Windows_x86_64.zip
    sha256: fdfc2f1f3a9a0c27c8bb0d8941c6fea7e3fd642eb3cb9218c17ad82435adcb7c
    bin: kubectl-ai.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/GoogleCloudPlatform/kubectl-ai/releases/download/v0.0.30/kubectl-ai_Windows_arm64.zip
    sha256: 80f30b4cee023dc7d8a6a11a76df7fca0a5cd8454c727e257e56812fdc404b4e
    bin: kubectl-ai.exe