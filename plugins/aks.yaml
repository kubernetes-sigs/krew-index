apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: aks
spec:
  version: v0.3.0
  homepage: https://github.com/Azure/kubectl-aks
  shortDescription: Interact with and debug AKS clusters
  description: |
    This plugin provides a set of commands that enable users to interact with an
    AKS cluster even when the control plane is not functioning as expected. For
    example, users can still use the plugin to debug their cluster if the API
    server is not working correctly. This plugin allows users to perform various
    tasks, retrieve information, and execute commands against the cluster nodes,
    regardless of the control plane's state.

    It's important to note that this plugin does not replace az (the Azure CLI
    [1]). Instead, it complements it by offering additional commands and
    providing users with a kubectl-like experience. In practice, users will use
    az to create and delete their AKS cluster, and then use kubectl and
    kubectl-aks to interact with and debug it.

    [1] https://learn.microsoft.com/en-us/cli/azure/
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/Azure/kubectl-aks/releases/download/v0.3.0/kubectl-aks-linux-amd64-v0.3.0.tar.gz
    sha256: a023372e633e6b3a3205db87445679618756db21f56cfb0d31def8e2b5c717ec
    bin: kubectl-aks
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/Azure/kubectl-aks/releases/download/v0.3.0/kubectl-aks-darwin-amd64-v0.3.0.tar.gz
    sha256: f6c85971bbce70c261a68236b80a598be3daf5cf076d03ab58fccc7dd59ae3bb
    bin: kubectl-aks
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/Azure/kubectl-aks/releases/download/v0.3.0/kubectl-aks-darwin-arm64-v0.3.0.tar.gz
    sha256: f336a47eae4578e73e9cdbe73b73ecb24d9fea919ed0cd4cdf9f1cab50275c65
    bin: kubectl-aks
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/Azure/kubectl-aks/releases/download/v0.3.0/kubectl-aks-windows-amd64-v0.3.0.tar.gz
    sha256: 2e242ef2390fb46b71c77e0980589a710c47cc6a8174517265dd816d86969b96
    bin: kubectl-aks.exe
