apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: aks
spec:
  version: v0.2.5
  homepage: https://github.com/Azure/kubectl-aks
  shortDescription: Interact with and debug AKS clusters
  description: |
    This plugin provides a set of commands that enable users to interact with an
    AKS cluster even when the control plane is not functioning as expected. For
    example, users can still use the plugin to debug their cluster if the API
    server is not working correctly. This plugin allows users to perform various
    tasks, retrieve information, and execute commands against the cluster nodes,
    regardless of the control plane's state.

    It's important to note that this plugin does not replace az (the Azure CLI
    [1]). Instead, it complements it by offering additional commands and
    providing users with a kubectl-like experience. In practice, users will use
    az to create and delete their AKS cluster, and then use kubectl and
    kubectl-aks to interact with and debug it.

    [1] https://learn.microsoft.com/en-us/cli/azure/
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/Azure/kubectl-aks/releases/download/v0.2.5/kubectl-aks-linux-amd64-v0.2.5.tar.gz
    sha256: 6912bb93cc80138d1dab79ea1b912235d52a19274cfcbe496c4775124bb17a2c
    bin: kubectl-aks
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/Azure/kubectl-aks/releases/download/v0.2.5/kubectl-aks-darwin-amd64-v0.2.5.tar.gz
    sha256: b3aa9bc41cfe98fd80f18ce80c82ceb1c739535204fd2516ffcbad3aac919a1a
    bin: kubectl-aks
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/Azure/kubectl-aks/releases/download/v0.2.5/kubectl-aks-darwin-arm64-v0.2.5.tar.gz
    sha256: 658e92dd68a42949c46ccf20e1fe7e1edae7931dc5df7fc525713252fded81cc
    bin: kubectl-aks
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/Azure/kubectl-aks/releases/download/v0.2.5/kubectl-aks-windows-amd64-v0.2.5.tar.gz
    sha256: d314ca80cb4002203d3e036ea2de394690c2f6e2df9d594110660ecc1cb2e9e4
    bin: kubectl-aks.exe
