apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: attune
spec:
  version: "v0.1.7"
  homepage: https://github.com/attune-io/attune
  shortDescription: Inspect and explain Attune pod right-sizing policies
  description: |
    Shows policy status, savings estimates, per-container recommendations,
    recommendation reasoning, and resize history for Attune policies.

    Subcommands:
      status            Show policy status, workload counts, and conditions
      savings           Show estimated CPU/memory savings per policy
      recommendations   Show per-container sizing recommendations
      explain           Show recommendation reasoning for one policy
      preview           Preview per-pod resource changes before promoting type
      history           Show resize history (including eviction fallbacks)
      diff              Show resource change diffs from recommendations
      wizard            Interactive policy creation and type promotion
  caveats: |
    Requires the Attune operator to be installed in the cluster.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.7/kubectl-attune_linux_amd64.tar.gz
    sha256: 5f3ce239fa9e1a2f177d61f0975358ae19593fa8e3c0fc7c2b21613d3d3c1d31
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.7/kubectl-attune_linux_arm64.tar.gz
    sha256: 39fdfbbe4fb00ededc5c93d66882622842251ac082581d36e509584bd025249b
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/attune-io/attune/releases/download/v0.1.7/kubectl-attune_linux_arm.tar.gz
    sha256: c3401c57325d7d0f31dd04f60b2d2e6523b55775ecb9c724c409676731fec03a
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.7/kubectl-attune_darwin_amd64.tar.gz
    sha256: 6e44448976950976924c242a52a2be3f805884375c5b023e1df7024982929733
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.7/kubectl-attune_darwin_arm64.tar.gz
    sha256: 54652c969f494c64dbc1f4b830f99fb6cdfd36439e4cfddae3e6dc46e7100c86
    bin: kubectl-attune
