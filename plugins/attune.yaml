apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: attune
spec:
  version: "v0.1.16"
  homepage: https://github.com/attune-io/attune
  shortDescription: Inspect and explain Attune pod right-sizing policies
  description: |
    The kubectl-attune plugin provides visibility into Attune, a Kubernetes
    operator for safe, in-place pod resource right-sizing. View policy status,
    savings estimates, per-container recommendations, and resize history.
  caveats: |
    Requires the Attune operator to be installed in the cluster.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.16/kubectl-attune_linux_amd64.tar.gz
    sha256: fa1d9a854a019c86249fb02a51cc31f384bcf6ca86d07576c62e6bc1aaf1fd3d
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.16/kubectl-attune_linux_arm64.tar.gz
    sha256: 6695e711b33de5144388c5e2ef9c6063fd0d04ed15c3899dd8cef5bc343d38d9
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/attune-io/attune/releases/download/v0.1.16/kubectl-attune_linux_arm.tar.gz
    sha256: 29f0bf5325c34a7776e478ad80026cc217efc463e05bcc8d672995dbc992031e
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: ppc64le
    uri: https://github.com/attune-io/attune/releases/download/v0.1.16/kubectl-attune_linux_ppc64le.tar.gz
    sha256: 98afb6223fc1fc095d3a55e1e26b8565cf57fa646bbc358ba61f0e7339d643a4
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.16/kubectl-attune_darwin_amd64.tar.gz
    sha256: b5497f06941ee5934ea9093c3719a2944228d680176fdbea7f9ce7c7018c42c3
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.16/kubectl-attune_darwin_arm64.tar.gz
    sha256: ef02ea8e3cb2ab0cc8a1ecb59913667bc5852dfbe0f308c16bc98e0ad0f609bd
    bin: kubectl-attune
