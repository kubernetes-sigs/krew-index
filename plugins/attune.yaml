apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: attune
spec:
  version: "v0.1.20"
  homepage: https://github.com/attune-io/attune
  shortDescription: Inspect and explain Attune pod right-sizing policies
  description: |
    The kubectl-attune plugin provides visibility into Attune, a Kubernetes
    operator for safe, in-place pod resource right-sizing. View policy status,
    savings estimates, per-container recommendations, and resize history.
  caveats: |
    Requires the Attune operator to be installed in the cluster.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.20/kubectl-attune_linux_amd64.tar.gz
    sha256: d7af7ecb168df5a9256bdf2c8f9aeef31d9c484e421e7e542dee05193b5b90e7
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.20/kubectl-attune_linux_arm64.tar.gz
    sha256: 1bfa5b904429f6719d33dd8ae996ab11d62c4eb7c7f4d4627d3b7887e81ccd66
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/attune-io/attune/releases/download/v0.1.20/kubectl-attune_linux_arm.tar.gz
    sha256: a615f342c4dcc205503c5b731c3066c261b99c5a75d151f03ae93f019e7b081f
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: ppc64le
    uri: https://github.com/attune-io/attune/releases/download/v0.1.20/kubectl-attune_linux_ppc64le.tar.gz
    sha256: e42df45fdc465df4e8a2c95f8e2975fa045bbfdfae3cc0f8d1afdcd15be0f8b3
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.20/kubectl-attune_darwin_amd64.tar.gz
    sha256: 5eafbe8cf505a5046929ce12169a0cd49b1985ede7333c42ad754890fa0f55c9
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.20/kubectl-attune_darwin_arm64.tar.gz
    sha256: ffa355a9ac115d81c837d876b5a38abf063903b8e71d111d659769f016aaeba4
    bin: kubectl-attune
