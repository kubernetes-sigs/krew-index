apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: attune
spec:
  version: "v0.1.10"
  homepage: https://github.com/attune-io/attune
  shortDescription: Inspect and explain Attune pod right-sizing policies
  description: |
    The kubectl-attune plugin provides visibility into Attune, a Kubernetes
    operator for safe, in-place pod resource right-sizing. View policy status,
    savings estimates, per-container recommendations, and resize history.
  caveats: |
    Requires the Attune operator to be installed in the cluster.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.10/kubectl-attune_linux_amd64.tar.gz
    sha256: 06c49022d775818e16d92ec95c56722a34514e07793037508679fccba74ce072
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.10/kubectl-attune_linux_arm64.tar.gz
    sha256: 7fc7823b5dc79857d27dd30b2fc7cdf9f398352b55c2f84fa7aed2fa964e2ee0
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/attune-io/attune/releases/download/v0.1.10/kubectl-attune_linux_arm.tar.gz
    sha256: 1114e2a8d0e54a91b99eff5ca6f263bf81f2e8a6185e990239d57e130c65c39e
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: ppc64le
    uri: https://github.com/attune-io/attune/releases/download/v0.1.10/kubectl-attune_linux_ppc64le.tar.gz
    sha256: 38891a9c15abb40555c86010b73c60f2489746eccb4d8092a440a1ed8d8783e6
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.10/kubectl-attune_darwin_amd64.tar.gz
    sha256: 29d86c13bbe717c916b5d4a35f5d26abc1197825d9e4b8fadfec47672a597a49
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.10/kubectl-attune_darwin_arm64.tar.gz
    sha256: 03f32efa0f717fb37166c962ea96fb58fee32281b6350bf2c2e64e303ff9a227
    bin: kubectl-attune
