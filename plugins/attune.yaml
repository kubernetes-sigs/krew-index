apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: attune
spec:
  version: "v0.1.19"
  homepage: https://github.com/attune-io/attune
  shortDescription: Inspect and explain Attune pod right-sizing policies
  description: |
    The kubectl-attune plugin provides visibility into Attune, a Kubernetes
    operator for safe, in-place pod resource right-sizing. View policy status,
    savings estimates, per-container recommendations, and resize history.
  caveats: |
    Requires the Attune operator to be installed in the cluster.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.19/kubectl-attune_linux_amd64.tar.gz
    sha256: 174db4f31d726845488b1ffc0a1404ebf7171cbec3820f88bf3a6751142e3ccb
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.19/kubectl-attune_linux_arm64.tar.gz
    sha256: 688197c0f8322799d04a0e062e2da1d313bd17c66f7f27bae126742f55e2b184
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/attune-io/attune/releases/download/v0.1.19/kubectl-attune_linux_arm.tar.gz
    sha256: 65d758adfef3aa22bd3a82ff27d07950aa8f32397a6cb0cedfa00376c871ec17
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: ppc64le
    uri: https://github.com/attune-io/attune/releases/download/v0.1.19/kubectl-attune_linux_ppc64le.tar.gz
    sha256: d320f3355364152247be6c90571011cb29590927dbf565a65e4b2ec0d55ef250
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.19/kubectl-attune_darwin_amd64.tar.gz
    sha256: 6f0c093cd3546eaa36d61faf6e354cf6eed95e8b072974c89416f612edba5a2c
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.19/kubectl-attune_darwin_arm64.tar.gz
    sha256: b71b74fb38addac0696982f08bdbdde8e3457570aa1646f9b6f7d323a966ceaf
    bin: kubectl-attune
