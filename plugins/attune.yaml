apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: attune
spec:
  version: "v0.1.8"
  homepage: https://github.com/attune-io/attune
  shortDescription: Inspect and explain Attune pod right-sizing policies
  description: |
    Shows policy status, savings estimates, per-container recommendations,
    recommendation reasoning, and resize history for Attune policies.

    Subcommands:
      status            Show policy status, workload counts, and conditions
      savings           Show estimated CPU/memory savings per policy
      recommendations   Show per-container sizing recommendations
      explain           Show recommendation reasoning for one policy
      preview           Preview per-pod resource changes before promoting type
      history           Show resize history (including eviction fallbacks)
      diff              Show resource change diffs from recommendations
      wizard            Interactive policy creation and type promotion
  caveats: |
    Requires the Attune operator to be installed in the cluster.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.8/kubectl-attune_linux_amd64.tar.gz
    sha256: 67ef5b4bd0351df469881b01eb2f6b9188a91a96a5b3c50cadcca82018d2cf0a
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.8/kubectl-attune_linux_arm64.tar.gz
    sha256: 81417f9936eb788ed1871eb81942e48a930b11222044fcc5ca9d9f790b2e8114
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/attune-io/attune/releases/download/v0.1.8/kubectl-attune_linux_arm.tar.gz
    sha256: 05e2d1eb8ae492483a545c4ce6db3c4735775c493b9b84a283863fb4b3501523
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: ppc64le
    uri: https://github.com/attune-io/attune/releases/download/v0.1.8/kubectl-attune_linux_ppc64le.tar.gz
    sha256: 4bd1cef7c698de2bb444c578465d146e3a7de6bacfe5cbe536b5253c18d255f5
