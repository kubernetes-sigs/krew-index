    uri: https://github.com/attune-io/attune/releases/download/v0.1.8/kubectl-attune_darwin_amd64.tar.gz
    sha256: 71d2fc928568e92aa946dc7e9f20cf30c2f3515487d577c04bf10e2828c6330c
