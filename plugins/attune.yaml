apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: attune
spec:
  version: "v0.1.14"
  homepage: https://github.com/attune-io/attune
  shortDescription: Inspect and explain Attune pod right-sizing policies
  description: |
    The kubectl-attune plugin provides visibility into Attune, a Kubernetes
    operator for safe, in-place pod resource right-sizing. View policy status,
    savings estimates, per-container recommendations, and resize history.
  caveats: |
    Requires the Attune operator to be installed in the cluster.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.14/kubectl-attune_linux_amd64.tar.gz
    sha256: 8256e42cebc9aa17404cf6405b7e74d9332fe99440f3c972962506acbd9dd945
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.14/kubectl-attune_linux_arm64.tar.gz
    sha256: 1aff2f91e79f98666581d9bc5fdd12966cbb62bf439a08d9098dfb9576264ddb
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/attune-io/attune/releases/download/v0.1.14/kubectl-attune_linux_arm.tar.gz
    sha256: 80f48bdd638f4737230354466ede8325a214047a022d24b06e5ff32c30d40cbe
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: ppc64le
    uri: https://github.com/attune-io/attune/releases/download/v0.1.14/kubectl-attune_linux_ppc64le.tar.gz
    sha256: 4378479698f185c13d5aec709d03a29e5bdc09462f51a78cbac5ffcb0ccee539
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.14/kubectl-attune_darwin_amd64.tar.gz
    sha256: 86b796704ef042078a58d2dfdcf54b37dcd47f35a9463fac3c423856c4885ae6
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.14/kubectl-attune_darwin_arm64.tar.gz
    sha256: a04c3b2ad2cd0e3eafdd67d306c6fff64917bac7fc7bba049935bab994340fe4
    bin: kubectl-attune
