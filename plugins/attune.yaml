apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: attune
spec:
  version: "v0.1.18"
  homepage: https://github.com/attune-io/attune
  shortDescription: Inspect and explain Attune pod right-sizing policies
  description: |
    The kubectl-attune plugin provides visibility into Attune, a Kubernetes
    operator for safe, in-place pod resource right-sizing. View policy status,
    savings estimates, per-container recommendations, and resize history.
  caveats: |
    Requires the Attune operator to be installed in the cluster.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.18/kubectl-attune_linux_amd64.tar.gz
    sha256: c350716eee2310891696b83f682d3a95ea12ffc392ee08fe47f8216193d29cfb
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.18/kubectl-attune_linux_arm64.tar.gz
    sha256: 79ae822c790df15348f34cb420d070c6e2a9e73bfffaad94a65d78c77cf79a30
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/attune-io/attune/releases/download/v0.1.18/kubectl-attune_linux_arm.tar.gz
    sha256: 70d00b4163cead5cde3b5ce73757f5d9826b5c6107806cff4a9cdb6ddae12b0c
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: ppc64le
    uri: https://github.com/attune-io/attune/releases/download/v0.1.18/kubectl-attune_linux_ppc64le.tar.gz
    sha256: 4d06b324fa459c0801bf2e8e734f564f400fcc56567452900519c738ff150b23
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.18/kubectl-attune_darwin_amd64.tar.gz
    sha256: 6fc69eaccbb2d1cbba0ebf3f9ad2cdfe36448d04ed6948e5df7c1a859fc3d108
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.18/kubectl-attune_darwin_arm64.tar.gz
    sha256: 340d405c90725741b37d50fc1e142528315b53765ccb27875cce0859dc3a4e83
    bin: kubectl-attune
