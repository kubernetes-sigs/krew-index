apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: attune
spec:
  version: "v0.1.9"
  homepage: https://github.com/attune-io/attune
  shortDescription: Inspect and explain Attune pod right-sizing policies
  description: |
    The kubectl-attune plugin provides visibility into Attune, a Kubernetes
    operator for safe, in-place pod resource right-sizing. View policy status,
    savings estimates, per-container recommendations, and resize history.
  caveats: |
    Requires the Attune operator to be installed in the cluster.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.9/kubectl-attune_linux_amd64.tar.gz
    sha256: 9865813fa7f521b075ff8a506f0ecc42ca0353f0d16dffbf6036812234d66c96
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.9/kubectl-attune_linux_arm64.tar.gz
    sha256: cce8770cac525fbcc399ba689decc6ed8769c9649dbd47081a09325b90dcc34a
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/attune-io/attune/releases/download/v0.1.9/kubectl-attune_linux_arm.tar.gz
    sha256: c84fbf8223f35021c1962d70045f1ce6a9f75f57e6d410fbacfea77c0b6e32dd
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: ppc64le
    uri: https://github.com/attune-io/attune/releases/download/v0.1.9/kubectl-attune_linux_ppc64le.tar.gz
    sha256: c5864902a127a083796b77023a5ef585b413311c61e46e31d00bc114790cb1e3
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.9/kubectl-attune_darwin_amd64.tar.gz
    sha256: 66467177253c23c5e87ef6b15247b20d3399bb68e68a836eb24cda97f20088ff
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.9/kubectl-attune_darwin_arm64.tar.gz
    sha256: 6e9be6aaf78c2a24c105b9e4e81833d4695557aab9308ba32f4a205c3da6b559
    bin: kubectl-attune
