apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: attune
spec:
  version: "v0.1.13"
  homepage: https://github.com/attune-io/attune
  shortDescription: Inspect and explain Attune pod right-sizing policies
  description: |
    The kubectl-attune plugin provides visibility into Attune, a Kubernetes
    operator for safe, in-place pod resource right-sizing. View policy status,
    savings estimates, per-container recommendations, and resize history.
  caveats: |
    Requires the Attune operator to be installed in the cluster.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.13/kubectl-attune_linux_amd64.tar.gz
    sha256: b800d240160167f7ee69f1be651da9c1f749e96ae2bf5bea5a1cbeeb9e4f7b0c
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.13/kubectl-attune_linux_arm64.tar.gz
    sha256: 8cb2b2b7db2438ae6a6859109f7fbf079d07f5558e3985c1bd0fc6f978a19d83
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/attune-io/attune/releases/download/v0.1.13/kubectl-attune_linux_arm.tar.gz
    sha256: 7371d012b32a2256ac9283dcf019f2f46d213ab2e0ce39d094f08ef4934af2f6
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: ppc64le
    uri: https://github.com/attune-io/attune/releases/download/v0.1.13/kubectl-attune_linux_ppc64le.tar.gz
    sha256: dd1fc625fbe029136aa99108034e317a18ef258935d9f4e578cbf5fef8e32080
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.13/kubectl-attune_darwin_amd64.tar.gz
    sha256: 2586577be2332b10dd6e5676643691bc16508e37a1f22a714727bc578a9e9b3a
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.13/kubectl-attune_darwin_arm64.tar.gz
    sha256: cdfa0f7edeaa6aa360714eec3689962a800e1613aa786350b054bad58191be6b
    bin: kubectl-attune
