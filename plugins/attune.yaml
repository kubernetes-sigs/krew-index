apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: attune
spec:
  version: "v0.1.17"
  homepage: https://github.com/attune-io/attune
  shortDescription: Inspect and explain Attune pod right-sizing policies
  description: |
    The kubectl-attune plugin provides visibility into Attune, a Kubernetes
    operator for safe, in-place pod resource right-sizing. View policy status,
    savings estimates, per-container recommendations, and resize history.
  caveats: |
    Requires the Attune operator to be installed in the cluster.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.17/kubectl-attune_linux_amd64.tar.gz
    sha256: 9a2bbf72b663b8550e61d8c54e4b3e0f330af9b6c84c3e762bb19dc0b540a172
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.17/kubectl-attune_linux_arm64.tar.gz
    sha256: 30c35621e8c2e5dabbbda3983f2a2dc5bd48c160ff50525723a678a9c901f5c5
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/attune-io/attune/releases/download/v0.1.17/kubectl-attune_linux_arm.tar.gz
    sha256: b3505edd417f5a0b0c265ebdec61829d14dc7acdf68495371d7d44fba5eab2e6
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: ppc64le
    uri: https://github.com/attune-io/attune/releases/download/v0.1.17/kubectl-attune_linux_ppc64le.tar.gz
    sha256: 1bb1f67caf18a140bf8e841dd03f8e0fcf84beb911e07064f39b6c81a5ebdc72
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.17/kubectl-attune_darwin_amd64.tar.gz
    sha256: 7cdf3c4886b5ac18cc5f89ecd0929f4cb44d806119f08afad465143669f7f71a
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/attune-io/attune/releases/download/v0.1.17/kubectl-attune_darwin_arm64.tar.gz
    sha256: bfc5ce81cbb9cd16a9d43c2e6ddf3e879506039185511b2bca6c8d38d36df046
    bin: kubectl-attune
