apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: auth-proxy
spec:
  homepage: https://github.com/int128/kauthproxy
  shortDescription: Authentication proxy to a pod or service
  description: |
    This is a kubectl plugin to forward a local port to a pod or service via the authentication proxy.
    It gets a token from the current credential plugin (e.g. aws-iam-authenticator or kubelogin).
    Then it appends the authorization header to HTTP requests, like `authorization: Bearer token`.
    All traffic is routed by the authentication proxy and port forwarder as follows:
      [browser] -> [authentication proxy] -> [port forwarder] -> [pod]

  caveats: |
    You need to configure authentication in the kubeconfig.
    See https://github.com/int128/kauthproxy for more.

  version: v1.2.6
  platforms:
  - bin: kauthproxy
    uri: https://github.com/int128/kauthproxy/releases/download/v1.2.6/kauthproxy_linux_amd64.zip
    sha256: eef7a4ac3606719ae423a030e206831f9f4ddd3bd61400e1de538301297c1e02
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kauthproxy
    uri: https://github.com/int128/kauthproxy/releases/download/v1.2.6/kauthproxy_linux_arm64.zip
    sha256: 1a94053b70ced70349b0aefd8d4a4026eeb514faaffcb5a3a37a94fb60d8e361
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kauthproxy
    uri: https://github.com/int128/kauthproxy/releases/download/v1.2.6/kauthproxy_linux_arm.zip
    sha256: 6cdeb735397f94311e878212f3460c524d6cba8088a1420a2755b616cd6f9470
    selector:
      matchLabels:
        os: linux
        arch: arm
  - bin: kauthproxy
    uri: https://github.com/int128/kauthproxy/releases/download/v1.2.6/kauthproxy_darwin_amd64.zip
    sha256: 61270a6b09b47ecd24f35c9443705f63c9d1db228e923e1ab0cff05365b07ec6
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kauthproxy
    uri: https://github.com/int128/kauthproxy/releases/download/v1.2.6/kauthproxy_darwin_arm64.zip
    sha256: 639e44d32976d0461272a376f332e6142ed12d2975f718d9e04df9374373927a
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kauthproxy.exe
    uri: https://github.com/int128/kauthproxy/releases/download/v1.2.6/kauthproxy_windows_amd64.zip
    sha256: 74aecbacbf940fc068c77f67c62792bbeecdfeaaaf1bbacbae396a89a2655312
    selector:
      matchLabels:
        os: windows
        arch: amd64
