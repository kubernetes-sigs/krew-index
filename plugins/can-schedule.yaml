    uri: https://github.com/ronaknnathani/kubectl-can-schedule/releases/download/v0.1.2/kubectl-can-schedule_v0.1.2_linux_arm64.tar.gz
    sha256: 658594c9a5ea65bdeb17d0e92c285e4ab1a2f735d40c1a4b9cf2362307b93caa
