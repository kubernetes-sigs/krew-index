apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cilium-policy-gen
spec:
  version: v1.9.1
  homepage: https://github.com/SoulKyu/cpg
  shortDescription: "Generate CiliumNetworkPolicy from Hubble flows"
  description: |
    Watches dropped network flows in real-time via Hubble Relay and
    automatically generates CiliumNetworkPolicy YAML files that would
    allow them. Useful for clusters with a default-deny posture where
    writing policies manually is tedious and error-prone.

    Supports TCP/UDP ports, ICMP, reserved entities, and CIDR rules.
    Merges with existing policies on disk and writes only on changes.

    Usage:
      kubectl cilium-policy-gen generate -n <namespace>
      kubectl cilium-policy-gen generate --server <relay-addr>
      kubectl cilium-policy-gen generate --cluster-dedup -n <namespace>
  caveats: |
    Requires a running Cilium cluster with Hubble Relay enabled.
    The plugin auto port-forwards to hubble-relay by default.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.9.1/cilium-policy-gen_linux_amd64.tar.gz
    sha256: e78b5122bdd3b27257003eb402c330a5079cef2014f45a5e4ef9430674ad7e53
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.9.1/cilium-policy-gen_linux_arm64.tar.gz
    sha256: 98391db848fb441384569aab7fb95b63bb32d1e3115cfe7ae3f02b5c0242c929
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.9.1/cilium-policy-gen_darwin_amd64.tar.gz
    sha256: 6516e9f1b33bf71d9b23a090985798e9d9df01c8cd1f8578934dedfd1e4e2cc0
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.9.1/cilium-policy-gen_darwin_arm64.tar.gz
    sha256: a3bde5da8a566706e9f659342b73c89ab1bf8e95b828e800999695da5dd8a0c4
    bin: kubectl-cilium_policy_gen
