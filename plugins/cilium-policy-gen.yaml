apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cilium-policy-gen
spec:
  version: v1.8.0
  homepage: https://github.com/SoulKyu/cpg
  shortDescription: "Generate CiliumNetworkPolicy from Hubble flows"
  description: |
    Watches dropped network flows in real-time via Hubble Relay and
    automatically generates CiliumNetworkPolicy YAML files that would
    allow them. Useful for clusters with a default-deny posture where
    writing policies manually is tedious and error-prone.

    Supports TCP/UDP ports, ICMP, reserved entities, and CIDR rules.
    Merges with existing policies on disk and writes only on changes.

    Usage:
      kubectl cilium-policy-gen generate -n <namespace>
      kubectl cilium-policy-gen generate --server <relay-addr>
      kubectl cilium-policy-gen generate --cluster-dedup -n <namespace>
  caveats: |
    Requires a running Cilium cluster with Hubble Relay enabled.
    The plugin auto port-forwards to hubble-relay by default.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.8.0/cilium-policy-gen_linux_amd64.tar.gz
    sha256: 284008bcb0d7240eb3f9aa501ed030b5e3483e22aa05c61936499a1514157af3
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.8.0/cilium-policy-gen_linux_arm64.tar.gz
    sha256: 50a9726e8d51448f970bf776b0ed24122c883c0ffb9a874875585b9c716c9527
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.8.0/cilium-policy-gen_darwin_amd64.tar.gz
    sha256: b5f5c7a985d8f37bbd2a71bd9b2dab874db440fef0161a046dc7b6653372bde6
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.8.0/cilium-policy-gen_darwin_arm64.tar.gz
    sha256: d5a5c1103b930513231f4cfcb1370287352016a315da0a5b6646b26b3f1321e0
    bin: kubectl-cilium_policy_gen
