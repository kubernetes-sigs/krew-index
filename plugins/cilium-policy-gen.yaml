apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cilium-policy-gen
spec:
  version: v1.10.0
  homepage: https://github.com/SoulKyu/cpg
  shortDescription: "Generate CiliumNetworkPolicy from Hubble flows"
  description: |
    Watches dropped network flows in real-time via Hubble Relay and
    automatically generates CiliumNetworkPolicy YAML files that would
    allow them. Useful for clusters with a default-deny posture where
    writing policies manually is tedious and error-prone.

    Supports TCP/UDP ports, ICMP, reserved entities, and CIDR rules.
    Merges with existing policies on disk and writes only on changes.

    Usage:
      kubectl cilium-policy-gen generate -n <namespace>
      kubectl cilium-policy-gen generate --server <relay-addr>
      kubectl cilium-policy-gen generate --cluster-dedup -n <namespace>
  caveats: |
    Requires a running Cilium cluster with Hubble Relay enabled.
    The plugin auto port-forwards to hubble-relay by default.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.10.0/cilium-policy-gen_linux_amd64.tar.gz
    sha256: 01b94399ab9b2c6a2c43d1f53c4b848f9006dfc35842e9b6f250b4ceb898ce1c
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.10.0/cilium-policy-gen_linux_arm64.tar.gz
    sha256: 0878da46d342ebed85258697b2671978c082ff7913529191bf04f26f438c061e
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.10.0/cilium-policy-gen_darwin_amd64.tar.gz
    sha256: 3fe9d9309c05c975ab1e64be26cd03592d8ee893091f4a4602adefd0bed5e9af
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.10.0/cilium-policy-gen_darwin_arm64.tar.gz
    sha256: 0d05e3be368bba395ef954adbae9f9a8943371e71b1d28d7029e430ab1136786
    bin: kubectl-cilium_policy_gen
