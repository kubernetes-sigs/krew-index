apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cilium-policy-gen
spec:
  version: v1.5.1
  homepage: https://github.com/SoulKyu/cpg
  shortDescription: "Generate CiliumNetworkPolicy from Hubble flows"
  description: |
    Watches dropped network flows in real-time via Hubble Relay and
    automatically generates CiliumNetworkPolicy YAML files that would
    allow them. Useful for clusters with a default-deny posture where
    writing policies manually is tedious and error-prone.

    Supports TCP/UDP ports, ICMP, reserved entities, and CIDR rules.
    Merges with existing policies on disk and writes only on changes.

    Usage:
      kubectl cilium-policy-gen generate -n <namespace>
      kubectl cilium-policy-gen generate --server <relay-addr>
      kubectl cilium-policy-gen generate --cluster-dedup -n <namespace>
  caveats: |
    Requires a running Cilium cluster with Hubble Relay enabled.
    The plugin auto port-forwards to hubble-relay by default.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.5.1/cilium-policy-gen_linux_amd64.tar.gz
    sha256: 151b0fc2db1f23b08c27f4f53e6875faa899a9027d462f751a46cdc158c81390
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.5.1/cilium-policy-gen_linux_arm64.tar.gz
    sha256: 226b91d5563ed8f355d70dc6fe112dc95e1b897e41721c3e36972f22569df361
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.5.1/cilium-policy-gen_darwin_amd64.tar.gz
    sha256: 983e252bc3a5b754e23877bbd866b85c88879bf0613fef89c8162c79857d2b79
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.5.1/cilium-policy-gen_darwin_arm64.tar.gz
    sha256: 4fd55a11d6fb2f894fd88379e5550610b75faa295220734f1de0e4d68e632e03
    bin: kubectl-cilium_policy_gen
