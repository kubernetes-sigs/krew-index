apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cilium-policy-gen
spec:
  version: v1.9.0
  homepage: https://github.com/SoulKyu/cpg
  shortDescription: "Generate CiliumNetworkPolicy from Hubble flows"
  description: |
    Watches dropped network flows in real-time via Hubble Relay and
    automatically generates CiliumNetworkPolicy YAML files that would
    allow them. Useful for clusters with a default-deny posture where
    writing policies manually is tedious and error-prone.

    Supports TCP/UDP ports, ICMP, reserved entities, and CIDR rules.
    Merges with existing policies on disk and writes only on changes.

    Usage:
      kubectl cilium-policy-gen generate -n <namespace>
      kubectl cilium-policy-gen generate --server <relay-addr>
      kubectl cilium-policy-gen generate --cluster-dedup -n <namespace>
  caveats: |
    Requires a running Cilium cluster with Hubble Relay enabled.
    The plugin auto port-forwards to hubble-relay by default.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.9.0/cilium-policy-gen_linux_amd64.tar.gz
    sha256: 34be108e1515f30e0faa843e8a06da3362c12841157733db78f276764d624a57
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.9.0/cilium-policy-gen_linux_arm64.tar.gz
    sha256: 41005315d486a3dbd970310b14209113806c3f2180d960614a4fdd6e7ade6381
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.9.0/cilium-policy-gen_darwin_amd64.tar.gz
    sha256: 9fa8a3141577a459cc0773453df3223113702ef35522771b978bc3ff3467cebf
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.9.0/cilium-policy-gen_darwin_arm64.tar.gz
    sha256: fb01d5642bfeb179bd949cca37f5042bc5454a81f78a94d794e7217a64be0da1
    bin: kubectl-cilium_policy_gen
