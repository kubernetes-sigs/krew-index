apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cilium-policy-gen
spec:
  version: v1.4.0
  homepage: https://github.com/SoulKyu/cpg
  shortDescription: "Generate CiliumNetworkPolicy from Hubble flows"
  description: |
    Watches dropped network flows in real-time via Hubble Relay and
    automatically generates CiliumNetworkPolicy YAML files that would
    allow them. Useful for clusters with a default-deny posture where
    writing policies manually is tedious and error-prone.

    Supports TCP/UDP ports, ICMP, reserved entities, and CIDR rules.
    Merges with existing policies on disk and writes only on changes.

    Usage:
      kubectl cilium-policy-gen generate -n <namespace>
      kubectl cilium-policy-gen generate --server <relay-addr>
      kubectl cilium-policy-gen generate --cluster-dedup -n <namespace>
  caveats: |
    Requires a running Cilium cluster with Hubble Relay enabled.
    The plugin auto port-forwards to hubble-relay by default.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.4.0/cilium-policy-gen_linux_amd64.tar.gz
    sha256: c34d3c6dbf2e8b457e7cba79693b0218a2b6cfb3221f1c4e34afb6fce046baa4
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.4.0/cilium-policy-gen_linux_arm64.tar.gz
    sha256: 75c29df3079cf28be97738a5130bd54ea34933ba74ca175ccac0e74cceed5d67
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.4.0/cilium-policy-gen_darwin_amd64.tar.gz
    sha256: 6cd99f7e794ab42b2646221af919ebdc75088cd32b48d1f249ae6cf89183e63e
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.4.0/cilium-policy-gen_darwin_arm64.tar.gz
    sha256: 6f449f0d8017e6777100996be6d292459aa6bcc1233ebdfa04a3af38196a63b9
    bin: kubectl-cilium_policy_gen
