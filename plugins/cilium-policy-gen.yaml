apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cilium-policy-gen
spec:
  version: v1.6.0
  homepage: https://github.com/SoulKyu/cpg
  shortDescription: "Generate CiliumNetworkPolicy from Hubble flows"
  description: |
    Watches dropped network flows in real-time via Hubble Relay and
    automatically generates CiliumNetworkPolicy YAML files that would
    allow them. Useful for clusters with a default-deny posture where
    writing policies manually is tedious and error-prone.

    Supports TCP/UDP ports, ICMP, reserved entities, and CIDR rules.
    Merges with existing policies on disk and writes only on changes.

    Usage:
      kubectl cilium-policy-gen generate -n <namespace>
      kubectl cilium-policy-gen generate --server <relay-addr>
      kubectl cilium-policy-gen generate --cluster-dedup -n <namespace>
  caveats: |
    Requires a running Cilium cluster with Hubble Relay enabled.
    The plugin auto port-forwards to hubble-relay by default.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.6.0/cilium-policy-gen_linux_amd64.tar.gz
    sha256: a186ada00dc0d8f275303cd33dc6e93010236100edb2f4de726618d6d45141cd
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.6.0/cilium-policy-gen_linux_arm64.tar.gz
    sha256: cc4b6dceb7bfa4373bb7bd9732b76c3b87a4c46bd21b8b263316cef9b3832e25
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.6.0/cilium-policy-gen_darwin_amd64.tar.gz
    sha256: 828892cff5a3c1735be863aacb54cddd39e4c8fb17a816e4a74f24999cec8365
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.6.0/cilium-policy-gen_darwin_arm64.tar.gz
    sha256: 7482de58241662f821ce00dbcf14da729453cda13155ccd46a54f85563ff4afd
    bin: kubectl-cilium_policy_gen
