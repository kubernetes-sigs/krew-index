apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cilium-policy-gen
spec:
  version: v1.11.0
  homepage: https://github.com/SoulKyu/cpg
  shortDescription: "Generate CiliumNetworkPolicy from Hubble flows"
  description: |
    Watches dropped network flows in real-time via Hubble Relay and
    automatically generates CiliumNetworkPolicy YAML files that would
    allow them. Useful for clusters with a default-deny posture where
    writing policies manually is tedious and error-prone.

    Supports TCP/UDP ports, ICMP, reserved entities, and CIDR rules.
    Merges with existing policies on disk and writes only on changes.

    Usage:
      kubectl cilium-policy-gen generate -n <namespace>
      kubectl cilium-policy-gen generate --server <relay-addr>
      kubectl cilium-policy-gen generate --cluster-dedup -n <namespace>
  caveats: |
    Requires a running Cilium cluster with Hubble Relay enabled.
    The plugin auto port-forwards to hubble-relay by default.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.11.0/cilium-policy-gen_linux_amd64.tar.gz
    sha256: 92258bddbc13ae496e556af7b7bd8f1fe6c0609712e920779358e74b3f7e9993
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.11.0/cilium-policy-gen_linux_arm64.tar.gz
    sha256: acafe5a76ea781c3e4e7bbfe69a08daafa3e970dc2d327e5e71a3158fe234b41
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.11.0/cilium-policy-gen_darwin_amd64.tar.gz
    sha256: ffbf8382942a3e9e639a9ea934c3aa472e70d6c0531838cefb434ed0d2bdc756
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.11.0/cilium-policy-gen_darwin_arm64.tar.gz
    sha256: eb0d760815f3d20bb9747c2f0485a917f23653652db21b6e19c1e79f22dfc020
    bin: kubectl-cilium_policy_gen
