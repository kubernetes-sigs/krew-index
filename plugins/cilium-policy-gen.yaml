apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cilium-policy-gen
spec:
  version: v1.7.0
  homepage: https://github.com/SoulKyu/cpg
  shortDescription: "Generate CiliumNetworkPolicy from Hubble flows"
  description: |
    Watches dropped network flows in real-time via Hubble Relay and
    automatically generates CiliumNetworkPolicy YAML files that would
    allow them. Useful for clusters with a default-deny posture where
    writing policies manually is tedious and error-prone.

    Supports TCP/UDP ports, ICMP, reserved entities, and CIDR rules.
    Merges with existing policies on disk and writes only on changes.

    Usage:
      kubectl cilium-policy-gen generate -n <namespace>
      kubectl cilium-policy-gen generate --server <relay-addr>
      kubectl cilium-policy-gen generate --cluster-dedup -n <namespace>
  caveats: |
    Requires a running Cilium cluster with Hubble Relay enabled.
    The plugin auto port-forwards to hubble-relay by default.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.7.0/cilium-policy-gen_linux_amd64.tar.gz
    sha256: 9f0520593cd9b4f461bbc53dd0de13d619b88b1220da5b5e18eb459c7a64657e
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.7.0/cilium-policy-gen_linux_arm64.tar.gz
    sha256: 194dd257c2f46b7fdfc69fa6b70c5209cc2357ae3cf07d8e070f062a70fabc26
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.7.0/cilium-policy-gen_darwin_amd64.tar.gz
    sha256: 0fd62610402ac577587b006a6b68dee26cff16bd7751ad9736fc22ebc2106a0b
    bin: kubectl-cilium_policy_gen
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/SoulKyu/cpg/releases/download/v1.7.0/cilium-policy-gen_darwin_arm64.tar.gz
    sha256: f5d1dddba9c4af7a5fc517f56e7a0fb2c0adaea48c9d0a027507fe7bb5dc639a
    bin: kubectl-cilium_policy_gen
