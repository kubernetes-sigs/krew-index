apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: correlate
spec:
  version: "v0.1.5"
  homepage: https://github.com/Dasmat13/kubecorrelate
  shortDescription: Merge logs, events, and node pressures chronologically
  description: |
    KubeCorrelate is a lightweight CLI troubleshooting tool that multiplexes
    pod container logs, Kubernetes events, config updates, and node-level
    resource pressure alerts into a single time-aligned, colorized stream.
  caveats: |
    Requires an active kubeconfig context. Some features like Node watches
    might require permissions that fallback gracefully if missing.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/Dasmat13/kubecorrelate/releases/download/v0.1.5/kubecorrelate_0.1.5_darwin_amd64.tar.gz
    sha256: 452ed09c2d5ba714f3c3e9f572ae22fbeb89e21d0a396ef44905f51282f7f152
    bin: kubecorrelate
    files:
    - from: "kubecorrelate"
      to: "."
    - from: "LICENSE"
      to: "."
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/Dasmat13/kubecorrelate/releases/download/v0.1.5/kubecorrelate_0.1.5_darwin_arm64.tar.gz
    sha256: 3f3c5ca13fe93abf6d362548f87607afeaf5e54fb85ece23ef82c4ea21cd41f0
    bin: kubecorrelate
    files:
    - from: "kubecorrelate"
      to: "."
    - from: "LICENSE"
      to: "."
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/Dasmat13/kubecorrelate/releases/download/v0.1.5/kubecorrelate_0.1.5_linux_amd64.tar.gz
    sha256: ab4292872e671436c9ebd32a913582dafa6658ed12292cf042a4eeb6eb173283
    bin: kubecorrelate
    files:
    - from: "kubecorrelate"
      to: "."
    - from: "LICENSE"
      to: "."
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/Dasmat13/kubecorrelate/releases/download/v0.1.5/kubecorrelate_0.1.5_linux_arm64.tar.gz
    sha256: b209592fbff111ee2aabe92e9225b68c32f3231c7150aabbf3c623b597faff98
    bin: kubecorrelate
    files:
    - from: "kubecorrelate"
      to: "."
    - from: "LICENSE"
      to: "."
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/Dasmat13/kubecorrelate/releases/download/v0.1.5/kubecorrelate_0.1.5_windows_amd64.zip
