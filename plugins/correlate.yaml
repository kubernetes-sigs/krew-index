        arch: arm64
    uri: https://github.com/Dasmat13/kubecorrelate/releases/download/v0.1.2/kubecorrelate_0.1.2_linux_arm64.tar.gz
    sha256: 818063a1c9d5bfee3a3907ee38d756542c6a9e0f39cf67a70393f4be37d5ab93
    bin: kubecorrelate
    files:
    - from: "kubecorrelate"
