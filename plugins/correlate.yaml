    uri: https://github.com/Dasmat13/kubecorrelate/releases/download/v0.1.4/kubecorrelate_0.1.4_linux_arm64.tar.gz
    sha256: 3eaf589bb6c95810c5b304c6002c80575da9de01e48d7d1d9eeb01b9d4648e75
    bin: kubecorrelate
    files:
    - from: "kubecorrelate"
