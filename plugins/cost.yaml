apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cost
spec:
  version: v0.0.0-test
  shortDescription: View cluster cost information
  description: |
    Uses Kubecost's API to gather and format cluster cost information broken
    down by various aggregations like namespace, deployment, and label.

    Kubecost is a cluster-side daemon that tracks the real cost of Kubernetes
    resources by combining resource utilization monitoring with your provider's
    cost data. Kubecost support GCP/GKE, AWS/EKS, Azure/AKS, and custom
    (including on-prem) "providers" via user-specified pricing sheets.

    Website: https://www.kubecost.com/
  caveats: |
    Requires Kubecost (a cluster-side daemon) to be installed in your cluster.
    See https://www.kubecost.com/install for installation instructions.
  homepage: https://github.com/kubecost/kubectl-cost
  platforms:
  - bin: kubectl-cost
    uri: https://github.com/kubecost/kubectl-cost/releases/download/v0.0.0-test/kubectl-cost-darwin-amd64.tar.gz
    sha256: 3c50dfcef13815dfe14caaadfa313c15c07f17e6f9de4ac91328c93f4601247f
    files:
    - from: kubectl-cost
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-cost
    uri: https://github.com/kubecost/kubectl-cost/releases/download/v0.0.0-test/kubectl-cost-darwin-arm64.tar.gz
    sha256: e72f2e3a3025a5c926951045a1e5433a14d420eef60753f261518ea12c2e8508
    files:
    - from: kubectl-cost
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-cost
    uri: https://github.com/kubecost/kubectl-cost/releases/download/v0.0.0-test/kubectl-cost-linux-amd64.tar.gz
    sha256: 2f6c0e54a6dda2ca97008f7c58fc808b09c6f61aa91d4ca86f7a579df9f61865
    files:
    - from: kubectl-cost
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-cost.exe
    uri: https://github.com/kubecost/kubectl-cost/releases/download/v0.0.0-test/kubectl-cost-windows-amd64.tar.gz
    sha256: 86f2d300f67de7b74c4952ec649dca0e0b6ca0e3e020010fb6ff5ecb0cdebd2b
    files:
    - from: kubectl-cost
      to: kubectl-cost.exe
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
