apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: curl
spec:
  version: v0.0.1
  homepage: https://github.com/crabique/kubectl-curl
  shortDescription: Make curl requests to in-cluster domains and IPs using system curl
  description: |
    This plugin allows using local curl binary to access
    resources inside the cluster by their IPs or DNS.
  caveats: |
    Dependencies: curl
  platforms:
  - selector:
      matchExpressions:
      - key: os
        operator: In
        values:
        - linux
        - darwin
    uri: https://github.com/crabique/kubectl-curl/archive/refs/tags/v0.0.1.tar.gz
    sha256: e35a0a41b3838e0a4d35f6f3379101d380477a1e9ecceaee8baebc9da87a6ea9
    files:
    - from: kubectl-curl-*/kubectl-curl
      to: .
    - from: kubectl-curl-*/LICENSE
      to: .
    bin: "./kubectl-curl"
