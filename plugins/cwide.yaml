apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cwide
spec:
  version: v0.5.0
  homepage: https://github.com/reborn1867/kubectl-cwide
  shortDescription: "Customize wide kubectl get output"
  description: |
    kubectl-cwide is a Kubernetes plugin that enhances the kubectl command-line tool by providing a customizable wide output format for Kubernetes objects. It allows users to define custom column templates(both jsonpath and go template are supported) to tailor the output to their specific needs. With kubectl-cwide, users can easily modify, extend, or alias the output format and share these configurations with their team members. This makes it a powerful tool for improving the readability and usability of Kubernetes object data in various workflows.
  platforms:
  - bin: kubectl-cwide
    uri: https://github.com/reborn1867/kubectl-cwide/releases/download/v0.5.0/kubectl-cwide_Linux_x86_64.tar.gz
    sha256: 96e1d7bd7828e82a318de85d8ffae0f16a062f21d58cf8dd8c4f167964111a0d
    files:
      - from: LICENSE
        to: .
      - from: kubectl-cwide
        to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-cwide
    uri: https://github.com/reborn1867/kubectl-cwide/releases/download/v0.5.0/kubectl-cwide_Darwin_x86_64.tar.gz
    sha256: c4b90b55d4c60ae9649b14781b3eeef18d8298ad5ac8aac2e38bdcfb12e66904
    files:
      - from: LICENSE
        to: .
      - from: kubectl-cwide
        to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-cwide
    uri: https://github.com/reborn1867/kubectl-cwide/releases/download/v0.5.0/kubectl-cwide_Darwin_arm64.tar.gz
    sha256: c908e55c52d1ccfcf3771d99210950b7712ffa98e07291bffe41ac5ac0d2ad5d
    files:
      - from: LICENSE
        to: .
      - from: kubectl-cwide
        to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-cwide.exe
    uri: https://github.com/reborn1867/kubectl-cwide/releases/download/v0.5.0/kubectl-cwide_Windows_x86_64.zip
    sha256: 3787508d62f61a9111076ef5df9df865ea4221086ca175ddbbbd416746ccbc80
    files:
      - from: LICENSE
        to: .
      - from: kubectl-cwide.exe
        to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
  caveats: |
      Usage:
        kubectl cwide init
        kubectl cwide get <custom-resource-type> <resource-name>
