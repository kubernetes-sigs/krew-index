apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cwide
spec:
  version: v0.8.0
  homepage: https://github.com/reborn1867/kubectl-cwide
  shortDescription: "Customize wide kubectl get output"
  description: |
    kubectl-cwide is a Kubernetes plugin that enhances the kubectl command-line tool by providing a customizable wide output format for Kubernetes objects. It allows users to define custom column templates(both jsonpath and go template are supported) to tailor the output to their specific needs. With kubectl-cwide, users can easily modify, extend, or alias the output format and share these configurations with their team members. This makes it a powerful tool for improving the readability and usability of Kubernetes object data in various workflows.
  platforms:
  - bin: kubectl-cwide
    uri: https://github.com/reborn1867/kubectl-cwide/releases/download/v0.8.0/kubectl-cwide_Linux_x86_64.tar.gz
    sha256: b434a63573ac03a01e4661be40cc461606f717bb860bd683f63da1abf66522d1
    files:
      - from: LICENSE
        to: .
      - from: kubectl-cwide
        to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-cwide
    uri: https://github.com/reborn1867/kubectl-cwide/releases/download/v0.8.0/kubectl-cwide_Darwin_x86_64.tar.gz
    sha256: f493246ea55c1f09f782c5800bd139a61c863a8373607b9e42d7c626f7b60256
    files:
      - from: LICENSE
        to: .
      - from: kubectl-cwide
        to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-cwide
    uri: https://github.com/reborn1867/kubectl-cwide/releases/download/v0.8.0/kubectl-cwide_Darwin_arm64.tar.gz
    sha256: 4eb6637a79afd54abd9f0fda3768348001ee75995325859f462aceb4c9fe6e5a
    files:
      - from: LICENSE
        to: .
      - from: kubectl-cwide
        to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-cwide.exe
    uri: https://github.com/reborn1867/kubectl-cwide/releases/download/v0.8.0/kubectl-cwide_Windows_x86_64.zip
    sha256: a9a40b5ca8041ca8a3407a952e8dbf518bf07dab866505c19dce3f71c98dcadf
    files:
      - from: LICENSE
        to: .
      - from: kubectl-cwide.exe
        to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
  caveats: |
      Usage:
        kubectl cwide init
        kubectl cwide get <custom-resource-type> <resource-name>
