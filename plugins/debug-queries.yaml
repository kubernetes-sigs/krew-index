apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: debug-queries
spec:
  version: v0.1.3
  homepage: https://github.com/yaacov/kubectl-debug-queries
  shortDescription: Query Kubernetes resources, logs, and events
  description: |
    kubectl-debug-queries is a kubectl plugin for querying Kubernetes resources,
    logs, and events. It works as both a CLI tool and an MCP server for
    AI assistants (Claude Desktop, Cursor IDE, OpenShift Lightspeed).
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.3/kubectl-debug-queries-v0.1.3-linux-amd64.tar.gz
    sha256: 8566b918b5a6540b4bcac20414e598bff75e9edc02cde7ceb240cacda80fb03f
    files:
    - from: kubectl-debug-queries-linux-amd64
      to: kubectl-debug_queries
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.3/kubectl-debug-queries-v0.1.3-linux-arm64.tar.gz
    sha256: 656495042089a0d7b5f54317a586773dd028bcc1d931de258c74ab439a002747
    files:
    - from: kubectl-debug-queries-linux-arm64
      to: kubectl-debug_queries
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.3/kubectl-debug-queries-v0.1.3-darwin-amd64.tar.gz
    sha256: 26eb3e3761940385e36cd83246299be3eb3c7a0a0c09aa004e47a2d8259145f2
    files:
    - from: kubectl-debug-queries-darwin-amd64
      to: kubectl-debug_queries
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.3/kubectl-debug-queries-v0.1.3-darwin-arm64.tar.gz
    sha256: 66d3d7ab83e60dad549720cc32f4196025a3b495aefb37e52842d20000bd7516
    files:
    - from: kubectl-debug-queries-darwin-arm64
      to: kubectl-debug_queries
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.3/kubectl-debug-queries-v0.1.3-windows-amd64.zip
    sha256: 580abcf7fb368dbdb525f420c4f05bd48f0d26f849de74bcc4c4965beb4e0109
    files:
    - from: kubectl-debug-queries-windows-amd64.exe
      to: kubectl-debug_queries.exe
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries.exe
