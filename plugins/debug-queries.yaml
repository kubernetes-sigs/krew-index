apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: debug-queries
spec:
  version: v0.1.2
  homepage: https://github.com/yaacov/kubectl-debug-queries
  shortDescription: Query Kubernetes resources, logs, and events
  description: |
    kubectl-debug-queries is a kubectl plugin for querying Kubernetes resources,
    logs, and events. It works as both a CLI tool and an MCP server for
    AI assistants (Claude Desktop, Cursor IDE, OpenShift Lightspeed).
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.2/kubectl-debug-queries-v0.1.2-linux-amd64.tar.gz
    sha256: 5e768ab29f676733b23f28cdc2beb67bce518372dbe0800438bca801b379655a
    files:
    - from: kubectl-debug-queries-linux-amd64
      to: kubectl-debug_queries
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.2/kubectl-debug-queries-v0.1.2-linux-arm64.tar.gz
    sha256: 56aee20c4bcee22f728d3299b0478216085cf9602b8dc57c9d46f553503d263f
    files:
    - from: kubectl-debug-queries-linux-arm64
      to: kubectl-debug_queries
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.2/kubectl-debug-queries-v0.1.2-darwin-amd64.tar.gz
    sha256: 240d57b44eb390bb89d75949a343d5695ba95635937ce3157e0988a5b8ebd62a
    files:
    - from: kubectl-debug-queries-darwin-amd64
      to: kubectl-debug_queries
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.2/kubectl-debug-queries-v0.1.2-darwin-arm64.tar.gz
    sha256: 1c9e9ac6f61b1a6aa8375f25eaabbb469b442666775da2fc063cc76aaf459c8a
    files:
    - from: kubectl-debug-queries-darwin-arm64
      to: kubectl-debug_queries
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.2/kubectl-debug-queries-v0.1.2-windows-amd64.zip
    sha256: ab6dbae0b619d751efaab5fdd676cc76165c6975cffff37c4d3864965a1f7a7b
    files:
    - from: kubectl-debug-queries-windows-amd64.exe
      to: kubectl-debug_queries.exe
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries.exe
