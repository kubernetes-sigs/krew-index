apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: debug-queries
spec:
  version: v0.1.5
  homepage: https://github.com/yaacov/kubectl-debug-queries
  shortDescription: Query Kubernetes resources, logs, and events
  description: |
    kubectl-debug-queries is a kubectl plugin for querying Kubernetes resources,
    logs, and events. It works as both a CLI tool and an MCP server for
    AI assistants (Claude Desktop, Cursor IDE, OpenShift Lightspeed).
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.5/kubectl-debug-queries-v0.1.5-linux-amd64.tar.gz
    sha256: 2e38b2b3bfe90fc4c440da158d5b5a1649c81cb19112701d72988764e3098e11
    files:
    - from: kubectl-debug-queries-linux-amd64
      to: kubectl-debug_queries
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.5/kubectl-debug-queries-v0.1.5-linux-arm64.tar.gz
    sha256: b7901ff2dc2f7b0ce73f50475d09fa3bc0bdb3c787d366de01b81f9688d53d21
    files:
    - from: kubectl-debug-queries-linux-arm64
      to: kubectl-debug_queries
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.5/kubectl-debug-queries-v0.1.5-darwin-amd64.tar.gz
    sha256: 3c12ed6e2c3f2863d7cd6e1a98dc306b2db69c0ba0ba679f7fb211b14beefa64
    files:
    - from: kubectl-debug-queries-darwin-amd64
      to: kubectl-debug_queries
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.5/kubectl-debug-queries-v0.1.5-darwin-arm64.tar.gz
    sha256: a972de8fbba9aa234993741df74132c3ce2b185b6f0995b05ccc0b10d20b53d3
    files:
    - from: kubectl-debug-queries-darwin-arm64
      to: kubectl-debug_queries
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/yaacov/kubectl-debug-queries/releases/download/v0.1.5/kubectl-debug-queries-v0.1.5-windows-amd64.zip
    sha256: e14941c5b0709ca9f4c71b664b11216695e135b84c704055c0e0d33f5900963c
    files:
    - from: kubectl-debug-queries-windows-amd64.exe
      to: kubectl-debug_queries.exe
    - from: LICENSE
      to: .
    bin: kubectl-debug_queries.exe
