apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: diffyml
spec:
  version: v0.1.0
  homepage: https://github.com/szhekpisov/kubectl-diffyml
  shortDescription: Structural YAML diff for kubectl diff
  description: |
    Renders the output of `kubectl diff` using diffyml, a structural YAML
    diff tool that highlights what changed by path rather than by line.
    Useful for reviewing manifest drift, GitOps PRs, and Helm/Kustomize
    output where unified-diff noise hides intent.

    Wraps `kubectl diff` and forwards all flags. Output formatting can be
    tuned via the KUBECTL_DIFFYML_OUTPUT and KUBECTL_DIFFYML_FLAGS
    environment variables. See https://github.com/szhekpisov/diffyml for
    the underlying engine.
  caveats: |
    * `kubectl diff` exits 1 when differences are found — that is expected
      and propagated through this plugin.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/szhekpisov/kubectl-diffyml/releases/download/v0.1.0/kubectl-diffyml_v0.1.0_darwin_amd64.tar.gz
    sha256: c03f7ea662d83c6d1d760e8647d96270c8f2a5bf6b228ef7c733c4c07b4deaf1
    bin: kubectl-diffyml
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/szhekpisov/kubectl-diffyml/releases/download/v0.1.0/kubectl-diffyml_v0.1.0_darwin_arm64.tar.gz
    sha256: 2e935211814cccb17613f37d82cac1f2f6aede1d825dffa9a34875b480fca70c
    bin: kubectl-diffyml
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/szhekpisov/kubectl-diffyml/releases/download/v0.1.0/kubectl-diffyml_v0.1.0_linux_amd64.tar.gz
    sha256: ad4d07a39ebe4b6b43680649ecac0914cee089905c3a4c9d7484e6d56856af56
    bin: kubectl-diffyml
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/szhekpisov/kubectl-diffyml/releases/download/v0.1.0/kubectl-diffyml_v0.1.0_linux_arm64.tar.gz
    sha256: 9d29b340b443a3b80b2e3085bac7a251faeb49da8c00a1406ef7380d5ac8fe77
    bin: kubectl-diffyml
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/szhekpisov/kubectl-diffyml/releases/download/v0.1.0/kubectl-diffyml_v0.1.0_windows_amd64.tar.gz
    sha256: 89465f506f5c4ad3611d9e0fbaff7d55c651e0cc82679d11a15fc3615d0b6a7d
    bin: kubectl-diffyml.exe
