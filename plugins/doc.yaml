apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: doc
spec:
  version: v0.2.7
  homepage: https://github.com/sttts/kubectl-doc
  shortDescription: Render Kubernetes API documentation
  description: |
    Render Kubernetes OpenAPI v3 schemas as YAML-shaped documentation for
    terminal, Markdown, HTML, and interactive documentation surfaces.

    kubectl doc can read schemas from a live cluster or from local CRD
    manifests. It supports YAML, Markdown, Kro SimpleSchema, HTML, browser,
    and terminal UI output formats.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.2.7/kubectl-doc-v0.2.7-linux-amd64.tar.gz
      sha256: 330b8cd96422ae06b79d347d4bda61aca3f66611a51df29b50d0c18d76d3bf40
      files:
        - from: kubectl-doc-v0.2.7-linux-amd64/kubectl-doc
          to: .
        - from: kubectl-doc-v0.2.7-linux-amd64/LICENSE
          to: .
      bin: kubectl-doc

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.2.7/kubectl-doc-v0.2.7-linux-arm64.tar.gz
      sha256: 7ce8acff4187ad250f353acf25b17c423a802327d9385898952646d3ebb314e0
      files:
        - from: kubectl-doc-v0.2.7-linux-arm64/kubectl-doc
          to: .
        - from: kubectl-doc-v0.2.7-linux-arm64/LICENSE
          to: .
      bin: kubectl-doc

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.2.7/kubectl-doc-v0.2.7-darwin-amd64.tar.gz
      sha256: 1a4649e4ddb104ca62487308a64e3cd05169fec65722881a768d6450a2c55cf9
      files:
        - from: kubectl-doc-v0.2.7-darwin-amd64/kubectl-doc
          to: .
        - from: kubectl-doc-v0.2.7-darwin-amd64/LICENSE
          to: .
      bin: kubectl-doc

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.2.7/kubectl-doc-v0.2.7-darwin-arm64.tar.gz
      sha256: 2233c9cf90f4a3ac5645a25122343d791777a2b2df989966328bd1c5e344515e
      files:
        - from: kubectl-doc-v0.2.7-darwin-arm64/kubectl-doc
          to: .
        - from: kubectl-doc-v0.2.7-darwin-arm64/LICENSE
          to: .
      bin: kubectl-doc

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.2.7/kubectl-doc-v0.2.7-windows-amd64.zip
      sha256: c4552ccb4a99a28e5879a186575e3fa4d9b17cbeb75448627b1013f3250c3231
      files:
        - from: kubectl-doc-v0.2.7-windows-amd64/kubectl-doc.exe
          to: .
        - from: kubectl-doc-v0.2.7-windows-amd64/LICENSE
          to: .
      bin: kubectl-doc.exe

    - selector:
        matchLabels:
          os: windows
          arch: arm64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.2.7/kubectl-doc-v0.2.7-windows-arm64.zip
      sha256: b7da2a866dcd67d3abd368585d88d8e5424c542cf59519f73eb99d74f00ea32c
      files:
        - from: kubectl-doc-v0.2.7-windows-arm64/kubectl-doc.exe
          to: .
        - from: kubectl-doc-v0.2.7-windows-arm64/LICENSE
          to: .
      bin: kubectl-doc.exe
