apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: doc
spec:
  version: v0.2.8
  homepage: https://github.com/sttts/kubectl-doc
  shortDescription: Render Kubernetes API documentation
  description: |
    Render Kubernetes OpenAPI v3 schemas as YAML-shaped documentation for
    terminal, Markdown, HTML, and interactive documentation surfaces.

    kubectl doc can read schemas from a live cluster or from local CRD
    manifests. It supports YAML, Markdown, Kro SimpleSchema, HTML, browser,
    and terminal UI output formats.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.2.8/kubectl-doc-v0.2.8-linux-amd64.tar.gz
      sha256: 6725a92cb1cbbe27b1ea6a43deee17d4776816070c2900befad23615450fe5fa
      files:
        - from: kubectl-doc-v0.2.8-linux-amd64/kubectl-doc
          to: .
        - from: kubectl-doc-v0.2.8-linux-amd64/LICENSE
          to: .
      bin: kubectl-doc

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.2.8/kubectl-doc-v0.2.8-linux-arm64.tar.gz
      sha256: ac67419ee8bd1eba5325964b8e505a46e326d9a827d12583c04e8504daf49a29
      files:
        - from: kubectl-doc-v0.2.8-linux-arm64/kubectl-doc
          to: .
        - from: kubectl-doc-v0.2.8-linux-arm64/LICENSE
          to: .
      bin: kubectl-doc

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.2.8/kubectl-doc-v0.2.8-darwin-amd64.tar.gz
      sha256: 34c6a8152d4e80c5a5204107c240370c3d82cac629e80a94b6cf0d053af78013
      files:
        - from: kubectl-doc-v0.2.8-darwin-amd64/kubectl-doc
          to: .
        - from: kubectl-doc-v0.2.8-darwin-amd64/LICENSE
          to: .
      bin: kubectl-doc

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.2.8/kubectl-doc-v0.2.8-darwin-arm64.tar.gz
      sha256: 47f839349e1cc86c0c0b3de0306f20ca5c3f526b4fd09e35bf8270afa52edc9d
      files:
        - from: kubectl-doc-v0.2.8-darwin-arm64/kubectl-doc
          to: .
        - from: kubectl-doc-v0.2.8-darwin-arm64/LICENSE
          to: .
      bin: kubectl-doc

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.2.8/kubectl-doc-v0.2.8-windows-amd64.zip
      sha256: 019d5d319b05f93d17ae970672593e4dceac331f7e4bc38d6bdc8235e00ff297
      files:
        - from: kubectl-doc-v0.2.8-windows-amd64/kubectl-doc.exe
          to: .
        - from: kubectl-doc-v0.2.8-windows-amd64/LICENSE
          to: .
      bin: kubectl-doc.exe

    - selector:
        matchLabels:
          os: windows
          arch: arm64
      uri: https://github.com/sttts/kubectl-doc/releases/download/v0.2.8/kubectl-doc-v0.2.8-windows-arm64.zip
      sha256: 5325b8c9e807d4c1365c7fd86aebc062eb49818bed0828d8076eda4c09645fa3
      files:
        - from: kubectl-doc-v0.2.8-windows-arm64/kubectl-doc.exe
          to: .
        - from: kubectl-doc-v0.2.8-windows-arm64/LICENSE
          to: .
      bin: kubectl-doc.exe
