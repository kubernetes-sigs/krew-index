apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: env
spec:
  version: "v0.4.2"
  homepage: https://github.com/dexiotropic/kubenv
  shortDescription: Render manifest variables
  description: |
    Render Kubernetes manifest variables before applying resources with
    kubectl. The plugin uses {{ env.NAME }} placeholders by default and
    can also render shell-style $NAME and ${NAME} placeholders.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/dexiotropic/kubenv/releases/download/v0.4.2/kubenv_kubectl-env_0.4.2_linux_amd64.tar.gz
    sha256: 60665e3b86283fdc9602ed48fe9f33cb2c526a2b53b7abc5408323d472e0bed4
    bin: kubectl-env
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/dexiotropic/kubenv/releases/download/v0.4.2/kubenv_kubectl-env_0.4.2_linux_arm64.tar.gz
    sha256: 9aa721b6341a32508f753376a7fcbfdcdc2d74ff36661e5bbae6205ca7cae7c4
    bin: kubectl-env
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/dexiotropic/kubenv/releases/download/v0.4.2/kubenv_kubectl-env_0.4.2_darwin_amd64.tar.gz
    sha256: 2ab55d2d5066224f909a21b8e369cd3e8a1cce1866265cb8ba3bfe70bb700f86
    bin: kubectl-env
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/dexiotropic/kubenv/releases/download/v0.4.2/kubenv_kubectl-env_0.4.2_darwin_arm64.tar.gz
    sha256: a2f432eab225f25f9924b11c86b497d1a0288f4e95f0c68c9f9c582504a16bd5
    bin: kubectl-env
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/dexiotropic/kubenv/releases/download/v0.4.2/kubenv_kubectl-env_0.4.2_windows_amd64.zip
    sha256: 1200517f9eb7a4140c8f6c1d1441287c29536eae798da4de7c835113088d9bf1
    bin: kubectl-env.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/dexiotropic/kubenv/releases/download/v0.4.2/kubenv_kubectl-env_0.4.2_windows_arm64.zip
    sha256: 2984788fc6241b82aae51095dfac07c70f1307019eed9876de063c68c14733c2
    bin: kubectl-env.exe
