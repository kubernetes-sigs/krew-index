apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: example
spec:
  version: v1.3.0
  homepage: https://github.com/talos-labs/kubectl-example
  shortDescription: Prints out example manifest YAMLs
  description: |
    Prints out a example manifest YAML for a given resource type.
    The plugin works similar to a dry run output but for arbitrary resources.
    All examples originate from kubernetes.io.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/talos-labs/kubectl-example/releases/download/v1.3.0/kubectl-example_Darwin_arm64.tar.gz
    sha256: f649b6de33c2b982dc08ed94e74838270d276b66d825beeb2d68d78301ec2bb1
    bin: "./kubectl-example"
    files:
      - from: kubectl-example
        to: .
      - from: LICENSE
        to: .
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/talos-labs/kubectl-example/releases/download/v1.3.0/kubectl-example_Darwin_x86_64.tar.gz
    sha256: a3a785a85affe49c322a4ad20796c26b6cbfbeef406da819969314d17c2cea76
    bin: "./kubectl-example"
    files:
      - from: kubectl-example
        to: .
      - from: LICENSE
        to: .
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/talos-labs/kubectl-example/releases/download/v1.3.0/kubectl-example_Linux_arm64.tar.gz
    sha256: 73486a0a59c554acaa648e6a3fdf29448737d8c9fc09f9164c06218448d0fbae
    bin: "./kubectl-example"
    files:
      - from: kubectl-example
        to: .
      - from: LICENSE
        to: .
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/talos-labs/kubectl-example/releases/download/v1.3.0/kubectl-example_Linux_x86_64.tar.gz
    sha256: 4712d3c5dbfb1c31d52034f3efe9d3dd4043cef6dc8b6893ed621cecc343192f
    bin: "./kubectl-example"
    files:
      - from: kubectl-example
        to: .
      - from: LICENSE
        to: .
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/talos-labs/kubectl-example/releases/download/v1.3.0/kubectl-example_Windows_x86_64.zip
    sha256: c2aa974bd2169d0175c9d29ed22dd69102bd070f1eb4b0742840fc892b6a2157
    bin: "./kubectl-example.exe"
    files:
      - from: kubectl-example.exe
        to: .
      - from: LICENSE
        to: .
