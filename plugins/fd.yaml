apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: fd
spec:
  version: v0.15.0
  homepage: https://github.com/alikhil/kubectl-find
  shortDescription: Find resources and perform action on them.
  description: |
    It's a plugin for kubectl that gives you a UNIX find-like experience.
    Find then print, patch or delete any resource matching the provided criteria based on name, age, labels, etc
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/alikhil/kubectl-find/releases/download/v0.15.0/kubectl-fd_Linux_x86_64.tar.gz
    sha256: dd35948e6688988661558c695ddb38a9d7c227d20304b008396a8f28646e94b0
    bin: kubectl-fd
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/alikhil/kubectl-find/releases/download/v0.15.0/kubectl-fd_Linux_arm64.tar.gz
    sha256: 1a5787f397db243da68b67a65bb3e7e5dd29b5f0e10b675f8ae1a8e693296647
    bin: kubectl-fd
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/alikhil/kubectl-find/releases/download/v0.15.0/kubectl-fd_Darwin_x86_64.tar.gz
    sha256: 4d5543a31050724d43ec3d036d15677104848b1e10250de76f153fd1b3a42c78
