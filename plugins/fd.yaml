      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/alikhil/kubectl-find/releases/download/v0.15.1/kubectl-fd_Linux_x86_64.tar.gz
    sha256: b14e616fc04b31cc7535c685afc16a096115430de72e2785ff0fc33194c2f7f6
    bin: kubectl-fd
