apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: fd
spec:
  version: v0.13.0
  homepage: https://github.com/alikhil/kubectl-find
  shortDescription: Find resources and perform action on them.
  description: |
    It's a plugin for kubectl that gives you a UNIX find-like experience.
    Find then print, patch or delete any resource matching the provided criteria based on name, age, labels, etc
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/alikhil/kubectl-find/releases/download/v0.13.0/kubectl-fd_Linux_x86_64.tar.gz
    sha256: cafff00370716f614fa841329e13f6cb656c436d7e5ed00b0bd8c9fce2f92e47
    bin: kubectl-fd
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/alikhil/kubectl-find/releases/download/v0.13.0/kubectl-fd_Linux_arm64.tar.gz
    sha256: 2874be501490ab5bea13699c12c6070bc03f6726d2c72ac7a0cbbddf51e588ed
    bin: kubectl-fd
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/alikhil/kubectl-find/releases/download/v0.13.0/kubectl-fd_Darwin_x86_64.tar.gz
