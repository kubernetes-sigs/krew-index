apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: finalizer-doctor
spec:
  version: "v0.1.2"
  homepage: https://github.com/alexremn/finalizer-doctor
  shortDescription: Safely diagnose & clear stuck finalizers
  description: |
    Pinpoints the finalizer and the dead controller / APIService blocking
    deletion, cleans truly-orphaned resources first, and clears finalizers only
    as a gated last resort. Dry-run and explain by default.
  caveats: |
    This is a last resort. Clearing a finalizer is irreversible and can orphan
    infrastructure. Run without --apply first to see the evidence and verdict.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/alexremn/finalizer-doctor/releases/download/v0.1.2/finalizer-doctor_linux_amd64.tar.gz
    sha256: 4a74c66e9dd0775a6d5017fecedb179f091ba49756bd5452c59143b26ca8745b
    bin: kubectl-finalizer_doctor
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/alexremn/finalizer-doctor/releases/download/v0.1.2/finalizer-doctor_linux_arm64.tar.gz
    sha256: f38af1a6b8d79c809e0f7d23383cb7308e2fcee9245a87f0ff122e855cc3b3be
    bin: kubectl-finalizer_doctor
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/alexremn/finalizer-doctor/releases/download/v0.1.2/finalizer-doctor_darwin_amd64.tar.gz
    sha256: 4db13e41fff13b464ebe60ac6c90e1ae154963c77a4055693e2329f084fba578
    bin: kubectl-finalizer_doctor
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/alexremn/finalizer-doctor/releases/download/v0.1.2/finalizer-doctor_darwin_arm64.tar.gz
    sha256: c8ebca904cb0fa6557c316d8b9b66f00dc859c5d834ca034bd5fd1ce575c4193
    bin: kubectl-finalizer_doctor
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/alexremn/finalizer-doctor/releases/download/v0.1.2/finalizer-doctor_windows_amd64.tar.gz
    sha256: 74a05c46094e447121d9203dbb292289e21e35b01470b8f9ad8dad199f6e9589
    bin: kubectl-finalizer_doctor.exe
