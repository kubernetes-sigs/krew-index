apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: finalizer-doctor
spec:
  version: "v0.1.3"
  homepage: https://github.com/alexremn/finalizer-doctor
  shortDescription: Safely diagnose & clear stuck finalizers
  description: |
    Pinpoints the finalizer and the dead controller / APIService blocking
    deletion, cleans truly-orphaned resources first, and clears finalizers only
    as a gated last resort. Dry-run and explain by default.
  caveats: |
    This is a last resort. Clearing a finalizer is irreversible and can orphan
    infrastructure. Run without --apply first to see the evidence and verdict.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/alexremn/finalizer-doctor/releases/download/v0.1.3/finalizer-doctor_linux_amd64.tar.gz
    sha256: e06393cb13b52b261c1aa6ef0ec69bb37aba83067c10fe95629e82097b70fb91
    bin: kubectl-finalizer_doctor
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/alexremn/finalizer-doctor/releases/download/v0.1.3/finalizer-doctor_linux_arm64.tar.gz
    sha256: 0d7d5a4f1828f30d3547368ed69e6bca525b8b7850dd1906224186fa18f2b6ba
    bin: kubectl-finalizer_doctor
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/alexremn/finalizer-doctor/releases/download/v0.1.3/finalizer-doctor_darwin_amd64.tar.gz
    sha256: fdaf76e0cf535b02f7ff7b81322da5679e6efb9edf58e52bca3af659ee616565
    bin: kubectl-finalizer_doctor
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/alexremn/finalizer-doctor/releases/download/v0.1.3/finalizer-doctor_darwin_arm64.tar.gz
    sha256: 92f8541f4a4f95b556149b6e61b33106eb403a2c54b7586ba6faa00d4d55750a
    bin: kubectl-finalizer_doctor
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/alexremn/finalizer-doctor/releases/download/v0.1.3/finalizer-doctor_windows_amd64.tar.gz
    sha256: 58a2e5f5ec42c9cd10132fc9dfee165eb516593c15a3250cf179f1276dcee558
    bin: kubectl-finalizer_doctor.exe
