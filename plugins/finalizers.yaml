  shortDescription: Discover and fix resources blocked by pending finalizers
  homepage: https://github.com/tremes/kubectl-finalizers
  description: |
    A kubectl plugin for discovering and fixing resources blocked by pending finalizers.

    This plugin helps Kubernetes administrators resolve resources that are stuck in a
    deletion state by automatically clearing their finalizers. It can scan resources
    in a specific namespace or cluster-scoped resources.

    Features:
    - Identifies Kubernetes resources with pending deletion
    - Removes finalizer values from stuck resources
    - Supports namespace-specific and cluster-scoped resource scanning
