    uri: https://github.com/inspektor-gadget/inspektor-gadget/releases/download/v0.52.0/kubectl-gadget-linux-arm64-v0.52.0.tar.gz
    sha256: ef5ade65d095deeb6925ddd96e958bddc62edfbb4229cac7659f7736fbb26478
    bin: kubectl-gadget

  - selector:
