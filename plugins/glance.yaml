apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: glance
spec:
  version: "v0.3.0"
  homepage: https://gitlab.com/davidxarnold/glance
  shortDescription: View cluster resource allocation and usage.
  description: |
    Glance is a kubectl plugin that displays cluster resource allocation and utilization.

    It allows you to quickly view:
    - Node resource allocation (CPU and memory)
    - Pod resource requests and limits
    - Cluster-wide totals
    - Cloud provider node information (optional)

    Features:
    - Multiple output formats (text, pretty, JSON, charts)
    - Human-readable and exact value display
    - Label and field selectors

    Usage:
      kubectl glance                    # Default view
      kubectl glance -o pretty          # Colored output
      kubectl glance -o json            # JSON format
      kubectl glance --selector tier=app # Filter by labels
      kubectl glance -c                 # Include cloud provider info
  caveats: |
    This plugin requires kubectl 1.12 or higher.
    For cloud provider information (--cloud-info), ensure proper cloud credentials are configured.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://gitlab.com/api/v4/projects/9502011/packages/generic/kubectl-glance/0.3.0/kubectl-glance-0.3.0-darwin-amd64.tar.gz
    sha256: e2565e991f9a631aa74ab388325c636562cedccfa06f77f0e9793d08b45cf541
    bin: kubectl-glance
    files:
    - from: "*"
      to: "."
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://gitlab.com/api/v4/projects/9502011/packages/generic/kubectl-glance/0.3.0/kubectl-glance-0.3.0-darwin-arm64.tar.gz
    sha256: e74fb151718f3dfc379a632e9abc5c5e8f662a1f368b1160a543e665dafadbf7
    bin: kubectl-glance
    files:
    - from: "*"
      to: "."
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://gitlab.com/api/v4/projects/9502011/packages/generic/kubectl-glance/0.3.0/kubectl-glance-0.3.0-linux-amd64.tar.gz
    sha256: f1a9d375803b647af51636ff524b79ec4d34939fafac5d2e406c843c8cf16ef2
    bin: kubectl-glance
    files:
    - from: "*"
      to: "."
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://gitlab.com/api/v4/projects/9502011/packages/generic/kubectl-glance/0.3.0/kubectl-glance-0.3.0-linux-arm64.tar.gz
    sha256: a68e2eebbc6d58beec9c90a63bca56fa4dc875955cce6f28f3713fd65b60c839
    bin: kubectl-glance
    files:
    - from: "*"
      to: "."
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://gitlab.com/api/v4/projects/9502011/packages/generic/kubectl-glance/0.3.0/kubectl-glance-0.3.0-windows-amd64.tar.gz
    sha256: 21c24f2e7c94fafa940c0f8c4815f92e483a10934b7d30cca0a3b096522657ec
    bin: kubectl-glance.exe
    files:
    - from: "*"
