    uri: https://github.com/SaiRohithGuntupally/kubectl-gpufit/releases/download/v0.1.0/kubectl-gpufit_darwin_amd64.tar.gz
    sha256: a2fd526945f35efe5fee34feb9dec72af24edd8545fd1677d82d31b022e64ff7
