# krew-release-bot template. Rendered on every tag push, the result is
# what gets PR'd to krew-index. The bot resolves `addURIAndSha` by
# fetching each release archive and computing its sha256.
#
# Keep this in sync with the (one-off, manually-submitted) v0.1.1 manifest
# living in krew-index at plugins/gpugo.yaml — schema fields, description,
# caveats. The static reference at /Users/taln/kubectl-gpugo/krew/gpugo.yaml
# was deleted; this file is the source of truth.
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: gpugo
spec:
  version: "v0.1.3"
  homepage: https://github.com/Tal-Naeh/kubectl-gpugo
  shortDescription: Top-like TUI for per-pod GPU usage on Kubernetes
  description: |
    A zero-cluster-footprint, top-like TUI for per-pod GPU usage on
    Kubernetes. Auto-discovers existing dcgm-exporter (and optionally
    cadvisor-gpu-gpu-enricher) pods and scrapes them through the
    kube-apiserver pod-proxy subresource — no DaemonSet to install,
    no port-forwards on your machine, no firewall changes.

    Handles MIG: per-slice rows are grouped by physical GPU and labeled
    with the slice ID (e.g. "0:8" = GPU 0, MIG slice 8). When workloads
    bypass the NVIDIA device plugin via NVIDIA_VISIBLE_DEVICES=all,
    falls back to per-(node, GPU) attribution and lists candidate pods.

    The TUI is scrollable, sorted by physical GPU, and refreshes every
    20 seconds.
  caveats: |
    Requires:
      - dcgm-exporter (or another exporter emitting DCGM_FI_DEV_* /
        gpu_process_memory_bytes) running in the target cluster.
      - The user's RBAC must allow "list pods" cluster-wide and
        "get pods/proxy" in the exporter's namespace.

    Will not work with Lens / freelens local-proxy kubeconfigs — their
    proxy does not pass pod-proxy subresource requests through. Use a
    direct kubeconfig.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/Tal-Naeh/kubectl-gpugo/releases/download/v0.1.3/kubectl-gpugo_v0.1.3_darwin_amd64.tar.gz
    sha256: 32021c2563c04a59081a1276921ad9385db680ba3194a200d7885d935c4e0b66
    bin: kubectl-gpugo
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/Tal-Naeh/kubectl-gpugo/releases/download/v0.1.3/kubectl-gpugo_v0.1.3_darwin_arm64.tar.gz
    sha256: 84f93d6f644711e3b1081b74133775f2bb7c21dd098b80b419f9dd96c4b05f58
    bin: kubectl-gpugo
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/Tal-Naeh/kubectl-gpugo/releases/download/v0.1.3/kubectl-gpugo_v0.1.3_linux_amd64.tar.gz
    sha256: 188c744e0a8533dbfb2ff50bf0b60f862da4288b15573091420df4a066513842
    bin: kubectl-gpugo
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/Tal-Naeh/kubectl-gpugo/releases/download/v0.1.3/kubectl-gpugo_v0.1.3_linux_arm64.tar.gz
    sha256: 975124bb681bfb6fecefc2d5b849d609592da6184089f05f07c92bd19bf8b512
    bin: kubectl-gpugo
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/Tal-Naeh/kubectl-gpugo/releases/download/v0.1.3/kubectl-gpugo_v0.1.3_windows_amd64.zip
    sha256: 6ba7a89dc4c7e592d729ad17ad4bffaedaa658c41028d45c10bde0c6783aa778
    bin: kubectl-gpugo.exe
