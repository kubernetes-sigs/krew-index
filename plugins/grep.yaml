apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: grep
spec:
  platforms:
  - uri: https://github.com/guessi/kubectl-grep/releases/download/v1.31.0/kubectl-grep-Darwin-x86_64.tar.gz
    sha256: a92b3dcad7663cd807ba3d5ba170a98ed177901d3321b202fccb41d08db1c837
    bin: kubectl-grep
    files:
    - from: kubectl-grep
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - uri: https://github.com/guessi/kubectl-grep/releases/download/v1.31.0/kubectl-grep-Darwin-arm64.tar.gz
    sha256: 8b125cac8ad4fcb8ccdd13e9ae5489947897b97705e0c99efb8998c9e5963f01
    bin: kubectl-grep
    files:
    - from: kubectl-grep
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - uri: https://github.com/guessi/kubectl-grep/releases/download/v1.31.0/kubectl-grep-Linux-x86_64.tar.gz
    sha256: 43c971961798e71b31daffea2e980086f9a1df4f461c65f710fe471e04a6b201
    bin: kubectl-grep
    files:
    - from: kubectl-grep
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - uri: https://github.com/guessi/kubectl-grep/releases/download/v1.31.0/kubectl-grep-Linux-arm64.tar.gz
    sha256: e5c26f179846b498973183feba1c1819832c63f8cd59a4d43ba577134b9c3712
    bin: kubectl-grep
    files:
    - from: kubectl-grep
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - uri: https://github.com/guessi/kubectl-grep/releases/download/v1.31.0/kubectl-grep-Windows-x86_64.tar.gz
    sha256: 0cf7f3e71ad23a85af79b85b57aa6bf872f2dd9871779fda82d0c7477d3229eb
    bin: kubectl-grep.exe
    files:
    - from: kubectl-grep.exe
      to: .
    - from: LICENSE.txt
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
  version: v1.31.0
  homepage: https://github.com/guessi/kubectl-grep
  shortDescription: Filter Kubernetes resources by matching their names
  description: |
    Filter Kubernetes resources by matching their names

    Examples:

    List all pods in all namespaces
    $ kubectl grep pods --all-namespaces

    List all pods in namespace "star-lab" which contain the keyword "flash"
    $ kubectl grep pods -n star-lab flash

    No more pipe, built-in grep :-)
