apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: grep
spec:
  platforms:
  - uri: https://github.com/guessi/kubectl-grep/releases/download/v1.30.0/kubectl-grep-Darwin-x86_64.tar.gz
    sha256: 09fee1f98259b5fc8ac29a6908c276d2b9814c7a9da4c1c5142de51b832afa47
    bin: kubectl-grep
    files:
    - from: kubectl-grep
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - uri: https://github.com/guessi/kubectl-grep/releases/download/v1.30.0/kubectl-grep-Darwin-arm64.tar.gz
    sha256: bb9acf9de9708f25e3135e1eddb212711c6badd42ade51725e9f466cae812780
    bin: kubectl-grep
    files:
    - from: kubectl-grep
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - uri: https://github.com/guessi/kubectl-grep/releases/download/v1.30.0/kubectl-grep-Linux-x86_64.tar.gz
    sha256: 613eb11961f9cc53d936a050d80f0a2c9f689888b4c70c0cf074a34dfc2dea7a
    bin: kubectl-grep
    files:
    - from: kubectl-grep
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - uri: https://github.com/guessi/kubectl-grep/releases/download/v1.30.0/kubectl-grep-Linux-arm64.tar.gz
    sha256: d6b6755c7fac69de1b16e21ac7ae90f7825501eecf58c3ffcd890036f04c2b66
    bin: kubectl-grep
    files:
    - from: kubectl-grep
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - uri: https://github.com/guessi/kubectl-grep/releases/download/v1.30.0/kubectl-grep-Windows-x86_64.tar.gz
    sha256: e42f74cc514d0be898d2703da40116a7906f7a0c524f961fda1a6ce8e67a38a6
    bin: kubectl-grep.exe
    files:
    - from: kubectl-grep.exe
      to: .
    - from: LICENSE.txt
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
  version: v1.30.0
  homepage: https://github.com/guessi/kubectl-grep
  shortDescription: Filter Kubernetes resources by matching their names
  description: |
    Filter Kubernetes resources by matching their names

    Examples:

    List all pods in all namespaces
    $ kubectl grep pods --all-namespaces

    List all pods in namespace "star-lab" which contain the keyword "flash"
    $ kubectl grep pods -n star-lab flash

    No more pipe, built-in grep :-)
