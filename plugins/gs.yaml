apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: gs
spec:
  version: v5.6.2
  homepage: https://github.com/giantswarm/kubectl-gs
  shortDescription: Handle custom resources with Giant Swarm
  description: |
    Simplifies creating clusters and node pools via Giant Swarm
    management clusters, as well as installing app catalogs and apps.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.2/kubectl-gs-v5.6.2-darwin-amd64.tar.gz
    sha256: 8b1714c4bd933e6b174a5712f3ce5f8cd5ff18c5fd096f8d066803ef8892aeba
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.2/kubectl-gs-v5.6.2-darwin-arm64.tar.gz
    sha256: 55d5457016feb8b20aa82d571a9ac1d1e094dc9203c02917a3b71463c521b81e
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.2/kubectl-gs-v5.6.2-linux-amd64.tar.gz
    sha256: f1acc3f24577be7c790f9676e8cb41429c15855ea6d3dd8f0ebe09c7dbe022e2
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.2/kubectl-gs-v5.6.2-linux-arm64.tar.gz
    sha256: 1fa29a350dba190f1adb25f836979065fc59c72f519d19f592068da1737c2a80
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.2/kubectl-gs-v5.6.2-windows-amd64.zip
    sha256: d1a378efbc8eda540304f8e2518af99b3cddac16aa11505fe897bb61479bfc40
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs.exe
