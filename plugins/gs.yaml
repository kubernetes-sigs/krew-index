apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: gs
spec:
  version: v5.6.3
  homepage: https://github.com/giantswarm/kubectl-gs
  shortDescription: Handle custom resources with Giant Swarm
  description: |
    Simplifies creating clusters and node pools via Giant Swarm
    management clusters, as well as installing app catalogs and apps.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.3/kubectl-gs-v5.6.3-darwin-amd64.tar.gz
    sha256: 983c566935cd3e39adbd4d367d3ed1dff70142b0ffe641dabe6ef16821f139d7
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.3/kubectl-gs-v5.6.3-darwin-arm64.tar.gz
    sha256: f5930fb6edd847704fb759c554feec1a6b8b05523c132c97b31e3585867eeca5
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.3/kubectl-gs-v5.6.3-linux-amd64.tar.gz
    sha256: f49b9fc470b1bea7afff8b17f033b23636a0f1ade58e5ccf226f541558dd25c6
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.3/kubectl-gs-v5.6.3-linux-arm64.tar.gz
    sha256: a001039681385859b58f82a279e204ec2af05c4d93b95946bf24f593d286ed37
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.3/kubectl-gs-v5.6.3-windows-amd64.zip
    sha256: 851480a4c6fd27f35e839acad8012d0ee24751d7b99a058aed24e440e4977ca4
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs.exe
