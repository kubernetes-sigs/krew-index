apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: gs
spec:
  version: v5.4.0
  homepage: https://github.com/giantswarm/kubectl-gs
  shortDescription: Handle custom resources with Giant Swarm
  description: |
    Simplifies creating clusters and node pools via Giant Swarm
    management clusters, as well as installing app catalogs and apps.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.4.0/kubectl-gs-v5.4.0-darwin-amd64.tar.gz
    sha256: 42d5ea68d2a9d0e6ed868654213cb16bb5000b846eca9d19cf300796f00511ea
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.4.0/kubectl-gs-v5.4.0-darwin-arm64.tar.gz
    sha256: 59a6f7c226623cdc02a10dcf69d9112d40edcd13a6ab0820a5aa413ba5c46ef9
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.4.0/kubectl-gs-v5.4.0-linux-amd64.tar.gz
    sha256: 607209aeedcf23a2a0e7f3d8518056175b6099fcf9cd3762a93392f6e7152025
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.4.0/kubectl-gs-v5.4.0-linux-arm64.tar.gz
    sha256: 2f580a6906d0a351882a4b492d1e8bd1383a93d7a3461499398bbe9951209eff
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.4.0/kubectl-gs-v5.4.0-windows-amd64.zip
    sha256: 1034baffe2187bb048ede696d2ce6cb8d453fff6e1e572d920d548edf5d65f46
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs.exe
