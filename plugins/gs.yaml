apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: gs
spec:
  version: v5.6.0
  homepage: https://github.com/giantswarm/kubectl-gs
  shortDescription: Handle custom resources with Giant Swarm
  description: |
    Simplifies creating clusters and node pools via Giant Swarm
    management clusters, as well as installing app catalogs and apps.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.0/kubectl-gs-v5.6.0-darwin-amd64.tar.gz
    sha256: 862f9e9fd7930802ee2feef218f7af0fefa060d0de851872ceca035fbbed624b
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.0/kubectl-gs-v5.6.0-darwin-arm64.tar.gz
    sha256: a5033f28870f4eda318c4ba834a1075e71437e051a7e4cc0c2693f9ef6eb4f5c
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.0/kubectl-gs-v5.6.0-linux-amd64.tar.gz
    sha256: aab537365a6a50be59315fa8d36d9df2ff3dc7e108b702a286fcc92b123e06aa
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.0/kubectl-gs-v5.6.0-linux-arm64.tar.gz
    sha256: ca751ac05094edee942233f3a429efd68f4516e68a45e94ad711309cb3eec160
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.0/kubectl-gs-v5.6.0-windows-amd64.zip
    sha256: a939ab723a5dec96ae44e279eadad4776eefeae8b7dda4a4b6e0e5c4147c91a9
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs.exe
