apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: gs
spec:
  version: v5.3.1
  homepage: https://github.com/giantswarm/kubectl-gs
  shortDescription: Handle custom resources with Giant Swarm
  description: |
    Simplifies creating clusters and node pools via Giant Swarm
    management clusters, as well as installing app catalogs and apps.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.3.1/kubectl-gs-v5.3.1-darwin-amd64.tar.gz
    sha256: 6eaffec4255867d0e5e7032f6ed78ee634e37b32db3e7596e7fa9873a058a61e
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.3.1/kubectl-gs-v5.3.1-darwin-arm64.tar.gz
    sha256: 9a4f1ee3adc0f1ad1a4438c2076cd5cac786136269419fb178b0c961367bd98e
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.3.1/kubectl-gs-v5.3.1-linux-amd64.tar.gz
    sha256: 1028520bfa1cbaafbc826828f3a615c83cbe24ddbe99058e486c832ecaa1e6eb
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.3.1/kubectl-gs-v5.3.1-linux-arm64.tar.gz
    sha256: f749c6c5a6f60dfa99b13284d7d819d85a51bac7b89fbfe70046be92e981f2c3
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.3.1/kubectl-gs-v5.3.1-windows-amd64.zip
    sha256: c9a7961176ad4537b281e26fe5434449900f498ac053d0a080423e5b791ed946
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs.exe
