apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: gs
spec:
  version: v5.3.0
  homepage: https://github.com/giantswarm/kubectl-gs
  shortDescription: Handle custom resources with Giant Swarm
  description: |
    Simplifies creating clusters and node pools via Giant Swarm
    management clusters, as well as installing app catalogs and apps.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.3.0/kubectl-gs-v5.3.0-darwin-amd64.tar.gz
    sha256: 4d35b81908ec588f559328c087764913f319146c17752756f9f8ad68b669124a
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.3.0/kubectl-gs-v5.3.0-darwin-arm64.tar.gz
    sha256: b6a79d6cc1e6763262f1dd9688fc7505748720bc2337ffc0279a6ac12dcb9790
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.3.0/kubectl-gs-v5.3.0-linux-amd64.tar.gz
    sha256: c4c865b2c66d2bfc9e5854f3c3dc3662ad44940ebd17f51bebd88179e2b76fcf
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.3.0/kubectl-gs-v5.3.0-linux-arm64.tar.gz
    sha256: dab2e9c62f1e4c53f38bc6e3832a23113db83c8fbc2890e393ed9258a3efd264
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.3.0/kubectl-gs-v5.3.0-windows-amd64.zip
    sha256: 459f22f0dfb8b2e1960abffccb9d47ea1a533c465fcce0402da5ba7fa8398270
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs.exe
