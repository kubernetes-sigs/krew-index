apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: gs
spec:
  version: v5.2.0
  homepage: https://github.com/giantswarm/kubectl-gs
  shortDescription: Handle custom resources with Giant Swarm
  description: |
    Simplifies creating clusters and node pools via Giant Swarm
    management clusters, as well as installing app catalogs and apps.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.2.0/kubectl-gs-v5.2.0-darwin-amd64.tar.gz
    sha256: 5cedc4332c36ef076519fe8e3c1d815fb3def371d088db636d1ac92048bc2d77
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.2.0/kubectl-gs-v5.2.0-darwin-arm64.tar.gz
    sha256: 15cb25829ca0500b2b769ef72bf2f7d2ef2f393299fe16f3c5edc175ff0ebfa9
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.2.0/kubectl-gs-v5.2.0-linux-amd64.tar.gz
    sha256: 41730956adbab6bd6b1939e4e28bf2188136732162a356b03e6d2a9c02e1ddf9
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.2.0/kubectl-gs-v5.2.0-linux-arm64.tar.gz
    sha256: c02c0f3b2f21fa8ffceef8955094b93be7a7129d32e03cf3a97e7465c0f91f34
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.2.0/kubectl-gs-v5.2.0-windows-amd64.zip
    sha256: 250a527b17377d0503ce9d847807261e2e9dac05f6ea36b51ee6a42eee552191
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs.exe
