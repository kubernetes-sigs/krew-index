apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: gs
spec:
  version: v5.0.2
  homepage: https://github.com/giantswarm/kubectl-gs
  shortDescription: Handle custom resources with Giant Swarm
  description: |
    Simplifies creating clusters and node pools via Giant Swarm
    management clusters, as well as installing app catalogs and apps.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.0.2/kubectl-gs-v5.0.2-darwin-amd64.tar.gz
    sha256: f786a107f76950c90203bd9a76a0bfaec40b60643ab37fea335d8d46e1b3463c
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.0.2/kubectl-gs-v5.0.2-darwin-arm64.tar.gz
    sha256: 83ea1fafe61864163591164b1a1e94af44a567feb34cf9e696e3c3bce93ee8db
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.0.2/kubectl-gs-v5.0.2-linux-amd64.tar.gz
    sha256: 8d2984cf4c1f506909e000cb0c7e8239f50755af866f9c08d4202010aab24b03
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.0.2/kubectl-gs-v5.0.2-linux-arm64.tar.gz
    sha256: a2af820c890abe2370a87698c202a5a0dd11c773e3d591248adc08486efae302
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.0.2/kubectl-gs-v5.0.2-windows-amd64.zip
    sha256: fee7ba367675ade6863503961080cef4c0561f6d0384ca4e363474c70a6b1cd3
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs.exe
