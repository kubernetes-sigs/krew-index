apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: gs
spec:
  version: v5.5.0
  homepage: https://github.com/giantswarm/kubectl-gs
  shortDescription: Handle custom resources with Giant Swarm
  description: |
    Simplifies creating clusters and node pools via Giant Swarm
    management clusters, as well as installing app catalogs and apps.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.5.0/kubectl-gs-v5.5.0-darwin-amd64.tar.gz
    sha256: a10a0ce3317586b3c856452e000a867c0d6684510ce12db1c8511e2011d5925f
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.5.0/kubectl-gs-v5.5.0-darwin-arm64.tar.gz
    sha256: 66968626761a0edb738dc98161b1d1a3c73d87a95c23185f1c9b4f5ad8e440ad
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.5.0/kubectl-gs-v5.5.0-linux-amd64.tar.gz
    sha256: 89f818e568ec36de1d87181906e26b1e7c2695cbf73c16c3f0155d55d325fd2c
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.5.0/kubectl-gs-v5.5.0-linux-arm64.tar.gz
    sha256: 8a1d3bd091fa9eb734ece3a3cfece55b205bdad8f18f397b1a6018496b305b25
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.5.0/kubectl-gs-v5.5.0-windows-amd64.zip
    sha256: c6a08dec46f63b11e1d1dae51a670ca52fe75b9cc50c7041ff07f4edebdce4b6
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs.exe
