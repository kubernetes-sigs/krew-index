apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: gs
spec:
  version: v5.6.1
  homepage: https://github.com/giantswarm/kubectl-gs
  shortDescription: Handle custom resources with Giant Swarm
  description: |
    Simplifies creating clusters and node pools via Giant Swarm
    management clusters, as well as installing app catalogs and apps.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.1/kubectl-gs-v5.6.1-darwin-amd64.tar.gz
    sha256: d994d70da83d16ede01c521e96d322805c9479c40d1411a32e6dd0fc88434da3
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.1/kubectl-gs-v5.6.1-darwin-arm64.tar.gz
    sha256: 613091efc2593967f65c1f4d6f7ddd1e9794d6a7dee3fa48e409e529605c62ad
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.1/kubectl-gs-v5.6.1-linux-amd64.tar.gz
    sha256: 462a187ef717ffc2c9290ecbfa6e45f2569ee8f31f0e7500b7e0497352b35e1c
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.1/kubectl-gs-v5.6.1-linux-arm64.tar.gz
    sha256: a0cc01d42d068c6a1e84196179a83b226ff02bbb2e9c51d5edaaf5cc9281dc31
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/giantswarm/kubectl-gs/releases/download/v5.6.1/kubectl-gs-v5.6.1-windows-amd64.zip
    sha256: 227b6017b379ae29cb6f720b2c62c0f86abf36be09a2c43bbe42731aab2b479f
    files:
    - from: ./kubectl-gs-*/*
      to: .
    bin: ./kubectl-gs.exe
