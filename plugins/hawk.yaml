    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/lakshya-8000cr/Hawk/releases/download/v1.0.0/hawk_v1.0.0_darwin_arm64.tar.gz
      sha256: 3fa485d3abd0ba3591e1c9f7180e8e37a94ea89106e5b4d13f69644b520976d9
      files:
        - from: kubectl-hawk
          to: kubectl-hawk
        - from: LICENSE
          to: LICENSE
      bin: kubectl-hawk

    - selector:
        matchLabels:
          os: windows
