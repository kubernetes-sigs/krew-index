    uri: https://github.com/mattsu2020/kubectl-hpa-status/releases/download/v0.6.0/kubectl-hpa-status_v0.6.0_linux_arm64.tar.gz
    sha256: e77a4926ff612513fc530153fd9c70674b08222b94bbda285b42c4e67c0142fe
