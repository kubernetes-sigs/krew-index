    uri: https://github.com/mattsu2020/kubectl-hpa-status/releases/download/v0.10.0/kubectl-hpa-status_v0.10.0_linux_arm64.tar.gz
    sha256: 517cc5893c76c5eb5dc0ad1cdce5d0b2ddfaf5e834dd5ac791ef8b8305905250
