    uri: https://github.com/mattsu2020/kubectl-hpa-status/releases/download/v0.9.0/kubectl-hpa-status_v0.9.0_linux_arm64.tar.gz
    sha256: 82723e84024551e24d64c8331d0d346ea56baaabff3d2d8b674ae6e059a3c964
