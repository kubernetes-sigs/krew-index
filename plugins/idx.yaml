apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: idx
spec:
  version: v0.0.10
  homepage: https://github.com/jzills/kx
  shortDescription: Select resources by index instead of typing names
  description: |
    idx wraps kubectl with index-based resource selection. List resources
    once with "kubectl idx get pods" to assign numbered indexes, then
    reference any resource by number in follow-up commands: describe,
    logs, exec, delete, edit, scale, rollout, port-forward, events,
    yaml, tree, and more. A navigable history of listings keeps indexes
    resolving as you move between resource kinds and namespaces.
    Also distributed as "kx" on PyPI (https://pypi.org/project/kx-cli/).
  caveats: |
    Index history is stored in ~/.kx/.
  platforms:
  - selector: {matchLabels: {os: linux, arch: amd64}}
    uri: https://github.com/jzills/kx/releases/download/v0.0.10/kx_v0.0.10_linux_amd64.tar.gz
    sha256: d3c515fdea70239bd788e9cd7e25ba5fa5eff8223c9db3cac590c47fd8647c40
    bin: kx/kx
  - selector: {matchLabels: {os: linux, arch: arm64}}
    uri: https://github.com/jzills/kx/releases/download/v0.0.10/kx_v0.0.10_linux_arm64.tar.gz
    sha256: 7625250e2409dc6c7d25acf811dc61bfd08d608cb5a264f7c194ba455cd1ddae
    bin: kx/kx
  - selector: {matchLabels: {os: darwin, arch: amd64}}
    uri: https://github.com/jzills/kx/releases/download/v0.0.10/kx_v0.0.10_darwin_amd64.tar.gz
    sha256: cb1aeb8855fd6bfd47bf7acba67e55789fee3796d12345d37679925ca46cd08a
    bin: kx/kx
  - selector: {matchLabels: {os: darwin, arch: arm64}}
    uri: https://github.com/jzills/kx/releases/download/v0.0.10/kx_v0.0.10_darwin_arm64.tar.gz
    sha256: cf9691c434fd02c3096d92da85d4906376122262e7350f6f9728e3d19b2847e6
    bin: kx/kx
