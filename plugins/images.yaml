apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: images
spec:
  version: v0.6.5
  homepage: https://github.com/chenjiandongx/kubectl-images
  shortDescription: Show container images used in the cluster.
  description: |
    This plugin shows container images used in the Kubernetes cluster in a
    table view. You can show all images or show images used in a specified
    namespace.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    files:
      - from: kubectl-images
        to: .
      - from: LICENSE
        to: .
    uri: https://github.com/chenjiandongx/kubectl-images/releases/download/v0.6.5/kubectl-images_darwin_amd64.tar.gz
    sha256: 96fc3daad14a7e6b1abf6dcde39eea6eb259deee4e79101f093418f67358c50e
    bin: kubectl-images
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    files:
      - from: kubectl-images
        to: .
      - from: LICENSE
        to: .
    uri: https://github.com/chenjiandongx/kubectl-images/releases/download/v0.6.5/kubectl-images_darwin_arm64.tar.gz
    sha256: a621fd63e4af013c6433fdf8c7521f1d5d7a9f2077bcbb15625b3edd6081cbe1
    bin: kubectl-images
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    files:
      - from: kubectl-images
        to: .
      - from: LICENSE
        to: .
    uri: https://github.com/chenjiandongx/kubectl-images/releases/download/v0.6.5/kubectl-images_linux_amd64.tar.gz
    sha256: 2dfd8517d062a1c5b85e510f4e8bb9016c3bcf1550b4fc67a35ca96076c91c37
    bin: kubectl-images
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    files:
      - from: kubectl-images
        to: .
      - from: LICENSE
        to: .
    uri: https://github.com/chenjiandongx/kubectl-images/releases/download/v0.6.5/kubectl-images_linux_arm64.tar.gz
    sha256: 306aab0b155bbba267b4886b5ca613fd4bd0ddc3a5390aa5ebe616e56bbed848
    bin: kubectl-images
  - selector:
      matchLabels:
        os: linux
        arch: arm
    files:
      - from: kubectl-images
        to: .
      - from: LICENSE
        to: .
    uri: https://github.com/chenjiandongx/kubectl-images/releases/download/v0.6.5/kubectl-images_linux_arm.tar.gz
    sha256: 40ec1ca1aa020bd4cccb747180cfdd65f5d359c8e56cb2b627381b0c0f8be8b0
    bin: kubectl-images
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    files:
      - from: kubectl-images.exe
        to: .
      - from: LICENSE
        to: .
    uri: https://github.com/chenjiandongx/kubectl-images/releases/download/v0.6.5/kubectl-images_windows_amd64.tar.gz
    sha256: 1d4e313f485f97de11bf6e3b8625cb1797e3a31b1e18580fc8482dab73870782
    bin: kubectl-images.exe
