apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: inspect
spec:
  version: v1.1.3
  homepage: https://github.com/irenedo/kubectl-inspect
  shortDescription: Browse Kubernetes resources interactively with a TUI tree browser
  description: |
    An interactive terminal UI for browsing Kubernetes resource and CRD field
    structures. Instead of typing kubectl explain repeatedly, use the collapsible
    tree view to explore fields and see full explain output in real-time.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.3/kubectl-inspect_v1.1.3_darwin_amd64.tar.gz
    sha256: 837f657641edf6d8c7aaa0cdc6005f523bc85eb7ed7d6a364b999c7c19dfa983
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.3/kubectl-inspect_v1.1.3_darwin_arm64.tar.gz
    sha256: 5a60eebaac9cd313afba082b068c38d4eda4d9621754943e3e97b5795470d3f1
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.3/kubectl-inspect_v1.1.3_linux_amd64.tar.gz
    sha256: 0477fe34aa1cf7f9252d7c4f339b1819332e0465ec88c752fdbbc477e273f5e2
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.3/kubectl-inspect_v1.1.3_linux_arm64.tar.gz
    sha256: b17390d021c621dc4dca2afc62e73f910970c89e7bf99d867b3f00e5a3a35b89
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.3/kubectl-inspect_v1.1.3_windows_amd64.tar.gz
    sha256: 7fe248a0167a2ab4dbc610d5b2a39a230f9b6c7d877b4cff469654bc1a627078
    bin: kubectl-inspect.exe
