apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: inspect
spec:
  version: v1.1.0 # This will be replaced with the actual version during release
  homepage: https://github.com/irenedo/kubectl-inspect
  shortDescription: Browse Kubernetes resources interactively with a TUI tree browser
  description: |
    An interactive terminal UI for browsing Kubernetes resource and CRD field
    structures. Instead of typing kubectl explain repeatedly, use the collapsible
    tree view to explore fields and see full explain output in real-time.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.0/kubectl-inspect_v1.1.0_darwin_amd64.tar.gz
    sha256: 90c1e5650691d1990e9bd2fb0d9ca53fff2cbee92f07803684ce8977640b3cf4
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.0/kubectl-inspect_v1.1.0_darwin_arm64.tar.gz
    sha256: 03f2735d026c3aa618dbdd0072ba67e62a3f53a3825e369280ad19d43a2ecb70
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.0/kubectl-inspect_v1.1.0_linux_amd64.tar.gz
    sha256: ab484b79d2e9bd41aae2d26d07f2a5e31b6a64798c4fd4282a1c58039884accf
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.0/kubectl-inspect_v1.1.0_linux_arm64.tar.gz
    sha256: 91e88564f3f895603d6933b8815e3075fe2114bebf1bff131d9c9f9e67137d54
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.0/kubectl-inspect_v1.1.0_windows_amd64.tar.gz
    sha256: 8d4f17180769541ce8c2c8cfe00b89c64b1a423c83440cf0d26a498dfd22ec60
    bin: kubectl-inspect.exe
