apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: inspect
spec:
  version: v1.1.2
  homepage: https://github.com/irenedo/kubectl-inspect
  shortDescription: Browse Kubernetes resources interactively with a TUI tree browser
  description: |
    An interactive terminal UI for browsing Kubernetes resource and CRD field
    structures. Instead of typing kubectl explain repeatedly, use the collapsible
    tree view to explore fields and see full explain output in real-time.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.2/kubectl-inspect_v1.1.2_darwin_amd64.tar.gz
    sha256: edd49c4945451c9ad10fe112327e9d241b8b0d1ff3ee24352e966d1e44a38632
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.2/kubectl-inspect_v1.1.2_darwin_arm64.tar.gz
    sha256: dca05b0373a14fc87f910b77b1f879e550fd668f44d68402a614e126dfb0e17d
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.2/kubectl-inspect_v1.1.2_linux_amd64.tar.gz
    sha256: 0c6f03dc306d357745c0e873f26d84b120dcd575ac66224ae35069f947273e44
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.2/kubectl-inspect_v1.1.2_linux_arm64.tar.gz
    sha256: 911c34cc455f185a9aef6d55c6a6572cb9ec6f877ee2efe140098e3832e30e46
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.2/kubectl-inspect_v1.1.2_windows_amd64.tar.gz
    sha256: 2fb014026b477ac9627164455d00036273d7b8966280d8ef15920bd856093673
    bin: kubectl-inspect.exe
