apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: inspect
spec:
  version: v1.1.1 # This will be replaced with the actual version during release
  homepage: https://github.com/irenedo/kubectl-inspect
  shortDescription: Browse Kubernetes resources interactively with a TUI tree browser
  description: |
    An interactive terminal UI for browsing Kubernetes resource and CRD field
    structures. Instead of typing kubectl explain repeatedly, use the collapsible
    tree view to explore fields and see full explain output in real-time.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.1/kubectl-inspect_v1.1.1_darwin_amd64.tar.gz
    sha256: e2af24d9d6057acb215a4b03d856d65f3d28df427b3f86a33b89f7e17d80fd8f
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.1/kubectl-inspect_v1.1.1_darwin_arm64.tar.gz
    sha256: b1eba27f6d5167b4c998d2500753ebe055eb0440f3946f489cbc707ab05b55d7
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.1/kubectl-inspect_v1.1.1_linux_amd64.tar.gz
    sha256: 885e065ab8f59d0a7bcf318d8bb488a7a8ec49cdb9e743c7f7d66b1595308b63
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.1/kubectl-inspect_v1.1.1_linux_arm64.tar.gz
    sha256: 636e4194656befb7b33ba42607cbf411cf7fddd6417a7947b4d2959837840a56
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/irenedo/kubectl-inspect/releases/download/v1.1.1/kubectl-inspect_v1.1.1_windows_amd64.tar.gz
    sha256: 07fdcc2f0b0c10902514430879f7bd095172d3f54e163e61bf7dc9fd3f8fb514
    bin: kubectl-inspect.exe
