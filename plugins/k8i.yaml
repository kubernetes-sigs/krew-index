      uri: https://github.com/ViktorUJ/kubectl-k8i/releases/download/v0.1.4/kubectl-k8i_darwin_arm64.tar.gz
      sha256: "9d5ff19fad6936541b9b3e2a1e408fd0317ba70949dc562553e0f9933d510a69"
