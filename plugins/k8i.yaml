      uri: https://github.com/ViktorUJ/kubectl-k8i/releases/download/v0.1.1/kubectl-k8i_darwin_arm64.tar.gz
      sha256: "7c3105576d2082b46afb5f59ea9a62d18b1d584e0c7980b7d19917357f1fe37e"
      bin: kubectl-k8i
