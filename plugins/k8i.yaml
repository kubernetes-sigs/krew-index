      uri: https://github.com/ViktorUJ/kubectl-k8i/releases/download/v0.1.3/kubectl-k8i_darwin_arm64.tar.gz
      sha256: "3237b97c2a8420a14613d687d446961754dc78e5c45308f71135df71bcf8c644"
