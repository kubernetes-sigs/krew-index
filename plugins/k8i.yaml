      uri: https://github.com/ViktorUJ/kubectl-k8i/releases/download/v0.1.2/kubectl-k8i_darwin_arm64.tar.gz
      sha256: "63e8f508e9cc3e189114f3bd3b108f8e742238469d59451ebc6672e20fc2f766"
      bin: kubectl-k8i
    - selector:
