      uri: https://github.com/ViktorUJ/kubectl-k8i/releases/download/v0.1.2/kubectl-k8i_windows_amd64.zip
      sha256: "b2aaede181d893b45bcc02f4d19f167bc9580ef9e07fa7015d4ccbcc9e7d30e2"
