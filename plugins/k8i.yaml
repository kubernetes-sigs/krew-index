          arch: amd64
      uri: https://github.com/ViktorUJ/kubectl-k8i/releases/download/v0.1.0/kubectl-k8i_windows_amd64.zip
      sha256: "4c2e9d09e520f802b0ae6f2f831b338bc58aa0f5f00beea56f4c1ff05e038c1e"
