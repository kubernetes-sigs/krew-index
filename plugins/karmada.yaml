apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: karmada
spec:
  description: |
    Karmada (Kubernetes Armada) is a Kubernetes management system that enables
    you to run your cloud-native applications across multiple Kubernetes
    clusters and clouds, with no changes to your applications. By speaking
    Kubernetes-native APIs and providing advanced scheduling capabilities,
    Karmada enables truly open, multi-cloud Kubernetes.
    This cli tools controls a federation of Karmada clusters.
  homepage: https://github.com/karmada-io/karmada
  platforms:
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: arm64
        os: linux
    uri: https://github.com/karmada-io/karmada/releases/download/v1.18.1/kubectl-karmada-linux-arm64.tgz
    sha256: 3842b57dc0fb010f54fb6f17080c606899b1545a56a40c28c3502698289dfff2
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: arm64
        os: darwin
    uri: https://github.com/karmada-io/karmada/releases/download/v1.18.1/kubectl-karmada-darwin-arm64.tgz
    sha256: ae1f35692b587c4e134fb40f942e7b597933002d3dda8f2ce7cab1a60f15e306
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: amd64
        os: linux
    uri: https://github.com/karmada-io/karmada/releases/download/v1.18.1/kubectl-karmada-linux-amd64.tgz
    sha256: 6c30527c759e2bb2e0580ac413acdba70029c690d0971b444c6f4d13b42ca619
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: amd64
        os: darwin
    uri: https://github.com/karmada-io/karmada/releases/download/v1.18.1/kubectl-karmada-darwin-amd64.tgz
    sha256: 8a6f7b84277b8880673656fab682acee166b8e58635d7de1909a5683573fe4f4
  shortDescription: Manage clusters with Karmada federation.
  version: v1.18.1
