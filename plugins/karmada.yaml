apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: karmada
spec:
  description: |
    Karmada (Kubernetes Armada) is a Kubernetes management system that enables
    you to run your cloud-native applications across multiple Kubernetes
    clusters and clouds, with no changes to your applications. By speaking
    Kubernetes-native APIs and providing advanced scheduling capabilities,
    Karmada enables truly open, multi-cloud Kubernetes.
    This cli tools controls a federation of Karmada clusters.
  homepage: https://github.com/karmada-io/karmada
  platforms:
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: arm64
        os: linux
    uri: https://github.com/karmada-io/karmada/releases/download/v1.17.2/kubectl-karmada-linux-arm64.tgz
    sha256: 60257cea3e9ebd3f66050151d305f8b97faab9b25ca632202852633fe21562d9
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: arm64
        os: darwin
    uri: https://github.com/karmada-io/karmada/releases/download/v1.17.2/kubectl-karmada-darwin-arm64.tgz
    sha256: 60765b87e91232b5de25719ae9d381e9c997493b5c7574648289723d9be3490e
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: amd64
        os: linux
    uri: https://github.com/karmada-io/karmada/releases/download/v1.17.2/kubectl-karmada-linux-amd64.tgz
    sha256: 90d117aaf23442dfa5e38eca7ca2ba2a60124d37553f7e4fc6a5e8f8ac1eb42a
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: amd64
        os: darwin
    uri: https://github.com/karmada-io/karmada/releases/download/v1.17.2/kubectl-karmada-darwin-amd64.tgz
    sha256: 19a1de2fcc187c662e19d145803b152434e9b637f03803df94610fc9a1f32423
  shortDescription: Manage clusters with Karmada federation.
  version: v1.17.2
