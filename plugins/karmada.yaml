apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: karmada
spec:
  description: |
    Karmada (Kubernetes Armada) is a Kubernetes management system that enables
    you to run your cloud-native applications across multiple Kubernetes
    clusters and clouds, with no changes to your applications. By speaking
    Kubernetes-native APIs and providing advanced scheduling capabilities,
    Karmada enables truly open, multi-cloud Kubernetes.
    This cli tools controls a federation of Karmada clusters.
  homepage: https://github.com/karmada-io/karmada
  platforms:
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: arm64
        os: linux
    uri: https://github.com/karmada-io/karmada/releases/download/v1.18.0/kubectl-karmada-linux-arm64.tgz
    sha256: 8bbbb125d97c69bfbf5f45f7534c83bb0514e31e89371debf016618c1a5917b7
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: arm64
        os: darwin
    uri: https://github.com/karmada-io/karmada/releases/download/v1.18.0/kubectl-karmada-darwin-arm64.tgz
    sha256: c85ea8f80a1f2aa05aeebd59200f173bea0b1f0aedf0e561a5688f4f33400020
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: amd64
        os: linux
    uri: https://github.com/karmada-io/karmada/releases/download/v1.18.0/kubectl-karmada-linux-amd64.tgz
    sha256: 92be9959cb6c5bec637681e7dcf53b99b2d6c43795b99e8436fd0c12cde01fd1
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: amd64
        os: darwin
    uri: https://github.com/karmada-io/karmada/releases/download/v1.18.0/kubectl-karmada-darwin-amd64.tgz
    sha256: 6366dc43c94aa9cf2329515c114eb74818084479c0f8951f656c7f4779d91177
  shortDescription: Manage clusters with Karmada federation.
  version: v1.18.0
