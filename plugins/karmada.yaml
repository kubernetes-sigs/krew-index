apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: karmada
spec:
  description: |
    Karmada (Kubernetes Armada) is a Kubernetes management system that enables
    you to run your cloud-native applications across multiple Kubernetes
    clusters and clouds, with no changes to your applications. By speaking
    Kubernetes-native APIs and providing advanced scheduling capabilities,
    Karmada enables truly open, multi-cloud Kubernetes.
    This cli tools controls a federation of Karmada clusters.
  homepage: https://github.com/karmada-io/karmada
  platforms:
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: arm64
        os: linux
    uri: https://github.com/karmada-io/karmada/releases/download/v1.17.1/kubectl-karmada-linux-arm64.tgz
    sha256: 4071f247a4c97137fb3ae4c02a27932a6e569b17358e791b59c8b90ec51536fa
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: arm64
        os: darwin
    uri: https://github.com/karmada-io/karmada/releases/download/v1.17.1/kubectl-karmada-darwin-arm64.tgz
    sha256: 5f24c15bf992ba3005c5483bba499c1f20dd16063f54fb05b412778262fbedc6
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: amd64
        os: linux
    uri: https://github.com/karmada-io/karmada/releases/download/v1.17.1/kubectl-karmada-linux-amd64.tgz
    sha256: 708c61afd9f8ea683440b4804fb9efa4ad55646718e204017dc138685f78f73f
  - bin: kubectl-karmada
    files:
    - from: kubectl-karmada
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        arch: amd64
        os: darwin
    uri: https://github.com/karmada-io/karmada/releases/download/v1.17.1/kubectl-karmada-darwin-amd64.tgz
    sha256: b13b315aa052116df3f563327cb4a27d67c4d53518d32b112baa363f8efb3a0f
  shortDescription: Manage clusters with Karmada federation.
  version: v1.17.1
