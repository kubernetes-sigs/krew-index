apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kimspect
spec:
  version: v0.0.44
  shortDescription: Inspect container images on your pods and nodes.
  description: |
    kimspect is a kubernetes container image inspection tool that provides
    comprehensive visibility into container images running inside your cluster
    and can get container image & registry information by pods, namespaces and nodes
    in your cluster
  homepage: https://github.com/koithos/kimspect
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/koithos/kimspect/releases/download/v0.0.44/kimspect-x86_64-unknown-linux-musl.tar.gz
      sha256: 1693cc3f856b2a0ca66a1419ad436a95d1edb4c458dcda47f94f702941691990
      bin: kimspect
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/koithos/kimspect/releases/download/v0.0.44/kimspect-x86_64-apple-darwin.tar.gz
      sha256: 57f461c302ca951ce077bc62e5dbe405105cb34928627976f427528570198ebc
      bin: kimspect
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/koithos/kimspect/releases/download/v0.0.44/kimspect-aarch64-apple-darwin.tar.gz
      sha256: ae5e93f3a173baeb2dec594d2d0177ebcc2279ed5f1e92b29179921551eea73a
      bin: kimspect
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/koithos/kimspect/releases/download/v0.0.44/kimspect-x86_64-pc-windows-msvc.zip
      sha256: c538e8a8531fe64440b818f2b5eebdc12398b45f973f5f40355f4298a9c5382f
      bin: kimspect.exe
