apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kimspect
spec:
  version: v0.0.45
  shortDescription: Inspect container images on your pods and nodes.
  description: |
    kimspect is a kubernetes container image inspection tool that provides
    comprehensive visibility into container images running inside your cluster
    and can get container image & registry information by pods, namespaces and nodes
    in your cluster
  homepage: https://github.com/koithos/kimspect
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/koithos/kimspect/releases/download/v0.0.45/kimspect-x86_64-unknown-linux-musl.tar.gz
      sha256: 89c7b62f9e07901dea0f5714000a9e1a22a9b29485d611a712d7a639d4b75155
      bin: kimspect
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/koithos/kimspect/releases/download/v0.0.45/kimspect-x86_64-apple-darwin.tar.gz
      sha256: 7581bf8931ece1589a8d2702906260aa0962e35af2d409e00c4cce4525beef41
      bin: kimspect
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/koithos/kimspect/releases/download/v0.0.45/kimspect-aarch64-apple-darwin.tar.gz
      sha256: 833a819125d5cda8a40b08290de2ee97f5988c37df39ebeb26b5405199d66d07
      bin: kimspect
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/koithos/kimspect/releases/download/v0.0.45/kimspect-x86_64-pc-windows-msvc.zip
      sha256: 20e415a1b10732265af37a06ba8b2d5c93243bc4d53cec883161860228c96c81
      bin: kimspect.exe
