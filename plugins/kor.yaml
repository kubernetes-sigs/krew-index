apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kor
spec:
  version: v0.6.8
  homepage: https://github.com/yonahd/kor
  shortDescription: Kor is a tool to discover unused K8s resources.
  description: |
    This plugin shows unused Kubernetes resources (namespaced or cluster-scoped).
    It provides additional capabilities such as exporting Prometheus metrics,
    deleting unused resources, and more!
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/yonahd/kor/releases/download/v0.6.8/kor_Linux_x86_64.tar.gz
    sha256: d5b8ca1aabfa58f7e17d7c4e404ec58f7fcb370fce862ec11ea3a4c3b26e841c
    bin: kor
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/yonahd/kor/releases/download/v0.6.8/kor_Linux_arm64.tar.gz
    sha256: 978abd619cb2612a5a100cb8c979531d2d8325caaa90350acc9eac977c91f7ca
    bin: kor
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/yonahd/kor/releases/download/v0.6.8/kor_Darwin_x86_64.tar.gz
    sha256: fe93ee29f16367e65b5d8294ca3f323eda65f80d5d00239eb917c29aa02e5df7
    bin: kor
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/yonahd/kor/releases/download/v0.6.8/kor_Darwin_arm64.tar.gz
    sha256: b2c28261240a7238194bc17eb046c89d70bcbe02ad5506be73a3dc75433e4cab
    bin: kor
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/yonahd/kor/releases/download/v0.6.8/kor_Windows_x86_64.zip
    sha256: 82163d03bf0b50c875a6d602bce75dff555447aaaf06bd01987fe62b6bcebdc6
    bin: kor.exe
