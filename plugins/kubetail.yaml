apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kubetail
spec:
  version: "v0.17.0"
  homepage: https://github.com/kubetail-org/kubetail
  shortDescription: "Logging tool for Kubernetes with real-time web dashboard"
  description: |
    Kubetail is a general-purpose logging tool for Kubernetes, optimized for
    tailing logs across multi-container workloads in real-time. With Kubetail,
    you can view logs from all the containers in a workload merged into a single,
    chronological timeline, delivered to your browser or terminal.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.17.0/kubetail-darwin-amd64.tar.gz
    sha256: 300a3dea31991aca5470516381ccaf249c793e0b6fba03787059cd4740afad28
    bin: kubetail
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.17.0/kubetail-darwin-arm64.tar.gz
    sha256: 30bbfd05fb4a96db8714bfca51941b429ee06de6ff8a0879e6a968bd22bf944b
    bin: kubetail
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.17.0/kubetail-linux-amd64.tar.gz
    sha256: 86052a8e747ac3e0d1a9a26ba0979f2b8ac3871fa9ec97746381286eead5f3db
    bin: kubetail
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.17.0/kubetail-linux-arm64.tar.gz
    sha256: 548fb01804874c3e85f1d6885585cfdf6a6aa8cc3a775b041cd8e6ec846e111e
    bin: kubetail
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.17.0/kubetail-windows-amd64.tar.gz
    sha256: 5be6cd0a0d76dd100dfee7c415e21916de8d50edca0e39a042771ad37ed15a9a
    bin: kubetail.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.17.0/kubetail-windows-arm64.tar.gz
    sha256: 1268354b88da32fabe59b1bbe5a8dc78aac40e7b9c007c55263c89f999fe0b6f
    bin: kubetail.exe
