apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kubetail
spec:
  version: "v0.13.0"
  homepage: https://github.com/kubetail-org/kubetail
  shortDescription: "Logging tool for Kubernetes with real-time web dashboard"
  description: |
    Kubetail is a general-purpose logging tool for Kubernetes, optimized for
    tailing logs across multi-container workloads in real-time. With Kubetail,
    you can view logs from all the containers in a workload merged into a single,
    chronological timeline, delivered to your browser or terminal.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.13.0/kubetail-darwin-amd64.tar.gz
    sha256: 303eaf283c6e0ec97e5cdfee530ea262b39e72bfb80a8984737d786ab4609039
    bin: kubetail
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.13.0/kubetail-darwin-arm64.tar.gz
    sha256: 1c1280c8615b29ce37419fa3d0e3f69d2711ab98d5d107dab7d3736e916d4d3d
    bin: kubetail
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.13.0/kubetail-linux-amd64.tar.gz
    sha256: e9f8bf755fcb2333757adb8a2f64b22de2b3547bd0749c80774e099fc53e88d7
    bin: kubetail
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.13.0/kubetail-linux-arm64.tar.gz
    sha256: f039ad313d809eeee08dbd740af246728984ca64c81c44cc6e4184b03e8cff83
    bin: kubetail
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.13.0/kubetail-windows-amd64.tar.gz
    sha256: 88a2c96a92838cacd8882f543f814357d0caae4cebf157b007934edf1057119d
    bin: kubetail.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.13.0/kubetail-windows-arm64.tar.gz
    sha256: 4020216af3ae5748f5b07578720c8deb7ce7b8a12e41f0a45bb92926161863d1
    bin: kubetail.exe
