apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kubetail
spec:
  version: "v0.14.0"
  homepage: https://github.com/kubetail-org/kubetail
  shortDescription: "Logging tool for Kubernetes with real-time web dashboard"
  description: |
    Kubetail is a general-purpose logging tool for Kubernetes, optimized for
    tailing logs across multi-container workloads in real-time. With Kubetail,
    you can view logs from all the containers in a workload merged into a single,
    chronological timeline, delivered to your browser or terminal.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.14.0/kubetail-darwin-amd64.tar.gz
    sha256: 73a76389b16edf7f9753df6261dc78b5198879a5d0aea0cbebc7f40d327fd597
    bin: kubetail
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.14.0/kubetail-darwin-arm64.tar.gz
    sha256: ed2f0ae3494451d8920abee467224e48f2c4e7e68d6bd7b9bc5a279ff429e9bc
    bin: kubetail
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.14.0/kubetail-linux-amd64.tar.gz
    sha256: 487f6e7cac12dd347d03a6167adbeb069d86c93995b06eb5713876d8d289fd73
    bin: kubetail
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.14.0/kubetail-linux-arm64.tar.gz
    sha256: ed77af613577af97cbcadb968cc4c29116ee9569256a4c2a2f745c2fd4361312
    bin: kubetail
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.14.0/kubetail-windows-amd64.tar.gz
    sha256: aa52cf904e506727566bf83ff4343e0b23a6b6744fa52efbb3f6f5d8ad6dfe3e
    bin: kubetail.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.14.0/kubetail-windows-arm64.tar.gz
    sha256: ea02e87751f39b4d59906cb2e04d792a550e02ba305fb7f17c0c01a55feec530
    bin: kubetail.exe
