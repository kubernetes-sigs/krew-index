apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kubetail
spec:
  version: "v0.18.0"
  homepage: https://github.com/kubetail-org/kubetail
  shortDescription: "Logging tool for Kubernetes with real-time web dashboard"
  description: |
    Kubetail is a general-purpose logging tool for Kubernetes, optimized for
    tailing logs across multi-container workloads in real-time. With Kubetail,
    you can view logs from all the containers in a workload merged into a single,
    chronological timeline, delivered to your browser or terminal.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.18.0/kubetail-darwin-amd64.tar.gz
    sha256: 22ca2aa657989aaf623b3e1a0a323a350ff317203129e4f5de4330608e136aa3
    bin: kubetail
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.18.0/kubetail-darwin-arm64.tar.gz
    sha256: c6c136d9b89ea40b907b3fd6066775d3cca8a2ceac5789aa1a17eb8f62dce2e3
    bin: kubetail
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.18.0/kubetail-linux-amd64.tar.gz
    sha256: 2584517689be61a12de17532303c66773061e24c77606f627da87973d9ae7d47
    bin: kubetail
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.18.0/kubetail-linux-arm64.tar.gz
    sha256: f77c21b6af8de9d9f3961197b5b77bef8fbdcf6cd5feb2885969d1f7e5ba868a
    bin: kubetail
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.18.0/kubetail-windows-amd64.tar.gz
    sha256: 3b3c177c9f0a50c8d65fc6ca0110b5df46280b74608f8d42d35a80af159ccc44
    bin: kubetail.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.18.0/kubetail-windows-arm64.tar.gz
    sha256: 96bccbd721fdf800594ef40dcdf29e010bc9a74d119c7db741b062ed500c3daf
    bin: kubetail.exe
