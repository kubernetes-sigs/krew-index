apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kubetail
spec:
  version: "v0.12.2"
  homepage: https://github.com/kubetail-org/kubetail
  shortDescription: "Logging tool for Kubernetes with real-time web dashboard"
  description: |
    Kubetail is a general-purpose logging tool for Kubernetes, optimized for
    tailing logs across multi-container workloads in real-time. With Kubetail,
    you can view logs from all the containers in a workload merged into a single,
    chronological timeline, delivered to your browser or terminal.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.12.2/kubetail-darwin-amd64.tar.gz
    sha256: a683a40569e3413924930bacedd59b6b97d450c578b9a15c7eb43047fff0d138
    bin: kubetail
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.12.2/kubetail-darwin-arm64.tar.gz
    sha256: bd77b3445ba1345cddf61a6ac9da8d10d659f78fb58f81178182ec5d12e9ad21
    bin: kubetail
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.12.2/kubetail-linux-amd64.tar.gz
    sha256: 0fec6b89ac087f45b74b75bdf29c65bdd8cfa79e89f94075c35ef6788ae99906
    bin: kubetail
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.12.2/kubetail-linux-arm64.tar.gz
    sha256: d0b6ad8b0da339295159dcf7774ca1629dbf58f08c83123def05498fef1b02b2
    bin: kubetail
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.12.2/kubetail-windows-amd64.tar.gz
    sha256: cc69c28c6d038a43deec7ec16cef19989bc1b443538cf40c558886781cd4de1b
    bin: kubetail.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.12.2/kubetail-windows-arm64.tar.gz
    sha256: 0016747eb029760991b1d55fa4e68a8cd6a387b6194d3d8259d95186a74fa8a2
    bin: kubetail.exe
