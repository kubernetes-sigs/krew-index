apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kubetail
spec:
  version: "v0.16.0"
  homepage: https://github.com/kubetail-org/kubetail
  shortDescription: "Logging tool for Kubernetes with real-time web dashboard"
  description: |
    Kubetail is a general-purpose logging tool for Kubernetes, optimized for
    tailing logs across multi-container workloads in real-time. With Kubetail,
    you can view logs from all the containers in a workload merged into a single,
    chronological timeline, delivered to your browser or terminal.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.16.0/kubetail-darwin-amd64.tar.gz
    sha256: af9c2bad5fd83776b33696d8e71025720650872bfcf7168f01bc69c50222f3d0
    bin: kubetail
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.16.0/kubetail-darwin-arm64.tar.gz
    sha256: 69f4af9a613a5a7f0241f31c391468a5be3481826f652519956b0b5abb72d859
    bin: kubetail
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.16.0/kubetail-linux-amd64.tar.gz
    sha256: 843bb06ae9d45716c7ff542319adce63c270d423932c7b3415c4c95cda040b4a
    bin: kubetail
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.16.0/kubetail-linux-arm64.tar.gz
    sha256: 64a4e1348274ea343d895a285216d2fdd9d8e4d74480ecc8c239fa29fb302123
    bin: kubetail
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.16.0/kubetail-windows-amd64.tar.gz
    sha256: 33c5b8f33529eab132ae66422a485e9dafaa464d855a7aecda58243d1ac2b17e
    bin: kubetail.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/kubetail-org/kubetail/releases/download/cli%2Fv0.16.0/kubetail-windows-arm64.tar.gz
    sha256: b9182c5581af072beb1e7c004334b06f4a02e15b9fbae963efd9f014b39d858d
    bin: kubetail.exe
