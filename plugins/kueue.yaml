apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.15.7
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.15.7/kubectl-kueue-linux-amd64.tar.gz
    sha256: 92ef368abec81f884ecf0f9f6ee4446d812f47897ef8fed6a979aecd00b6f83a
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.15.7/kubectl-kueue-linux-arm64.tar.gz
    sha256: ace06fe92c3480004e50083ab540fe54e5f3c109e4533bf57626a3c2345d1015
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.15.7/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 826cf4e2d1ba24065f3ef38c6573a70f7bfd8aa1ed2e3133591dff562c7afc3c
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.15.7/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 05d53a5721f0a6ade786b2905400dacabbf6f16717159864116d4bffa5a1b50a
    bin: "kubectl-kueue"
