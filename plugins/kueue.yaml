apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.17.8
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.8/kubectl-kueue-linux-amd64.tar.gz
    sha256: 8cce128b16fea2daf86e0e64355811fab71ed0bd02c746d9427addf2b437ba5c
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.8/kubectl-kueue-linux-arm64.tar.gz
    sha256: 0468d3514ab70968932ca06687ff3c4ec1b00d41e83fa260e6f6bb778e925e7c
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.8/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 8f983a6643319828326ca80230c06f0fc23bc7ecdd12006e2e07312e45997834
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.8/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 0726bc2fe80de136f2bf404e3b11873f435fbb53bac72776d9c6f28c0f37a3bb
    bin: "kubectl-kueue"
