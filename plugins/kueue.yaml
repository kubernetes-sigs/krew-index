apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.18.0
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.0/kubectl-kueue-linux-amd64.tar.gz
    sha256: f8c77f08843027eac6b3a9405c6568317091f62cf42cc7d374c605039358d6b0
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.0/kubectl-kueue-linux-arm64.tar.gz
    sha256: fb136b25ed0ebcb5998a793ee4304b03582903a7bda02df6ae86afadc87815a6
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.0/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 3c8e79dae08c4c85be54dd116396710d2d7137bac5458d00094e8e77c5e4dffa
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.0/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 8349a403975df29c5826639c4ed1a22abc78f5d6d956e8991f04d16b53bcb719
    bin: "kubectl-kueue"
