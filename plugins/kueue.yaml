apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.16.3
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.3/kubectl-kueue-linux-amd64.tar.gz
    sha256: 67158898d474de4a90931a54d4a3d45784d50336207d1e632f822f86b11a6960
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.3/kubectl-kueue-linux-arm64.tar.gz
    sha256: 402d06a7aa1c6138f89bd34c1e001c94c6675253a1012bbb8f76d2b0ee7033d3
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.3/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 2db390e46ca383a240e841b832674681eef184b34f6d78ce655ecb520fd43979
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.3/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 6616b10f41c1b903a3ba4f92ec7b8aa364e181656df4fed09a2154a4b977173e
    bin: "kubectl-kueue"
