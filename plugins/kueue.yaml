apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.17.5
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.5/kubectl-kueue-linux-amd64.tar.gz
    sha256: 28393e61956f19af670b5ed4d03f1ea35be6a2cd7215bf009576aaeb2ef7f605
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.5/kubectl-kueue-linux-arm64.tar.gz
    sha256: 5699a7e2df8b028d6dfa6e0bb0ad24274a3cce5c2761e767cd8a1fab6ca90a84
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.5/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 6ae9ac7d19b6846f941af672ade088e64be4f8f02c4e59df9af10382354bf79e
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.5/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 3995a707fc6d68601a7b0a7e0a26eadc36b80837799647d7baa9d4e6d8a7919a
    bin: "kubectl-kueue"
