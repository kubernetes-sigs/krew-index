apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.17.4
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.4/kubectl-kueue-linux-amd64.tar.gz
    sha256: 8ee6c1a9b1a10bc5fff96ec8c1e55f781aaafd3b318e2191a3d156c72cffde4f
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.4/kubectl-kueue-linux-arm64.tar.gz
    sha256: 79f47f5474a67cbe786444a3c80e99dd30cf5f0491bbc312d58f427b4c3ad77e
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.4/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 9f89afe5be2416dd7f5c61d8e087336c462a24297bf144df74c9deef77c32d95
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.4/kubectl-kueue-darwin-arm64.tar.gz
    sha256: e6ca05bb77bd6713d186be99aa160ef464972bf7fecb1f88e7920de376c889f9
    bin: "kubectl-kueue"
