apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.18.1
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.1/kubectl-kueue-linux-amd64.tar.gz
    sha256: cb08d807b5b4f6fb2ff21b493594a9c22a61c465db5ea1102ec0814b94f368ad
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.1/kubectl-kueue-linux-arm64.tar.gz
    sha256: c930c7be17f3832c090451d0a9d967aefbecdc64e926d41e4dc2308a1bd90593
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.1/kubectl-kueue-darwin-amd64.tar.gz
    sha256: ef8e14eb707bc95533b06533c5c304b38ed3c6eedd1338752d1148105a0f29bb
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.1/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 597b39ee4eb975d02dc1e9f9fa462a2110497d8280279704e32cd9adf1214aef
    bin: "kubectl-kueue"
