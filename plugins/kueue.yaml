apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.17.0
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.0/kubectl-kueue-linux-amd64.tar.gz
    sha256: 41577160cc0061427d9615ec43f7abeae4916ce65a1e16b21e9af515b0a7d0bb
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.0/kubectl-kueue-linux-arm64.tar.gz
    sha256: 5451997321fe36d0f0c87a51357b33fcb785e627f7501bd9efbe8c4640265bd2
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.0/kubectl-kueue-darwin-amd64.tar.gz
    sha256: dafb9b4c0357492a8bd5c165363c5a7119748f0686849836aac048be0a978632
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.0/kubectl-kueue-darwin-arm64.tar.gz
    sha256: cce969bf31808ebc86deaf832cb1a7fc2e9ddc7d8476c1b277be11e7ab8a7313
    bin: "kubectl-kueue"
