apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.15.6
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.15.6/kubectl-kueue-linux-amd64.tar.gz
    sha256: 823361fd3e531e55f9b9210e0516637ef849affab4feab7cc3b700cdd6327141
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.15.6/kubectl-kueue-linux-arm64.tar.gz
    sha256: d63782efcc43b97021c87cf8f909b5137e3071e489ebc7e093088a2906a854df
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.15.6/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 63521d81eeb888b6c51f5bbf17ac34eb74cb16f27c7c05dad5ece94a519fcc57
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.15.6/kubectl-kueue-darwin-arm64.tar.gz
    sha256: c723eccb2011192d55e68ac2afa84c953f44ac96b8d2edc2ba27f984c872a689
    bin: "kubectl-kueue"
