apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.18.4
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.4/kubectl-kueue-linux-amd64.tar.gz
    sha256: 8388dff254b1e2cb6081534fbea704945523f3963aa280e436e15b9fb3cf9819
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.4/kubectl-kueue-linux-arm64.tar.gz
    sha256: 53f909345679bcffdb526c794387f1c3d357395fc60ebee8dd4e704077ed6fca
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.4/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 2e7eb13619076d0e8780fb242c5bcd6c9d71736d62fa9ebd4f150a0319a542eb
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.4/kubectl-kueue-darwin-arm64.tar.gz
    sha256: f09cb14bd24a91ade7f34327e92cf9e6c3b91b01b551f09bfb56bf2be0d0c6a6
    bin: "kubectl-kueue"
