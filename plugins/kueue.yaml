apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.17.1
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.1/kubectl-kueue-linux-amd64.tar.gz
    sha256: 386f571ed5dabcffad381788b63e95d8d3d40a4990450dda0d8f824e6a5a54ea
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.1/kubectl-kueue-linux-arm64.tar.gz
    sha256: 8c23bb4eab88d355c89b8ef7d7e4a6fd353f83773c0932c5a9b1a1d5af9f7cd4
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.1/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 89f4f519fe1200691631dc7d0a4b40cab3a9a310d6bf95ab0f21eaee9b2e791b
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.1/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 6f721a713807eb159251de1c9db8fb24d2d9756343e37cac6098e859716c3171
    bin: "kubectl-kueue"
