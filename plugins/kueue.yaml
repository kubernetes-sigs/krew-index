apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.18.2
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.2/kubectl-kueue-linux-amd64.tar.gz
    sha256: 4dc0638f2ca93936f052c8ff8a60b66e27fb0d2de49672042f4418f51fb89145
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.2/kubectl-kueue-linux-arm64.tar.gz
    sha256: c4324d711bbf32e7be8633706c8c06d32c92312df4dbc9725c8949ea8d0caa58
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.2/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 478fca3cf674b90ddb0627931f96c4758e9f67b6be277e912def68d7af6a352b
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.2/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 77c211eb2195a3e2fc2ab626b4e757a18781a95a388226d455882e23d33d453b
    bin: "kubectl-kueue"
