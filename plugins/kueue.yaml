apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.16.9
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.9/kubectl-kueue-linux-amd64.tar.gz
    sha256: 5ac80c73d7205bba782d7d17acc1b6e2c3a0aa21e0668aaff4286f55555a967b
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.9/kubectl-kueue-linux-arm64.tar.gz
    sha256: f1d5132065e61c9d6420e214d6e00e4387e906d514b82cc95edb866a54fb60a7
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.9/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 77d47f4ffaa8b8b5cf6ac14834bd387bf570be4e2094a3f0524d435c33cba58b
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.9/kubectl-kueue-darwin-arm64.tar.gz
    sha256: d4e9174777cb2c33a3fac3cd40802a0e92a4360a7b671ddc7d1df06a90c841bf
    bin: "kubectl-kueue"
