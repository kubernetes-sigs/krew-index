apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.17.7
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.7/kubectl-kueue-linux-amd64.tar.gz
    sha256: 9f38dc4bc11ad87ed4543ddbd4189c6665f8842c3900eb03acf76908e2af212f
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.7/kubectl-kueue-linux-arm64.tar.gz
    sha256: be6624314c4c9f80a41095b7cc86aa0573b432bd5c97642987ae49666afe0b2a
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.7/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 4d2b90b27d304eeaf98345b835a05e2e4b553fec0b9191675395b8d5970b23bc
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.7/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 4e5fe0c604d99b8ae4a8689b7cffaa9d722bcb5cad10f8a11b30a3ba1e806246
    bin: "kubectl-kueue"
