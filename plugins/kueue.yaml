apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.16.4
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.4/kubectl-kueue-linux-amd64.tar.gz
    sha256: bc3ecfb23ce3de48a6613e8fce6326782321f8ec681676e835ff1d83471349f6
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.4/kubectl-kueue-linux-arm64.tar.gz
    sha256: 22d82247e10bb45aede3e53bdd6ef86adc67bdaf09cfecd94800da307075e1d7
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.4/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 30e51eaabea069acaf639a475b7162e0bc542af70a4e965049023a572507ca4a
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.4/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 458cbb0037db2a23c183c1dbf2a0ed3c5ab259dafebd46aa1ac134b1aa50bc08
    bin: "kubectl-kueue"
