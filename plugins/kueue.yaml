apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.15.8
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.15.8/kubectl-kueue-linux-amd64.tar.gz
    sha256: 07a8d5f6e6a22ebcc0f4b601ffe3a433c8af17a4ffa459655d26ad775040c984
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.15.8/kubectl-kueue-linux-arm64.tar.gz
    sha256: b513ef4ca8a3fcd1f4ed719c97a1aebbe7886c0a6230503ea79b2844db779362
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.15.8/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 661359877cd78e8d27cb52a3419f791e75c72d1985140a71a4eda878d207d14f
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.15.8/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 0287484742d058e65785655c7e723aea92fe022f003870ba163d66752b073803
    bin: "kubectl-kueue"
