apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.16.8
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.8/kubectl-kueue-linux-amd64.tar.gz
    sha256: 4e1e3639ce8ed612420a36e12f9bc4a8cd7391a391fa833c20e0309fe30dced9
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.8/kubectl-kueue-linux-arm64.tar.gz
    sha256: 9442d5916aeeae054a377a5d1b140d1ff8d6b5e0bb3e544ab100b82977b11844
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.8/kubectl-kueue-darwin-amd64.tar.gz
    sha256: a7b5f8b3f38cf061524c0a729ad0528e6a027d65e9a1125678d7b8635de8386f
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.8/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 490acea1f387949b476e19fe9a269f9d32602bb8aff07e38cd3900dcb599fd6e
    bin: "kubectl-kueue"
