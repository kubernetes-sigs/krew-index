apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.16.6
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.6/kubectl-kueue-linux-amd64.tar.gz
    sha256: 784c5c66c5752a7da3ea957767f95b0119f48ba27f38868c3abaf6d4ebde7af6
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.6/kubectl-kueue-linux-arm64.tar.gz
    sha256: 74ae6bca752aa96fa2cb34084b0dbbee70e5236ba82c0159214ef205c204c6d6
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.6/kubectl-kueue-darwin-amd64.tar.gz
    sha256: cd6694e5f5ea4c7163c2c6f42da40016c075bbfa2c79fe5b9cb4761f68bf7da8
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.6/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 261c087c7b534aa4a0f9b8998d776f17752b9813bb00e550da5257a374662828
    bin: "kubectl-kueue"
