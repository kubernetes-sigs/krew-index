apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.17.2
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.2/kubectl-kueue-linux-amd64.tar.gz
    sha256: 58a47fed6baa99177e1226fbc24fb77f8ed299b577bc7a2358a53def49f39007
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.2/kubectl-kueue-linux-arm64.tar.gz
    sha256: 62d68f606e92419123168f01e22a0dcdc5faa02711cdb1ac4f3bf18182267cc5
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.2/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 825f322dde329a9ea4019db85e52c92d071eadd884e57c3a7281bd3c780092a7
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.2/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 801de9ca674d459c26c4a2a24586d04b34868894bacd79c583537e7044af7a56
    bin: "kubectl-kueue"
