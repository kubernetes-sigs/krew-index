apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.16.5
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.5/kubectl-kueue-linux-amd64.tar.gz
    sha256: dd1c9799ced410443130b1178fe8187a91f2afdcc5f2a104c544079d19883b1a
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.5/kubectl-kueue-linux-arm64.tar.gz
    sha256: c59f97dbc3817be12f701e150584ca764444e2e35a9238fad998a5315caba8f5
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.5/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 8e35e74f6c7b6ad387dfb573a2c8973048a99469658292d3b7a401d4b303dc9f
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.5/kubectl-kueue-darwin-arm64.tar.gz
    sha256: f47b37bad80a79dbbe9993fb3cfae7f1287f25c960b2b8b43b89a870af866df3
    bin: "kubectl-kueue"
