apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.17.3
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.3/kubectl-kueue-linux-amd64.tar.gz
    sha256: eeaa52edc722095ce5adc47d2459c74b79f5ec405e605b9c505e3fa4da155320
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.3/kubectl-kueue-linux-arm64.tar.gz
    sha256: c266b27fe29817a41c58a8cf8af3d890d0fdec04f9a4ffec879241ebdf294052
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.3/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 3d27da4a9ce88f55ecb17b05f1cbda693cc6627d696bd8bb71fef5bde3bfaf4c
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.17.3/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 797a87774fbbaff6d07233492ef6f5bbb161b89c8eaca16ad717302c756de885
    bin: "kubectl-kueue"
