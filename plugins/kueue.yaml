apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.16.7
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.7/kubectl-kueue-linux-amd64.tar.gz
    sha256: 8225033f0849e9f7c22b849a9a98c012de5ea9fe1f17b6e52b9a412b7586dede
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.7/kubectl-kueue-linux-arm64.tar.gz
    sha256: 9799b42ad830b9be5521a205705c168f1d4369fb3ca78e4edeafc7b7e111e8ba
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.7/kubectl-kueue-darwin-amd64.tar.gz
    sha256: baa2915a9d3e2c9470020a57484bee808c959696d573ac304c6c41f03dc84c45
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.16.7/kubectl-kueue-darwin-arm64.tar.gz
    sha256: 6c7e4b61fdd45744a0a0e6bbc5ae541a5d4e247c988f7de330971f174a3f0651
    bin: "kubectl-kueue"
