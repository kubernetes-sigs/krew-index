apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kueue
spec:
  version: v0.18.3
  shortDescription: Controls Kueue queueing manager.
  homepage: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  description: |
    The kubectl-kueue plugin, kueuectl, allows you to list, create, resume
    and stop kueue resources such as clusterqueues, localqueues and workloads.

    See the documentation for more information: https://kueue.sigs.k8s.io/docs/reference/kubectl-kueue/
  caveats: |
    Requires the Kueue operator to be installed:
      https://kueue.sigs.k8s.io/docs/installation/
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.3/kubectl-kueue-linux-amd64.tar.gz
    sha256: 9b2955179bb23217b4d6ed3dfaebe6e8e6ad0d5b76c85b0084ac206d74b9994b
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.3/kubectl-kueue-linux-arm64.tar.gz
    sha256: b3c3cc5d74d5726e0e35091b94463aab9e90a892a302210d635995caa48f3899
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.3/kubectl-kueue-darwin-amd64.tar.gz
    sha256: 8c4bd51805ce0507a4d680964e5226485c4dceab16883887191243aa54ecc3ad
    bin: "kubectl-kueue"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kubernetes-sigs/kueue/releases/download/v0.18.3/kubectl-kueue-darwin-arm64.tar.gz
    sha256: ed9364f60cec9ec589485b8c008ba105f94288c55ec984a6ed0caaca9ea01927
    bin: "kubectl-kueue"
