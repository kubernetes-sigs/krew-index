apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kuttl
spec:
  version: "v0.26.0"

  shortDescription: Declaratively run and test operators
  homepage: https://github.com/kudobuilder/kuttl
  description: |
    The KUbernetes Test TooL (KUTTL) is a highly productive test
    toolkit for testing operators on Kubernetes.
  platforms:
  - selector:
      matchLabels:
        os: "linux"
        arch: "amd64"
    uri: https://github.com/kudobuilder/kuttl/releases/download/v0.26.0/kuttl_0.26.0_linux_x86_64.tar.gz
    sha256: "a1e85cf519f19260b16f8c2c77b475c6b43c10313aee1ad02469f37da08dbe86"
    bin: "./kubectl-kuttl"
  - selector:
      matchLabels:
        os: "linux"
        arch: "386"
    uri: https://github.com/kudobuilder/kuttl/releases/download/v0.26.0/kuttl_0.26.0_linux_i386.tar.gz
    sha256: "ca68ecf0e8b4e28397f7829fbaf6f3363824ed1c7fbd8aabae01da5f412da430"
    bin: "./kubectl-kuttl"
  - selector:
      matchLabels:
        os: "linux"
        arch: "arm64"
    uri: https://github.com/kudobuilder/kuttl/releases/download/v0.26.0/kuttl_0.26.0_linux_arm64.tar.gz
    sha256: "f7fe82b0dd18d26a146b7a9158adb927f631be1bf6e387e461277ad41a23220d"
    bin: "./kubectl-kuttl"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "amd64"
    uri: https://github.com/kudobuilder/kuttl/releases/download/v0.26.0/kuttl_0.26.0_darwin_x86_64.tar.gz
    sha256: "2ffbf8d3e996a4c077ec09f17a462bc2ad33aad537ce83d3a9d7ed1eb737b804"
    bin: "./kubectl-kuttl"
  - selector:
      matchLabels:
        os: "darwin"
        arch: "arm64"
    uri: https://github.com/kudobuilder/kuttl/releases/download/v0.26.0/kuttl_0.26.0_darwin_arm64.tar.gz
    sha256: "ac2fd11d770b4082dd3d7462b4c80e5c08d0d619c52f4f34d8e22f9e4c657b02"
    bin: "./kubectl-kuttl"
