apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kyverno
spec:
  version: v1.16.4
  homepage: https://github.com/kyverno/kyverno
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/kyverno/kyverno/releases/download/v1.16.4/kyverno-cli_v1.16.4_linux_x86_64.tar.gz
      sha256: 556f38bac615748fcaeab0c8923c7f2fff677556f7072032d752fc9d9808e5df
      files:
        - from: kyverno
          to: .
        - from: LICENSE
          to: .
      bin: kyverno
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/kyverno/kyverno/releases/download/v1.16.4/kyverno-cli_v1.16.4_darwin_x86_64.tar.gz
      sha256: 42138157a9231614c5d5790009a9b52ec1d35e54611b198524eeac05d8d839b2
      files:
        - from: kyverno
          to: .
        - from: LICENSE
          to: .
      bin: kyverno
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/kyverno/kyverno/releases/download/v1.16.4/kyverno-cli_v1.16.4_darwin_arm64.tar.gz
      sha256: 4510e21604707808a0f287694bab40e35a85916720b058fd1d54bd4754510e14
      files:
        - from: kyverno
          to: .
        - from: LICENSE
          to: .
      bin: kyverno
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/kyverno/kyverno/releases/download/v1.16.4/kyverno-cli_v1.16.4_windows_x86_64.zip
      sha256: 9176483336c0534541cc78f7c50e99c87861ae2adb8c8f7cc25cfdb7b6d58ae0
      files:
        - from: kyverno.exe
          to: .
        - from: LICENSE
          to: .
      bin: kyverno.exe
  shortDescription: Kyverno is a policy engine for kubernetes
  description: |+2
    Kyverno is used to test kyverno policies and apply policies to resources files
  caveats: |
    The plugin requires access to create Policy and CustomResources
