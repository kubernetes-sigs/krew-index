apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: link
spec:
  version: v0.1.1
  homepage: https://github.com/umutbasal/kubectl-link
  shortDescription: Access cluster resources without vpn
  description: |
    kubectl-link simplifies accessing your Kubernetes
    pods and services by automatically creating port-forwards on demand
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/umutbasal/kubectl-link/releases/download/v0.1.1/kubectl-link_Darwin_x86_64.tar.gz
    sha256: 62111e695f2cad4cb91383ef7d278ecb291c03f7032152b1c52a349682c323a7
    bin: kubectl-link
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/umutbasal/kubectl-link/releases/download/v0.1.1/kubectl-link_Darwin_arm64.tar.gz
    sha256: bb74f860e54287b3bb9adc309788c4fd730fdc633d658110c06371c4f3131b71
    bin: kubectl-link