apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: liqo
spec:
  version: v1.1.2
  homepage: https://github.com/liqotech/liqo
  shortDescription: Install and manage Liqo on your clusters
  description: |
    Liqo is a platform to enable dynamic and decentralized resource sharing across
    Kubernetes clusters, either on-prem or managed. Liqo allows to run pods on a
    remote cluster seamlessly and without any modification of Kubernetes and the
    applications. With Liqo it is possible to extend the control and data plane of a
    Kubernetes cluster across the cluster's boundaries, making multi-cluster native
    and transparent: collapse an entire remote cluster to a local virtual node,
    enabling workloads offloading, resource management and cross-cluster communication
    compliant with the standard Kubernetes approach.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/liqotech/liqo/releases/download/v1.1.2/liqoctl-darwin-amd64.tar.gz
    sha256: 7710a086369dfdab6415ab3c76605d51f7e9acf55fab9ab66cb129ae98f43571
    bin: liqoctl
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/liqotech/liqo/releases/download/v1.1.2/liqoctl-darwin-arm64.tar.gz
    sha256: b706540aafc3908901c2318e5345b15713bcb5ce72755cea43f01f61a5b18ef4
    bin: liqoctl
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/liqotech/liqo/releases/download/v1.1.2/liqoctl-linux-amd64.tar.gz
    sha256: 846ddc81565bd185370f9134b30ae60e44c69ed7101ced05099ef30c2a3ebe80
    bin: liqoctl
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/liqotech/liqo/releases/download/v1.1.2/liqoctl-linux-arm64.tar.gz
    sha256: 338a393fe2bfcd5d3320d4587dd1b89c67b8e0816cc52f964630614176e870cc
    bin: liqoctl
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/liqotech/liqo/releases/download/v1.1.2/liqoctl-windows-amd64.tar.gz
    sha256: 7a002dd87d547ac54104cc95efb6ca6a0b1db6237a28d2182e28496fbad5c133
    bin: liqoctl
