apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: liqo
spec:
  version: v1.2.0
  homepage: https://github.com/liqotech/liqo
  shortDescription: Install and manage Liqo on your clusters
  description: |
    Liqo is a platform to enable dynamic and decentralized resource sharing across
    Kubernetes clusters, either on-prem or managed. Liqo allows to run pods on a
    remote cluster seamlessly and without any modification of Kubernetes and the
    applications. With Liqo it is possible to extend the control and data plane of a
    Kubernetes cluster across the cluster's boundaries, making multi-cluster native
    and transparent: collapse an entire remote cluster to a local virtual node,
    enabling workloads offloading, resource management and cross-cluster communication
    compliant with the standard Kubernetes approach.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/liqotech/liqo/releases/download/v1.2.0/liqoctl-darwin-amd64.tar.gz
    sha256: 5196e8f1a2679a36a7c9a8eea222fa46adeab874e0bb8623c8ccd6622d1bea86
    bin: liqoctl
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/liqotech/liqo/releases/download/v1.2.0/liqoctl-darwin-arm64.tar.gz
    sha256: 1bf9ca1340f95bbca5585372e898ff95cbdfaa846421962ef767dbad54933a65
    bin: liqoctl
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/liqotech/liqo/releases/download/v1.2.0/liqoctl-linux-amd64.tar.gz
    sha256: 88c81be5abfe118bb5d7d45cfde6787267b26bbd5d1c2430486f7017146bf15f
    bin: liqoctl
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/liqotech/liqo/releases/download/v1.2.0/liqoctl-linux-arm64.tar.gz
    sha256: ed7d2f38cd2fe93ab16b67b4f0d4660a9405b5d2e8a88ca2ef3f80f96f6591b7
    bin: liqoctl
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/liqotech/liqo/releases/download/v1.2.0/liqoctl-windows-amd64.tar.gz
    sha256: 52d9b7773de40cce05bb32bc3b9e78c247f674002f597abdd8e29b1a168b12dd
    bin: liqoctl
