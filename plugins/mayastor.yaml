  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/openebs/mayastor-extensions/releases/download/v2.11.0/kubectl-mayastor-aarch64-apple-darwin.tar.gz
    sha256: e7ef6c75099c6e8d9e899791283e9f40d7100322460fafa2c5bcd03ff9198c86
