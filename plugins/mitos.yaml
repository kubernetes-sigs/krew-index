apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.11.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.11.0/kubectl-mitos_v1.11.0_linux_amd64.tar.gz
    sha256: 39543313e9cda640ab916b2b52a1d270539a2ac62a18907c5577e7ab24fd1a6d
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.11.0/kubectl-mitos_v1.11.0_linux_arm64.tar.gz
    sha256: 44616f968270060c5db7d3211d4f3c8fa9edc17b2cd3f2bdc59b5357a74394d8
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.11.0/kubectl-mitos_v1.11.0_darwin_amd64.tar.gz
    sha256: bbc8d21873486ae9e491330be445d662b3574704afc3c01939f7699a445c4a60
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.11.0/kubectl-mitos_v1.11.0_darwin_arm64.tar.gz
    sha256: fc298bd6bc27605793171284064bcb5540cd21157715232b7c63e034940b67b4
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.11.0/kubectl-mitos_v1.11.0_windows_amd64.zip
    sha256: 979b19843f67b10817b9620b502d474d06f3d740caea1a879a192615c4c8b324
    bin: kubectl-mitos.exe
