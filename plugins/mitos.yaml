apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.31.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.31.0/kubectl-mitos_v1.31.0_linux_amd64.tar.gz
    sha256: 14318b1c80720ec56053b64d8a86c4bd22ef849ac7d79d6577380a55fac207ee
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.31.0/kubectl-mitos_v1.31.0_linux_arm64.tar.gz
    sha256: ee96baf5a085adfa0becc8796cd62a3f1bd5bb7a2e84d4604b1656c998ed956c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.31.0/kubectl-mitos_v1.31.0_darwin_amd64.tar.gz
    sha256: eed2d88e9696dd6c58eb3b79e2c0063464e9f82306d98ab36cd60c9d4e6a11b2
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.31.0/kubectl-mitos_v1.31.0_darwin_arm64.tar.gz
    sha256: 625e5f6fb5aa3c7de3c9ae9c169ebb58b6ca92a47e4d6e736ca18e6247ed279d
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.31.0/kubectl-mitos_v1.31.0_windows_amd64.zip
    sha256: a86a4ee34c5c43a47b695c789013a11a521a2b7379d8a40387b207e6420c1a23
    bin: kubectl-mitos.exe
