apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.24.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.0/kubectl-mitos_v1.24.0_linux_amd64.tar.gz
    sha256: e1ae3ea057f07031108958269c7745e10823bbcc1748bb3d6a5744700a3aff3c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.0/kubectl-mitos_v1.24.0_linux_arm64.tar.gz
    sha256: 20d2d77c6a0320d5572ebf2b48f066c2b6c69f0f364b669bece2d6b3b11d8e7c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.0/kubectl-mitos_v1.24.0_darwin_amd64.tar.gz
    sha256: edfff00f048ac59447f44f8e2e85c0f808c357c7a4ad45cc59b21f7ec2930564
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.0/kubectl-mitos_v1.24.0_darwin_arm64.tar.gz
    sha256: 4c8a9bc6869db024c4f6202d8c4feb1128602607c45448633e411b756ced1916
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.0/kubectl-mitos_v1.24.0_windows_amd64.zip
    sha256: a875f86caf45a4b7414e43d4e84b6ba744a2e8e76cb7fc2c139ff3992edc282a
    bin: kubectl-mitos.exe
