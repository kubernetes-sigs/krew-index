apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.33.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.33.0/kubectl-mitos_v1.33.0_linux_amd64.tar.gz
    sha256: 2c9639298b58d64cd35f9823d8b10ace3fcc6c30444ce6f2618b4007e4c1162b
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.33.0/kubectl-mitos_v1.33.0_linux_arm64.tar.gz
    sha256: 205a82b542a29647ec77388fc3ea284fda6820bcac399881f6526937264c052d
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.33.0/kubectl-mitos_v1.33.0_darwin_amd64.tar.gz
    sha256: a41ebfee5e78691765211ebd0581c598fecebdc3a4919b926db60ba7f1f3c915
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.33.0/kubectl-mitos_v1.33.0_darwin_arm64.tar.gz
    sha256: 04f2222ae3f7dafef9e1a73aa74072b0558ef63bccdcb5847ee8c5d20344f8f5
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.33.0/kubectl-mitos_v1.33.0_windows_amd64.zip
    sha256: 466ae8431de200ab28a38890d9a0661cc1b4a34faa4b43813fc216043ae3d38f
    bin: kubectl-mitos.exe
