apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.12.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.12.0/kubectl-mitos_v1.12.0_linux_amd64.tar.gz
    sha256: d11a9eafc778b002ced26597e8721753d07328a00b30e1b04efa708e1c85a708
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.12.0/kubectl-mitos_v1.12.0_linux_arm64.tar.gz
    sha256: 82fa14294334730c61e9217d6e065998c695f8e69214e3ea918b1dd24108acac
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.12.0/kubectl-mitos_v1.12.0_darwin_amd64.tar.gz
    sha256: 0948d001d3173b345084e1aa2693b598e0a8c60fad72f3b0015a60cf78fc8512
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.12.0/kubectl-mitos_v1.12.0_darwin_arm64.tar.gz
    sha256: 5c53dc431f171096c3bcaf7c1ad869d94c59f46b8ecc666dc2d1783f65e24dc7
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.12.0/kubectl-mitos_v1.12.0_windows_amd64.zip
    sha256: 296de5d180d505a95271bc6303c437ef011d375e5bfd0a7a535a028306e5a064
    bin: kubectl-mitos.exe
