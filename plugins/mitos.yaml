apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.38.1"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.38.1/kubectl-mitos_v1.38.1_linux_amd64.tar.gz
    sha256: 05d8cd7b190a191538cc378da3b41094d8c982169a4e89b4abf8d1779ed0a7b8
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.38.1/kubectl-mitos_v1.38.1_linux_arm64.tar.gz
    sha256: e3a6bd59be106177847d6fbac0272fac15786af6b29972251fea9f1643c65671
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.38.1/kubectl-mitos_v1.38.1_darwin_amd64.tar.gz
    sha256: 100655046cf080591a4a6d68368b834e96a14a8f1dc10f7201aad80e9ca85b6e
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.38.1/kubectl-mitos_v1.38.1_darwin_arm64.tar.gz
    sha256: c1be60fdc4406e4dab670210077acbdc88c97208248956aa51e959093bcf3e01
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.38.1/kubectl-mitos_v1.38.1_windows_amd64.zip
    sha256: 954c3ef94a76892d7699ea56ae7e71f9569b6cc6d876cbd6e3260d0fdd757ee9
    bin: kubectl-mitos.exe
