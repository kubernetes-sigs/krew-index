apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.15.2"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.2/kubectl-mitos_v1.15.2_linux_amd64.tar.gz
    sha256: 15be5c2b94687a6ca648df1ed18b088767bd25551b809c5371321998cfb8001a
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.2/kubectl-mitos_v1.15.2_linux_arm64.tar.gz
    sha256: 6288c824b109581b83a13d311b69e6139cb16ebb7280d5f72dd04c68f4528f53
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.2/kubectl-mitos_v1.15.2_darwin_amd64.tar.gz
    sha256: 581004c1c04af9610e5895a4e866938abed6414434eba22c999169fe21527868
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.2/kubectl-mitos_v1.15.2_darwin_arm64.tar.gz
    sha256: 431f6864601832d94427b6d6de6a00112bac59a9d14e907d48d503504825cc22
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.2/kubectl-mitos_v1.15.2_windows_amd64.zip
    sha256: 8d457ff32ca71af13eec27f3e51d230f4943d429fb85122debae14626f3706fd
    bin: kubectl-mitos.exe
