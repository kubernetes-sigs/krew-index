apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.22.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.22.0/kubectl-mitos_v1.22.0_linux_amd64.tar.gz
    sha256: a617e6c3c291d852280e07ab129942cd19154ca7a19b56f643e6db6107b06b67
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.22.0/kubectl-mitos_v1.22.0_linux_arm64.tar.gz
    sha256: ccc875afbc67d2c1759556265d5e70b01561487b4400d7b2a459c8eeee73621a
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.22.0/kubectl-mitos_v1.22.0_darwin_amd64.tar.gz
    sha256: edc20ca4aa0834bf63634d76e1f1a37756c77f4d0e8d3f2e07d2ff5db144541d
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.22.0/kubectl-mitos_v1.22.0_darwin_arm64.tar.gz
    sha256: 1dd7c11cf9aa6aeec52be032c86f379f00264aa9dcea373bbe8a61ea4bb35ddd
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.22.0/kubectl-mitos_v1.22.0_windows_amd64.zip
    sha256: 9accfea7d660232a7424b8226b9f188653309f63bda842371afe55eb3d725e4a
    bin: kubectl-mitos.exe
