apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.25.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.25.0/kubectl-mitos_v1.25.0_linux_amd64.tar.gz
    sha256: d354d4367bd4ba48d6e73941181e553337098dfabe845a90647bea838f6c0ff5
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.25.0/kubectl-mitos_v1.25.0_linux_arm64.tar.gz
    sha256: 591957473d3fdb0ec9c1194a192ee800fdcbd1f45eaf8fcc729a8a1d22ec9ed2
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.25.0/kubectl-mitos_v1.25.0_darwin_amd64.tar.gz
    sha256: 646eb854b931a73ed70303b57bf6751fa1f3e1a9554a94542b9b5540c0f8dec2
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.25.0/kubectl-mitos_v1.25.0_darwin_arm64.tar.gz
    sha256: c8ab0293d673d538c2ab68ff4377165bdd05079ed4b0567e17709fb4556c9581
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.25.0/kubectl-mitos_v1.25.0_windows_amd64.zip
    sha256: f3b385d4f27d71e51b10fbf0c6e66a60f072fac5cb80d422a7bfc035fa8a716c
    bin: kubectl-mitos.exe
