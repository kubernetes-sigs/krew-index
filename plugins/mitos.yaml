apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.43.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.43.0/kubectl-mitos_v1.43.0_linux_amd64.tar.gz
    sha256: 9dc60e06a3fe41a3e06702e01a0b4031fc355d4c8c803f69d30c60fe232f9fa4
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.43.0/kubectl-mitos_v1.43.0_linux_arm64.tar.gz
    sha256: 27aa2b3e09de0f973faadebcb6bee1dfe9bb34ca41dbc4f43c3763ee12cb78fb
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.43.0/kubectl-mitos_v1.43.0_darwin_amd64.tar.gz
    sha256: 31ee99d3609273d5304300729f183116baec5d7d4b07fc7b7a13f36fc7dec758
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.43.0/kubectl-mitos_v1.43.0_darwin_arm64.tar.gz
    sha256: 4c51d7ef134e9c6dec0ea333f110956d328534bfd24a85d5035aa6a1b6ff63e7
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.43.0/kubectl-mitos_v1.43.0_windows_amd64.zip
    sha256: 5b236e5cb5d3419dc6569b6c46a3ae25c142b67e564d6dc7c50ee40571f36189
    bin: kubectl-mitos.exe
