apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.29.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.29.0/kubectl-mitos_v1.29.0_linux_amd64.tar.gz
    sha256: 548138c06b06ff220594d1b65dfeca9830de9007393dc1a75218161960c63c81
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.29.0/kubectl-mitos_v1.29.0_linux_arm64.tar.gz
    sha256: 42e072382537b3780899a34de22c68d7ad7ba46ebbe4e55484b712b46f288f89
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.29.0/kubectl-mitos_v1.29.0_darwin_amd64.tar.gz
    sha256: a8c40cdba51e1c44cbe6be2e446e4b43d468ee6a129cee473b8a74970d3d69f2
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.29.0/kubectl-mitos_v1.29.0_darwin_arm64.tar.gz
    sha256: a674c31c2ac7611f4a9422638b48b382b62ddcf3c4e00eb1b40e2ec6a5985163
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.29.0/kubectl-mitos_v1.29.0_windows_amd64.zip
    sha256: fb37b762c4ce2e1c55d2c08a35db69b36e4152201e79b84c3d86bf9ef73a8c60
    bin: kubectl-mitos.exe
