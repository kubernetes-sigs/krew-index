apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.20.2"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.2/kubectl-mitos_v1.20.2_linux_amd64.tar.gz
    sha256: 10ac2cc65bcd7af1b74dd572dff848c197422b8607a75af4cd6a548be56a20ea
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.2/kubectl-mitos_v1.20.2_linux_arm64.tar.gz
    sha256: c76ed26dd5ff44237ac575d3242b6e876325b37ba90c2610ed8a5080abd7e291
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.2/kubectl-mitos_v1.20.2_darwin_amd64.tar.gz
    sha256: 88d51041b2a3c4fe5441707d02bd00bdde8bc2711d817a5902c094dc5bc8aef8
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.2/kubectl-mitos_v1.20.2_darwin_arm64.tar.gz
    sha256: c7c8c07732659a25b24e456b49c776f6367965f3177029b05112cdec1257c3f9
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.2/kubectl-mitos_v1.20.2_windows_amd64.zip
    sha256: ab7f08da686bcda1e8de38373f09a0cde3a9f40d4678b553484a866c8927f27b
    bin: kubectl-mitos.exe
