apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.38.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.38.0/kubectl-mitos_v1.38.0_linux_amd64.tar.gz
    sha256: a1040c714bc6e087c0530b66f06ff4686426de1cd3892dd5b699b867c94e10a3
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.38.0/kubectl-mitos_v1.38.0_linux_arm64.tar.gz
    sha256: b927abcad02d4622d3f371b2c7f2522d9dcc55a423bef40e933d0f3b75902682
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.38.0/kubectl-mitos_v1.38.0_darwin_amd64.tar.gz
    sha256: faad004d81a7227f6fcac1f0020555e2edcab61e76b5e79afdd7a53605305beb
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.38.0/kubectl-mitos_v1.38.0_darwin_arm64.tar.gz
    sha256: 8f50438e3ebeebaba556b04e30c21b59c3b1eae48ed835efd95735399d271160
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.38.0/kubectl-mitos_v1.38.0_windows_amd64.zip
    sha256: 23e321d648c6184b2ff9ff07d9bdb5f804ba30f810a5d1d92292ca5ea0114bd4
    bin: kubectl-mitos.exe
