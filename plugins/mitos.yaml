apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.16.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.16.0/kubectl-mitos_v1.16.0_linux_amd64.tar.gz
    sha256: fca290783db8b1d4b8bbb4afdd86a625a46c5ceaa32ae7bf42b9240dc76aa804
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.16.0/kubectl-mitos_v1.16.0_linux_arm64.tar.gz
    sha256: 76c7b69f989eb1837d062ae12c203603fa3d7bca72b333907a05902712a76c75
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.16.0/kubectl-mitos_v1.16.0_darwin_amd64.tar.gz
    sha256: 881df470228e520b5ddad48554b4436ecc8962ef60bead40e042562bf9be3efa
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.16.0/kubectl-mitos_v1.16.0_darwin_arm64.tar.gz
    sha256: 240a4e536f4325d2c85992c0305bc8e44473f53e0627920598d8486072d8ff89
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.16.0/kubectl-mitos_v1.16.0_windows_amd64.zip
    sha256: 6ac709206e66c486f4f386e2318a630418eb5061d5838531e2e18da2d7ad23a3
    bin: kubectl-mitos.exe
