apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.37.2"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.2/kubectl-mitos_v1.37.2_linux_amd64.tar.gz
    sha256: ee6bd1fe30879538019a0b54153c01a1c9d34c0d20130423414d05c43667883f
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.2/kubectl-mitos_v1.37.2_linux_arm64.tar.gz
    sha256: 3b3cfb610103f58b84c88c532e70f12811b89c5f0070debb967cc5f1222291fa
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.2/kubectl-mitos_v1.37.2_darwin_amd64.tar.gz
    sha256: 99c5fb6cf666be01eeae91d2e84355d85d49c2b96c885474000cb9abf76ac4be
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.2/kubectl-mitos_v1.37.2_darwin_arm64.tar.gz
    sha256: 4c5a053bcd0e4e082b1272c9fd60a8615a5b6c6bd338419ab218f53de96e654c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.2/kubectl-mitos_v1.37.2_windows_amd64.zip
    sha256: f2287a7a59c2d39c71133330f2fede33544ad19fd8b15e17f1adcdf6e2968407
    bin: kubectl-mitos.exe
