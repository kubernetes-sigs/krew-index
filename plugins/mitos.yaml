apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.20.3"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.3/kubectl-mitos_v1.20.3_linux_amd64.tar.gz
    sha256: c297ace95378e56658d20f9811435edcc756b87eb07aa7afab717d060708a580
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.3/kubectl-mitos_v1.20.3_linux_arm64.tar.gz
    sha256: 7e9505fc30c514bc32fe48f484fe5005d8a45ea63b88dffd0baf60b222b259aa
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.3/kubectl-mitos_v1.20.3_darwin_amd64.tar.gz
    sha256: 3e239579b1cd702f432d69123332c52b3a8cd426767899be13cb6c2edb3eef4f
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.3/kubectl-mitos_v1.20.3_darwin_arm64.tar.gz
    sha256: 9d21db867734fff86ffbb096b6efc219f3c7b89d2e3c17a8efe3a825db33f2f2
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.3/kubectl-mitos_v1.20.3_windows_amd64.zip
    sha256: 390983e8a4fcb9556284a74e5efaefd30ffdb7dee82a5b6dad1d624f8291ab36
    bin: kubectl-mitos.exe
