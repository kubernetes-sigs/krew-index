apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.15.1"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.1/kubectl-mitos_v1.15.1_linux_amd64.tar.gz
    sha256: f612e4ad06384965659bfe6f85259f8f6df094cde340139783fdd81471a075ce
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.1/kubectl-mitos_v1.15.1_linux_arm64.tar.gz
    sha256: eab33449d720348bb998e417ee4aad823caee01770fdd399972c98c928ee8b67
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.1/kubectl-mitos_v1.15.1_darwin_amd64.tar.gz
    sha256: 65b62d18bd07cb94f38c38deaa0eac548df835bcb3bb35944d7bde109029cd22
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.1/kubectl-mitos_v1.15.1_darwin_arm64.tar.gz
    sha256: 8284765b3194b14826a0f187773854ccb823f84b1c3030ed6d10d7df6c1846a8
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.1/kubectl-mitos_v1.15.1_windows_amd64.zip
    sha256: 145bcfe9ad3e4f607305ba1dc85f23e6b6c8b92d5d98fbeebb38b0c09f51cce3
    bin: kubectl-mitos.exe
