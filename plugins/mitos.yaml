apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.35.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.35.0/kubectl-mitos_v1.35.0_linux_amd64.tar.gz
    sha256: 52ccf65d5149e18a5c21053e145eeb27fd2f00710eda53a80b922b9493b8ae6a
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.35.0/kubectl-mitos_v1.35.0_linux_arm64.tar.gz
    sha256: 2a6368e3193be39660d9fa7fe97d629432716fd1593022ece04ca09cf38558a5
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.35.0/kubectl-mitos_v1.35.0_darwin_amd64.tar.gz
    sha256: c0a33e1b5492c6be729d399a17bab40d3256d203fe3fa5acdefa0cd5ea78f0be
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.35.0/kubectl-mitos_v1.35.0_darwin_arm64.tar.gz
    sha256: 3eddbdb8780f5cc212621b0e4f135215a07af8198fd6517064998465c00ee6d4
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.35.0/kubectl-mitos_v1.35.0_windows_amd64.zip
    sha256: 7c14473e3dc994d4b968e71578841dfeec5eb3202407e9995744f681835e64d1
    bin: kubectl-mitos.exe
