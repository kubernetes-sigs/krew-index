apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.20.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.0/kubectl-mitos_v1.20.0_linux_amd64.tar.gz
    sha256: 94e3d8dd45f7440c65c7ac8033c7f36903bb03d19c90bd568f944be86854234b
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.0/kubectl-mitos_v1.20.0_linux_arm64.tar.gz
    sha256: d48ec2b15dc74802f606f958ff6373ba5c053e23aafe0f86a9cfc4107f3c26de
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.0/kubectl-mitos_v1.20.0_darwin_amd64.tar.gz
    sha256: 3f0b22b7798403902507b391b7fe416fcdf9560b0a8404e29536676c402f4175
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.0/kubectl-mitos_v1.20.0_darwin_arm64.tar.gz
    sha256: 8ec007813cc18b73a297a4b3ef9e2013bcb3295468510169c9af526434fdecd1
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.0/kubectl-mitos_v1.20.0_windows_amd64.zip
    sha256: cefe1c8a39ee0c8ab5b0c0bbe6530b01a38cd72b26273570e97b509e2f7e3847
    bin: kubectl-mitos.exe
