apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.15.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.0/kubectl-mitos_v1.15.0_linux_amd64.tar.gz
    sha256: 8e34c3b3042269b3357863ed4d14aa06d58e0b16d020dffbe5e3a1ebe6cb72ca
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.0/kubectl-mitos_v1.15.0_linux_arm64.tar.gz
    sha256: 62638808a7f919a8a6561900f4dca5541d6b964436c358034f54a8ff8820af4c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.0/kubectl-mitos_v1.15.0_darwin_amd64.tar.gz
    sha256: 10663e2e1530aef476334e6f7f18ec7acef30f82c138aa671b5f0ac4e3aaed7b
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.0/kubectl-mitos_v1.15.0_darwin_arm64.tar.gz
    sha256: e464740591b387d6b75e1b88b04dc968721a43846c01ffb3bef771fa75226692
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.15.0/kubectl-mitos_v1.15.0_windows_amd64.zip
    sha256: 8a5a193c8b0021c9eadb069ac60f1af46a349edc0d0cbbdae5a28a2af2374662
    bin: kubectl-mitos.exe
