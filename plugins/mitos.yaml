apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.21.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.21.0/kubectl-mitos_v1.21.0_linux_amd64.tar.gz
    sha256: d64d4193d9242a58bde8cf68c87f4c41c07d01bb592fbdeb76686b3e2c17e617
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.21.0/kubectl-mitos_v1.21.0_linux_arm64.tar.gz
    sha256: 95c9710187f6a36517d740f42dd4eaa73701a0f5a93cad507972a9b42aeffb81
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.21.0/kubectl-mitos_v1.21.0_darwin_amd64.tar.gz
    sha256: c474319be5ab6a9f1403e681732e96d12f337375c8c0570dbdc8efd52ed243c8
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.21.0/kubectl-mitos_v1.21.0_darwin_arm64.tar.gz
    sha256: c57f8ef13e1ebaeafcad0a030b61cc7ef679f70bd5ae7ff96a91793788b6839b
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.21.0/kubectl-mitos_v1.21.0_windows_amd64.zip
    sha256: 4a047336f4df99cfd1c021ecf2367c4d0e5c0efb6cca292d9fc617d6a47b7aa6
    bin: kubectl-mitos.exe
