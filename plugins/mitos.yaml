apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.32.2"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.2/kubectl-mitos_v1.32.2_linux_amd64.tar.gz
    sha256: 624c90577e75e2efff11dfdb3caaa453cb6eedf4f16dcaf372c9040471470313
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.2/kubectl-mitos_v1.32.2_linux_arm64.tar.gz
    sha256: d833895a51c3b701a21a0f2efaa72b690743de4e2abbb588ffe5a0fb24caf0ff
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.2/kubectl-mitos_v1.32.2_darwin_amd64.tar.gz
    sha256: b612df112130a1b0479356ce583ceb93a8875aa6b45399ef7522563c2d721fbe
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.2/kubectl-mitos_v1.32.2_darwin_arm64.tar.gz
    sha256: 88b7ccc3383bdc937c0a7acbc87b77f2342c5c75ef718028d3d2e5d333eeaa8a
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.2/kubectl-mitos_v1.32.2_windows_amd64.zip
    sha256: 535c7d83e909e99d1ef380c5b64df7124e7ae5a7ff43d61796f672f7ae9bc599
    bin: kubectl-mitos.exe
