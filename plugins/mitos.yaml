apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.37.1"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.1/kubectl-mitos_v1.37.1_linux_amd64.tar.gz
    sha256: fa8a40892f6f8799b624562d5c8895202ee58a93b3426845a0875b202e857a98
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.1/kubectl-mitos_v1.37.1_linux_arm64.tar.gz
    sha256: eabbb1e3348bdd855517e500b5363f344b4dce0122f0aa372be1786d2249dd90
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.1/kubectl-mitos_v1.37.1_darwin_amd64.tar.gz
    sha256: 2a3fa36a1df8055068e91d9754cdd8b9cbb8b7d20c4f07eed346daad1fbf9af0
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.1/kubectl-mitos_v1.37.1_darwin_arm64.tar.gz
    sha256: ef1958297f28812d1daa9c90da0f6035eca7ea9d5064635183c6519cb284b292
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.1/kubectl-mitos_v1.37.1_windows_amd64.zip
    sha256: f69b138728aaf072413a9943c91835ea7ff361c303186ffd15ae0c7ed4f017c0
    bin: kubectl-mitos.exe
