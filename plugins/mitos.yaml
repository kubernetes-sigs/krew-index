apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.26.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.0/kubectl-mitos_v1.26.0_linux_amd64.tar.gz
    sha256: 17af0c457dc141a11bd958df3829c99930b94612df56842aeb4c3fe37a36d614
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.0/kubectl-mitos_v1.26.0_linux_arm64.tar.gz
    sha256: 4844d3c36c8f540a0717938e9fa6e5ea076c63159da7e4f126fe1fc5dab1dd1a
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.0/kubectl-mitos_v1.26.0_darwin_amd64.tar.gz
    sha256: 28ead1bceb8669c418e9da6b609591b40f5705bdcbaaa88c370272c93ac01687
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.0/kubectl-mitos_v1.26.0_darwin_arm64.tar.gz
    sha256: 340cc7c5f28e55e339326a6958aa33f7807fc84345272e156eab2310794bff7f
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.0/kubectl-mitos_v1.26.0_windows_amd64.zip
    sha256: f03e1dd9fb2217aa5533967564fe9f7f5abe14e83f5ae8de6ed59074153ba294
    bin: kubectl-mitos.exe
