apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.19.1"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.1/kubectl-mitos_v1.19.1_linux_amd64.tar.gz
    sha256: e4f154626f8fa65200cd422e27cd95d86c151cee53a99d0681d69ba514e025fe
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.1/kubectl-mitos_v1.19.1_linux_arm64.tar.gz
    sha256: 85dd14867b270a1170c15578dfda2a597b7016ba5f1412b04f88f5d08045bf00
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.1/kubectl-mitos_v1.19.1_darwin_amd64.tar.gz
    sha256: fc8831ef81cb094b1c13e6f5515b53366edfd44c82843a4ab5621808320b47de
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.1/kubectl-mitos_v1.19.1_darwin_arm64.tar.gz
    sha256: 16d9863769f627eed6e8e92b2e0e763ac363adc987eba73428c0176c16743475
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.1/kubectl-mitos_v1.19.1_windows_amd64.zip
    sha256: c333631796ec8b29f6e0bfe379a38855a26b92353f2801b47438a73b6383364b
    bin: kubectl-mitos.exe
