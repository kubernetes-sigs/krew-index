apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.20.4"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.4/kubectl-mitos_v1.20.4_linux_amd64.tar.gz
    sha256: 83cac0ed8514768443f460dd726370bb9772eb5526bad7a92c2731659d5c2054
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.4/kubectl-mitos_v1.20.4_linux_arm64.tar.gz
    sha256: cc46462ebe5872e4c4fc688c3e8b09e425920677962bd3f6bb3987acb0ed40f7
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.4/kubectl-mitos_v1.20.4_darwin_amd64.tar.gz
    sha256: 3662d8a2051f79da06e380d53cc7b30624582c8146f521e0cdcb6aac8b799196
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.4/kubectl-mitos_v1.20.4_darwin_arm64.tar.gz
    sha256: fa339f86bc3ff8066497ea1cd4aac37c90df1a05e1eb2453f9ffdeaa4984f08e
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.4/kubectl-mitos_v1.20.4_windows_amd64.zip
    sha256: 68b5a3c6998c5866ea9ed0fc8bf70fa67e29d8a0033fab55fcfb0ff7c384ac94
    bin: kubectl-mitos.exe
