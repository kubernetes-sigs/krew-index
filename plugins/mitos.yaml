apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.24.2"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.2/kubectl-mitos_v1.24.2_linux_amd64.tar.gz
    sha256: 6d3d49a381e23cb75a82f83e4f6a9bc89f09b201841fda759e4fafdf8dde9c86
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.2/kubectl-mitos_v1.24.2_linux_arm64.tar.gz
    sha256: 718bfb1ba6e8942e1f218fdabec87086d107f28bd26cab479fe9f6271a4835bd
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.2/kubectl-mitos_v1.24.2_darwin_amd64.tar.gz
    sha256: f3904f63514f6a269e0b080fece8f792b50891c3535dcc5670db52fe6743e809
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.2/kubectl-mitos_v1.24.2_darwin_arm64.tar.gz
    sha256: b2caeb76789aae8ae8bc30e938c9115377681f446bc7de1a3c53b1fa9dce534e
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.2/kubectl-mitos_v1.24.2_windows_amd64.zip
    sha256: f5f9755d32c47b21dfeeb2f700ff3703d21a4b5fa46d11009d73b2c59a878964
    bin: kubectl-mitos.exe
