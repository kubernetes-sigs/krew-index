apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.34.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.34.0/kubectl-mitos_v1.34.0_linux_amd64.tar.gz
    sha256: 608b3fac4e0eb620d7b49d6914ed746821deecb4a6e7e5ac7bcfe1f20660c22e
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.34.0/kubectl-mitos_v1.34.0_linux_arm64.tar.gz
    sha256: 35069c8e2d86dad63beb41ec582ebaa28b21087091912fefecb6b6bba8330cb0
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.34.0/kubectl-mitos_v1.34.0_darwin_amd64.tar.gz
    sha256: 079f2f0fdb7baa94b388bb7c90a0729e56c8dd6b74977b4e558f668c984bf1b6
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.34.0/kubectl-mitos_v1.34.0_darwin_arm64.tar.gz
    sha256: 4329ae1f8e8baef0d2926e7b32520e71063ed645144a041cdcc4a36db7c6486e
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.34.0/kubectl-mitos_v1.34.0_windows_amd64.zip
    sha256: a49c08b12be316213c6b9a01600268d4a8b174ba2e4a851bb2fc97883f27e99b
    bin: kubectl-mitos.exe
