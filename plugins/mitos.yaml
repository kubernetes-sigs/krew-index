apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.32.1"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.1/kubectl-mitos_v1.32.1_linux_amd64.tar.gz
    sha256: 559b96dba4585e861ef67bbf2069cd857d691012771f450a81dba6dfd40b9e39
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.1/kubectl-mitos_v1.32.1_linux_arm64.tar.gz
    sha256: 27b44710904fa153a2bb55118dbbc4625a7455bfa95d550e1e86d05cb26ed47c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.1/kubectl-mitos_v1.32.1_darwin_amd64.tar.gz
    sha256: 5bc03db3b2ad85e4b1e6c8c0fb88f64c0f385716bd33d7b8613445d8339d2594
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.1/kubectl-mitos_v1.32.1_darwin_arm64.tar.gz
    sha256: 1b251d1db535650b640b7385028528303fbf6f03977695f7712324067a8dd349
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.1/kubectl-mitos_v1.32.1_windows_amd64.zip
    sha256: dee8866c990d88fb510917255ef194b644bb85a23d5b08c246ac9f1ffc216e7e
    bin: kubectl-mitos.exe
