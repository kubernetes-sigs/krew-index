apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.41.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.41.0/kubectl-mitos_v1.41.0_linux_amd64.tar.gz
    sha256: 26cd0d3269ee1a591b1c16f55a105048dc1e9ef18705491211119a549715743d
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.41.0/kubectl-mitos_v1.41.0_linux_arm64.tar.gz
    sha256: 6a00e96bfc9652c2bba844c0f0083e40f337305413493c50cab62b0e938bc75c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.41.0/kubectl-mitos_v1.41.0_darwin_amd64.tar.gz
    sha256: 29f270d3c40f895a70daf1308c8ccb29c84fe1db5278ec8c5f2fb90572aa5e24
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.41.0/kubectl-mitos_v1.41.0_darwin_arm64.tar.gz
    sha256: d723e0856892b6922376505cbbd6ada8b6bb31fa65761159cd4e83866bf08c7a
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.41.0/kubectl-mitos_v1.41.0_windows_amd64.zip
    sha256: ccc36c3151595f5f3591319efe7926004beb1a610a74ff2eacb407cb8228b5ce
    bin: kubectl-mitos.exe
