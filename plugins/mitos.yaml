apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.19.3"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.3/kubectl-mitos_v1.19.3_linux_amd64.tar.gz
    sha256: 0c2e44f60299884c9a4077f1824e6a542d4bc4b7199de4bd1f0347be96eb2e14
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.3/kubectl-mitos_v1.19.3_linux_arm64.tar.gz
    sha256: 07dead85c1a073e0ff9f086aa0db6c6b41e0c198d1c45c86de9fcade090d6b10
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.3/kubectl-mitos_v1.19.3_darwin_amd64.tar.gz
    sha256: 2164598c63eb66f254cd9176454d2e432869c9ea81bf8a5706f773a8e1887cd5
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.3/kubectl-mitos_v1.19.3_darwin_arm64.tar.gz
    sha256: e00137819386ab0510d519021195a17fb86b0574efc34c11b0ef0f68a486b9dd
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.3/kubectl-mitos_v1.19.3_windows_amd64.zip
    sha256: eb93aeb37d86e0ce9bd29fe28d12f5c79eb1de0fa5f8529b82be29e74c4751df
    bin: kubectl-mitos.exe
