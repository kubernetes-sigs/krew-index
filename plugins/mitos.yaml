apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.19.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.0/kubectl-mitos_v1.19.0_linux_amd64.tar.gz
    sha256: e8bf833cd13aa22cc95f3194c56f41d5e8154f48ffafeeed30569ea431550501
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.0/kubectl-mitos_v1.19.0_linux_arm64.tar.gz
    sha256: 8adf8c6040e5587d37caa7f7560e4fff4eed13f4bb0534278aa7794bd3296ae0
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.0/kubectl-mitos_v1.19.0_darwin_amd64.tar.gz
    sha256: 46fd1a7b7081959a5e74b155adff79179ac329d5fdebde22947078a7aed7b7a8
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.0/kubectl-mitos_v1.19.0_darwin_arm64.tar.gz
    sha256: 3dc2b127a868e6969b0117e4e24c5dd818595fa029e1da527948fc420becff66
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.0/kubectl-mitos_v1.19.0_windows_amd64.zip
    sha256: cf7aa42a912d493144c30b0dfc6e6fbae57ddb2f9a76537114f230d2d74b53e3
    bin: kubectl-mitos.exe
