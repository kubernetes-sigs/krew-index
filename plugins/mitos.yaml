apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.30.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.30.0/kubectl-mitos_v1.30.0_linux_amd64.tar.gz
    sha256: 22f5b4d496665148e71ad5fbbb3baab300ef2d22e4b9c695d54e3ea8da9ae71b
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.30.0/kubectl-mitos_v1.30.0_linux_arm64.tar.gz
    sha256: 107416a9e613825f08e662b7b274590b003baa05735d5998d01ff5f738aa8d70
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.30.0/kubectl-mitos_v1.30.0_darwin_amd64.tar.gz
    sha256: e829e897ea4c8c1cf06248328a8c699c1b1c3312691a4682a9990a2cf32f860d
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.30.0/kubectl-mitos_v1.30.0_darwin_arm64.tar.gz
    sha256: 2dd0d238f076226ce2364d629605f1bc301093784e967989acdf4f111be97481
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.30.0/kubectl-mitos_v1.30.0_windows_amd64.zip
    sha256: 425cec80f67a0d8324ba67605bdf31cd5bb95d437efd288715f1d8a31368dfd2
    bin: kubectl-mitos.exe
