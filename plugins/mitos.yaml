apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.27.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.27.0/kubectl-mitos_v1.27.0_linux_amd64.tar.gz
    sha256: 22e52e7c3e24705c9029f873eaeac13c2d269c7bf70fbd8ac247b634471940b9
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.27.0/kubectl-mitos_v1.27.0_linux_arm64.tar.gz
    sha256: 239ab512543b08f993a61e98bd1d614a8f16ae9fd15f4230f3d944253a401bf3
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.27.0/kubectl-mitos_v1.27.0_darwin_amd64.tar.gz
    sha256: 3d3a0bf9eebf7477dc7e68122cf01b07c746f1d46dfa7f2080821a33ac6e1a9b
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.27.0/kubectl-mitos_v1.27.0_darwin_arm64.tar.gz
    sha256: 36fe8fd286647b1d6718884cfce57cfda28cf8bfc44392b94e267ff0d0fda6bc
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.27.0/kubectl-mitos_v1.27.0_windows_amd64.zip
    sha256: 9044df0128213b918269a561c7feb2e3c21629338f6b0318ed9bb3deece15d6c
    bin: kubectl-mitos.exe
