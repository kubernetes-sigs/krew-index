apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.23.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.23.0/kubectl-mitos_v1.23.0_linux_amd64.tar.gz
    sha256: 657ec33ce32d5dc1704f0ec11ac2844f32c1854650f54bbc4e80d3bd0e52a432
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.23.0/kubectl-mitos_v1.23.0_linux_arm64.tar.gz
    sha256: 20dbf3235156694cab48e4d04d680d26da9b03971e67293b9b5dbda2d353a332
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.23.0/kubectl-mitos_v1.23.0_darwin_amd64.tar.gz
    sha256: 4def9e67ad6334cc8121cbd1c98d868af6b520f8f5671f2d20825bcca5c155e4
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.23.0/kubectl-mitos_v1.23.0_darwin_arm64.tar.gz
    sha256: 7e3ed25655ac075790881d8f7c56c86154222f0f795453142ee0ba9b728fb678
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.23.0/kubectl-mitos_v1.23.0_windows_amd64.zip
    sha256: f308dcd703b7786b4a091b03df78ef312c80764861e787895503cb720b0e68a1
    bin: kubectl-mitos.exe
