apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.26.1"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.1/kubectl-mitos_v1.26.1_linux_amd64.tar.gz
    sha256: 15b8b61e836657960b0b60d44d2aed88c4b9d2446f53d7ac77a6197f7a83109c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.1/kubectl-mitos_v1.26.1_linux_arm64.tar.gz
    sha256: 235dcec1f9f2b1324575e200603d67498f05a3e723715c086a1bef91ff19fe5b
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.1/kubectl-mitos_v1.26.1_darwin_amd64.tar.gz
    sha256: 54eec44c926315fea62de9fb9d3261711d872b0b54988bef6f72bdbad382f080
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.1/kubectl-mitos_v1.26.1_darwin_arm64.tar.gz
    sha256: 6815dcd5c4001f0c794a1d2f769b38f8db35b5a01a4d73bdffc534d512922786
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.1/kubectl-mitos_v1.26.1_windows_amd64.zip
    sha256: 8fa0d050975c9898f5d4191ea7dd1e729729189cb696e480a0f3b99807e9282c
    bin: kubectl-mitos.exe
