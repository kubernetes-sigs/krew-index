apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.13.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.13.0/kubectl-mitos_v1.13.0_linux_amd64.tar.gz
    sha256: b66a73ef192794112540bee18f64bf80958e645cf138c4b0319264c82d37d180
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.13.0/kubectl-mitos_v1.13.0_linux_arm64.tar.gz
    sha256: d43a4051baaf76ab3b9d69b02add17ca5ef70f6fa8a5b9e0d564b69046366e0d
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.13.0/kubectl-mitos_v1.13.0_darwin_amd64.tar.gz
    sha256: cedd4b71c0cd79754ffa5dff6513fe2f378d1a1800d7a692b2b67cba1bc51749
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.13.0/kubectl-mitos_v1.13.0_darwin_arm64.tar.gz
    sha256: 7f789a2d67190de69e7df5e5afecf4e3743ca1c806a6e73f01272d6c4d11e1ac
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.13.0/kubectl-mitos_v1.13.0_windows_amd64.zip
    sha256: 3e409629f8080aa8c6f1eedbf307f0d9aec0017165f0df4b4635ca8ca5d17776
    bin: kubectl-mitos.exe
