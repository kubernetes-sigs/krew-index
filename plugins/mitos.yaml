apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.14.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.14.0/kubectl-mitos_v1.14.0_linux_amd64.tar.gz
    sha256: acbda7cfb0619d0f558ab122883b007bb64f4347a3a9489cedec3310078ed895
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.14.0/kubectl-mitos_v1.14.0_linux_arm64.tar.gz
    sha256: d11e0cc5631a54e48b2383f87ed778bd35cf09ec3811297002279541d6c965c8
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.14.0/kubectl-mitos_v1.14.0_darwin_amd64.tar.gz
    sha256: ccbd0ff8e58baad77e7c48bc0dee605ee5c670aab2e6f56a9c3872afc6f235df
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.14.0/kubectl-mitos_v1.14.0_darwin_arm64.tar.gz
    sha256: 06cf0df3b23786e77e0ed4c02627bbd5aada907ec89b5c5208cdc951902a13ce
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.14.0/kubectl-mitos_v1.14.0_windows_amd64.zip
    sha256: 2f661e6abd2d6e270df0215df88eb41fda7e0bbdf06575d82c944cbcb802115e
    bin: kubectl-mitos.exe
