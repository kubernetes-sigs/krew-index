apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.39.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.39.0/kubectl-mitos_v1.39.0_linux_amd64.tar.gz
    sha256: 2d0195d0b4ac89e82497d44a1c0c5ae27e0e88d3b58f7f3650de185177b22675
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.39.0/kubectl-mitos_v1.39.0_linux_arm64.tar.gz
    sha256: c563005bd734fe01555d7e0aa4cd6b805c125a3461c0dd23c16bcf7eedd9607f
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.39.0/kubectl-mitos_v1.39.0_darwin_amd64.tar.gz
    sha256: 1cbef2d95fabd08d573dbe6649142f5509788e986a136c7d177c7cbfdb0b320b
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.39.0/kubectl-mitos_v1.39.0_darwin_arm64.tar.gz
    sha256: 63bbefa79ffd50d7f67ee0511b0327fea9d37502b65e3151c967e1388d0ce781
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.39.0/kubectl-mitos_v1.39.0_windows_amd64.zip
    sha256: b4e0e94277eb0abd41a0dc464fe7a515f24d96b676bb203803dc7b5b76ea554a
    bin: kubectl-mitos.exe
