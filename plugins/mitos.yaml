apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.24.1"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.1/kubectl-mitos_v1.24.1_linux_amd64.tar.gz
    sha256: 0080181d9b9a31fabfb518d881d83bc538cef4a899ef624b4895e91293358656
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.1/kubectl-mitos_v1.24.1_linux_arm64.tar.gz
    sha256: 5dd00240bdb9aeaaa7d83dc813ed0394c2f3c06bbed503a39b0ab79f6bbf562a
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.1/kubectl-mitos_v1.24.1_darwin_amd64.tar.gz
    sha256: df08b4e9580b7e45cc8dfc6965c8a02209e2ba1a44280feb0a9cd1290bd9c501
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.1/kubectl-mitos_v1.24.1_darwin_arm64.tar.gz
    sha256: 9fe4ab5e373d52f4669bfc10af909df990a3a50ed115548508df72c2d154f3ee
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.24.1/kubectl-mitos_v1.24.1_windows_amd64.zip
    sha256: a863abec9b8a6852c8df465139a2f9f0459d981bd5e29a846beb9e77394955fe
    bin: kubectl-mitos.exe
