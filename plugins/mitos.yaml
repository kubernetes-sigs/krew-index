apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.11.1"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.11.1/kubectl-mitos_v1.11.1_linux_amd64.tar.gz
    sha256: 6fc4cd769b3eb9034ecc3b1a3b91d79c8f978a5bd96e6fd86752b9fc5a58df13
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.11.1/kubectl-mitos_v1.11.1_linux_arm64.tar.gz
    sha256: a3317885c46cc73b38939945d28b5191573d5623eec11ceb3b189677d7e9c1e3
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.11.1/kubectl-mitos_v1.11.1_darwin_amd64.tar.gz
    sha256: 843b2ae66b2e186f835f2aa0f7b5317e4fd62552f78869955c5122b5ab035c46
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.11.1/kubectl-mitos_v1.11.1_darwin_arm64.tar.gz
    sha256: 5e5550777815d496491db56fc24ab2bb0e518961149f9c152a161b3785774f86
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.11.1/kubectl-mitos_v1.11.1_windows_amd64.zip
    sha256: 45efd9bb073b661f09ba85d2a6fe3d2263ea53daa94e84b2ee9bb597a39e850a
    bin: kubectl-mitos.exe
