apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.20.1"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.1/kubectl-mitos_v1.20.1_linux_amd64.tar.gz
    sha256: 097fbf85565ecd52a3b77f26cfcc20e7cce542ca763463a00a4d88afac04f44f
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.1/kubectl-mitos_v1.20.1_linux_arm64.tar.gz
    sha256: 668e9835ab16da4c091e1fe10bda5c77c06c7f01c6e3b366776eadea9d8000d5
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.1/kubectl-mitos_v1.20.1_darwin_amd64.tar.gz
    sha256: 3064ce6c1dc5700104589899adf998536cb2bc678a04348328c24431c5dfdfe4
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.1/kubectl-mitos_v1.20.1_darwin_arm64.tar.gz
    sha256: 461d48c25e0457ba02289870c9e9b18641c2b2b82e24bed5622ee6d72fe36ecc
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.20.1/kubectl-mitos_v1.20.1_windows_amd64.zip
    sha256: 536163887cff5cf207e122d2985dac92b25cf2374dc9e1bcd7468d3e3d3aa977
    bin: kubectl-mitos.exe
