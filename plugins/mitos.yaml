apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.37.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.0/kubectl-mitos_v1.37.0_linux_amd64.tar.gz
    sha256: acff59c89b3d081349ba21654ee9cc72a1386948f63b20988a7bc85121cce464
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.0/kubectl-mitos_v1.37.0_linux_arm64.tar.gz
    sha256: 2aa60af5ae5d411120eab9fb81b547b896685e35d7fad6d1cd3bc5a66793acc4
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.0/kubectl-mitos_v1.37.0_darwin_amd64.tar.gz
    sha256: 634ece87d998f4e15a889d2eecabc9a6f1fed8a3c62dbb21ce5bfd6283843e58
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.0/kubectl-mitos_v1.37.0_darwin_arm64.tar.gz
    sha256: b3ae44f595be281e881ed9ca837969eb3a7067776a13e519d8592eb4cbf28b36
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.37.0/kubectl-mitos_v1.37.0_windows_amd64.zip
    sha256: 3f02af79bde20261917d1ce2832158f7a6ec8bcf364e63883025b49f7532c82e
    bin: kubectl-mitos.exe
