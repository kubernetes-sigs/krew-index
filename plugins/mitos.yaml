apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.13.1"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.13.1/kubectl-mitos_v1.13.1_linux_amd64.tar.gz
    sha256: 4b5f243bfc68a478b78883b52459cdf0f97ae39761241d4356c72dd8944d990d
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.13.1/kubectl-mitos_v1.13.1_linux_arm64.tar.gz
    sha256: 7439fda1a3fd03dbc25d3b24e2e631d197eabf51b79b6d0da30980140cb303d9
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.13.1/kubectl-mitos_v1.13.1_darwin_amd64.tar.gz
    sha256: b2a63bafbc71895029a992e4be40355f8f088210e2443dc08db7f6889c4b697a
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.13.1/kubectl-mitos_v1.13.1_darwin_arm64.tar.gz
    sha256: 48e2119c3a1a8408ee0582f59ad798b4b30f7eb76ec648dd3f24782e59061d86
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.13.1/kubectl-mitos_v1.13.1_windows_amd64.zip
    sha256: 839bc4997a1def30429cf52048f2b96fdbfcdf0446f1bea6be0c211294b29dae
    bin: kubectl-mitos.exe
