apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.26.3"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.3/kubectl-mitos_v1.26.3_linux_amd64.tar.gz
    sha256: 84f18fddb0a068fa74e5f414187e0254c12a3f1bdbd74a553db991e55b4f8511
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.3/kubectl-mitos_v1.26.3_linux_arm64.tar.gz
    sha256: 44c5b3ee0e2a38fe20ce0a08cca9c172ae782e7405b0cdab4abc5c2ab0661a59
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.3/kubectl-mitos_v1.26.3_darwin_amd64.tar.gz
    sha256: 5e706d7119c2e30e3966d009d27d2dbfd825efcf59d1e84417efa34f060e6d4d
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.3/kubectl-mitos_v1.26.3_darwin_arm64.tar.gz
    sha256: 6fdae37f03ae82a9f5ca89aa9de255692fb51ccb1bb73713f030f1f830301abf
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.3/kubectl-mitos_v1.26.3_windows_amd64.zip
    sha256: 725841dbff382dba3679b8ee8c594d0adc61265993a581ce984b9d3d71b796db
    bin: kubectl-mitos.exe
