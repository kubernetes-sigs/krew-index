apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.40.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.40.0/kubectl-mitos_v1.40.0_linux_amd64.tar.gz
    sha256: 0eeba2fc4bfba8fde6084e24806abc75a21402984c0992036390003a36b08c1f
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.40.0/kubectl-mitos_v1.40.0_linux_arm64.tar.gz
    sha256: 720eae01d362db47c59f7cb3f31695d2a6b1a9758cdfd3dc3c96afde450fda93
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.40.0/kubectl-mitos_v1.40.0_darwin_amd64.tar.gz
    sha256: ffc2037bbfb8f8171a702d7ee50a82510e137dfeb9243ee8adb9af8ba149000b
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.40.0/kubectl-mitos_v1.40.0_darwin_arm64.tar.gz
    sha256: 6f24011b051c247e498cb65c9f7325e698f9e11a505369872c082d353cee1931
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.40.0/kubectl-mitos_v1.40.0_windows_amd64.zip
    sha256: f4eff76ca1571d5ae93bbefc48d37b94c725f3a93b3d68b77364585d45093a31
    bin: kubectl-mitos.exe
