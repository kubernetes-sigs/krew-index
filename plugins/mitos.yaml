apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.19.4"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.4/kubectl-mitos_v1.19.4_linux_amd64.tar.gz
    sha256: 2c33ed9a1ab46841ab2d5e17bd45a54dc0081ae400c62b47fa16620424d55f6b
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.4/kubectl-mitos_v1.19.4_linux_arm64.tar.gz
    sha256: d2915fffe0d58846f1856390273c1af141b429d9eabdddd9287f457aceb25f3f
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.4/kubectl-mitos_v1.19.4_darwin_amd64.tar.gz
    sha256: a8cde09e14ff53b2ad893f9068e6c00c0da4acb589d3d9e3a26c9804d4a9f16c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.4/kubectl-mitos_v1.19.4_darwin_arm64.tar.gz
    sha256: 707309a9eba68c35b791dd13caabe676f6b54fe90c498b36a665edf2fc9228c1
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.4/kubectl-mitos_v1.19.4_windows_amd64.zip
    sha256: d4593e97387c2db1baa3baa930a5a08c3f17587c7f6c3259242bf7782249771d
    bin: kubectl-mitos.exe
