apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.39.1"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.39.1/kubectl-mitos_v1.39.1_linux_amd64.tar.gz
    sha256: 73853fc8a8abcc7cddc246e5a26344d444f0cdcd47b2b2b9a06509d28bc85240
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.39.1/kubectl-mitos_v1.39.1_linux_arm64.tar.gz
    sha256: 8a42f69809346acc1928ab5e4b9e480013cd776c041a95870899e4cdf387bfc8
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.39.1/kubectl-mitos_v1.39.1_darwin_amd64.tar.gz
    sha256: 219a757127dc5c91119a18ba403c404e6c0054a0c4488aa9f4a09aedff75d3b2
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.39.1/kubectl-mitos_v1.39.1_darwin_arm64.tar.gz
    sha256: 97d21584be2fad26ff2ea857ec34f330e5261d6ebb7dba6cab13e2fee581490b
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.39.1/kubectl-mitos_v1.39.1_windows_amd64.zip
    sha256: d774ca1b23c79a50857f776359a3a0488a7f9470df4ebf1aea9f4c39b7b2beb3
    bin: kubectl-mitos.exe
