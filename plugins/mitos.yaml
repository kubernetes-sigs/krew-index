apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.32.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.0/kubectl-mitos_v1.32.0_linux_amd64.tar.gz
    sha256: bba56b0b3f33cbc7fe734242bae2f9001c3a24d48ab5eb1f4adc96054cff9aa0
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.0/kubectl-mitos_v1.32.0_linux_arm64.tar.gz
    sha256: 7e555b26c130f036b8c2c2e336d6e3ce1a232a0b548e84c4f03809587bb1b13e
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.0/kubectl-mitos_v1.32.0_darwin_amd64.tar.gz
    sha256: 5309d37610355cda13e1e773034cf6f9f49517651404b965bab701e49a9d649c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.0/kubectl-mitos_v1.32.0_darwin_arm64.tar.gz
    sha256: 361244d3fdc99b09626e5c6528e11c78bc8a52c3cbd78c4992000a2274ab66b1
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.32.0/kubectl-mitos_v1.32.0_windows_amd64.zip
    sha256: 031766aef0f3382023fb20df1668bcc9118509ba4e96bc42364dc8d2cdc41d9c
    bin: kubectl-mitos.exe
