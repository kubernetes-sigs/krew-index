apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.28.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.28.0/kubectl-mitos_v1.28.0_linux_amd64.tar.gz
    sha256: 2cef435748a7d7c853c68b5a1ae578351a6cf38c0385948294b3ab8f170060fd
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.28.0/kubectl-mitos_v1.28.0_linux_arm64.tar.gz
    sha256: 07670b881a852736e16b920731b82ac256c38474e44ac960be372e2c8eb361fa
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.28.0/kubectl-mitos_v1.28.0_darwin_amd64.tar.gz
    sha256: f5aaf8e3b7662bfc6cd582ad2957cf94a1d131f1da5842768fde0ec2e488c827
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.28.0/kubectl-mitos_v1.28.0_darwin_arm64.tar.gz
    sha256: bd4a10a312b712fbb03966bc5ca5b82450e40d8d87348f0f78e2529442f80f58
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.28.0/kubectl-mitos_v1.28.0_windows_amd64.zip
    sha256: ff3528de7c9b7a7dbe82b8dda69f8cde087ef9f39a6ab0f92186e0c3581e34ba
    bin: kubectl-mitos.exe
