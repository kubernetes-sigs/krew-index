apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.8.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.8.0/kubectl-mitos_v1.8.0_linux_amd64.tar.gz
    sha256: 2266fa673687b218618c055bde57bf99d930d2fd3f07287d209f5ed51cc7e3e9
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.8.0/kubectl-mitos_v1.8.0_linux_arm64.tar.gz
    sha256: 018b8a36136bd5c56fec440186c9fcdbe1645f492c76021d2f8a5a8429a28c77
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.8.0/kubectl-mitos_v1.8.0_darwin_amd64.tar.gz
    sha256: 945fc556553025819e37ced2357c6a2c36c2618dfef46fc33ad169b96831f98e
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.8.0/kubectl-mitos_v1.8.0_darwin_arm64.tar.gz
    sha256: 903133c5cbc6a2ce16737c1b4d74e81fa223452ea0f5fe147a5ad064e9d66818
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.8.0/kubectl-mitos_v1.8.0_windows_amd64.zip
    sha256: 2f2d37506afbe869a302ea8799b3935b0dac1b56e4ad412b43510d1439be86ff
    bin: kubectl-mitos.exe
