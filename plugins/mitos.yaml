apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.36.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.36.0/kubectl-mitos_v1.36.0_linux_amd64.tar.gz
    sha256: d18156e32be1556a933eb3642f2750e697d3f173dcb0acda0442e8d6eca49cea
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.36.0/kubectl-mitos_v1.36.0_linux_arm64.tar.gz
    sha256: b43bab6665fee77d297abf719d75b54011939560cab41e4bc06770fa30a7cc7f
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.36.0/kubectl-mitos_v1.36.0_darwin_amd64.tar.gz
    sha256: 61e8e2134b6055c318bf8e8e331fa8dd8e264a0cd34be5ee3fd815aead3a16be
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.36.0/kubectl-mitos_v1.36.0_darwin_arm64.tar.gz
    sha256: b8d8a7102907374df788e2680a750cc8b85edb5683d6e0faf6a131231dfb1d5f
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.36.0/kubectl-mitos_v1.36.0_windows_amd64.zip
    sha256: a5779e83fec691a479825a0065cbd44b759b121b59f5b82d5b2862de068fee68
    bin: kubectl-mitos.exe
