apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.10.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.10.0/kubectl-mitos_v1.10.0_linux_amd64.tar.gz
    sha256: f7f1e34f15a9aad51b4434a363e0a9a7ab233bc2ab9d47876a4397417b8c0a90
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.10.0/kubectl-mitos_v1.10.0_linux_arm64.tar.gz
    sha256: f657f2851540247f0c00d7530f60ec84a26dcbd8c035f7dee2603610665901ec
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.10.0/kubectl-mitos_v1.10.0_darwin_amd64.tar.gz
    sha256: a0f2b09e304d4e4fed3d04eb4aaa097af0e37ddfcca1abe37824c75cdf156c54
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.10.0/kubectl-mitos_v1.10.0_darwin_arm64.tar.gz
    sha256: a4d2c054ce0acda50be4af26c200aab8d68c9bcf8253e33ec8e9972499274bb1
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.10.0/kubectl-mitos_v1.10.0_windows_amd64.zip
    sha256: 5e7a1cd3eb94353e3e2800a81dad96ee655a67b99778f255335d6d84879dde9a
    bin: kubectl-mitos.exe
