apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.26.2"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.2/kubectl-mitos_v1.26.2_linux_amd64.tar.gz
    sha256: c01ef1991ddd19a543c549ed9106102aab5b74b546f644deb6fa9ed6276ff893
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.2/kubectl-mitos_v1.26.2_linux_arm64.tar.gz
    sha256: f3801105b17d86f85a0a464e97d8dd31548fc517a6ad7f14168bc7d6d0684f1d
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.2/kubectl-mitos_v1.26.2_darwin_amd64.tar.gz
    sha256: 389e4b38811d0b6556226b7fd74be1dfca61a6812597dee4d75a504101207364
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.2/kubectl-mitos_v1.26.2_darwin_arm64.tar.gz
    sha256: 0422b384b889f2bcee48744322910ab14652bed340720926efae05add4119bfd
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.26.2/kubectl-mitos_v1.26.2_windows_amd64.zip
    sha256: 63fb04f9bfbe6405a4dde1beaaaf40698bd8d5a4be2c5bc6d3079a507825efaa
    bin: kubectl-mitos.exe
