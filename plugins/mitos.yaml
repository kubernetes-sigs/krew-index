apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.19.2"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.2/kubectl-mitos_v1.19.2_linux_amd64.tar.gz
    sha256: 837bd7c5b1c2cd7f5ec02e4e8852af29d952e2ee31277148e9ffbe1e95a9cb8b
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.2/kubectl-mitos_v1.19.2_linux_arm64.tar.gz
    sha256: 7ca7502c48dc194079baa433250e1bc9c86b69c54882e05adb7708f62c2a414c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.2/kubectl-mitos_v1.19.2_darwin_amd64.tar.gz
    sha256: 318ca19915d396bf4098a7b68de1079b5fc69e6a8214ad78cb231a7dbfb5521c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.2/kubectl-mitos_v1.19.2_darwin_arm64.tar.gz
    sha256: ea8058db4b05afed0e1fa402b25adc106806f24ba32f113c9597efb54a10f515
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.2/kubectl-mitos_v1.19.2_windows_amd64.zip
    sha256: 138261b5d4ea4449501edd67986533656bd842c76923856beea83e8c243a5f7a
    bin: kubectl-mitos.exe
