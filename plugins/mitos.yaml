apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.42.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.42.0/kubectl-mitos_v1.42.0_linux_amd64.tar.gz
    sha256: dd51cacb07c56f6608d45cec620c7eb6ab6147133985696a9018f5c741be8400
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.42.0/kubectl-mitos_v1.42.0_linux_arm64.tar.gz
    sha256: 3fd93a40a1a3294c13d3fb6f7ac4f54541153ec5bcc627a78af971dc20fefd6d
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.42.0/kubectl-mitos_v1.42.0_darwin_amd64.tar.gz
    sha256: 90652df9f7014ec2973db1d277ddbf10e4b3915e01d33eb77b2e21410106d573
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.42.0/kubectl-mitos_v1.42.0_darwin_arm64.tar.gz
    sha256: 15615ae89c60b03b9b1a1d9e50bd8712bbf5824e84a314389c45ce7d1e377a20
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.42.0/kubectl-mitos_v1.42.0_windows_amd64.zip
    sha256: 7ec09a33a43d4f8fcd1e3536c348290f7afd64747ffc64000274728c8cc3c217
    bin: kubectl-mitos.exe
