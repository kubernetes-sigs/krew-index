apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.17.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.17.0/kubectl-mitos_v1.17.0_linux_amd64.tar.gz
    sha256: 0096fb9d9b11778d362266b9f051d0b39b5c13427b836b0a6162996d7e9f37c9
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.17.0/kubectl-mitos_v1.17.0_linux_arm64.tar.gz
    sha256: 7ba6171254feb5ff797762d15d52b26e141699b2d703d28d97429818301c9bcc
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.17.0/kubectl-mitos_v1.17.0_darwin_amd64.tar.gz
    sha256: ceab326de1ee4d024e69ddde97b70be9e2b4062655d10d4c563071b3cb98f357
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.17.0/kubectl-mitos_v1.17.0_darwin_arm64.tar.gz
    sha256: b8603869a3bc7bc46e8e84fe2090ea71e69949d743d20f64bd8975bcad1d19c0
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.17.0/kubectl-mitos_v1.17.0_windows_amd64.zip
    sha256: 74af7d7b5976f8f1f3f209d7c04415e7e5287f849770515caf4fe56386a9dd03
    bin: kubectl-mitos.exe
