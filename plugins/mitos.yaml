apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.19.5"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.5/kubectl-mitos_v1.19.5_linux_amd64.tar.gz
    sha256: dc80668127dc48fb144556a713317546a53fddbe7facba26b1029b3a916d50a0
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.5/kubectl-mitos_v1.19.5_linux_arm64.tar.gz
    sha256: e9f2c84d84d8d187910398fe53c0087a1469b3cd75883ebfd5c203d0eac7a30c
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.5/kubectl-mitos_v1.19.5_darwin_amd64.tar.gz
    sha256: 0ad1e0e39621b451cf508d61e1454555cccca400c93146e524aaf21ff8fc1f85
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.5/kubectl-mitos_v1.19.5_darwin_arm64.tar.gz
    sha256: e593b300f4218277b6b3ec2cf2f375e84905d8110e2487a2768bc4c5417ac4f6
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.19.5/kubectl-mitos_v1.19.5_windows_amd64.zip
    sha256: 5481a1dfb68c3a6fd07180b27efc68b38662099233293e4d7b881ed3783dbb42
    bin: kubectl-mitos.exe
