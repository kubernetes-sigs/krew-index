apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.42.1"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.42.1/kubectl-mitos_v1.42.1_linux_amd64.tar.gz
    sha256: 059ed5e109f40086eb6ec9ff15818ea896d07307949f62e942bc7ae44055ccaf
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.42.1/kubectl-mitos_v1.42.1_linux_arm64.tar.gz
    sha256: 04a94078c67177de3f3ff20303e0d67166f9c821cb587dd2fe7010d3b9303d6f
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.42.1/kubectl-mitos_v1.42.1_darwin_amd64.tar.gz
    sha256: 37b7ab52795d56268c5d9f8b68b71d63a100de0f8f1edfc71172ebd6f6f5ea34
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.42.1/kubectl-mitos_v1.42.1_darwin_arm64.tar.gz
    sha256: 0e2b6a1d415b17b92b1eac94af5d482bf963566394fa6caaa657220e4ef8ee1e
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.42.1/kubectl-mitos_v1.42.1_windows_amd64.zip
    sha256: c5575ade8ecaa1e5d8afbdf530a6f0b819dc1e2a0680f14c6489742603bb1899
    bin: kubectl-mitos.exe
