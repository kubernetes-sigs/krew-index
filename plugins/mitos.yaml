apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "v1.9.0"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. Mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.9.0/kubectl-mitos_v1.9.0_linux_amd64.tar.gz
    sha256: 671ba289020c7a1a10d4bc3d5a9bcd149d62b3a1d6327415b5a80185c54223c0
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.9.0/kubectl-mitos_v1.9.0_linux_arm64.tar.gz
    sha256: 14f677b90347bd072ed01cff8b624244a4f38b344c6609c660f2ad97ce69d759
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.9.0/kubectl-mitos_v1.9.0_darwin_amd64.tar.gz
    sha256: 765ba399698f684fc4aee87c506ac88e405381cab64470b51aca9ddb75f761c6
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.9.0/kubectl-mitos_v1.9.0_darwin_arm64.tar.gz
    sha256: d79e3ab8b4f4be68678f0416e08c741459819140f0ee47b64e2114b22fb6f48f
    bin: kubectl-mitos
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mitos-run/mitos/releases/download/v1.9.0/kubectl-mitos_v1.9.0_windows_amd64.zip
    sha256: ab7a3f5ea3b2c1e25a02803214eb086542bcea8f8b97fdf463700e589096a7b7
    bin: kubectl-mitos.exe
