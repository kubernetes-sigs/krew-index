apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: moco
spec:
  version: v0.36.0
  homepage: https://github.com/cybozu-go/moco
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/cybozu-go/moco/releases/download/v0.36.0/kubectl-moco_v0.36.0_darwin_amd64.tar.gz
      sha256: 5db4c79bf383bbd07adf2f7b75e49c814b7055112309783f950cfccede5a787a
      bin: kubectl-moco
      files:
        - from: kubectl-moco
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/cybozu-go/moco/releases/download/v0.36.0/kubectl-moco_v0.36.0_darwin_arm64.tar.gz
      sha256: 9fcbd4302180d2b2b251f931caafd200bf6b4676f9acc76a541c2d43ffabe182
      bin: kubectl-moco
      files:
        - from: kubectl-moco
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/cybozu-go/moco/releases/download/v0.36.0/kubectl-moco_v0.36.0_linux_amd64.tar.gz
      sha256: 1314062e9496a598b1552a13802fe7696e7a6e2272ebd8a934f0edf76f2fff16
      bin: kubectl-moco
      files:
        - from: kubectl-moco
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/cybozu-go/moco/releases/download/v0.36.0/kubectl-moco_v0.36.0_linux_arm64.tar.gz
      sha256: bfa27faa01d37fa4c844cb375eb75c8c1fa0dff6bbd254efb468f7fbd37226b8
      bin: kubectl-moco
      files:
        - from: kubectl-moco
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/cybozu-go/moco/releases/download/v0.36.0/kubectl-moco_v0.36.0_windows_amd64.tar.gz
      sha256: 08806f149363f68fcfa69fe87ca4a19277906d79de79e4c8414cf88dd4bc83bd
      bin: kubectl-moco.exe
      files:
        - from: kubectl-moco.exe
          to: .
        - from: LICENSE
          to: .
  shortDescription: Interact with MySQL operator MOCO.
  description: |
    kubectl-moco is a kubectl plugin for controlling MySQL clusters created by the MySQL operator MOCO.
    MOCO is a MySQL operator on Kubernetes.
    Its primary function is to manage MySQL clusters using GTID-based semi-synchronous replication.
    It does not manage group replication clusters.
    Read more documentation at: https://cybozu-go.github.io/moco/index.html
