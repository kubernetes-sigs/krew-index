apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: moco
spec:
  version: v0.35.0
  homepage: https://github.com/cybozu-go/moco
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/cybozu-go/moco/releases/download/v0.35.0/kubectl-moco_v0.35.0_darwin_amd64.tar.gz
      sha256: 2774c99c2711ac6f75c7bf1355913688a6b0e703f86e535e536b555a7bb8f364
      bin: kubectl-moco
      files:
        - from: kubectl-moco
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/cybozu-go/moco/releases/download/v0.35.0/kubectl-moco_v0.35.0_darwin_arm64.tar.gz
      sha256: cc43be7da7861712676a9015ea3ae0c60c7b6e6bbce0772b2693469234956133
      bin: kubectl-moco
      files:
        - from: kubectl-moco
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/cybozu-go/moco/releases/download/v0.35.0/kubectl-moco_v0.35.0_linux_amd64.tar.gz
      sha256: ec48217c8beab6440ab6869c7de20681bc78d674ef4c3b7d035b57b4b3c1bcf7
      bin: kubectl-moco
      files:
        - from: kubectl-moco
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/cybozu-go/moco/releases/download/v0.35.0/kubectl-moco_v0.35.0_linux_arm64.tar.gz
      sha256: 30111d4be92f70b3c5fff764ab31e99d95963166bb15fd46dd8450490ca002ab
      bin: kubectl-moco
      files:
        - from: kubectl-moco
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/cybozu-go/moco/releases/download/v0.35.0/kubectl-moco_v0.35.0_windows_amd64.tar.gz
      sha256: c4859e6616d45c23a16c8e23bd0d3123632f7adf95815ca08b0080c429a62afa
      bin: kubectl-moco.exe
      files:
        - from: kubectl-moco.exe
          to: .
        - from: LICENSE
          to: .
  shortDescription: Interact with MySQL operator MOCO.
  description: |
    kubectl-moco is a kubectl plugin for controlling MySQL clusters created by the MySQL operator MOCO.
    MOCO is a MySQL operator on Kubernetes.
    Its primary function is to manage MySQL clusters using GTID-based semi-synchronous replication.
    It does not manage group replication clusters.
    Read more documentation at: https://cybozu-go.github.io/moco/index.html
