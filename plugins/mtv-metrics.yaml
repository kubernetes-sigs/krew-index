apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mtv-metrics
spec:
  version: v0.1.4
  homepage: https://github.com/yaacov/kubectl-metrics
  shortDescription: Query Prometheus/Thanos metrics for Kubernetes MTV/Forklift
  description: |
    kubectl-mtv-metrics is a kubectl plugin for querying Prometheus and Thanos
    metrics for Kubernetes. It works as both a CLI tool and an MCP
    server for AI assistants (Claude Desktop, Cursor IDE, OpenShift Lightspeed).
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.4/kubectl-metrics-v0.1.4-linux-amd64.tar.gz
    sha256: 04c33688deba9f8180eab135fe80dd2ce00619949d6170435aa96407eecbd2d5
    files:
    - from: kubectl-metrics-linux-amd64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.4/kubectl-metrics-v0.1.4-linux-arm64.tar.gz
    sha256: 987af190c7c7461e0044f6037aeb8bf91bd15a0ccb434b9b97f25c8fbe0edf8a
    files:
    - from: kubectl-metrics-linux-arm64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.4/kubectl-metrics-v0.1.4-darwin-amd64.tar.gz
    sha256: f18aea94e9a1a83f88d2ca8865bd5612cd10222d8379dd2e82be39c890819dcc
    files:
    - from: kubectl-metrics-darwin-amd64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.4/kubectl-metrics-v0.1.4-darwin-arm64.tar.gz
    sha256: 6f89ce604acc8289ba41361aa0855fc0973ac9eb419fa1ac9ec844ba1b73c374
    files:
    - from: kubectl-metrics-darwin-arm64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.4/kubectl-metrics-v0.1.4-windows-amd64.zip
    sha256: 366324f306ea2b5543f611cbcd8e95ea09a0974f763478eb524b69e6809109ef
    files:
    - from: kubectl-metrics-windows-amd64.exe
      to: kubectl-mtv_metrics.exe
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics.exe
