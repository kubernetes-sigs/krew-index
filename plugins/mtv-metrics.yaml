apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mtv-metrics
spec:
  version: v0.1.9
  homepage: https://github.com/yaacov/kubectl-metrics
  shortDescription: Query Prometheus/Thanos metrics for Kubernetes MTV/Forklift
  description: |
    kubectl-mtv-metrics is a kubectl plugin for querying Prometheus and Thanos
    metrics for Kubernetes. It works as both a CLI tool and an MCP
    server for AI assistants (Claude Desktop, Cursor IDE, OpenShift Lightspeed).
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.9/kubectl-metrics-v0.1.9-linux-amd64.tar.gz
    sha256: e272a7807629881bb44a5d96cdf3f63987fe887c68f9a8e278a2da038587ded5
    files:
    - from: kubectl-metrics-linux-amd64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.9/kubectl-metrics-v0.1.9-linux-arm64.tar.gz
    sha256: 42c50c8d27c1667e4d172bdd40f1124cbc80b85521f00bacf6b4a4520a1e80c8
    files:
    - from: kubectl-metrics-linux-arm64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.9/kubectl-metrics-v0.1.9-darwin-amd64.tar.gz
    sha256: 910d107a76e3035feb52899a283ec6584ef97e9e5779445cbd987f030820ba62
    files:
    - from: kubectl-metrics-darwin-amd64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.9/kubectl-metrics-v0.1.9-darwin-arm64.tar.gz
    sha256: 3a1f264a2bf16bd6f0bd015cf7ae0c39f37fe0ce4a433458088ee2d7458761d7
    files:
    - from: kubectl-metrics-darwin-arm64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.9/kubectl-metrics-v0.1.9-windows-amd64.zip
    sha256: b728b54deae56f6b90438b88d7b1ee14b4d7565bae73c9bfea8bc0105ac03637
    files:
    - from: kubectl-metrics-windows-amd64.exe
      to: kubectl-mtv_metrics.exe
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics.exe
