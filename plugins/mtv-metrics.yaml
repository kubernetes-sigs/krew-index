apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mtv-metrics
spec:
  version: v0.1.11
  homepage: https://github.com/yaacov/kubectl-metrics
  shortDescription: Query Prometheus/Thanos metrics for Kubernetes MTV/Forklift
  description: |
    kubectl-mtv-metrics is a kubectl plugin for querying Prometheus and Thanos
    metrics for Kubernetes. It works as both a CLI tool and an MCP
    server for AI assistants (Claude Desktop, Cursor IDE, OpenShift Lightspeed).
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.11/kubectl-metrics-v0.1.11-linux-amd64.tar.gz
    sha256: 8b41b83832a644141de00b35d3ceffc2ecb32d33572dbf6fa3ccd491ceb8fe78
    files:
    - from: kubectl-metrics-linux-amd64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.11/kubectl-metrics-v0.1.11-linux-arm64.tar.gz
    sha256: 2eb5995e08d9a79b5409ede4e577af112e8f9158f2a2ec5952c93c16b5fbcb66
    files:
    - from: kubectl-metrics-linux-arm64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.11/kubectl-metrics-v0.1.11-darwin-amd64.tar.gz
    sha256: 7c2fc419cf0d9e64685dfbc52871cc08610a0c64c4384785416a887539b9a48f
    files:
    - from: kubectl-metrics-darwin-amd64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.11/kubectl-metrics-v0.1.11-darwin-arm64.tar.gz
    sha256: 9683ee3cd388b4cf04d71fd9351aa9f904d0d63b3327a400a271160aeaa1474b
    files:
    - from: kubectl-metrics-darwin-arm64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.11/kubectl-metrics-v0.1.11-windows-amd64.zip
    sha256: dab6e6301923f49c5f86736e5a09e6f0da77e3d5a3e3f83a3dc0443f11792ac9
    files:
    - from: kubectl-metrics-windows-amd64.exe
      to: kubectl-mtv_metrics.exe
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics.exe
