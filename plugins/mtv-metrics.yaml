apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mtv-metrics
spec:
  version: v0.1.12
  homepage: https://github.com/yaacov/kubectl-metrics
  shortDescription: Query Prometheus/Thanos metrics for Kubernetes MTV/Forklift
  description: |
    kubectl-mtv-metrics is a kubectl plugin for querying Prometheus and Thanos
    metrics for Kubernetes. It works as both a CLI tool and an MCP
    server for AI assistants (Claude Desktop, Cursor IDE, OpenShift Lightspeed).
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.12/kubectl-metrics-v0.1.12-linux-amd64.tar.gz
    sha256: 5c7896eef169c3d25f9db5d9115b1398d299c366f32c8c0b05f3c8aae09b21c9
    files:
    - from: kubectl-metrics-linux-amd64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.12/kubectl-metrics-v0.1.12-linux-arm64.tar.gz
    sha256: 35b2b42f36c79ae65c9c803c8a7be8398d99ef758a4711b69ecc2d711785d38e
    files:
    - from: kubectl-metrics-linux-arm64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.12/kubectl-metrics-v0.1.12-darwin-amd64.tar.gz
    sha256: fe8221f2266e2e2b9e45b2ff63a938ea4b45b8e714681f0ea147c19ce145a513
    files:
    - from: kubectl-metrics-darwin-amd64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.12/kubectl-metrics-v0.1.12-darwin-arm64.tar.gz
    sha256: 8a045f9aae3ba155703826ff1fdce6fd98ec5f961126192029f248dfef33c4e7
    files:
    - from: kubectl-metrics-darwin-arm64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.12/kubectl-metrics-v0.1.12-windows-amd64.zip
    sha256: 7d3af0647cf4a973c274d132a466ca5b410f0d4ef915d2e3725d4fa3151c0abc
    files:
    - from: kubectl-metrics-windows-amd64.exe
      to: kubectl-mtv_metrics.exe
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics.exe
