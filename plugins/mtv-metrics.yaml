apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mtv-metrics
spec:
  version: v0.1.3
  homepage: https://github.com/yaacov/kubectl-metrics
  shortDescription: Query Prometheus/Thanos metrics for Kubernetes MTV/Forklift
  description: |
    kubectl-mtv-metrics is a kubectl plugin for querying Prometheus and Thanos
    metrics for Kubernetes. It works as both a CLI tool and an MCP
    server for AI assistants (Claude Desktop, Cursor IDE, OpenShift Lightspeed).
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.3/kubectl-metrics-v0.1.3-linux-amd64.tar.gz
    sha256: 45469e36c1b80ec4adaa7934b27d346c6d67037e21eae5b6d6d7fccd2196c949
    files:
    - from: kubectl-metrics-linux-amd64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.3/kubectl-metrics-v0.1.3-linux-arm64.tar.gz
    sha256: aea96d9561b4257ed949ad7473b936bcb62af408d0fb077a32574c2b0b5ff7b5
    files:
    - from: kubectl-metrics-linux-arm64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.3/kubectl-metrics-v0.1.3-darwin-amd64.tar.gz
    sha256: 414fe255b02d11ff46af9f3a3b22faf9f7cdee203859a631e021557a2048af63
    files:
    - from: kubectl-metrics-darwin-amd64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.3/kubectl-metrics-v0.1.3-darwin-arm64.tar.gz
    sha256: 38ea1a84ac794e1bd4ea57caecf45af9780fba9c160bfe7f1fa9909e6188a35b
    files:
    - from: kubectl-metrics-darwin-arm64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.3/kubectl-metrics-v0.1.3-windows-amd64.zip
    sha256: c34a26d7b665a54f89795d0d3968f9d034060b21c712746bf9295319a0f33d43
    files:
    - from: kubectl-metrics-windows-amd64.exe
      to: kubectl-mtv_metrics.exe
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics.exe
