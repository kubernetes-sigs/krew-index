apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mtv-metrics
spec:
  version: v0.1.13
  homepage: https://github.com/yaacov/kubectl-metrics
  shortDescription: Query Prometheus/Thanos metrics for Kubernetes MTV/Forklift
  description: |
    kubectl-mtv-metrics is a kubectl plugin for querying Prometheus and Thanos
    metrics for Kubernetes. It works as both a CLI tool and an MCP
    server for AI assistants (Claude Desktop, Cursor IDE, OpenShift Lightspeed).
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.13/kubectl-metrics-v0.1.13-linux-amd64.tar.gz
    sha256: ef5e5b1ab83cc719aab39e81aa0d0908af8d87f71b3005ea2d7b7427eed1995f
    files:
    - from: kubectl-metrics-linux-amd64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.13/kubectl-metrics-v0.1.13-linux-arm64.tar.gz
    sha256: 7329c79d6e71232cac8a4b50473c9d547000d1815e32e29b529044a7873fe019
    files:
    - from: kubectl-metrics-linux-arm64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.13/kubectl-metrics-v0.1.13-darwin-amd64.tar.gz
    sha256: 9f75008110707c8ef4287dc0612c360b683322ff266bada56b9616ea961ca36b
    files:
    - from: kubectl-metrics-darwin-amd64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.13/kubectl-metrics-v0.1.13-darwin-arm64.tar.gz
    sha256: 4223859a0511c0dedacd622fc55b512b4e6c0a3efb8fb19e0d73b7a0c329e901
    files:
    - from: kubectl-metrics-darwin-arm64
      to: kubectl-mtv_metrics
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/yaacov/kubectl-metrics/releases/download/v0.1.13/kubectl-metrics-v0.1.13-windows-amd64.zip
    sha256: c34734eb23abe3d9fee41388caed3730f86a014087ee160ba6a321cb8326391f
    files:
    - from: kubectl-metrics-windows-amd64.exe
      to: kubectl-mtv_metrics.exe
    - from: LICENSE
      to: .
    bin: kubectl-mtv_metrics.exe
