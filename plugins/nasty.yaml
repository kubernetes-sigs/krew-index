apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: nasty
spec:
  version: v0.0.3
  homepage: https://github.com/nasty-project/nasty-plugin
  shortDescription: Manage NASty CSI volumes
  description: |
    kubectl plugin for managing NASty CSI driver volumes.

    Commands:
    - list: List all managed volumes with clone relationships
    - list-snapshots: List snapshots with source volumes
    - list-orphaned: Find volumes without matching PVCs
    - describe: Show detailed volume information
    - health: Check health of all volumes
    - troubleshoot: Diagnose PVC issues
    - summary: Dashboard overview of all resources
    - cleanup: Delete orphaned volumes safely
    - mark-adoptable: Mark volumes for DR/adoption
    - adopt: Generate PV manifest for adoption
    - status: Show volume status from NASty
    - connectivity: Test NASty connection
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/nasty-project/nasty-plugin/releases/download/v0.0.3/kubectl-nasty-linux-amd64.tar.gz
    sha256: 2e3cd71704ebe00e8c3e94b527781ccae636706243ecec6952807a1e7a4eb4fa
    bin: kubectl-nasty
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/nasty-project/nasty-plugin/releases/download/v0.0.3/kubectl-nasty-linux-arm64.tar.gz
    sha256: c0df41a0d4f5f015a8d4d27a11fd34035e8abf7e9ee4e33f99050c9b1e7116d4
    bin: kubectl-nasty
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/nasty-project/nasty-plugin/releases/download/v0.0.3/kubectl-nasty-darwin-amd64.tar.gz
    sha256: a933aced22632b541a26132971d58bbff831c375a04043fb6c7f832f575d8366
    bin: kubectl-nasty
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/nasty-project/nasty-plugin/releases/download/v0.0.3/kubectl-nasty-darwin-arm64.tar.gz
    sha256: e17f4464c82bd26a1edf9531ee74a1942a1fbceeaf34ffbf183ed9d2bb3bbbc2
    bin: kubectl-nasty
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/nasty-project/nasty-plugin/releases/download/v0.0.3/kubectl-nasty-windows-amd64.zip
    sha256: a2633527cb306ade97fb93308761c454617af23b2d53fdb67fbe37913b1d4f29
    bin: kubectl-nasty.exe
