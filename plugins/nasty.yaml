apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: nasty
spec:
  version: v0.0.2
  homepage: https://github.com/nasty-project/nasty-plugin
  shortDescription: Manage NASty CSI volumes
  description: |
    kubectl plugin for managing NASty CSI driver volumes.

    Commands:
    - list: List all managed volumes with clone relationships
    - list-snapshots: List snapshots with source volumes
    - list-orphaned: Find volumes without matching PVCs
    - describe: Show detailed volume information
    - health: Check health of all volumes
    - troubleshoot: Diagnose PVC issues
    - summary: Dashboard overview of all resources
    - cleanup: Delete orphaned volumes safely
    - mark-adoptable: Mark volumes for DR/adoption
    - adopt: Generate PV manifest for adoption
    - status: Show volume status from NASty
    - connectivity: Test NASty connection
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/nasty-project/nasty-plugin/releases/download/v0.0.2/kubectl-nasty-linux-amd64.tar.gz
    sha256: 78dd1e4c5f28563477c7d173eccebc4a1679a951b3cd3603231b782f60eb5151
    bin: kubectl-nasty
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/nasty-project/nasty-plugin/releases/download/v0.0.2/kubectl-nasty-linux-arm64.tar.gz
    sha256: 6a1734fc5e7878f3eadb61b5b2bb83c04a29dcd42d3a376332b45677347cb3aa
    bin: kubectl-nasty
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/nasty-project/nasty-plugin/releases/download/v0.0.2/kubectl-nasty-darwin-amd64.tar.gz
    sha256: d93e19dca4b3b7a4c3a6fc062ab6e2df322c866ebb3f2fd88ae4c27ad061305c
    bin: kubectl-nasty
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/nasty-project/nasty-plugin/releases/download/v0.0.2/kubectl-nasty-darwin-arm64.tar.gz
    sha256: b777eee50324db328aff2659801453b440a4534a2f1fc9d2f1515138b95a772e
    bin: kubectl-nasty
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/nasty-project/nasty-plugin/releases/download/v0.0.2/kubectl-nasty-windows-amd64.zip
    sha256: 248f9de4c81362b87033a9e1853358bca7560a5752364e9166b6363a00be3900
    bin: kubectl-nasty.exe
