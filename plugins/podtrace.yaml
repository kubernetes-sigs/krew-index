apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: podtrace
spec:
  version: "v0.14.0"
  homepage: https://github.com/gma1k/podtrace
  shortDescription: eBPF diagnostics for Kubernetes pods
  description: |
    Podtrace runs eBPF probes against Kubernetes pods to surface low-level
    diagnostics: TCP/UDP latency, DNS resolution, file I/O, syscall traces,
    lock contention, OOM events, and more. Run from your workstation for
    ad-hoc diagnose runs of single or multiple pods, with bounded duration
    and optional JSON/OTLP/Jaeger/Splunk/Datadog export.

    The same binary also powers the in-cluster operator and per-session
    Job runtime when installed via Helm; the CLI is one mode of three
    (CLI, continuous PodTrace CR, bounded PodTraceSession CR).
  caveats: |
    Podtrace requires Linux nodes with kernel 5.8+ (BPF ring buffer) and,
    for some probes (gRPC, FastCGI, full path resolution), BTF available
    at /sys/kernel/btf/vmlinux.

    The agent and per-session Jobs run as privileged in-cluster
    containers with hostPID (capabilities include CAP_BPF,
    CAP_SYS_ADMIN, CAP_PERFMON, CAP_SYS_RESOURCE, CAP_NET_ADMIN). The
    kubectl plugin itself does not need elevated permissions on your
    workstation.

    Supported platforms: linux/amd64, linux/arm64, darwin/amd64,
    darwin/arm64. Compatibility matrix:
    https://github.com/gma1k/podtrace/blob/main/docs/compatibility.md
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/gma1k/podtrace/releases/download/v0.14.0/podtrace_linux_amd64.tar.gz
    sha256: 2f467b9d113fc5149690219bcf6a84751c52ea5e743d7403e71600a1bc1b8991
    bin: podtrace
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/gma1k/podtrace/releases/download/v0.14.0/podtrace_linux_arm64.tar.gz
    sha256: e4c06061da1636333e5038b2cfd69fd0de07b155709b0631057ab0abef752e96
    bin: podtrace
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/gma1k/podtrace/releases/download/v0.14.0/podtrace_darwin_amd64.tar.gz
    sha256: add8dfa27dd284b552032914cea9de5f27b3497728638c0e32f123f6b7f831c7
    bin: podtrace
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/gma1k/podtrace/releases/download/v0.14.0/podtrace_darwin_arm64.tar.gz
    sha256: b69c7fabebf6b797c69b0ded36412ce80393e039ccb56f9afbc7b91c4390a89a
    bin: podtrace
