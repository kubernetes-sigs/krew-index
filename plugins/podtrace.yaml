apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: podtrace
spec:
  version: v0.11.6
  homepage: https://github.com/gma1k/podtrace
  shortDescription: eBPF diagnostics for Kubernetes pods
  description: |
    Podtrace runs eBPF probes against Kubernetes pods to surface low-level
    diagnostics: TCP/UDP latency, DNS resolution, file I/O, syscall traces,
    lock contention, OOM events, and more. Use as `kubectl podtrace` for
    ad-hoc diagnose runs from your workstation, with bounded duration and
    optional JSON/OTLP/Jaeger/Splunk/DataDog export.

    The same binary also powers the in-cluster operator and per-session
    Job runtime when installed via Helm; the CLI is one mode of three
    (CLI, continuous PodTrace CR, bounded PodTraceSession CR).
  caveats: |
    Podtrace requires Linux nodes with kernel 5.8+ (BPF ring buffer) and,
    for some probes (gRPC, FastCGI, full path resolution), BTF available
    at /sys/kernel/btf/vmlinux.

    The agent and per-session Jobs run as privileged in-cluster
    containers with CAP_BPF + CAP_PERFMON + hostPID. The kubectl plugin
    itself does not need elevated permissions on your workstation.

    Supported platforms: linux/amd64, linux/arm64, darwin/amd64,
    darwin/arm64. Compatibility matrix:
    https://github.com/gma1k/podtrace/blob/main/doc/compatibility.md
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/gma1k/podtrace/releases/download/v0.11.6/podtrace_linux_amd64.tar.gz
      sha256: 4d1ea40318af9762bbcfeb7d8402408060c88afff4249080f489f3ffd9d74e3a
      bin: podtrace
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/gma1k/podtrace/releases/download/v0.11.6/podtrace_linux_arm64.tar.gz
      sha256: dbee921c5f4829a5fe743a73cc8ab1c29d3a012df8efce84655c99af551e46c0
      bin: podtrace
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/gma1k/podtrace/releases/download/v0.11.6/podtrace_darwin_amd64.tar.gz
      sha256: ba214425c138e8c75539c5582088d0a1628ae06691029e6ad966c4d619328fa0
      bin: podtrace
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/gma1k/podtrace/releases/download/v0.11.6/podtrace_darwin_arm64.tar.gz
      sha256: 2f0ffdc226ce600b0ad9e038e2cfa13eda69a91f7683fcdf43c1201ebb49bb44
      bin: podtrace
