apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: pv-mounter
spec:
  version: v26.21.0
  shortDescription: Mount PVC locally using SSHFS or NFS
  homepage: https://github.com/fenio/pv-mounter
  description: |
    Plugin that allows to mount PVC locally using SSHFS or NFS.
    Use --backend nfs for the NFS backend (NFS-Ganesha).
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/fenio/pv-mounter/releases/download/v26.21.0/pv-mounter_v26.21.0_linux_amd64.tar.gz
    sha256: 23629d9e2aa677faf8110bb383e385c752f052f56f2d651b60f0c1fddab529b7
    files:
    - from: "./pv-mounter"
      to: "."
    - from: LICENSE
      to: "."
    bin: "pv-mounter"
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/fenio/pv-mounter/releases/download/v26.21.0/pv-mounter_v26.21.0_linux_arm64.tar.gz
    sha256: b33a21b72e028244a333b2d08c5ed3e32adfe67dc1b80a7e549140a4bf02e675
    files:
    - from: "./pv-mounter"
      to: "."
    - from: LICENSE
      to: "."
    bin: "pv-mounter"

  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/fenio/pv-mounter/releases/download/v26.21.0/pv-mounter_v26.21.0_darwin_amd64.tar.gz
    sha256: c4b8f28f63b06c950899db875438b88e94785b430613176fa93e12431d3ef950
    files:
    - from: "./pv-mounter"
      to: "."
    - from: LICENSE
      to: "."
    bin: "pv-mounter"
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/fenio/pv-mounter/releases/download/v26.21.0/pv-mounter_v26.21.0_darwin_arm64.tar.gz
    sha256: 8685ff15f5c0ee8fa7f6a6eeb2125ada36090334dc6f5ae50885f77ee14b9f4b
    files:
    - from: "./pv-mounter"
      to: "."
    - from: LICENSE
      to: "."
    bin: "pv-mounter"
