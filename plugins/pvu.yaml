apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: pvu
spec:
  version: "v0.1.1"
  homepage: https://github.com/kha7iq/pvu
  shortDescription: Inspect Kubernetes pod volumes usage
  description: |
    pvu is a kubectl plugin for inspecting pod volume usage.
    It can open an interactive TUI to browse pods in a namespace,
    or print volume details directly for a specific pod.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/kha7iq/pvu/releases/download/v0.1.1/pvu_Linux_x86_64.tar.gz
      sha256: 432959c66dce6eb1f1004fde3996fbcabb345eeb5b558e822b529103ea1fb7f0
      bin: kubectl-pvu

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/kha7iq/pvu/releases/download/v0.1.1/pvu_Linux_arm64.tar.gz
      sha256: 96a5155a3eb09f6fe529db66cff72acc87154ae19808733c5fe10bb9f4776933
      bin: kubectl-pvu

    - selector:
        matchLabels:
          os: linux
          arch: arm
      uri: https://github.com/kha7iq/pvu/releases/download/v0.1.1/pvu_Linux_armv7.tar.gz
      sha256: 0bfa94419160d2907b0e2bb95039b5c0f06335f3ad89bc7867bc04b1eae66e96
      bin: kubectl-pvu

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/kha7iq/pvu/releases/download/v0.1.1/pvu_Darwin_x86_64.tar.gz
      sha256: 80dcdc865ce62f4c6cc8938fe6630b05e5d52e4541e537c87d983d3b3887d1c9
      bin: kubectl-pvu

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/kha7iq/pvu/releases/download/v0.1.1/pvu_Darwin_arm64.tar.gz
      sha256: b8d4404c7c70dc03a93c6c12b25d535f0803d657fb56a942de13db785766ee30
      bin: kubectl-pvu

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/kha7iq/pvu/releases/download/v0.1.1/pvu_Windows_x86_64.zip
      sha256: 938405f72cd1b96429ddbf6a71ab106322329b9c994bdaaf51bd0bfa65e3cf2e
      bin: kubectl-pvu.exe
