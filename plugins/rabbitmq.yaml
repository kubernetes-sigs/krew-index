apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: rabbitmq
spec:
  homepage: https://github.com/rabbitmq/cluster-operator
  shortDescription: Manage RabbitMQ clusters
  version: v2.22.1
  description: |
    A plugin providing utilities to operate RabbitMQ clusters deployed
    by the RabbitMQ cluster operator.
  caveats: |
    This plugin requires the RabbitMQ cluster operator to be installed.
    To install the RabbitMQ cluster operator run `kubectl rabbitmq install-cluster-operator`.

    `tail` subcommand requires the `tail` plugin. You can install it with `kubectl krew install tail`.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.1/kubectl-rabbitmq-darwin-amd64.tar.gz
    sha256: 6b571cc390af87904aff371fa290717b8de6d35e9c91cbecbca2eb77de9f0012
    bin: kubectl-rabbitmq-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.1/kubectl-rabbitmq-darwin-arm64.tar.gz
    sha256: 8a715e86cc7ad180621a6dfd3dc5048b29cf739d2852d432ed431131473fbccb
    bin: kubectl-rabbitmq-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.1/kubectl-rabbitmq-linux-amd64.tar.gz
    sha256: d5ab02b719da8e6d1a7a8cc1f91a564b3b0549f5b0124608f97c32ef911511b9
    bin: kubectl-rabbitmq-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.1/kubectl-rabbitmq-linux-arm64.tar.gz
    sha256: c223942f78ee4e7931ee1c867a66d2a26140725230a42460f68f39256f1c938e
    bin: kubectl-rabbitmq-linux-arm64
