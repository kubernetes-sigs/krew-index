apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: rabbitmq
spec:
  homepage: https://github.com/rabbitmq/cluster-operator
  shortDescription: Manage RabbitMQ clusters
  version: v2.21.1
  description: |
    A plugin providing utilities to operate RabbitMQ clusters deployed
    by the RabbitMQ cluster operator.
  caveats: |
    This plugin requires the RabbitMQ cluster operator to be installed.
    To install the RabbitMQ cluster operator run `kubectl rabbitmq install-cluster-operator`.

    `tail` subcommand requires the `tail` plugin. You can install it with `kubectl krew install tail`.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.21.1/kubectl-rabbitmq-darwin-amd64.tar.gz
    sha256: ea0a5c0ab5d9d4377553f2f8ac3657234e4381ec05916ca4fed9b4bd68c257b6
    bin: kubectl-rabbitmq-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.21.1/kubectl-rabbitmq-darwin-arm64.tar.gz
    sha256: 5e5c1726b1bab53abdb5f6ad97262f022197d32dcc03af7ec72d931253fbf552
    bin: kubectl-rabbitmq-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.21.1/kubectl-rabbitmq-linux-amd64.tar.gz
    sha256: 6aa32813d119e67429750d03360b224071e9b6c019b516d10351b93b92459373
    bin: kubectl-rabbitmq-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.21.1/kubectl-rabbitmq-linux-arm64.tar.gz
    sha256: 1c634aa281a76aaaacb0c6d0ac8c50278bf417f4b12be4df0770d6e54c5dc4da
    bin: kubectl-rabbitmq-linux-arm64
