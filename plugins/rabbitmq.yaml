apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: rabbitmq
spec:
  homepage: https://github.com/rabbitmq/cluster-operator
  shortDescription: Manage RabbitMQ clusters
  version: v2.20.1
  description: |
    A plugin providing utilities to operate RabbitMQ clusters deployed
    by the RabbitMQ cluster operator.
  caveats: |
    This plugin requires the RabbitMQ cluster operator to be installed.
    To install the RabbitMQ cluster operator run `kubectl rabbitmq install-cluster-operator`.

    `tail` subcommand requires the `tail` plugin. You can install it with `kubectl krew install tail`.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.20.1/kubectl-rabbitmq-darwin-amd64.tar.gz
    sha256: 2dcba07c953d6a722378d94c249961bdb2221a3c5c057a37acdd00d183f2c38a
    bin: kubectl-rabbitmq-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.20.1/kubectl-rabbitmq-darwin-arm64.tar.gz
    sha256: 9627597f7f887c719a666249f08b653b2504908fc387a6a5d95ddc68331dff39
    bin: kubectl-rabbitmq-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.20.1/kubectl-rabbitmq-linux-amd64.tar.gz
    sha256: 1ef0e6596408057932030e5e4e96b69ac193159c4e30f366071e1e2549d80317
    bin: kubectl-rabbitmq-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.20.1/kubectl-rabbitmq-linux-arm64.tar.gz
    sha256: dc43c3f31e86db9f016fa2545f3c5eac9b52bee750bb75cdb93fa6451ac50019
    bin: kubectl-rabbitmq-linux-arm64
