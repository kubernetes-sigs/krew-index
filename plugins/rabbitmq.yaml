apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: rabbitmq
spec:
  homepage: https://github.com/rabbitmq/cluster-operator
  shortDescription: Manage RabbitMQ clusters
  version: v2.21.0
  description: |
    A plugin providing utilities to operate RabbitMQ clusters deployed
    by the RabbitMQ cluster operator.
  caveats: |
    This plugin requires the RabbitMQ cluster operator to be installed.
    To install the RabbitMQ cluster operator run `kubectl rabbitmq install-cluster-operator`.

    `tail` subcommand requires the `tail` plugin. You can install it with `kubectl krew install tail`.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.21.0/kubectl-rabbitmq-darwin-amd64.tar.gz
    sha256: 6bc6330933455bc4106813a9fc05b18973b7dbb541a8fdfaeb3a4b71d1784e0b
    bin: kubectl-rabbitmq-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.21.0/kubectl-rabbitmq-darwin-arm64.tar.gz
    sha256: 8143df74cabe2be93e6f2d9ad3505e40fd378361a70b0431ef10ef6e7540ef0b
    bin: kubectl-rabbitmq-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.21.0/kubectl-rabbitmq-linux-amd64.tar.gz
    sha256: 07279c25582292e8f84a28f1c1c3bf8efc6a876728cbc8f96ce5ae3256605ad5
    bin: kubectl-rabbitmq-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.21.0/kubectl-rabbitmq-linux-arm64.tar.gz
    sha256: 5cadf08a3196004e92136cf106282036ec3df838db79b7cb48f18025278ab760
    bin: kubectl-rabbitmq-linux-arm64
