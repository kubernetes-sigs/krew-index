apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: rabbitmq
spec:
  homepage: https://github.com/rabbitmq/cluster-operator
  shortDescription: Manage RabbitMQ clusters
  version: v2.20.0
  description: |
    A plugin providing utilities to operate RabbitMQ clusters deployed
    by the RabbitMQ cluster operator.
  caveats: |
    This plugin requires the RabbitMQ cluster operator to be installed.
    To install the RabbitMQ cluster operator run `kubectl rabbitmq install-cluster-operator`.

    `tail` subcommand requires the `tail` plugin. You can install it with `kubectl krew install tail`.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.20.0/kubectl-rabbitmq-v2.20.0-darwin-amd64.tar.gz
    sha256: 3bd5ba37320d5826f2d48783436355faa21cfe127766716dafe18417a5f0c314
    bin: kubectl-rabbitmq-v2.20.0-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.20.0/kubectl-rabbitmq-v2.20.0-darwin-arm64.tar.gz
    sha256: fb64945597d40027d39008a36ff4a40fbf7413e6ee33b562d1969832ad14c5f2
    bin: kubectl-rabbitmq-v2.20.0-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.20.0/kubectl-rabbitmq-v2.20.0-linux-amd64.tar.gz
    sha256: 34a1c0ca628d26d222d2c088322eac34554caa3f8dbdf7c28b2287432e38f071
    bin: kubectl-rabbitmq-v2.20.0-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.20.0/kubectl-rabbitmq-v2.20.0-linux-arm64.tar.gz
    sha256: c97b537d38b194ff46770c0f164e879e283516c03e30972733abe35054d89a2f
    bin: kubectl-rabbitmq-v2.20.0-linux-arm64
