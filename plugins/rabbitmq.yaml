apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: rabbitmq
spec:
  homepage: https://github.com/rabbitmq/cluster-operator
  shortDescription: Manage RabbitMQ clusters
  version: v2.22.2
  description: |
    A plugin providing utilities to operate RabbitMQ clusters deployed
    by the RabbitMQ cluster operator.
  caveats: |
    This plugin requires the RabbitMQ cluster operator to be installed.
    To install the RabbitMQ cluster operator run `kubectl rabbitmq install-cluster-operator`.

    `tail` subcommand requires the `tail` plugin. You can install it with `kubectl krew install tail`.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.2/kubectl-rabbitmq-darwin-amd64.tar.gz
    sha256: dd716fee8fb12af6092a1d3b30f5bf66d04ca26fee7db3426135ff9eaedc501c
    bin: kubectl-rabbitmq-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.2/kubectl-rabbitmq-darwin-arm64.tar.gz
    sha256: 73a85cd40c23343ec5771baabd7a1b357a6969f6a77a27ff8d9cab774e4908c7
    bin: kubectl-rabbitmq-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.2/kubectl-rabbitmq-linux-amd64.tar.gz
    sha256: 1c9b4302eeb2fae19051c04ed1181a091cb98a567b104078a39dccf39c37d7d1
    bin: kubectl-rabbitmq-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.2/kubectl-rabbitmq-linux-arm64.tar.gz
    sha256: e40a6a1f5ea688e0df1a0bf061ba371af043697b0106ba20415d68cd62c77e83
    bin: kubectl-rabbitmq-linux-arm64
