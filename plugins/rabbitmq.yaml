apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: rabbitmq
spec:
  homepage: https://github.com/rabbitmq/cluster-operator
  shortDescription: Manage RabbitMQ clusters
  version: v2.22.0
  description: |
    A plugin providing utilities to operate RabbitMQ clusters deployed
    by the RabbitMQ cluster operator.
  caveats: |
    This plugin requires the RabbitMQ cluster operator to be installed.
    To install the RabbitMQ cluster operator run `kubectl rabbitmq install-cluster-operator`.

    `tail` subcommand requires the `tail` plugin. You can install it with `kubectl krew install tail`.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.0/kubectl-rabbitmq-darwin-amd64.tar.gz
    sha256: 62721e55795bb9156748bd8c5fea30ad5e42848fd6018e780eb410e427763c33
    bin: kubectl-rabbitmq-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.0/kubectl-rabbitmq-darwin-arm64.tar.gz
    sha256: 51acca400a6102485462bfc7fc7551060a31f68c0341943cf81120bbd8399bc6
    bin: kubectl-rabbitmq-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.0/kubectl-rabbitmq-linux-amd64.tar.gz
    sha256: 68d75d82defb68ac1cd1768e41823cdd81ccd3ca320f4a10dd5b5a959bb228d1
    bin: kubectl-rabbitmq-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.0/kubectl-rabbitmq-linux-arm64.tar.gz
    sha256: 21eba10ece8b77e36e2437f0ac43bca52a19644644b93c812161fa325157379c
    bin: kubectl-rabbitmq-linux-arm64
