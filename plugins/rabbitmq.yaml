apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: rabbitmq
spec:
  homepage: https://github.com/rabbitmq/cluster-operator
  shortDescription: Manage RabbitMQ clusters
  version: v2.22.3
  description: |
    A plugin providing utilities to operate RabbitMQ clusters deployed
    by the RabbitMQ cluster operator.
  caveats: |
    This plugin requires the RabbitMQ cluster operator to be installed.
    To install the RabbitMQ cluster operator run `kubectl rabbitmq install-cluster-operator`.

    `tail` subcommand requires the `tail` plugin. You can install it with `kubectl krew install tail`.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.3/kubectl-rabbitmq-darwin-amd64.tar.gz
    sha256: 117f553e5996aee5183444b1bf144de7eaf77ee5ff6735105620d19a917c92b2
    bin: kubectl-rabbitmq-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.3/kubectl-rabbitmq-darwin-arm64.tar.gz
    sha256: 24a35f96ee595390a207bade90215b241844b5ae4fb1f6e7df007a37d96311b2
    bin: kubectl-rabbitmq-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.3/kubectl-rabbitmq-linux-amd64.tar.gz
    sha256: a9cb2ce94477696f930bb4b059ea13de94f5aa7d86acaf03f7264c0800b9bbdf
    bin: kubectl-rabbitmq-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/rabbitmq/cluster-operator/releases/download/v2.22.3/kubectl-rabbitmq-linux-arm64.tar.gz
    sha256: 966e0ae47f2752016067d2ae2f07987d3a0113f926dfa4596c837152a4d002a9
    bin: kubectl-rabbitmq-linux-arm64
