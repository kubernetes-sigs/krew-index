apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.1.4
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.4/radar_v1.1.4_darwin_arm64.tar.gz
    sha256: 50761c9d73c4a46e5aae0c1eb820b604a28fa1ac9ab5a6cda5b7c8617f507765
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.4/radar_v1.1.4_darwin_amd64.tar.gz
    sha256: a8e55cfad63dad669792d9ec789d3f4322df3c1ad999104a8731f2309a352745
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.4/radar_v1.1.4_linux_amd64.tar.gz
    sha256: a12d18dc81b8edae86ef4e8e500142956ffd23d4b5bb61317a2adbc4abc77345
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.4/radar_v1.1.4_linux_arm64.tar.gz
    sha256: 6452b164116b088539c52f3113c82e19a6fa9724e4e42babc0a60be1e6abbfb8
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.4/radar_v1.1.4_windows_amd64.zip
    sha256: 6faf7e5cc87ff9f1ee83383d489e1a11bbad55ba7e4bfbecb4f08c85a70d5510
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
