apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.8.4
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.4/radar_v1.8.4_darwin_arm64.tar.gz
    sha256: cf4a2fec6122af3cede3e86733c7361b16516e77dde48dfce00851679b012f19
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.4/radar_v1.8.4_darwin_amd64.tar.gz
    sha256: c4c13aaccf4947552db039cebaa28765c69194846fc39439c5c0ebafcfaf5e7e
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.4/radar_v1.8.4_linux_amd64.tar.gz
    sha256: 2d48dd806e076f144210c3f60e1c563f3608a4aa8844e2bb544c4adf7406083c
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.4/radar_v1.8.4_linux_arm64.tar.gz
    sha256: 724346945b8b5f112c49481fe3ec244d05dd96afba225ed7f13c299837458541
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.4/radar_v1.8.4_windows_amd64.zip
    sha256: 49047083cd99f47e183754489e44e7a271033a20633b01fe492584cbbb08a418
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
