apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.2.2
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.2/radar_v1.2.2_darwin_arm64.tar.gz
    sha256: 5bf0bd14691c4d7595c5d330615d1fc48cf8e059bcefd322e52098769c5db17f
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.2/radar_v1.2.2_darwin_amd64.tar.gz
    sha256: c9d1f6f71bec136568e5999dbe318642f2b6f61ce3f84c14f73d23fe0037b5da
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.2/radar_v1.2.2_linux_amd64.tar.gz
    sha256: 96cd9b926d089a60038e5cb834bd21d07dc7cdffb89cc30556253c41a7a43454
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.2/radar_v1.2.2_linux_arm64.tar.gz
    sha256: f215ca6473f65a8dd28954b8ab0cd30b6c473c231bd960c7ca21a6eb8e84d9ff
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.2/radar_v1.2.2_windows_amd64.zip
    sha256: d0fe79347a96f9ffee2f83f50bf78bbc413f16a95ee9f5d8b248821e66de2c89
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
