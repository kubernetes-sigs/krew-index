apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.5.9
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.9/radar_v1.5.9_darwin_arm64.tar.gz
    sha256: 8f67fcb0cabaf022a7aa33a9071dabb6776c1c4c8009e0542debd948111c932a
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.9/radar_v1.5.9_darwin_amd64.tar.gz
    sha256: 853c5bb8cf81ed02471420b14496de3c6b562a23a5884dfa0853145ad7f50db6
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.9/radar_v1.5.9_linux_amd64.tar.gz
    sha256: 467e7aff253acca883efa080425ac77b5fba7bf8214bf3e3e4b97d594d52491c
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.9/radar_v1.5.9_linux_arm64.tar.gz
    sha256: 2c88e23520f6078de071d834ec4c9fdc00a32ba09dac0f6ec3124d48148fbb04
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.9/radar_v1.5.9_windows_amd64.zip
    sha256: 0e7d21abda193d8aea98416298611942c4fe3ece929bf72af8f0f14b93b1264b
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
