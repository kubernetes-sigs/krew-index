apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.4.3
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.3/radar_v1.4.3_darwin_arm64.tar.gz
    sha256: 605a90538010ce6788f93cbbdd82c6955ee8585d0142c3c160b5b5ccc0e9b961
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.3/radar_v1.4.3_darwin_amd64.tar.gz
    sha256: cce590acf43b3a1b40b89fca38d19d54e9d2402d1d58157222442639846d96b5
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.3/radar_v1.4.3_linux_amd64.tar.gz
    sha256: 77e71a4ce65399a31c11cf6c5683e7602804345e8bbffc0f64b62fbb095b71a1
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.3/radar_v1.4.3_linux_arm64.tar.gz
    sha256: af657506bf48ad479007317c31dbf67b858c9abe368ddb5a3018e72b64018e96
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
