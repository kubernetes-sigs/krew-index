apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.5.11
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.11/radar_v1.5.11_darwin_arm64.tar.gz
    sha256: 94f0ac2d5b975dbd4c4eb11303769416e77332518392294e5553123de4ca4fd2
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.11/radar_v1.5.11_darwin_amd64.tar.gz
    sha256: f25785a3cb83fe91279ff206b95bb2d36f4f5f1247b4ac5b09d98dcf273cba56
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.11/radar_v1.5.11_linux_amd64.tar.gz
    sha256: 3369f9ca1789b63d9c0fbd9b7f4b3b5a3c24004f4d4b489811ae9b02c461b4a7
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.11/radar_v1.5.11_linux_arm64.tar.gz
    sha256: 90d95bc0ac0e91edb2e54637569265b8fa02ecbf721f563e327e1ba8f11c3e03
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.11/radar_v1.5.11_windows_amd64.zip
    sha256: 9d61bd90923a71cf7614bf15d93cb33370174b92010c0046ec5a81dc5f5ce7e7
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
