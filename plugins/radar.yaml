  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.13/radar_v1.5.13_windows_amd64.zip
    sha256: 0a064e51f66d9a2d0135c80a38bc91a99a4e6e813430965a7c6733562c47ae3c
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
