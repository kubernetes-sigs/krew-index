apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.1.0
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.0/radar_v1.1.0_darwin_arm64.tar.gz
    sha256: a002c46e7007e7e552de0858527c199d68ae13057576ef3406277ed5a25f661c
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.0/radar_v1.1.0_darwin_amd64.tar.gz
    sha256: 6ec2457e9055d6f8ba5b369647bbe754b0891bde82c6ff29996b903321825f1d
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.0/radar_v1.1.0_linux_amd64.tar.gz
    sha256: d802f6c85d6fea3a65c6c7981dba0c3cd1c306c78022a7ed45dbd9cd74179f5f
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.0/radar_v1.1.0_linux_arm64.tar.gz
    sha256: 433abc0848db808131051f358e35e71efdaf7bfeb5ad3216a983f73364a0b648
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.0/radar_v1.1.0_windows_amd64.zip
    sha256: f507d462f2bbcb1d87a651304e7978b28abf4305b4bf167755ba63aa9a9ff557
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
