apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.5.3
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.3/radar_v1.5.3_darwin_arm64.tar.gz
    sha256: aa3fd180444a631a54d4ae1ef1c942ab95a19da8f0fb08019fe2a662f1d9c760
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.3/radar_v1.5.3_darwin_amd64.tar.gz
    sha256: 74e47e02dd3d92669f78cf788319b1ac60dc33288ec54eacd3c3b5383ec4dd81
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.3/radar_v1.5.3_linux_amd64.tar.gz
    sha256: c4466b8973fff4b4131f45f2627a00315101e3e80d54445d6ab6dc79a00212bf
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.3/radar_v1.5.3_linux_arm64.tar.gz
    sha256: 0136ac852ad593514b9aa9736bd429983e8c15d3377038cc5452c2a28a0978cd
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.3/radar_v1.5.3_windows_amd64.zip
    sha256: 7ad5768cc653327bac91ff1eadd6e81208eff3c1f6fae18b0ce4698ea88e0cda
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
