apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.7.7
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.7/radar_v1.7.7_darwin_arm64.tar.gz
    sha256: 2030392cbbdeba7442f9c422a394e29fd3253c29ae656b4f7a828bf67f82bd97
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.7/radar_v1.7.7_darwin_amd64.tar.gz
    sha256: ae650c6e1be53ae6a5f94e1993cd6902fb93d2881eabb3cae1b8f438f5c6afe8
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.7/radar_v1.7.7_linux_amd64.tar.gz
    sha256: 3e22f9b31782287196c22b72b172775e609dd6e1e5ae3d5cbc4442761546054d
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.7/radar_v1.7.7_linux_arm64.tar.gz
    sha256: 4e790be5a5718559a3aaa70e30aadd0b81c29cbce2f40e97d777f7c63814b922
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.7/radar_v1.7.7_windows_amd64.zip
    sha256: 4e2f69aa07e89f352bce7bef19caee1e365a6b110cb488098a486361661c3629
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
