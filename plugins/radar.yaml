apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.1.3
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.3/radar_v1.1.3_darwin_arm64.tar.gz
    sha256: a3e4840d2d2467af5006cf9082c6f2685e1e50404be7cb6d42650b360e63cedd
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.3/radar_v1.1.3_darwin_amd64.tar.gz
    sha256: de253b15b014f731d336d6138a7baf3c6874b73223c0db1a6fe18ccf06eb0584
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.3/radar_v1.1.3_linux_amd64.tar.gz
    sha256: 0e5a6593994f1d40b335a19f55cbe37cf3737f679e2121f2d79fc387c6dac2bd
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.3/radar_v1.1.3_linux_arm64.tar.gz
    sha256: 54991ac889c2bdf84fdd53b6bcae142057324fa495ed53439b94414118b5a859
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.3/radar_v1.1.3_windows_amd64.zip
    sha256: 38eeb117fa214229fddf7fc0f74b1f408242211052932809386a3369d6f2d082
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
