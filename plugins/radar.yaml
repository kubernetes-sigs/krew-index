apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.4.0
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.0/radar_v1.4.0_darwin_arm64.tar.gz
    sha256: f0f7248e4568cb081fa30350f00e5d7b2af7d725f11b920f10c37dbfda014ecf
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.0/radar_v1.4.0_darwin_amd64.tar.gz
    sha256: f2f939eefb09247d22158329c5f5ea0baa233ab8d475a3a0296300e08a5c392a
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.0/radar_v1.4.0_linux_amd64.tar.gz
    sha256: b63e5f80e2483a801235b050ccba621bd1bb32bfa5885b4ea1bad47d5ed787aa
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.0/radar_v1.4.0_linux_arm64.tar.gz
    sha256: 039085a806f8e5653dc20c9ce3abd824afa8b6b5d5ec58b4e7e396e270b7159d
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.0/radar_v1.4.0_windows_amd64.zip
    sha256: 554973abc9383d2a5b6e75afa71b9aeaf43b43d12bf86b77ef213b324ca9f309
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
