apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.2.0
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.0/radar_v1.2.0_darwin_arm64.tar.gz
    sha256: 2f22e8ac72feea62a73af94f42352d9623f18cc58f4c74d1b038b43404015bfa
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.0/radar_v1.2.0_darwin_amd64.tar.gz
    sha256: a98472437b6feaf571479f04ab6d47ac8a739874adff1568fa793303aa88634e
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.0/radar_v1.2.0_linux_amd64.tar.gz
    sha256: e0416b3fa998c6d189c93a78da0b7b2389933049dc10a3826d7bb43645a40709
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.0/radar_v1.2.0_linux_arm64.tar.gz
    sha256: b1bd5b97e3f7b7ddf61ce5669f4f525018094756fe7e8d30fa075b625ef6ec4f
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.0/radar_v1.2.0_windows_amd64.zip
    sha256: 0cfb2d3d9e1c38c79869142e4e549060cfc13ace402ffc05974761c50e690ecf
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
