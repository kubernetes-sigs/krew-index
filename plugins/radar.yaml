apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.3.1
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.1/radar_v1.3.1_darwin_arm64.tar.gz
    sha256: fc091b73c53b104211379d7bac0aa47ae725f79731f155d11157aa51285da9c5
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.1/radar_v1.3.1_darwin_amd64.tar.gz
    sha256: ab857ae3b2d353647fc3f2d3ff834f50e6f0bf98072064131529588e56e614cc
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.1/radar_v1.3.1_linux_amd64.tar.gz
    sha256: 73dce0fbccd00fdcac13a5711eebd2c9d476baad0da6175abd1fa0bf1be3a9c1
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.1/radar_v1.3.1_linux_arm64.tar.gz
    sha256: 5194ef7b43c307078b1d48df617457b863f6e9e9b2139b6cf1b2f68afce16404
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.1/radar_v1.3.1_windows_amd64.zip
    sha256: 73a69d09031f4a79403f764ab04afb39c59f385bc96b2553f05a00e744c9541b
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
