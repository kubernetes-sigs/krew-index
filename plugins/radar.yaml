apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.5.8
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.8/radar_v1.5.8_darwin_arm64.tar.gz
    sha256: 2e4c0c28716b3ac3d69d2dd8a26868a805b20d2d692208b2221d9b5cac633275
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.8/radar_v1.5.8_darwin_amd64.tar.gz
    sha256: b6a53512cc1063692130982b44e9c35ec7b18b10e513a6ce9d9eb3a51504689b
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.8/radar_v1.5.8_linux_amd64.tar.gz
    sha256: a7fa5a37ba06f8387dc38a61a12370da23eb8fec64774d44250682212c3a58ba
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.8/radar_v1.5.8_linux_arm64.tar.gz
    sha256: c147a02b2b146c7d4fbf4e3e18e1ba56718ce3e50cb9bb53e1d0e36b27a06855
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.8/radar_v1.5.8_windows_amd64.zip
    sha256: 7ef3e9b787e59f533361e900ddfea2941d4f7dd7a7ffad8589726d5f654ce4d7
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
