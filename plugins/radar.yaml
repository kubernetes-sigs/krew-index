apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.8.0
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.0/radar_v1.8.0_darwin_arm64.tar.gz
    sha256: ecde5fa82b9f8c44d94b1c1b9c35f1ba5c76ab92a30375dc4cdbdc29cee20866
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.0/radar_v1.8.0_darwin_amd64.tar.gz
    sha256: fe1c6080d568810fee1a1818eea1c5646b6fe330380ab7296f0efbeecaf30056
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.0/radar_v1.8.0_linux_amd64.tar.gz
    sha256: a3b9749661b51ea2d2275ae76e3d9936d9d02ab6dbfaf2a23eaa6e3eeb64ce91
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.0/radar_v1.8.0_linux_arm64.tar.gz
    sha256: 1cb8185e3b7dccb448f36a1e65f855f610b0c078aa117574f39037aff2033fd7
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.0/radar_v1.8.0_windows_amd64.zip
    sha256: 08bf92ff24aa765fd1f611c7d8e6b8e50208166610b02f32eb6d00761b724a05
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
