apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.3.3
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.3/radar_v1.3.3_darwin_arm64.tar.gz
    sha256: fb45716c12acf38b2c2fb41be52cb09a3c937e5a4cf3be2cace45d6755b60e1e
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.3/radar_v1.3.3_darwin_amd64.tar.gz
    sha256: 2e1dbe5eb8863dbe79121ffa61f38eda6054fd3bb1ad765c1052204f9831be22
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.3/radar_v1.3.3_linux_amd64.tar.gz
    sha256: b16a92318df0710fab7c115b3939c4a4050b7df4627851949fbac4672799b904
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.3/radar_v1.3.3_linux_arm64.tar.gz
    sha256: 480c9e9dab44fbb9ca70215db81faf07a8e206ab1cfc554eac4e2e9afbe5f275
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.3/radar_v1.3.3_windows_amd64.zip
    sha256: 83f67938702cf7f61c35a9489fa64406cf1729040aa6c5afe8c4ed68509ff899
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
