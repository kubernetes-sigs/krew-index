apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.4.2
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.2/radar_v1.4.2_darwin_arm64.tar.gz
    sha256: cdaa6c11f910410d66ce5f5496f1a2a7af5630d79225054f3d904f5dae460e3d
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.2/radar_v1.4.2_darwin_amd64.tar.gz
    sha256: e6c5306b0f7f24f610b6c4151a5c22fccecac443d66381a83f1a8ea91b829c9a
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.2/radar_v1.4.2_linux_amd64.tar.gz
    sha256: 7aeed140a4a9fdc61a14181bc4a81e0388eab7ce1b338ac1a4ee83cd7646de09
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.2/radar_v1.4.2_linux_arm64.tar.gz
    sha256: 6354d39ee4e69b516aa99ca8fc3bb37dcee9640722d9954c921d09a0ffebfd73
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.2/radar_v1.4.2_windows_amd64.zip
    sha256: 0b2fb9ddffd40a3d198b7924c918ff81746934abd62090948a75cb01fd0c5ce6
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
