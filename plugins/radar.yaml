apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.5.2
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.2/radar_v1.5.2_darwin_arm64.tar.gz
    sha256: 90106e95497e6976d94ecf63cb8e638ad605fc89045a3a3ffe1c97b2a0cf0a21
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.2/radar_v1.5.2_darwin_amd64.tar.gz
    sha256: 6d34be225943794d87f52d8e2f69fc25334671a718bdcd1325cc85a16eee0d11
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.2/radar_v1.5.2_linux_amd64.tar.gz
    sha256: caf27e8e983c2fb8862e1698291c8cc8bd5986f4c647416d56a8f697876b6019
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.2/radar_v1.5.2_linux_arm64.tar.gz
    sha256: 5af81b8840e1cbf7306b32927e6c2ffdaf7c7946ad1fe1fe2df6dfda42d2af7b
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.2/radar_v1.5.2_windows_amd64.zip
    sha256: 057cc7bedd11bfcc4117016213674f6c792f04c43ce494123ba9a34e4cc6fcd2
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
