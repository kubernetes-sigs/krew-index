apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.5.10
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.10/radar_v1.5.10_darwin_arm64.tar.gz
    sha256: 73de9c79dacd4bde29816ecebb713e6ef83e580e553dc24acc0b334ed9694885
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.10/radar_v1.5.10_darwin_amd64.tar.gz
    sha256: da325f28d30e781b2da39d6479a6df8143f0500f0c457d0f4b8f69645366d11d
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.10/radar_v1.5.10_linux_amd64.tar.gz
    sha256: 07ebb78dd9d2709533b27a0f0053c493475814d0cf7bd861bd8d4e697b6d8fd7
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.10/radar_v1.5.10_linux_arm64.tar.gz
    sha256: 1ff2778125c243abaa39d698a5cf0b516550f332a33c2099ea5d7b9be908ed38
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.10/radar_v1.5.10_windows_amd64.zip
    sha256: dd7ffc207226b662412ae1fbb0091d0e7bbdf4067d622b9593b4f8dfe4a8665b
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
