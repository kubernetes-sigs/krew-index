apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.7.0
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.0/radar_v1.7.0_darwin_arm64.tar.gz
    sha256: 10c4d1b27a4d86874016a5a1967cffbc36559742e08187a3ae9422e75d68c4d8
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.0/radar_v1.7.0_darwin_amd64.tar.gz
    sha256: 2698bc16ddd3b4decd09a4c4541cae50a62f7c2a5f64790472b155bdb2186cc6
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.0/radar_v1.7.0_linux_amd64.tar.gz
    sha256: d802308cf27893099a8bf8740d4483e9a25c8e7ffbe7ed469efafba96cf42e58
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.0/radar_v1.7.0_linux_arm64.tar.gz
    sha256: 8a061c23171e2b27512011c8be0adfe70795ea169247f0fe5f7ca4ace647e7bc
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.0/radar_v1.7.0_windows_amd64.zip
    sha256: fa24bfef76d73a5ff807f312fec004c016ff89e14da82f452164b94b5802846e
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
