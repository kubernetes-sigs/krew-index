apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.4.1
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.1/radar_v1.4.1_darwin_arm64.tar.gz
    sha256: 92e54453c9b5a87c2e0a1d8745513f4d17260774ba91a54a27b14e4af90b498d
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.1/radar_v1.4.1_darwin_amd64.tar.gz
    sha256: 5709a135dfffbe7a6bc1052a168829718ad47782c12325a39ee3ed9b92032561
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.1/radar_v1.4.1_linux_amd64.tar.gz
    sha256: 5672d21fe5eaf47381b8f6d878b93860f757a7e8c2535972a9135b2d1bf740e1
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.1/radar_v1.4.1_linux_arm64.tar.gz
    sha256: 50d9afc58adf3ddf4cb2388361e8f0b0cc1b54f2a33fe795b7acfeee92239359
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.1/radar_v1.4.1_windows_amd64.zip
    sha256: aea112d36a1ac0d5b48edd219059ad3d8d9a8b4b94f9fcddac31ee12b9fa86d4
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
