apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.7.6
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.6/radar_v1.7.6_darwin_arm64.tar.gz
    sha256: 4ff9a9cdbd405b44ec428643b52407d7174f22d423d15d4ca6d3f5e4e7786578
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.6/radar_v1.7.6_darwin_amd64.tar.gz
    sha256: 176ccbd86d60e3108e4e52fed70b810c99fadd47933849e97fae3d893744aeba
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.6/radar_v1.7.6_linux_amd64.tar.gz
    sha256: 91ac374066f0becf388bee1147be48ea0a7352c65ffe62b32ca4dd4e55f8ffe0
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.6/radar_v1.7.6_linux_arm64.tar.gz
    sha256: 76c722837796ea69708f555353124b5cd027cc8cd92d38e71b47c023d7a77c9b
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.6/radar_v1.7.6_windows_amd64.zip
    sha256: f70dc4aed6e8fa6d17e30843b508c88f72562908dc19685f1ec4d589ae98847e
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
