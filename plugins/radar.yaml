apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.7.4
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.4/radar_v1.7.4_darwin_arm64.tar.gz
    sha256: f08b754f17c884de44cab4955722e67798cc83b834e608b4ea51608b4c4b9855
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.4/radar_v1.7.4_darwin_amd64.tar.gz
    sha256: 7a7c0328246db0faca31e01bb167dbb563e8a9696581a7a2eb319e155751e9e1
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.4/radar_v1.7.4_linux_amd64.tar.gz
    sha256: 1cb4f0f18240e19c2fdc35ded27b625088dcd72259882185f3d1eb73d21b7470
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.4/radar_v1.7.4_linux_arm64.tar.gz
    sha256: dfe2921598f50e38095320d791fa88fc6d3ae834946ff19da3ab5841b52b892c
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.7.4/radar_v1.7.4_windows_amd64.zip
    sha256: 49ac56803ca63e726281f7bb5fef53730a68843c716aec345fc354bcaedc948d
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
