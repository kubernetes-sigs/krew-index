apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.5.5
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.5/radar_v1.5.5_darwin_arm64.tar.gz
    sha256: a20791447f4f4607b0d0b7dec166319d2174a828652eb7ecf1778cf4d54789eb
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.5/radar_v1.5.5_darwin_amd64.tar.gz
    sha256: b734a58f4803d8b8ae58db0a634f1f7d17f9d50e4177f4f5fe9a7725df6c5b1e
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.5/radar_v1.5.5_linux_amd64.tar.gz
    sha256: daf762730c503f8cec9a07917509005e7e8c173c856afb757d69889ac03a3ff8
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.5/radar_v1.5.5_linux_arm64.tar.gz
    sha256: 7455f3d293d362d02c4a9a069c7887d208b84e45db3cbbc2bf08af1966be4d75
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
