apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.6.1
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.1/radar_v1.6.1_darwin_arm64.tar.gz
    sha256: 4cc14296075bd2edab17baafa7849e78504cc47c66ae02fb053723446052ead9
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.1/radar_v1.6.1_darwin_amd64.tar.gz
    sha256: d7d0f56f93de627ebcf8c4af013729820452aa5fe42f4334751c8d5c3e415213
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.1/radar_v1.6.1_linux_amd64.tar.gz
    sha256: 83299bf16fd882c478fd2e61c9c84c791a9f7cb3687090f97e5ad2776890a461
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.1/radar_v1.6.1_linux_arm64.tar.gz
    sha256: d789179e14b68c602d496353c052108f5f7e156cd9e68ce8aafed7de7bf4327a
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.1/radar_v1.6.1_windows_amd64.zip
    sha256: 09451934aa0882369b5cd3b6d56eba53e8a99b66743500f832362ab5372e4320
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
