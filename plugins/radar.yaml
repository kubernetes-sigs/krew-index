apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.1.1
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.1/radar_v1.1.1_darwin_arm64.tar.gz
    sha256: e6c1dcf2dcfe24a3b356d3b0e318d2f72cc4fe7569a5d777058654184de50b8d
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.1/radar_v1.1.1_darwin_amd64.tar.gz
    sha256: 19b02720c2be85a433c38b74b3cf48b4c427d19efbfcbb249305d5f2e8221c39
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.1/radar_v1.1.1_linux_amd64.tar.gz
    sha256: 3347b609a80115fabe4e782c5e260368079c38aac47f017e8a90d4881d54a8cf
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.1/radar_v1.1.1_linux_arm64.tar.gz
    sha256: b0435f03a875f6e168f5076a81afcdb70cd699f23dc3951a9ce1629875a28a8b
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.1/radar_v1.1.1_windows_amd64.zip
    sha256: 56a3cfb0c1da4a8333e56ca9e9cd538c383b561d5d0e69425b29fa043db7679b
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
