apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.6.2
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.2/radar_v1.6.2_darwin_arm64.tar.gz
    sha256: 82d0be3ec92a28bf693164d714ec197e4b487a0c858bb64e4ce3126ae97eadb4
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.2/radar_v1.6.2_darwin_amd64.tar.gz
    sha256: ae1818f7111962ddef00fbc6c0db847f36b3526236d76815bdde666c618fb1b5
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.2/radar_v1.6.2_linux_amd64.tar.gz
    sha256: 6db46bfde282fd069f156b349c6894ece754d5424bbf1ab54210e240421488c8
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.2/radar_v1.6.2_linux_arm64.tar.gz
    sha256: d1baa7639d8b23abbf9621cde8f25e0eb7be63c91628dc9d6d0000f82af33740
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.2/radar_v1.6.2_windows_amd64.zip
    sha256: fbdb613c6f7992f0498d42f2a17134e974322a09e9cad71056dd0c6820d2381b
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
