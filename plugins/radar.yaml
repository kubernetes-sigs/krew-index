apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.1.2
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.2/radar_v1.1.2_darwin_arm64.tar.gz
    sha256: 5e1bfb98da13cc658b74a1828073b0142d8bfbc5f0fbdf45af7456f3c85947f1
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.2/radar_v1.1.2_darwin_amd64.tar.gz
    sha256: 6ddec3dcbf624918ec70896251727fcb951400384e4aebda467b2b07ea68aac1
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.2/radar_v1.1.2_linux_amd64.tar.gz
    sha256: d5c9600a839aff4e0ba72a909ac6b44afb3bf83dddb70243f6edae935c3e69f9
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.2/radar_v1.1.2_linux_arm64.tar.gz
    sha256: 4ba58f49d30cf745b0412f9e0909523cfa8be93197b74d7fff76ac92ee88cd7b
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.1.2/radar_v1.1.2_windows_amd64.zip
    sha256: bd0ace6f09e3e96f7b0c862e23adcfa23fcff30255c2d9c7e5532effb456dabc
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
