apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.4.4
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.4/radar_v1.4.4_darwin_arm64.tar.gz
    sha256: 9c5cef8d9fb03a4fcaf89421b5d5f4e80b10d4811e821594262abd8c10be248f
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.4/radar_v1.4.4_darwin_amd64.tar.gz
    sha256: 7f9f62741978671cb0ef7322941ada7992c7b4d8582df3301484a7e4107239e8
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.4/radar_v1.4.4_linux_amd64.tar.gz
    sha256: 038278583a67f34aa18d41b449d3ae1c2b2a6b608b378d75a00ce20fd348c603
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.4/radar_v1.4.4_linux_arm64.tar.gz
    sha256: 43d962c916c6283c471ee8e12f52d17cda1963b63fae670af32b463c63b53f2c
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.4/radar_v1.4.4_windows_amd64.zip
    sha256: 2bcee289bb4a027e222d36b2d99876a5b10853c4078b6804dabef9b080703cd8
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
