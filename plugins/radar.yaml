apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.2.5
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.5/radar_v1.2.5_darwin_arm64.tar.gz
    sha256: 3077672d3ea76c28bd4495d75655b6098455bfa17ba1332ddd528b40cc7eb85c
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.5/radar_v1.2.5_darwin_amd64.tar.gz
    sha256: 9155ad9a56c4e1f0dafb9cd185f75756a9b7dd5194fd81edd38cd924ab80fd21
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.5/radar_v1.2.5_linux_amd64.tar.gz
    sha256: b67e0570214159deea4e4191494dea31d832742ce53166129e72ee3a03e215de
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.5/radar_v1.2.5_linux_arm64.tar.gz
    sha256: f90b11954809e7e5724ae5c7e109cf99fc04e2f4a94e3db548fbb38d48c7850b
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.5/radar_v1.2.5_windows_amd64.zip
    sha256: 9cb4dd255868ab88c862544d4df96e6c380229c60ffa639ae85810d78fca7ca6
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
