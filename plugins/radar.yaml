apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.3.0
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.0/radar_v1.3.0_darwin_arm64.tar.gz
    sha256: 414940306acc05ff77fb24f232bd07acbec317a56e7f86f0739e7251e4b4beeb
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.0/radar_v1.3.0_darwin_amd64.tar.gz
    sha256: 6320d1a1a6e24673546520c340f11ac8fc51060da45b0298ae40ebb53e324b98
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.0/radar_v1.3.0_linux_amd64.tar.gz
    sha256: 62a6051cb105b699e060396eb825b089fd8cbcde768ada80cc227c586d7544dd
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.0/radar_v1.3.0_linux_arm64.tar.gz
    sha256: 3efe4e156f0a0ee219a5d7231286cd7ba9966ca062e28f530a6ed2d4ab750982
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.0/radar_v1.3.0_windows_amd64.zip
    sha256: c8e191e80e130f77912dda212b34c8a140193524cc44685fd416621b535bb37a
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
