apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.8.6
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.6/radar_v1.8.6_darwin_arm64.tar.gz
    sha256: e5bd6daf89b0881378a7f24cbd1b25b10e8440f73decf5a3d6cfbf9dade7f592
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.6/radar_v1.8.6_darwin_amd64.tar.gz
    sha256: a2ab8ea3502638130f42e57f3be4f4ec934b73b32d3aeca0945f0e85a3f2751b
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.6/radar_v1.8.6_linux_amd64.tar.gz
    sha256: 44c981363c4eb577a4f36ae1d05444dbf8587495e91e15ae026c35423545bba2
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.6/radar_v1.8.6_linux_arm64.tar.gz
    sha256: 9383658e52b8cc9c566b7e9f05fad58e646612a1b67cb7ea7e64c267c5f7be87
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.6/radar_v1.8.6_windows_amd64.zip
    sha256: f4fee6f4954f5dc2d662e652f06d497a7ff0883a8a629fdafb36e3af5383e8e6
    files:
    - from: kubectl-radar.exe
      to: .
