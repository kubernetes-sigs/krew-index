apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.6.0
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.0/radar_v1.6.0_darwin_arm64.tar.gz
    sha256: b035e73a49cd26d5f3db43a11486f10fcd57dace82e7150f695b256687da3135
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.0/radar_v1.6.0_darwin_amd64.tar.gz
    sha256: 51d1694b6d6dead11021dc8ddf8b8d64e1f9b7b6ff68529e4bc6631b007d0bbf
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.0/radar_v1.6.0_linux_amd64.tar.gz
    sha256: ddd5c312b0f194676c0ffc5d3d528242161f43bf4218cce138e90e371b71ef77
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.0/radar_v1.6.0_linux_arm64.tar.gz
    sha256: a23809abeed51fe034f719e88f192b9a55f250a9b917f411fd13757b94fde892
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.6.0/radar_v1.6.0_windows_amd64.zip
    sha256: 8feb505b6888a28c36cc903fcc5a3b97e08b8da5b479866eaa7f6d497cb2de98
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
