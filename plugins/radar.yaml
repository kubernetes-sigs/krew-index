  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.3/radar_v1.8.3_windows_amd64.zip
    sha256: d61fb938c015865e5ce097c10d20e4bba7ca482c6d1092aead0ed906144c595d
    files:
