apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.5.12
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.12/radar_v1.5.12_darwin_arm64.tar.gz
    sha256: fcbcfad5f48f09f1d2b94ce093f7246210b878d65c6e83568774fec2dfa58307
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.12/radar_v1.5.12_darwin_amd64.tar.gz
    sha256: 76b2e597e34e82a8f63ccfea4ee4a39a99b8e99630559e1c2f3cbc17da923373
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.12/radar_v1.5.12_linux_amd64.tar.gz
    sha256: 2067b23b11a1b35e62d2f395794c1e3f0c21395ee3572f4213a0b1b6592939eb
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.12/radar_v1.5.12_linux_arm64.tar.gz
    sha256: 3703beaebc5d1b14986e837b8d03955cded69a87a4340b0ce898093b8936e442
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.12/radar_v1.5.12_windows_amd64.zip
    sha256: a386a2dd5c60b52fce6211ec5fc1a8f19578f0c88e4abe1eac9524c0d076b66b
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
