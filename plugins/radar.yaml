apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.8.1
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.1/radar_v1.8.1_darwin_arm64.tar.gz
    sha256: 680b1b14855005f43aa0edfb92e809729135b365e0329ecb5ae457bf0cae5981
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.1/radar_v1.8.1_darwin_amd64.tar.gz
    sha256: 4d5a4aab14440cb1bd77c63e77a95e1faeb07355cd51da73fa2db317061773b6
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.1/radar_v1.8.1_linux_amd64.tar.gz
    sha256: e41ee9c4acb69911817af5907dde3443845e24e44073ddbdb41715d8ee4adce8
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.1/radar_v1.8.1_linux_arm64.tar.gz
    sha256: dc9f87da4d9849048ec108645e91920d9c25285e7ed42d4a86b4be85b908b2d6
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.1/radar_v1.8.1_windows_amd64.zip
    sha256: 4f931e2e807e3fe8dc9234623cf7444a52b2b8fffe1d325cdadf69d1980dc10b
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
