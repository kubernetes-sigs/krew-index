apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.2.1
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.1/radar_v1.2.1_darwin_arm64.tar.gz
    sha256: f2b390d70b6eab61d3e699b8642bc7b819e8b543cb94a18117e706590ff8f316
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.1/radar_v1.2.1_darwin_amd64.tar.gz
    sha256: 01eb085bd626075cec6d05e6c467b1479ff667cbac45e79c780529642dfeda64
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.1/radar_v1.2.1_linux_amd64.tar.gz
    sha256: 057fa5ab1d02dadd0d359a53cf71110391b38f7a2aec225096fcc9616ebab42f
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.1/radar_v1.2.1_linux_arm64.tar.gz
    sha256: 844707ed02dbf437527f7862f4bcde9fabe797424fc8fc3f075bca98bcf959c1
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.1/radar_v1.2.1_windows_amd64.zip
    sha256: 6d61c430970082f6e1a40621310df847aed883d4ff70455c9b8e3834b1ce2d98
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
