apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.5.4
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.4/radar_v1.5.4_darwin_arm64.tar.gz
    sha256: b582c4033f040d2eff0f57c0178dd5ae6a9b97eb4351d04002ed87e28e2d63af
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.4/radar_v1.5.4_darwin_amd64.tar.gz
    sha256: e614342a5a49228345d8d30d8e1be0fa28c4771916750e403d073e3a799b31a7
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.4/radar_v1.5.4_linux_amd64.tar.gz
    sha256: 419289ed3395b5927b94405e93f2cb277d40f03c7b817cea584f08b2c6cca5fc
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.4/radar_v1.5.4_linux_arm64.tar.gz
    sha256: d62f4855223a19802599b5cd851226300933ee1847e4e2449bbbdf238a08a767
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.4/radar_v1.5.4_windows_amd64.zip
    sha256: 7f367165c4a19728b6a5fbe26bee98861668554d4f4928abced6e45600a9f467
    files:
    - from: kubectl-radar.exe
      to: .
