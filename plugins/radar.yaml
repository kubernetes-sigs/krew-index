apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.4.7
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.7/radar_v1.4.7_darwin_arm64.tar.gz
    sha256: 50e8ef0594d189d2d7bcf12b8f4b087c431a7219eaa179a07ed33a2728f921f8
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.7/radar_v1.4.7_darwin_amd64.tar.gz
    sha256: c607966c144596ac88279a950f6b0049e7c74a7828136c67e1a70a2e1561e88a
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.7/radar_v1.4.7_linux_amd64.tar.gz
    sha256: 7230d8284e7a1d086582e359610b5b8de557e9dfec5ab844b162ab5535b0afae
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.4.7/radar_v1.4.7_linux_arm64.tar.gz
    sha256: ce2912a0cff65134f929ba559ca2a658036a6af0b445649b02a93a2d4d503ef5
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
