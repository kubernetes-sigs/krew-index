apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.3.2
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.2/radar_v1.3.2_darwin_arm64.tar.gz
    sha256: 92fb43e73c2fd063fad07a3fe6e8f2f2bb1d5e7d4b2a985004f26476b4e5f817
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.2/radar_v1.3.2_darwin_amd64.tar.gz
    sha256: 1b31f326c7de3a270bd804f06c92ba4fe8da95d5c860cc9cc452f0c67e8b0541
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.2/radar_v1.3.2_linux_amd64.tar.gz
    sha256: 68b4cef66827658ddfa37d39438c992ee4f3d956e6edcc1b07e6c3005684f087
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.2/radar_v1.3.2_linux_arm64.tar.gz
    sha256: 68376e23ea394a6d41d87c93c37008698defab9e98f0a389bc7bef82cfcdbd01
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.3.2/radar_v1.3.2_windows_amd64.zip
    sha256: a9d53c1fe9b13025ed4fd90912cb7b64824feef8e62a730b90ff6bce30f43c74
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
