apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.8.5
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.5/radar_v1.8.5_darwin_arm64.tar.gz
    sha256: 89e9f7d77edc69349f740ef9177d3f3aac9263144d42d3616fae9da13ad0b90b
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.5/radar_v1.8.5_darwin_amd64.tar.gz
    sha256: a057d6dfab322eb4a06c2c4c72f7937c06c4549ff31c1e2a35dce945fe08a7ec
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.5/radar_v1.8.5_linux_amd64.tar.gz
    sha256: bc998861c9494013ef1b6ed2be12e8fcc907b4ff4ac5b0bb677754e5340c54c4
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.5/radar_v1.8.5_linux_arm64.tar.gz
    sha256: ac4b4a354a8aad9fcf9cf6abd7d80af79ab7b4d8e4bdc5bbf229b6835ecc84da
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.8.5/radar_v1.8.5_windows_amd64.zip
    sha256: b7a58527f453ac8d2562e250656d21e1a55f36ba52a72c7e4aa3c7801d727836
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
