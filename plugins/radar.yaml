  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.5.5/radar_v1.5.5_windows_amd64.zip
    sha256: 391bf2896591e40e7839d7f5ad7b8a99295e9cbbbcf243eb2f0110d0a7a6c733
    files:
    - from: kubectl-radar.exe
      to: .
