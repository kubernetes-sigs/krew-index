apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: radar
spec:
  version: v1.2.4
  homepage: https://github.com/skyhook-io/radar
  shortDescription: Cluster dashboard with topology and traffic maps
  description: |
    Radar provides real-time visibility into your Kubernetes cluster.

    Features:
    - Topology visualization of resources and their relationships
    - Service traffic maps showing network connections
    - Event timeline with resource change history
    - Resource browser with YAML editing
    - Helm release management
    - Pod logs and terminal exec
    - Port forwarding

    Local-first. No account required. No cloud dependency.
  caveats: |
    This plugin opens a web UI in your browser by default.
    Use --no-browser to start the server without opening a browser.
  platforms:
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.4/radar_v1.2.4_darwin_arm64.tar.gz
    sha256: fe46683baead58071e654e804017da45c65786862e842f04bdac4f001bb672a6
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.4/radar_v1.2.4_darwin_amd64.tar.gz
    sha256: 03866ce1724fddb9adb947917d72d5ad605c1ae32931c15131f12b6613c7f069
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.4/radar_v1.2.4_linux_amd64.tar.gz
    sha256: c8ee605319668128fbf07d9890e52090a4adc0f7d17598b94b152aaa8f6ae01f
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - bin: kubectl-radar
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.4/radar_v1.2.4_linux_arm64.tar.gz
    sha256: 73718fd2c00328cd5838c7965d0cb86ee58b15f22ea35b9b8162d2a62cf56a57
    files:
    - from: kubectl-radar
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - bin: kubectl-radar.exe
    uri: https://github.com/skyhook-io/radar/releases/download/v1.2.4/radar_v1.2.4_windows_amd64.zip
    sha256: af834d1a61926a84421b2bb02a1bc5f96764e8e57ead027703a075dd02a4d70d
    files:
    - from: kubectl-radar.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
