apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: rbacmap
spec:
  version: "v0.1.0" # This will be managed by Git Tags
  homepage: https://github.com/hrishin/kubectl-rbacmap
  shortDescription: "Map RBAC permissions for subjects (ServiceAccounts, Users, Groups)"
  description: |
    kubectl-rbacmap finds all permissions associated with Kubernetes subjects
    by inspecting Roles, ClusterRoles, RoleBindings, and ClusterRoleBindings.
    It resolves complex mappings (like AWS IAM ARNs to EKS identities) and
    outputs the exact access granted in clean tables, markdown, or CSV.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    # The URI will be your GitHub release URL, like:
    uri: https://github.com/hrishin/kubectl-rbacmap/releases/download/v0.1.0/kubectl-rbacmap_Darwin_x86_64.tar.gz
    sha256: "96303b28bc0fa88dd1f6e95b519600b1f35ae7d06e46b147d1b6774c98f93d37"
    bin: kubectl-rbacmap
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/hrishin/kubectl-rbacmap/releases/download/v0.1.0/kubectl-rbacmap_Darwin_arm64.tar.gz
    sha256: "05ce013f777519d011c02d5e0f7d80b38f13ed0501e9ca4146fe318d3a41d55b"
    bin: kubectl-rbacmap
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/hrishin/kubectl-rbacmap/releases/download/v0.1.0/kubectl-rbacmap_Linux_x86_64.tar.gz
    sha256: "aa6f02f29948abeb7a294eafe8918eebaeee1c10604a3e83547bd777b83a1b2b"
    bin: kubectl-rbacmap
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/hrishin/kubectl-rbacmap/releases/download/v0.1.0/kubectl-rbacmap_Linux_arm64.tar.gz
    sha256: "3f31df4ab339cddc19822867f50300cb35cf2369fe6843be934c2a146742dde1"
    bin: kubectl-rbacmap
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/hrishin/kubectl-rbacmap/releases/download/v0.1.0/kubectl-rbacmap_Windows_x86_64.zip
    sha256: "ad8a361b81c535ebcd18ea424a73c2199c62447d2fa0aa8f7daceb7e2d5feb47"
    bin: kubectl-rbacmap.exe
