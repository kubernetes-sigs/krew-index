apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: relay
spec:
  version: v0.2.0
  homepage: https://github.com/knight42/krelay
  shortDescription: Drop-in "port-forward" replacement with UDP and hostname resolution.
  description: |
    This kubectl plugin is a drop-in replacement for `kubectl port-forward` with some enhanced features:
    * Supports UDP port forwarding
    * Supports simultaneous forwarding of data to multiple targets
    * Forwarding session will not be interfered after performing rolling updates
    * Forwarding data to the given IP or hostname that is accessible within the kubernetes cluster
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/knight42/krelay/releases/download/v0.2.0/kubectl-relay_v0.2.0_darwin-amd64.tar.gz
    sha256: 5df44626abd89c241f30094469f7eeaae4fa42d45fbb5f73bba8f18fc51f3786
    bin: kubectl-relay
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/knight42/krelay/releases/download/v0.2.0/kubectl-relay_v0.2.0_darwin-arm64.tar.gz
    sha256: 08d8101e7f017fafddd6f3f38ba83527e6fdf8f8ebb3ad4bc69bbbd304f5a8b1
    bin: kubectl-relay
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/knight42/krelay/releases/download/v0.2.0/kubectl-relay_v0.2.0_linux-amd64.tar.gz
    sha256: 53b887e08af739aaa57fbdc22f8f55195fb7cfc5a7bd6027f580081bcbf23c2c
    bin: kubectl-relay
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/knight42/krelay/releases/download/v0.2.0/kubectl-relay_v0.2.0_linux-arm64.tar.gz
    sha256: e2ae4df309e1e269e9309d89cc3bb6377f39a3f884d88599541354b37bee9488
    bin: kubectl-relay
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/knight42/krelay/releases/download/v0.2.0/kubectl-relay_v0.2.0_windows-amd64.tar.gz
    sha256: ed3655147a5b9578191e147b31840b704150c386a3daaff80fe0a5a1bf633908
    bin: kubectl-relay.exe
