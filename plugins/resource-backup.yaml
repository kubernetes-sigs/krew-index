apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: resource-backup
spec:
  version: v0.2.6
  homepage: https://github.com/zak905/kubectl-resource-backup
  shortDescription: Save Kubernetes resources to disk
  description: |
    Backs up Kubernetes objects (including CRDs) to the local file system. 
    Before saving any resource, some additional processing is done to remove:
    - the status stanza if the object has any.
    - the server generated fields from the object metadata. 
    - any field with a null value.
    The aims is to make the saved objects look like the original creation request.
  caveats: |
    The fields that has a default value are not removed (unlike the neat plugin)  
    because it's not possible to make a distinction between a value set 
    by a creation/update request and a value set by a controller 
    or a mutating admission webhook.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.2.6/kubectl-resource-backup_darwin_amd64.tar.gz
    sha256: 6c1403e4be2177752d55ee5cf3224b2e2797399708e821be31c98df22f44af1a
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.2.6/kubectl-resource-backup_darwin_arm64.tar.gz
    sha256: 34b0d1832fd6b243b367c2711d145ac79af25be2a619bcd4b358b9b098adf0ae
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.2.6/kubectl-resource-backup_linux_amd64.tar.gz
    sha256: 093dd5282ce3133266723470c11515d72a981653aaa907b206b9503dac7c69ad
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.2.6/kubectl-resource-backup_linux_arm64.tar.gz
    sha256: a76bdc4fc7cab1a3fb646c6cd50c9aa3952f5020842134828fbb041971886be1
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.2.6/kubectl-resource-backup_windows_amd64.tar.gz
    sha256: 7b1387b684d37a7abb917b3e5b6463f70ca62c8b36534f3b693f4f30b3239333
    bin: kubectl-resource-backup.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
