apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: resource-backup
spec:
  version: v0.3.1
  homepage: https://github.com/zak905/kubectl-resource-backup
  shortDescription: Save Kubernetes resources to disk
  description: |
    Backs up Kubernetes objects (including CRDs) to the local file system. 
    Before saving any resource, some additional processing is done to remove:
    - the status stanza if the object has any.
    - the server generated fields from the object metadata. 
    - any field with a null value.
    The aims is to make the saved objects look like the original creation request.
  caveats: |
    The fields that has a default value are not removed (unlike the neat plugin)  
    because it's not possible to make a distinction between a value set 
    by a creation/update request and a value set by a controller 
    or a mutating admission webhook.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.3.1/kubectl-resource-backup_darwin_amd64.tar.gz
    sha256: fa330c5b63b9a47a6c4c436ea3309ffc1f4ee2df38d78722f1be934150c2053b
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.3.1/kubectl-resource-backup_darwin_arm64.tar.gz
    sha256: 2b9cff2458809667a3d35527ade18a88a99e52f29178f99fe142b788c7b6a933
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.3.1/kubectl-resource-backup_linux_amd64.tar.gz
    sha256: b0d883b58b35c4f5714c8acc1f017b82da42aeaeeb945cfd9b0ac1433b683c6c
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.3.1/kubectl-resource-backup_linux_arm64.tar.gz
    sha256: 3bab1c4dfcc3feeb31a096198238ccf48e91884dd86afcd6295ebbf02e43ba40
    bin: kubectl-resource-backup
  - selector:
