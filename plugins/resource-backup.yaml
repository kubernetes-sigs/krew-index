apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: resource-backup
spec:
  version: v0.3.2
  homepage: https://github.com/zak905/kubectl-resource-backup
  shortDescription: Save Kubernetes resources to disk
  description: |
    Backs up Kubernetes objects (including CRDs) to the local file system. 
    Before saving any resource, some additional processing is done to remove:
    - the status stanza if the object has any.
    - the server generated fields from the object metadata. 
    - any field with a null value.
    The aims is to make the saved objects look like the original creation request.
  caveats: |
    The fields that has a default value are not removed (unlike the neat plugin)  
    because it's not possible to make a distinction between a value set 
    by a creation/update request and a value set by a controller 
    or a mutating admission webhook.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.3.2/kubectl-resource-backup_darwin_amd64.tar.gz
    sha256: 88cf01d61d6865f38c538ff28acc2b7cdd5de74a94aebbc3c1f2319631b9ec2f
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.3.2/kubectl-resource-backup_darwin_arm64.tar.gz
    sha256: 7c9cad645aca1db2a6611e3b496331f1a6bc2ded6909932d82f80e5f3952cf90
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.3.2/kubectl-resource-backup_linux_amd64.tar.gz
    sha256: ad48ae08aea29503176855a13ff35863ee234bb5b33577fe4390eb3236db53f9
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.3.2/kubectl-resource-backup_linux_arm64.tar.gz
    sha256: 77a555f6ef0fc97e7dd296957849223c2e2311442cd7ad71e5d702b871e55409
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
