apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: retina
spec:
  version: v1.2.2
  homepage: https://github.com/microsoft/retina
  shortDescription: Distributed network captures and telemetry
  description: |
    The Retina CLI plugin enables users to collect distributed network captures in an
    OS and vendor-agnostic way. Capture jobs can be created via the CLI to target specific
    nodes or pods in a time-limited or size limited way. Capture jobs can also filter specific
    network traffic based on the given configurations; more info on the configurations can be 
    found on the official docs. The captures are collected in formats like pcap, etl and 
    text files, and can then be stored at remote storage destinations.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.2/kubectl-retina-darwin-amd64-v1.2.2.tar.gz
    sha256: e75f01ab108e98110a7f892becc72cd083276c56728a87cdacff7a506670459c
    bin: kubectl-retina-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.2/kubectl-retina-darwin-arm64-v1.2.2.tar.gz
    sha256: 29e1352474876d9100d3d332e3f08c8829b338d1f79e39094414b9e7dcf6f99d
    bin: kubectl-retina-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.2/kubectl-retina-linux-amd64-v1.2.2.tar.gz
    sha256: e667d1a991db4b9213e37b61932267e52494bfb45b77fb52da991396dd1b1e78
    bin: kubectl-retina-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.2/kubectl-retina-linux-arm64-v1.2.2.tar.gz
    sha256: 88a1183da7ae56e9d7d2da41b464da6839d4cf0f06fd686d3ae6bf3369c5d132
    bin: kubectl-retina-linux-arm64
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.2/kubectl-retina-windows-amd64-v1.2.2.zip
    sha256: 6e93d382f20938630188e7d8df3d9e633c2e537f9e11700623f62ff87c31394f
    bin: kubectl-retina-windows-amd64.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.2/kubectl-retina-windows-arm64-v1.2.2.zip
    sha256: df9aec2a4625bca16e01df45d0ed3614553d5952e62cf8c5184c084f634544b1
    bin: kubectl-retina-windows-arm64.exe

