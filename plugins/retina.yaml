apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: retina
spec:
  version: v1.2.0
  homepage: https://github.com/microsoft/retina
  shortDescription: Distributed network captures and telemetry
  description: |
    The Retina CLI plugin enables users to collect distributed network captures in an
    OS and vendor-agnostic way. Capture jobs can be created via the CLI to target specific
    nodes or pods in a time-limited or size limited way. Capture jobs can also filter specific
    network traffic based on the given configurations; more info on the configurations can be 
    found on the official docs. The captures are collected in formats like pcap, etl and 
    text files, and can then be stored at remote storage destinations.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.0/kubectl-retina-darwin-amd64-v1.2.0.tar.gz
    sha256: a8c2cc8b2b75fc3bb6023e26902655cad46a29929cc72abd672df1c0b5de4f43
    bin: kubectl-retina-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.0/kubectl-retina-darwin-arm64-v1.2.0.tar.gz
    sha256: 3b0c71081d08d44ac4960b42b1ac38f52dc8e202fe59dfd492e5b1b28e57cd96
    bin: kubectl-retina-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.0/kubectl-retina-linux-amd64-v1.2.0.tar.gz
    sha256: 02af37b220fe3867b6fa56c4d141a0e0fd31f5b653b40d211c4cbc1ae3406c76
    bin: kubectl-retina-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.0/kubectl-retina-linux-arm64-v1.2.0.tar.gz
    sha256: 11db47cf3f4d447be109dbcef765a2cd4ecd5e7689a5101feab6a6551de933f4
    bin: kubectl-retina-linux-arm64
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.0/kubectl-retina-windows-amd64-v1.2.0.zip
    sha256: 7c4bb3db9ed22b65fbd1b84fdbea4cd4f29f0927af9e848d86b390cdea03b1cf
    bin: kubectl-retina-windows-amd64.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.0/kubectl-retina-windows-arm64-v1.2.0.zip
    sha256: e91363e26ade6a1cc45127d2b281eab39e043e0ed562dcdcce4fc40a8b56991c
    bin: kubectl-retina-windows-arm64.exe

