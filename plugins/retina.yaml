apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: retina
spec:
  version: v1.2.1
  homepage: https://github.com/microsoft/retina
  shortDescription: Distributed network captures and telemetry
  description: |
    The Retina CLI plugin enables users to collect distributed network captures in an
    OS and vendor-agnostic way. Capture jobs can be created via the CLI to target specific
    nodes or pods in a time-limited or size limited way. Capture jobs can also filter specific
    network traffic based on the given configurations; more info on the configurations can be 
    found on the official docs. The captures are collected in formats like pcap, etl and 
    text files, and can then be stored at remote storage destinations.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.1/kubectl-retina-darwin-amd64-v1.2.1.tar.gz
    sha256: 428e6d4984373e912d93103046b55ba773bd69188875f17770f6a5b2383c9954
    bin: kubectl-retina-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.1/kubectl-retina-darwin-arm64-v1.2.1.tar.gz
    sha256: 4b525ad1a90534adadff419eced69b5b87adbf75393d4c9f889e9a4f1b4953dd
    bin: kubectl-retina-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.1/kubectl-retina-linux-amd64-v1.2.1.tar.gz
    sha256: 45040833b68d74b2199f74582cf9cdcc9e61480d85383276aa6053f7ebf35072
    bin: kubectl-retina-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.1/kubectl-retina-linux-arm64-v1.2.1.tar.gz
    sha256: 6985d323e58d0619df9a7eec74bd558a7cf18b4fa6951852d9305338f6471beb
    bin: kubectl-retina-linux-arm64
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.1/kubectl-retina-windows-amd64-v1.2.1.zip
    sha256: 9dbf516486fcfce7e12b1c6e40f517a10a18afa2434754c897f56ee6e22f859b
    bin: kubectl-retina-windows-amd64.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.1/kubectl-retina-windows-arm64-v1.2.1.zip
    sha256: ebbd02359539ce341d82d37e66a4bef217a594872b3c1563e607bfc41575575d
    bin: kubectl-retina-windows-arm64.exe

