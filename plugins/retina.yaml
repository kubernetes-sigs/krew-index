apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: retina
spec:
  version: v0.0.33-windows-rc.2
  homepage: https://github.com/microsoft/retina
  shortDescription: Distributed network captures and telemetry
  description: |
    The Retina CLI plugin enables users to collect distributed network captures in an
    OS and vendor-agnostic way. Capture jobs can be created via the CLI to target specific
    nodes or pods in a time-limited or size limited way. Capture jobs can also filter specific
    network traffic based on the given configurations; more info on the configurations can be 
    found on the official docs. The captures are collected in formats like pcap, etl and 
    text files, and can then be stored at remote storage destinations.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v0.0.33-windows-rc.2/kubectl-retina-darwin-amd64-v0.0.33-windows-rc.2.tar.gz
    sha256: f8f24f9be81822d3e3755a2e2f9fc63ba6435bacbbe120d70ea5be994651dc39
    bin: kubectl-retina-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v0.0.33-windows-rc.2/kubectl-retina-darwin-arm64-v0.0.33-windows-rc.2.tar.gz
    sha256: e3a57f749366e05c0f8711780a7d3cc3ac8f39f37991e6c8065518140e1f934c
    bin: kubectl-retina-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v0.0.33-windows-rc.2/kubectl-retina-linux-amd64-v0.0.33-windows-rc.2.tar.gz
    sha256: ff24da18992bce747fb227847cb862626417cbed4f43888e189df4124821de08
    bin: kubectl-retina-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v0.0.33-windows-rc.2/kubectl-retina-linux-arm64-v0.0.33-windows-rc.2.tar.gz
    sha256: 50c891f451a9025670222d0df50bacc0f127b9a4aefd05e086ffb52b7bd67446
    bin: kubectl-retina-linux-arm64
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v0.0.33-windows-rc.2/kubectl-retina-windows-amd64-v0.0.33-windows-rc.2.zip
    sha256: e3504c785de65900271201fc409a1e8cac69e5b960a945d2942d22028158f691
    bin: kubectl-retina-windows-amd64.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v0.0.33-windows-rc.2/kubectl-retina-windows-arm64-v0.0.33-windows-rc.2.zip
    sha256: cec36b1860994af28b10f56434b3a60358dc3832753ccfbeb2536c4e0ef209c3
    bin: kubectl-retina-windows-arm64.exe

