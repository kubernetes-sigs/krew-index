apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: retina
spec:
  version: v1.2.3
  homepage: https://github.com/microsoft/retina
  shortDescription: Distributed network captures and telemetry
  description: |
    The Retina CLI plugin enables users to collect distributed network captures in an
    OS and vendor-agnostic way. Capture jobs can be created via the CLI to target specific
    nodes or pods in a time-limited or size limited way. Capture jobs can also filter specific
    network traffic based on the given configurations; more info on the configurations can be 
    found on the official docs. The captures are collected in formats like pcap, etl and 
    text files, and can then be stored at remote storage destinations.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.3/kubectl-retina-darwin-amd64-v1.2.3.tar.gz
    sha256: 4f23d7e2934117a34029be360dfcc829b073f257f5fb194068ecfa7d3f468810
    bin: kubectl-retina-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.3/kubectl-retina-darwin-arm64-v1.2.3.tar.gz
    sha256: c9d387a40ff5d3a07bddbc2def30b560644572e4517590dbf147822e0c9f1b33
    bin: kubectl-retina-darwin-arm64
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.3/kubectl-retina-linux-amd64-v1.2.3.tar.gz
    sha256: b0d69751ea3e60fe574ac9ade756d0a46e2c258f25ee096c716f749e0192dab2
    bin: kubectl-retina-linux-amd64
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.3/kubectl-retina-linux-arm64-v1.2.3.tar.gz
    sha256: 0da85d0ae0fbd5593ed3c8b55871956ce1ee7de13d05f118a3053929b222dfad
    bin: kubectl-retina-linux-arm64
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.3/kubectl-retina-windows-amd64-v1.2.3.zip
    sha256: 1a4282ba4fb026db40b81bc2308086687507e884663f3f665534c1f85ab57c37
    bin: kubectl-retina-windows-amd64.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/microsoft/retina/releases/download/v1.2.3/kubectl-retina-windows-arm64-v1.2.3.zip
    sha256: 8c7baa8fa581575e655f98254f18aa944bebb40c2190385381a5d859db0e44dc
    bin: kubectl-retina-windows-arm64.exe

