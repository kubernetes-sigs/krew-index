    sha256: 365fd3297c947943e6abd5d90a6dcc87ef43242155315cee1c1e0699e1c1ef9b
    bin: kubectl-rsync
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/major1201/kubectl-rsync/releases/download/v0.1.0/kubectl-rsync_v0.1.0_windows_amd64.tar.gz
    sha256: c390bf6c459decb1a72b62e3d6f353a9ff14fb5c7315004180ec3b6c854833c5
