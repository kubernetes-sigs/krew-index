apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: safe
spec:
  version: "v0.0.5"
  homepage: https://github.com/rumstead/kubectl-safe
  shortDescription: Prompts before running edit commands
  description: |
    This plugin allows users to confirm when they get prompted
    on certain kubectl commands.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/rumstead/kubectl-safe/releases/download/v0.0.5/kubectl-safe_v0.0.5_darwin_amd64.tar.gz
      sha256: b059709af95ec9171470bf6cae89cfd62a40483bf735c1cb792e6b51ad0ff86b
      bin: "kubectl-safe"
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/rumstead/kubectl-safe/releases/download/v0.0.5/kubectl-safe_v0.0.5_darwin_arm64.tar.gz
      sha256: 275107a3c5a8c80b9b7a8153c2385df3e89a63c4039000d4ec90270d5145c6e2
      bin: "kubectl-safe"
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/rumstead/kubectl-safe/releases/download/v0.0.5/kubectl-safe_v0.0.5_linux_amd64.tar.gz
      sha256: dbda5e829a5a2e1f46c0469dc05119a0b6bd26babd09502423b13b1b9dbeef7c
      bin: "kubectl-safe"
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/rumstead/kubectl-safe/releases/download/v0.0.5/kubectl-safe_v0.0.5_linux_arm64.tar.gz
      sha256: 91d398970515fe6812f3a7184ad823ce9ce0f7c1b0c9ef074acbabab68b68dc6
      bin: "kubectl-safe"
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/rumstead/kubectl-safe/releases/download/v0.0.5/kubectl-safe_v0.0.5_windows_amd64.tar.gz
      sha256: 019d37dd7adb61eacabdd998a2602fa29c6509a79336c5c83343d8bbdea9e819
      bin: "kubectl-safe.exe"
