apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: schemagen
spec:
  version: v0.4.0
  homepage: https://github.com/ogormans-deptstack/kubectl-schemagen
  shortDescription: Generate, migrate, and scaffold Kubernetes resources from cluster schema
  description: |
    A multi-subcommand kubectl plugin driven by the cluster's OpenAPI v3 schema.
    Generate example manifests, detect deprecated APIs, and scaffold kustomize
    bases -- all from the live cluster schema.

    Subcommands:
      manifest  - Generate example YAML for any resource or CRD
      migrate   - Check manifests for deprecated or removed APIs
      scaffold  - Generate kustomize bases from resource schemas
  caveats: |
    * Requires a running cluster (reads OpenAPI v3 spec via discovery API)
    * CRD examples require the CRD to be installed in the cluster
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.4.0/kubectl-schemagen_v0.4.0_darwin_amd64.tar.gz
      sha256: 97689c25acea6868870ee672afa514763d4dc2bb4bcdf87979a2f2031cbfb529
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.4.0/kubectl-schemagen_v0.4.0_darwin_arm64.tar.gz
      sha256: 255ea25b16d3d5966d801d8d39aa20466ebc9b6742446afdd6655ac863b02c5a
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.4.0/kubectl-schemagen_v0.4.0_linux_amd64.tar.gz
      sha256: 7a1d0f672c59ab553075639221c2f05674805fae886e9d80bacb3cc895f2e7eb
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.4.0/kubectl-schemagen_v0.4.0_linux_arm64.tar.gz
      sha256: d4926be4caf43208782a3b598570235a7ea31539f1679e4bf0b906597e898f58
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.4.0/kubectl-schemagen_v0.4.0_windows_amd64.zip
      sha256: 0be7a5e7a3c39bdce6ad1fd8738ce8d343706972a3a6a3fc219c5df73f065cd5
      bin: kubectl-schemagen.exe
