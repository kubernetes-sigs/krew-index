apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: schemagen
spec:
  version: v0.5.0
  homepage: https://github.com/ogormans-deptstack/kubectl-schemagen
  shortDescription: Generate, migrate, and scaffold Kubernetes resources from cluster schema
  description: |
    A multi-subcommand kubectl plugin driven by the cluster's OpenAPI v3 schema.
    Generate example manifests, detect deprecated APIs, and scaffold kustomize
    bases -- all from the live cluster schema.

    Subcommands:
      manifest  - Generate example YAML for any resource or CRD
      migrate   - Check manifests for deprecated or removed APIs
      scaffold  - Generate kustomize bases from resource schemas
  caveats: |
    * Requires a running cluster (reads OpenAPI v3 spec via discovery API)
    * CRD examples require the CRD to be installed in the cluster
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.5.0/kubectl-schemagen_v0.5.0_darwin_amd64.tar.gz
      sha256: d43c78a20dea2200d878e7b37773df467e93cdbe05d1c03fe894b0fafe7b671b
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.5.0/kubectl-schemagen_v0.5.0_darwin_arm64.tar.gz
      sha256: 9615e2dfd60cb616786977e15d51875b9ef3aa8a93142d8d23d76344b406fb91
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.5.0/kubectl-schemagen_v0.5.0_linux_amd64.tar.gz
      sha256: 51494a9298ff54002077237e3b437676753260498d2f9761f770e7d39a38b783
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.5.0/kubectl-schemagen_v0.5.0_linux_arm64.tar.gz
      sha256: 2f5ea2f2483bd6fd1de9915a6760954a754a32cb3c845b9148b61bb77e25b4d6
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.5.0/kubectl-schemagen_v0.5.0_windows_amd64.zip
      sha256: 06568172b3a13a7eabae4c2b6683d2ab5e0b771e5cdb97a4c3497f4d190cc56f
      bin: kubectl-schemagen.exe
