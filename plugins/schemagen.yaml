apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: schemagen
spec:
  version: v0.6.1
  homepage: https://github.com/ogormans-deptstack/kubectl-schemagen
  shortDescription: Generate, migrate, and scaffold Kubernetes resources from cluster schema
  description: |
    A multi-subcommand kubectl plugin driven by the cluster's OpenAPI v3 schema.
    Generate example manifests, detect deprecated APIs, and scaffold kustomize
    bases -- all from the live cluster schema.

    Subcommands:
      manifest  - Generate example YAML for any resource or CRD
      migrate   - Check manifests for deprecated or removed APIs
      scaffold  - Generate kustomize bases from resource schemas
  caveats: |
    * Requires a running cluster (reads OpenAPI v3 spec via discovery API)
    * CRD examples require the CRD to be installed in the cluster
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.6.1/kubectl-schemagen_v0.6.1_darwin_amd64.tar.gz
      sha256: 85b5bbc43c4b65ceaeb2ba43cbfa23fee6c1a81aa0d7a27c3b45caf3c2f60f43
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.6.1/kubectl-schemagen_v0.6.1_darwin_arm64.tar.gz
      sha256: 353eeaf99c0fbbfc2ef187741844d052f7d93c980d055d8035898e4531c35758
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.6.1/kubectl-schemagen_v0.6.1_linux_amd64.tar.gz
      sha256: 1f6a872bae6673c0668e55c2dda5842a8890af038c88a0c919d408ee1d04b27d
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.6.1/kubectl-schemagen_v0.6.1_linux_arm64.tar.gz
      sha256: 29ab5e0813b5cf367705065f55e18ef6f06a0dceea2c4d570e54fc85a519de7b
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.6.1/kubectl-schemagen_v0.6.1_windows_amd64.zip
      sha256: 2440e71e59095f20aac914e5b48eef0e8086d931ec109a796f6a485ca19e1f57
      bin: kubectl-schemagen.exe
