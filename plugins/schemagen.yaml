apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: schemagen
spec:
  version: v0.6.0
  homepage: https://github.com/ogormans-deptstack/kubectl-schemagen
  shortDescription: Generate, migrate, and scaffold Kubernetes resources from cluster schema
  description: |
    A multi-subcommand kubectl plugin driven by the cluster's OpenAPI v3 schema.
    Generate example manifests, detect deprecated APIs, and scaffold kustomize
    bases -- all from the live cluster schema.

    Subcommands:
      manifest  - Generate example YAML for any resource or CRD
      migrate   - Check manifests for deprecated or removed APIs
      scaffold  - Generate kustomize bases from resource schemas
  caveats: |
    * Requires a running cluster (reads OpenAPI v3 spec via discovery API)
    * CRD examples require the CRD to be installed in the cluster
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.6.0/kubectl-schemagen_v0.6.0_darwin_amd64.tar.gz
      sha256: 7c0ca8d3d81ca901367b304d295731fc9e32b820aa562f7f68056310acf074cb
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.6.0/kubectl-schemagen_v0.6.0_darwin_arm64.tar.gz
      sha256: 6e9acd8538c61fd69d908cc9a8823e95c2ca8382f7ac7bc76d6c51bc97146692
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.6.0/kubectl-schemagen_v0.6.0_linux_amd64.tar.gz
      sha256: 367c1b7861af0328479fd2c1aa54f348e225c5be83f2200f76fcb01f70b32d28
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.6.0/kubectl-schemagen_v0.6.0_linux_arm64.tar.gz
      sha256: 594e13f7eb74ece1fde11dffa4f5b8ddec65390671caebc06610141f4ccf1425
      bin: kubectl-schemagen
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/ogormans-deptstack/kubectl-schemagen/releases/download/v0.6.0/kubectl-schemagen_v0.6.0_windows_amd64.zip
      sha256: f0f34fd9de41a7064efa724d0d8d288d1ff49a21e4afb07298a9659780a30b42
      bin: kubectl-schemagen.exe
