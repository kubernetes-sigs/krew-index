  name: schemahero
spec:
  version: v0.25.0
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.25.0/kubectl-schemahero_linux_amd64.tar.gz
    sha256: db49e4c78624e18821498f46341c812698cb29d5a73d93bae75d03356bc679c9
    files:
    - from: kubectl-schemahero
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.25.0/kubectl-schemahero_linux_arm64.tar.gz
    sha256: 32d7b2acb0f590c876a8ca4fe5558e0be62e424194b552e50216569ac2a46528
    files:
    - from: kubectl-schemahero
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.25.0/kubectl-schemahero_darwin_amd64.tar.gz
    sha256: e51b907d23469dda08db1eee80b06c1576647f1885501e5139e55b09ba396361
    files:
    - from: kubectl-schemahero
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.25.0/kubectl-schemahero_darwin_arm64.tar.gz
    sha256: 6100de5f822c267fc599c93d148cec515be71e690e3ed45493314253ba7ee4cc
    files:
    - from: kubectl-schemahero
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.25.0/kubectl-schemahero_windows_amd64.tar.gz
    sha256: 9ba04acbd673f0130f961405d0cce95ee4bd2abe87c5e6970aa482da3dc765ec
    files:
    - from: kubectl-schemahero.exe
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero.exe
  shortDescription: Declarative database schema migrations via YAML
  homepage: https://schemahero.io
  caveats: |
    SchemaHero requires an in-cluster operator. To install the operator run:

      $ kubectl schemahero install
  description: |
    SchemaHero is a database schema migration tool that converts a schema
    definition into migration scripts to be applied to a database engine
    (with current support for Postgres, Mysql, rqlite and CockroachDB).

    SchemaHero allows developers to define a database table schema as a
    declarative Kubernetes object and then apply the definition to the
    cluster. The SchemaHero operator will then query the current database
    schema and generate (and optionally apply) the necessary SQL
    statements to update the database to the desired schema.

    To learn more, try the tutorial at https://schemahero.io/tutorial/
