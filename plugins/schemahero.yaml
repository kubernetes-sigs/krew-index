apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: schemahero
spec:
  version: v0.24.0
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.24.0/kubectl-schemahero_linux_amd64.tar.gz
    sha256: 081d646ac3406b90fde06d6246292430f7058992a4dbaee13fb691b950bbcda8
    files:
    - from: kubectl-schemahero
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.24.0/kubectl-schemahero_linux_arm64.tar.gz
    sha256: 4bbb45304bc687e1a7303c844861128f1615efbf3e689d78f563466d43fd9882
    files:
    - from: kubectl-schemahero
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.24.0/kubectl-schemahero_darwin_amd64.tar.gz
    sha256: 46a24355ddb7906a93dd0272a0523befb12bb6419f43b2c9ca848c1301701c8f
    files:
    - from: kubectl-schemahero
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.24.0/kubectl-schemahero_darwin_arm64.tar.gz
    sha256: 146838dde41b9c004ca1971de97034ce6e9de9c7601a8785fc590ccc64c8715d
    files:
    - from: kubectl-schemahero
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.24.0/kubectl-schemahero_windows_amd64.tar.gz
    sha256: bb6b4115f8eed755258d28c480b1c54dc42a180ef768a98475854d7c123ebcbf
    files:
    - from: kubectl-schemahero.exe
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero.exe
  shortDescription: Declarative database schema migrations via YAML
  homepage: https://schemahero.io
  caveats: |
    SchemaHero requires an in-cluster operator. To install the operator run:

      $ kubectl schemahero install
  description: |
    SchemaHero is a database schema migration tool that converts a schema
    definition into migration scripts to be applied to a database engine
    (with current support for Postgres, Mysql, rqlite and CockroachDB).

    SchemaHero allows developers to define a database table schema as a
    declarative Kubernetes object and then apply the definition to the
    cluster. The SchemaHero operator will then query the current database
    schema and generate (and optionally apply) the necessary SQL
    statements to update the database to the desired schema.

    To learn more, try the tutorial at https://schemahero.io/tutorial/
