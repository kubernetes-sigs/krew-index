  name: schemahero
spec:
  version: v0.25.1
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.25.1/kubectl-schemahero_linux_amd64.tar.gz
    sha256: 2751d6619375b809c68bce23297182cf8e3b330fc81c6a6e5e653267f9619e86
    files:
    - from: kubectl-schemahero
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.25.1/kubectl-schemahero_linux_arm64.tar.gz
    sha256: 32b4c45f2d41ccff74d51d539fca70e7bccf8cb4535b16dfe3cfa466bcb0ee52
    files:
    - from: kubectl-schemahero
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.25.1/kubectl-schemahero_darwin_amd64.tar.gz
    sha256: dde54f770edaba7cb572c39f684097b55cefb5029774a079a28e79245c23286b
    files:
    - from: kubectl-schemahero
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.25.1/kubectl-schemahero_darwin_arm64.tar.gz
    sha256: 8f04616b8ba25871dcb226328f1922b23dd689242783ffb9796a22931c68e5ec
    files:
    - from: kubectl-schemahero
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-schemahero
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/schemahero/schemahero/releases/download/v0.25.1/kubectl-schemahero_windows_amd64.tar.gz
    sha256: b6a852ac7ea7710190744fda1308eaa69be69788ec53451f6593849f0149f387
