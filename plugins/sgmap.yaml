apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: sgmap
spec:
  version: v1.4.8
  homepage: https://github.com/naka-gawa/kubectl-sgmap
  shortDescription: "Visualize security group per pod."
  description: |
    A kubectl plugin to visualize security group per pod.
    This plugin provides a command to generate a security group map for pods in a Kubernetes cluster.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/naka-gawa/kubectl-sgmap/releases/download/v1.4.8/kubectl-sgmap_Darwin_arm64.tar.gz
      sha256: 20bc6af5c9eb08c462ed9dbfa064d5f5ee8d929ef5e52ab36b5e0496e846dbd6
      files:
        - from: "kubectl-sgmap"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "./kubectl-sgmap"
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/naka-gawa/kubectl-sgmap/releases/download/v1.4.8/kubectl-sgmap_Darwin_x86_64.tar.gz
      sha256: c147b769faf8190d61652a9434ec253fc1513a7ff3d63231200a6aa4c090e61e
      files:
        - from: "kubectl-sgmap"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "./kubectl-sgmap"
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/naka-gawa/kubectl-sgmap/releases/download/v1.4.8/kubectl-sgmap_Linux_x86_64.tar.gz
      sha256: 4b8d1c0321acc11a777cdf742f00a8823843117fdbab3588a11a4f4ab9d3b4c8
      files:
        - from: "kubectl-sgmap"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "./kubectl-sgmap"
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/naka-gawa/kubectl-sgmap/releases/download/v1.4.8/kubectl-sgmap_Linux_arm64.tar.gz
      sha256: 27b52cd8d30dc1f1a221f3d3300457c298d82c52b0a2b5ddeb363b5338a20296
      files:
        - from: "kubectl-sgmap"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "./kubectl-sgmap"
