apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: sgmap
spec:
  version: v1.4.9
  homepage: https://github.com/naka-gawa/kubectl-sgmap
  shortDescription: "Visualize security group per pod."
  description: |
    A kubectl plugin to visualize security group per pod.
    This plugin provides a command to generate a security group map for pods in a Kubernetes cluster.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/naka-gawa/kubectl-sgmap/releases/download/v1.4.9/kubectl-sgmap_Darwin_arm64.tar.gz
      sha256: cfff1f6e25d6bc03f491cc27a2cd52fecb5420cb52c1ea67b7c0223ebc48f9f9
      files:
        - from: "kubectl-sgmap"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "./kubectl-sgmap"
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/naka-gawa/kubectl-sgmap/releases/download/v1.4.9/kubectl-sgmap_Darwin_x86_64.tar.gz
      sha256: f1096e76d202da9495abe0d66ace3b77d1e6324e83f6d2737681ec9ee7489e78
      files:
        - from: "kubectl-sgmap"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "./kubectl-sgmap"
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/naka-gawa/kubectl-sgmap/releases/download/v1.4.9/kubectl-sgmap_Linux_x86_64.tar.gz
      sha256: 459f122e46c188c289b7ae1f531fd6d9312cf829cefc3f9309f1b0cb06962d29
      files:
        - from: "kubectl-sgmap"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "./kubectl-sgmap"
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/naka-gawa/kubectl-sgmap/releases/download/v1.4.9/kubectl-sgmap_Linux_arm64.tar.gz
      sha256: 64970c92a8abcc8c4e74e9a0b6192a1b25602c37a4c9d0cf83d4ad2f4e99e3fa
      files:
        - from: "kubectl-sgmap"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "./kubectl-sgmap"
