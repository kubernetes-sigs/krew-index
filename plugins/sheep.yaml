apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: sheep
spec:
  version: v0.2.0
  homepage: https://github.com/ahoz/kubectl-sheep
  shortDescription: Fetch and manage kubeconfigs from Rancher-managed clusters
  description: |
    A kubectl plugin to manage multiple Rancher instances, list their downstream
    clusters, and fetch/refresh kubeconfigs individually or in bulk. Rancher API
    tokens can be stored either as plaintext or encrypted (passphrase-protected file
    backend), selectable per instance.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/ahoz/kubectl-sheep/releases/download/v0.2.0/kubectl-sheep_linux_amd64.tar.gz
      sha256: 635c5ec0328a78e01ddbd028e42294e147fb43941da8113e090ef582072d57a2
      bin: kubectl-sheep
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/ahoz/kubectl-sheep/releases/download/v0.2.0/kubectl-sheep_linux_arm64.tar.gz
      sha256: 9306461ba847105321f251ed09787c86f7ce212411a7fd8bacb99a5dad24305c
      bin: kubectl-sheep
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/ahoz/kubectl-sheep/releases/download/v0.2.0/kubectl-sheep_darwin_amd64.tar.gz
      sha256: 002d47713fcda27d37ec1ac2ee41b5268f42e61c7dc7fdffc017b928097744f1
      bin: kubectl-sheep
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/ahoz/kubectl-sheep/releases/download/v0.2.0/kubectl-sheep_darwin_arm64.tar.gz
      sha256: 1340b9859878affe5da161a08178e057fd153c1fdc370cdf56d120df96181260
      bin: kubectl-sheep
