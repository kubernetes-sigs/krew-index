apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: sshuttle
spec:
  version: v0.2.5
  homepage: https://github.com/jjo/kubectl-sshuttle
  shortDescription: Tunnel traffic through a cluster using sshuttle
  description: |
    Manages a proxy pod in a Kubernetes cluster and tunnels traffic
    through it. Lets you reach IPs and subnets that are only accessible
    from inside the cluster network.

    Three transport modes:
      default            — sshuttle locally, python+sshuttle in pod
      --rushtle-server   — sshuttle locally, rushtle server in pod
                           (works around kubectl-exec >1KB stdin
                            truncation seen on tailscale-fronted clusters)
      --rushtle          — rushtle on both ends, no sshuttle/python at all
                           (linux+macos, requires root locally for NAT setup)

    Default and --rushtle-server modes require sshuttle locally
    (pip install sshuttle). The bundled `rushtle` binary is used for
    --rushtle mode.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/jjo/kubectl-sshuttle/releases/download/v0.2.5/kubectl-sshuttle_v0.2.5_linux_amd64.tar.gz
    sha256: 1f12a7888e086cd1c7c5d2fdfdfe6d87a9098b0ab0e3fb5a9d68568aa5facccb
    bin: kubectl-sshuttle
    files:
    - from: LICENSE
      to: .
    - from: kubectl-sshuttle
      to: .
    - from: rushtle
      to: .
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/jjo/kubectl-sshuttle/releases/download/v0.2.5/kubectl-sshuttle_v0.2.5_linux_arm64.tar.gz
    sha256: 5fbc557af8ad10d35bbd7822c8d5dabf2527df14ee246e7ff3f43ba65f189001
    bin: kubectl-sshuttle
    files:
    - from: LICENSE
      to: .
    - from: kubectl-sshuttle
      to: .
    - from: rushtle
      to: .
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/jjo/kubectl-sshuttle/releases/download/v0.2.5/kubectl-sshuttle_v0.2.5_darwin_amd64.tar.gz
    sha256: 3d1dde80bd5143df6611f299b7f289250f0750b8d6b987cee2145a3d5ff51c42
    bin: kubectl-sshuttle
    files:
    - from: LICENSE
      to: .
    - from: kubectl-sshuttle
      to: .
    - from: rushtle
      to: .
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/jjo/kubectl-sshuttle/releases/download/v0.2.5/kubectl-sshuttle_v0.2.5_darwin_arm64.tar.gz
    sha256: 5a66f2cf2ab3dccb07ab0fd8c4fedca79e2c9a209ec1859d257d1cf0845904bc
    bin: kubectl-sshuttle
    files:
    - from: LICENSE
      to: .
    - from: kubectl-sshuttle
      to: .
    - from: rushtle
      to: .
