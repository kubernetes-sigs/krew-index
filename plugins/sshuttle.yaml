apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: sshuttle
spec:
  version: v0.2.3
  homepage: https://github.com/jjo/kubectl-sshuttle
  shortDescription: Tunnel traffic through a cluster using sshuttle
  description: |
    Manages a proxy pod in a Kubernetes cluster and tunnels traffic
    through it. Lets you reach IPs and subnets that are only accessible
    from inside the cluster network.

    Three transport modes:
      default            — sshuttle locally, python+sshuttle in pod
      --rushtle-server   — sshuttle locally, rushtle server in pod
                           (works around kubectl-exec >1KB stdin
                            truncation seen on tailscale-fronted clusters)
      --rushtle          — rushtle on both ends, no sshuttle/python at all
                           (linux+macos, requires root locally for NAT setup)

    Default and --rushtle-server modes require sshuttle locally
    (pip install sshuttle). The bundled `rushtle` binary is used for
    --rushtle mode.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/jjo/kubectl-sshuttle/releases/download/v0.2.3/kubectl-sshuttle_v0.2.3_linux_amd64.tar.gz
    sha256: 0ae2dfaf68273ca00e1d2e4c79da82987338444490b11d020f45d1789baf05b9
    bin: kubectl-sshuttle
    files:
    - from: LICENSE
      to: .
    - from: kubectl-sshuttle
      to: .
    - from: rushtle
      to: .
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/jjo/kubectl-sshuttle/releases/download/v0.2.3/kubectl-sshuttle_v0.2.3_linux_arm64.tar.gz
    sha256: 427324b050ed10121fe9b0c6b9c54d9068032d6db10f20d12858846cd7c7f0ec
    bin: kubectl-sshuttle
    files:
    - from: LICENSE
      to: .
    - from: kubectl-sshuttle
      to: .
    - from: rushtle
      to: .
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/jjo/kubectl-sshuttle/releases/download/v0.2.3/kubectl-sshuttle_v0.2.3_darwin_amd64.tar.gz
    sha256: 6993719ff3fc6eaa115a116ae00684a76bfb88c3f454e5829d987412dbe9c66f
    bin: kubectl-sshuttle
    files:
    - from: LICENSE
      to: .
    - from: kubectl-sshuttle
      to: .
    - from: rushtle
      to: .
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/jjo/kubectl-sshuttle/releases/download/v0.2.3/kubectl-sshuttle_v0.2.3_darwin_arm64.tar.gz
    sha256: 6ccec9e5c20d3703d605452e37f3a9e09978cd5b02258de036eac052ef7a5533
    bin: kubectl-sshuttle
    files:
    - from: LICENSE
      to: .
    - from: kubectl-sshuttle
      to: .
    - from: rushtle
      to: .
