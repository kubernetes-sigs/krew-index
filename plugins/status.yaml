apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: status
spec:
  version: v0.7.19
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/bergerx/kubectl-status/releases/download/v0.7.19/status_linux_amd64.tar.gz
    sha256: 5d0e525282c7258bed85149c7e52b6779a42d0f0955c8a9ff0fed4780522291b
    files:
    - from: "./status"
      to: "."
    - from: LICENSE
      to: "."
    bin: "status"
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/bergerx/kubectl-status/releases/download/v0.7.19/status_linux_arm64.tar.gz
    sha256: 50366e64eda8bb1840450ae7f73a99ef02f788f529b234422f24d87bf9f646a1
    files:
    - from: "./status"
      to: "."
    - from: LICENSE
      to: "."
    bin: "status"
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/bergerx/kubectl-status/releases/download/v0.7.19/status_darwin_amd64.tar.gz
    sha256: 66dcb3caf287febcde98a558e8deebb9ce3ef52d0c69892450c1fc2526498f6e
    files:
    - from: "./status"
      to: "."
    - from: LICENSE
      to: "."
    bin: "status"
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/bergerx/kubectl-status/releases/download/v0.7.19/status_darwin_arm64.tar.gz
    sha256: 1737523f9964dd93abe441918aad4e81825371a6099a9cba4849f726a68914ca
    files:
    - from: "./status"
      to: "."
    - from: LICENSE
      to: "."
    bin: "status"
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/bergerx/kubectl-status/releases/download/v0.7.19/status_windows_amd64.zip
    sha256: 6a14a456a02337f8aa49b3e26271b616d9d67a263b8e6cfc0517d3546eefecc8
    files:
    - from: "/status.exe"
      to: "."
    - from: LICENSE
      to: "."
    bin: "status.exe"
  shortDescription: Show status of Kubernetes resources at a glance.
  homepage: https://github.com/bergerx/kubectl-status
  caveats: |
    Usage:
      $ kubectl status

    For additional options:
      $ kubectl status --help

  description: |
    Shows the status of any Kubernetes resource in one command, in place of
    separate get/describe calls. Most useful when debugging why a resource
    isn't healthy.
