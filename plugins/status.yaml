apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: status
spec:
  version: v0.7.20
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/bergerx/kubectl-status/releases/download/v0.7.20/status_linux_amd64.tar.gz
    sha256: 13f6ee81071a722859d1c2ccae17b9b491b25d0be9521e8787a83e3db6ce2691
    files:
    - from: "./status"
      to: "."
    - from: LICENSE
      to: "."
    bin: "status"
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/bergerx/kubectl-status/releases/download/v0.7.20/status_linux_arm64.tar.gz
    sha256: aef0879cdbe5d9a48a206e492b82596dfc3a3e01aaed32005f6c34c5df9ce291
    files:
    - from: "./status"
      to: "."
    - from: LICENSE
      to: "."
    bin: "status"
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/bergerx/kubectl-status/releases/download/v0.7.20/status_darwin_amd64.tar.gz
    sha256: cd9a54473a343a84b56d06ba881731e93de10c652dc66d0b112d85cb749a5510
    files:
    - from: "./status"
      to: "."
    - from: LICENSE
      to: "."
    bin: "status"
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/bergerx/kubectl-status/releases/download/v0.7.20/status_darwin_arm64.tar.gz
    sha256: 260310b816ef32bd969e6d9880d5c4e0e678af497ffe308853f4acda05d2a441
    files:
    - from: "./status"
      to: "."
    - from: LICENSE
      to: "."
    bin: "status"
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/bergerx/kubectl-status/releases/download/v0.7.20/status_windows_amd64.zip
    sha256: 0b834d0858ff530b238f1f4e628bbd74a392367f86bce7fc3db85a350d9e0b5c
    files:
    - from: "/status.exe"
      to: "."
    - from: LICENSE
      to: "."
    bin: "status.exe"
  shortDescription: Show status of Kubernetes resources at a glance.
  homepage: https://github.com/bergerx/kubectl-status
  caveats: |
    Usage:
      $ kubectl status

    For additional options:
      $ kubectl status --help

  description: |
    Shows the status of any Kubernetes resource in one command, in place of
    separate get/describe calls. Most useful when debugging why a resource
    isn't healthy.
