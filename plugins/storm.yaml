apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: storm
spec:
  version: v0.2.0
  homepage: https://github.com/guilhem/kubectl-storm
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/guilhem/kubectl-storm/releases/download/v0.2.0/kubectl-storm_v0.2.0_darwin_amd64.tar.gz
    sha256: f64b82040f99eab1c44609e28b81a49175f2f88b5009abb2136df18a3d5d0a54
    bin: kubectl-storm
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/guilhem/kubectl-storm/releases/download/v0.2.0/kubectl-storm_v0.2.0_darwin_arm64.tar.gz
    sha256: 7fab94297295b7e073e891909e266cd86c8631cf2cb4f737d5ddff85adf814e0
    bin: kubectl-storm
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/guilhem/kubectl-storm/releases/download/v0.2.0/kubectl-storm_v0.2.0_linux_amd64.tar.gz
    sha256: 94003963fde53ffe1bf6fee0b3d0184783c2c6ccdf62d06db76199f79950b018
    bin: kubectl-storm
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/guilhem/kubectl-storm/releases/download/v0.2.0/kubectl-storm_v0.2.0_linux_arm64.tar.gz
    sha256: 1b3434f2a6c3e28715c16327ac9d5cf3a3696b77723fdd40a2a42087ea9f42b4
    bin: kubectl-storm
  shortDescription: Monitor and diff excessive Kubernetes resource changes.
  description: |
    Monitor and diff excessive Kubernetes resource changes.
    By default it detects rapid metadata.resourceVersion updates, including status and metadata write storms.
    It can also monitor metadata.generation changes to focus on spec updates.
    The tool supports resource include/exclude filters and uses a terminal interface to display affected resources, change counts, and cleaned diffs.
