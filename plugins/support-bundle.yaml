apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: support-bundle
spec:
  version: v0.126.1
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.126.1/support-bundle_linux_amd64.tar.gz
    sha256: 76640a85746ea42c958bba6aa8e77c83c0fe8a53aa0c3b0c4e24ab8b290a6f36
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.126.1/support-bundle_linux_arm64.tar.gz
    sha256: 4e56face5cfa9c36aa08e7528cb5febe36f6a01c28c53f45b54f22abbe207ce7
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.126.1/support-bundle_linux_arm.tar.gz
    sha256: e211574eccdde0bbd389774cafa736a5c0615f2992d0ec00ac6f83dce14c77e2
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.126.1/support-bundle_darwin_all.tar.gz
    sha256: 571b7d9ac16b2209c8d5ac7635e75a8fc40b14a448a1cf64c48fe154c66e18b0
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.126.1/support-bundle_darwin_all.tar.gz
    sha256: 571b7d9ac16b2209c8d5ac7635e75a8fc40b14a448a1cf64c48fe154c66e18b0
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  shortDescription: Creates support bundles for off-cluster analysis
  homepage: https://github.com/replicatedhq/troubleshoot
  description: |
    This plugin collects information about the cluster, and automatically
    redacts sensitive data from being collected. This can optionally include
    application-specific data.  The plugin writes the collected files into a
    single archive named support-bundle.tar.gz. This archive can be manually
    inspected or uploaded to https://vendor.replicated.com for automated
    analysis.

    Application developers can create and host a Collector manifest that
    defines information to be collected.

    For information on creating a Collector manifest, view the documentation
    at https://help.replicated.com/docs/troubleshoot/kubernetes/collectors/defining-collectors/

    Usage:
      $ kubectl support-bundle <uri>

      where <uri> references a set of application collectors

      For example:

      $ kubectl support-bundle https://troubleshoot.replicated.com

    For additional options:
      $ kubectl support-bundle --help

    Documentation:
      Full documentation on this plugin is available at:
      https://help.replicated.com/docs/troubleshoot/kubernetes/support-bundle/overview/

      For application developers writing collectors and analyzers:
      https://help.replicated.com/docs/troubleshoot/kubernetes/collectors/defining-collectors/
