apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: support-bundle
spec:
  version: v0.130.0
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.130.0/support-bundle_linux_amd64.tar.gz
    sha256: b4e91c84266ffa39720066fbb5bab8d43dd047509b4507d0f554188cc8ce4049
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.130.0/support-bundle_linux_arm64.tar.gz
    sha256: 937623accf7b2dab8e1277eafb143cbc8d51d9de0d4fdad804a7ebcc720266a2
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.130.0/support-bundle_linux_arm.tar.gz
    sha256: 210095ad9ed5b4b1439042cb3ec3e4b7f12077b02c443b7c4a1218e10aaac727
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.130.0/support-bundle_darwin_all.tar.gz
    sha256: 9b045206fe284d5feef3ee824d662a4bc9d2e254f21f0e6ae768d3283b59b31a
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.130.0/support-bundle_darwin_all.tar.gz
    sha256: 9b045206fe284d5feef3ee824d662a4bc9d2e254f21f0e6ae768d3283b59b31a
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  shortDescription: Creates support bundles for off-cluster analysis
  homepage: https://github.com/replicatedhq/troubleshoot
  description: |
    This plugin collects information about the cluster, and automatically
    redacts sensitive data from being collected. This can optionally include
    application-specific data.  The plugin writes the collected files into a
    single archive named support-bundle.tar.gz. This archive can be manually
    inspected or uploaded to https://vendor.replicated.com for automated
    analysis.

    Application developers can create and host a Collector manifest that
    defines information to be collected.

    For information on creating a Collector manifest, view the documentation
    at https://help.replicated.com/docs/troubleshoot/kubernetes/collectors/defining-collectors/

    Usage:
      $ kubectl support-bundle <uri>

      where <uri> references a set of application collectors

      For example:

      $ kubectl support-bundle https://troubleshoot.replicated.com

    For additional options:
      $ kubectl support-bundle --help

    Documentation:
      Full documentation on this plugin is available at:
      https://help.replicated.com/docs/troubleshoot/kubernetes/support-bundle/overview/

      For application developers writing collectors and analyzers:
      https://help.replicated.com/docs/troubleshoot/kubernetes/collectors/defining-collectors/
