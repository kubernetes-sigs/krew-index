apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: support-bundle
spec:
  version: v0.130.1
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.130.1/support-bundle_linux_amd64.tar.gz
    sha256: 9198aa39f08cf7878458d70291e992d5bafafdc2bfb70563865859a93a3f0332
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.130.1/support-bundle_linux_arm64.tar.gz
    sha256: b90e7e73e60520f8944ba011f280dfe64ca8e447fadef9c4fdfce88ff9412551
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.130.1/support-bundle_linux_arm.tar.gz
    sha256: c2c96bf2283c6ad36fe9709d08ae8fdfae719a7a74a94a20fa520655d3df20fe
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.130.1/support-bundle_darwin_all.tar.gz
    sha256: 8dd647e29eb9f6c730a43a3756d706e9eecf6f410aaf7f9e9a7c28cfbdfa1ce3
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.130.1/support-bundle_darwin_all.tar.gz
    sha256: 8dd647e29eb9f6c730a43a3756d706e9eecf6f410aaf7f9e9a7c28cfbdfa1ce3
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  shortDescription: Creates support bundles for off-cluster analysis
  homepage: https://github.com/replicatedhq/troubleshoot
  description: |
    This plugin collects information about the cluster, and automatically
    redacts sensitive data from being collected. This can optionally include
    application-specific data.  The plugin writes the collected files into a
    single archive named support-bundle.tar.gz. This archive can be manually
    inspected or uploaded to https://vendor.replicated.com for automated
    analysis.

    Application developers can create and host a Collector manifest that
    defines information to be collected.

    For information on creating a Collector manifest, view the documentation
    at https://help.replicated.com/docs/troubleshoot/kubernetes/collectors/defining-collectors/

    Usage:
      $ kubectl support-bundle <uri>

      where <uri> references a set of application collectors

      For example:

      $ kubectl support-bundle https://troubleshoot.replicated.com

    For additional options:
      $ kubectl support-bundle --help

    Documentation:
      Full documentation on this plugin is available at:
      https://help.replicated.com/docs/troubleshoot/kubernetes/support-bundle/overview/

      For application developers writing collectors and analyzers:
      https://help.replicated.com/docs/troubleshoot/kubernetes/collectors/defining-collectors/
