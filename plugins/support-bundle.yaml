apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: support-bundle
spec:
  version: v0.129.3
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.129.3/support-bundle_linux_amd64.tar.gz
    sha256: 6285f937955284beb56997161fc0c9b32d480e17dd1d2fcbd8479c28abe9c7c6
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.129.3/support-bundle_linux_arm64.tar.gz
    sha256: 0f598acc796c41c52243bcfdbe3d2e4c0c163d921eb1b85086999415006e42f6
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: linux
        arch: arm
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.129.3/support-bundle_linux_arm.tar.gz
    sha256: 467e0d4da10cfdea5abe24bb8a5ab16e945cd2428a65ec5dd24874c1285c23d7
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.129.3/support-bundle_darwin_all.tar.gz
    sha256: 8d1dfc18c7f7b9a4287e0067211aa4b89c0277ff55761a4bd587a9a15d784492
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
      to: .
    bin: support-bundle
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/replicatedhq/troubleshoot/releases/download/v0.129.3/support-bundle_darwin_all.tar.gz
    sha256: 8d1dfc18c7f7b9a4287e0067211aa4b89c0277ff55761a4bd587a9a15d784492
    files:
    - from: support-bundle
      to: .
    - from: LICENSE
