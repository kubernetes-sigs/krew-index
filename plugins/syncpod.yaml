apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: syncpod
spec:
  version: v1.0.8
  homepage: https://github.com/hashmap-kz/kubectl-syncpod
  shortDescription: High-Speed File Transfer to and from PVCs
  description: |
    Small utility that mounts PVCs using a temporary helper pod
    and transfers files via high-performance SFTP, without impacting
    application containers or requiring in-container tools.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.8/kubectl-syncpod_v1.0.8_darwin_amd64.tar.gz
    sha256: 347a69d3acb48af9d401897a60b2207de298c0203e10a0a597b85164ecfa4740
    bin: kubectl-syncpod
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.8/kubectl-syncpod_v1.0.8_darwin_arm64.tar.gz
    sha256: 30dd2a3b9525a26b27579ad92795e183b5dff2a5837c916041fa6fb047aa17cb
    bin: kubectl-syncpod
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.8/kubectl-syncpod_v1.0.8_linux_amd64.tar.gz
    sha256: 1d80cf3f8114c65e23de8bebff91eab437d66c28e43d9f6053299862f4899127
    bin: kubectl-syncpod
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.8/kubectl-syncpod_v1.0.8_linux_arm64.tar.gz
    sha256: d4079a0cd9fc61446f891a60443d8521dc30130e0a552485039fafb2c539e6b4
    bin: kubectl-syncpod
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.8/kubectl-syncpod_v1.0.8_windows_amd64.tar.gz
    sha256: 7808893f3415b1f0300f8585e8240d3eabf65970631f3614888bbfd9323058a9
    bin: kubectl-syncpod.exe
