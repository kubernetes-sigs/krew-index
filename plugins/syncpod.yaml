apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: syncpod
spec:
  version: v1.0.7
  homepage: https://github.com/hashmap-kz/kubectl-syncpod
  shortDescription: High-Speed File Transfer to and from PVCs
  description: |
    Small utility that mounts PVCs using a temporary helper pod 
    and transfers files via high-performance SFTP, without impacting 
    application containers or requiring in-container tools.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.7/kubectl-syncpod_v1.0.7_darwin_amd64.tar.gz
    sha256: 3da12c952a96e3a11fac95cfa8ee8debffefb29689b794fe9ee098edd6fd73d7
    bin: kubectl-syncpod
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.7/kubectl-syncpod_v1.0.7_darwin_arm64.tar.gz
    sha256: 44fb01d27186693906bad2b7913ad1f81f27254ac2cd9ef5eac74f7222eaa64d
    bin: kubectl-syncpod
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.7/kubectl-syncpod_v1.0.7_linux_amd64.tar.gz
    sha256: 59e40af97310c99717b639fd35d8d1ad8e7739bc702965e79230aaec6d14fda0
    bin: kubectl-syncpod
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.7/kubectl-syncpod_v1.0.7_linux_arm64.tar.gz
    sha256: dff7ef0300fe6e9b79b1333f2e0d41116e98492c3e46030c51d7be39d3242810
    bin: kubectl-syncpod
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.7/kubectl-syncpod_v1.0.7_windows_amd64.tar.gz
    sha256: 3c1286a660e8c4e9bd2734a9565ac6c6782ff6467a0b02dc9b1fb622b6d92fc2
    bin: kubectl-syncpod.exe
