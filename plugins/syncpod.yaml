apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: syncpod
spec:
  version: v1.0.6
  homepage: https://github.com/hashmap-kz/kubectl-syncpod
  shortDescription: High-Speed File Transfer to and from PVCs
  description: |
    Small utility that mounts PVCs using a temporary helper pod 
    and transfers files via high-performance SFTP, without impacting 
    application containers or requiring in-container tools.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.6/kubectl-syncpod_v1.0.6_darwin_amd64.tar.gz
    sha256: db7e8891d71cfcd7f46d17d996c130bbd6e62adf497513b1570cd0b84659691c
    bin: kubectl-syncpod
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.6/kubectl-syncpod_v1.0.6_darwin_arm64.tar.gz
    sha256: 35c7df54ca9ddf455c7b15a83a8366fa9a34a650fa22d75d6f606ed795db3156
    bin: kubectl-syncpod
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.6/kubectl-syncpod_v1.0.6_linux_amd64.tar.gz
    sha256: 408991f603031488e878ce2782cd0794a90e795bcdf0afed2e61cd4ec96a1b3e
    bin: kubectl-syncpod
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.6/kubectl-syncpod_v1.0.6_linux_arm64.tar.gz
    sha256: 3b622a3140b7451d229f6584b198490b3a867abf6ba02510a94841fe4500c526
    bin: kubectl-syncpod
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/hashmap-kz/kubectl-syncpod/releases/download/v1.0.6/kubectl-syncpod_v1.0.6_windows_amd64.tar.gz
    sha256: c90385951ea1e57948d27ff7fda7a53c4829f243e5cdb791683bb45258f51eb9
    bin: kubectl-syncpod.exe
