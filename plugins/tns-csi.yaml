apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: tns-csi
spec:
  version: v0.5.1
  homepage: https://github.com/fenio/tns-csi
  shortDescription: Manage TrueNAS CSI volumes
  description: |
    kubectl plugin for managing TrueNAS CSI driver volumes.

    Commands:
    - list: List all managed volumes with clone relationships
    - list-snapshots: List snapshots with source volumes
    - list-orphaned: Find volumes without matching PVCs
    - describe: Show detailed volume information
    - health: Check health of all volumes
    - troubleshoot: Diagnose PVC issues
    - summary: Dashboard overview of all resources
    - cleanup: Delete orphaned volumes safely
    - mark-adoptable: Mark volumes for DR/adoption
    - adopt: Generate PV manifest for adoption
    - status: Show volume status from TrueNAS
    - connectivity: Test TrueNAS connection
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.1/kubectl-tns_csi-linux-amd64.tar.gz
    sha256: 3bf7916856495e8452fcf284c9501cab67f69e950653b34a0901463f6dcd5180
    bin: kubectl-tns_csi
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.1/kubectl-tns_csi-linux-arm64.tar.gz
    sha256: f79bed5a5f6a3e7e66b6cb1db5ffa814704b9407f5408dabde567ada9167c04b
    bin: kubectl-tns_csi
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.1/kubectl-tns_csi-darwin-amd64.tar.gz
    sha256: 4d0e52f6b27544d0eead6a8c2ad0b5b274a626ef0610408573ba2b36da4a729b
    bin: kubectl-tns_csi
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.1/kubectl-tns_csi-darwin-arm64.tar.gz
    sha256: df68b99c9f1bc59d78ad71eec4ff300544302a4313d338090ed275aa65edfaf2
    bin: kubectl-tns_csi
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.1/kubectl-tns_csi-windows-amd64.zip
    sha256: 1615b9f9074a5195df78d2548871f03b5ffcd933ce4515fee896554c592b4d4c
    bin: kubectl-tns_csi.exe
