apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: tns-csi
spec:
  version: v0.5.4
  homepage: https://github.com/fenio/tns-csi
  shortDescription: Manage TrueNAS CSI volumes
  description: |
    kubectl plugin for managing TrueNAS CSI driver volumes.

    Commands:
    - list: List all managed volumes with clone relationships
    - list-snapshots: List snapshots with source volumes
    - list-orphaned: Find volumes without matching PVCs
    - describe: Show detailed volume information
    - health: Check health of all volumes
    - troubleshoot: Diagnose PVC issues
    - summary: Dashboard overview of all resources
    - cleanup: Delete orphaned volumes safely
    - mark-adoptable: Mark volumes for DR/adoption
    - adopt: Generate PV manifest for adoption
    - status: Show volume status from TrueNAS
    - connectivity: Test TrueNAS connection
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.4/kubectl-tns_csi-linux-amd64.tar.gz
    sha256: 0c1dda7d862ebeee105b2a00e4020fb2ac9d2017385e1f08dd93d01a96fb8e6a
    bin: kubectl-tns_csi
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.4/kubectl-tns_csi-linux-arm64.tar.gz
    sha256: 34e88a58331fc516b8b7f3dff8d171372ee1908cf41a2191cd203fe02ba484ef
    bin: kubectl-tns_csi
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.4/kubectl-tns_csi-darwin-amd64.tar.gz
    sha256: d2a4ff50757357bdef2f9fb2cbb9cc7e4f3ff8a6ffa5b7d636b9735926eb929e
    bin: kubectl-tns_csi
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.4/kubectl-tns_csi-darwin-arm64.tar.gz
    sha256: cfd6371d5477c1c402040e7cfbc7dc74b40743d0fb7e422916e26f7f998536e2
    bin: kubectl-tns_csi
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.4/kubectl-tns_csi-windows-amd64.zip
    sha256: 4e2041ffa3420a81388fc6f87cfd8d3796223013f372124a674ab6a6fa2f2fd5
    bin: kubectl-tns_csi.exe
