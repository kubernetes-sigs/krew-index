apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: tns-csi
spec:
  version: v0.5.2
  homepage: https://github.com/fenio/tns-csi
  shortDescription: Manage TrueNAS CSI volumes
  description: |
    kubectl plugin for managing TrueNAS CSI driver volumes.

    Commands:
    - list: List all managed volumes with clone relationships
    - list-snapshots: List snapshots with source volumes
    - list-orphaned: Find volumes without matching PVCs
    - describe: Show detailed volume information
    - health: Check health of all volumes
    - troubleshoot: Diagnose PVC issues
    - summary: Dashboard overview of all resources
    - cleanup: Delete orphaned volumes safely
    - mark-adoptable: Mark volumes for DR/adoption
    - adopt: Generate PV manifest for adoption
    - status: Show volume status from TrueNAS
    - connectivity: Test TrueNAS connection
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.2/kubectl-tns_csi-linux-amd64.tar.gz
    sha256: 4dc02d3da9d084915f6531d8f0c8d54c90c7d6789bb8de081d82757a5926f181
    bin: kubectl-tns_csi
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.2/kubectl-tns_csi-linux-arm64.tar.gz
    sha256: fc1a7b3ea16db44c7f34a7a89d1527f707c3818080133be797748fe647e722aa
    bin: kubectl-tns_csi
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.2/kubectl-tns_csi-darwin-amd64.tar.gz
    sha256: da1dd8227a1fcb88e95104d1b910d9ae27601b578b9037f4fbc9256b205eba87
    bin: kubectl-tns_csi
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.2/kubectl-tns_csi-darwin-arm64.tar.gz
    sha256: b7a7b7c686748f7d6465b55257f11991208ffa170abe6a2ebf9478af84de7e63
    bin: kubectl-tns_csi
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/fenio/tns-csi/releases/download/plugin-v0.5.2/kubectl-tns_csi-windows-amd64.zip
    sha256: fbbe18981ded5ec64c801567cdaa8174fcaccb57ff910d822b1bc3dfc643ffc1
    bin: kubectl-tns_csi.exe
