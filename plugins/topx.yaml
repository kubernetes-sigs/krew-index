apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: topx
spec:
  version: v1.2.6
  homepage: https://github.com/mms-gianni/kubectl-topx
  shortDescription: Monitor CPU and memory resources in real-time
  description: |
    kubectl-topx is a Kubernetes CLI tool for monitoring CPU and memory 
    resources (requests, limits, and actual usage) in real-time.
    
    Features:
    - Shows CPU and memory requests, limits, and current usage
    - Live updates with configurable refresh intervals
    - Progress bars for visual representation
    - Color-coded output based on usage level
    - Historical metrics with visual histograms
    
    Prerequisites:
    - Metrics Server must be installed in your Kubernetes cluster
  caveats: |
    This plugin requires the Metrics Server to be installed in your cluster.
    
    Install Metrics Server:
      kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
    
    Usage:
      kubectl topx                    # Monitor current namespace
      kubectl topx -w                 # Display additional columns (requests, limits)
      kubectl topx -i 5                # Refresh every 5 seconds
      kubectl topx -A                 # Monitor all namespaces
      kubectl topx -n <namespace>     # Monitor specific namespace
      kubectl topx -t                 # Show historical metrics
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mms-gianni/kubectl-topx/releases/download/v1.2.6/kubectl-topx-v1.2.6-linux-amd64.tar.gz
    sha256: 2bc740815c22ec7fc2c9033630a3e634c02df435f331fd3c83bb6681ee1f3605
    bin: kubectl-topx
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mms-gianni/kubectl-topx/releases/download/v1.2.6/kubectl-topx-v1.2.6-darwin-amd64.tar.gz
    sha256: ae9900d51d79764a8c464e3fee4f7422832658b5b909508194b02aa97ba74a00
    bin: kubectl-topx
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mms-gianni/kubectl-topx/releases/download/v1.2.6/kubectl-topx-v1.2.6-darwin-arm64.tar.gz
    sha256: bef60ec1a4fe06f12b36b02f2f21dbbd9b1ce444927efc8481e7da11e158b518
    bin: kubectl-topx
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mms-gianni/kubectl-topx/releases/download/v1.2.6/kubectl-topx-v1.2.6-windows-amd64.zip
    sha256: 2ff87ff46477243846d48495b1e31b58909c8ba04a7f76025623637d4f4f247a
    bin: kubectl-topx.exe
