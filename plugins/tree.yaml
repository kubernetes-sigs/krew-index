apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: tree
spec:
  version: v0.6.0
  homepage: https://github.com/ahmetb/kubectl-tree
  shortDescription: Show a tree of object hierarchies through ownerReferences
  description: |
    This plugin shows sub-resources of a specified Kubernetes API object in a
    tree view in the command-line. The parent-child relationship is discovered
    using ownerReferences on the child object.
  caveats: |
    * For resources that are not in default namespace, currently you must
      specify -n/--namespace explicitly (the current namespace setting is not
      yet used).
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/ahmetb/kubectl-tree/releases/download/v0.6.0/kubectl-tree_v0.6.0_darwin_amd64.tar.gz
    sha256: a59f41c46bdd5505ad71b5f649c8094f05c7fd14f7b0ecd7af2edfb727f84045
    bin: kubectl-tree
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/ahmetb/kubectl-tree/releases/download/v0.6.0/kubectl-tree_v0.6.0_darwin_arm64.tar.gz
    sha256: 748bfab7e212dfe244c13a643cfc627ce54968bdf81af22b851fb1068f32cf9f
    bin: kubectl-tree
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/ahmetb/kubectl-tree/releases/download/v0.6.0/kubectl-tree_v0.6.0_linux_amd64.tar.gz
    sha256: 6d047927abf0e973a8b825838cb40159012ff917f48b9064075b64fd6dafac42
    bin: kubectl-tree
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/ahmetb/kubectl-tree/releases/download/v0.6.0/kubectl-tree_v0.6.0_linux_arm64.tar.gz
    sha256: 9571870ed2a5c7e60c5e7a10afe2b06b4f5d1ccd912649477ad159dac72634db
    bin: kubectl-tree
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/ahmetb/kubectl-tree/releases/download/v0.6.0/kubectl-tree_v0.6.0_windows_amd64.tar.gz
    sha256: e069f1b5542e4372cdf819b1c8960eb3889dcca635953a57a9d51e953bf9dcb1
    bin: kubectl-tree.exe
