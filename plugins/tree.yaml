apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: tree
spec:
  version: v0.5.0
  homepage: https://github.com/ahmetb/kubectl-tree
  shortDescription: Show a tree of object hierarchies through ownerReferences
  description: |
    This plugin shows sub-resources of a specified Kubernetes API object in a
    tree view in the command-line. The parent-child relationship is discovered
    using ownerReferences on the child object.
  caveats: |
    * For resources that are not in default namespace, currently you must
      specify -n/--namespace explicitly (the current namespace setting is not
      yet used).
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/ahmetb/kubectl-tree/releases/download/v0.5.0/kubectl-tree_v0.5.0_darwin_amd64.tar.gz
    sha256: 809836f785a3dc5f7c9ae9626766350e3ab9afdb3d24418c3e38099d5e72bb89
    bin: kubectl-tree
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/ahmetb/kubectl-tree/releases/download/v0.5.0/kubectl-tree_v0.5.0_darwin_arm64.tar.gz
    sha256: f5005f958a6178f6f08cdf3d16d1e3f0879a099256ba445c298b2f3b9a275f0b
    bin: kubectl-tree
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/ahmetb/kubectl-tree/releases/download/v0.5.0/kubectl-tree_v0.5.0_linux_amd64.tar.gz
    sha256: 04494d2b67b730ab6a9c9b0b3504673f7cd0818f30d5b96874e671a2eff46025
    bin: kubectl-tree
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/ahmetb/kubectl-tree/releases/download/v0.5.0/kubectl-tree_v0.5.0_linux_arm64.tar.gz
    sha256: 92d958cb83601d5b4ea46752166397aa048f64a3c5bbc7176d74e972eb9a9532
    bin: kubectl-tree
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/ahmetb/kubectl-tree/releases/download/v0.5.0/kubectl-tree_v0.5.0_windows_amd64.tar.gz
    sha256: ed73d5cdd7e6b1992b6758dfbce39bd97d6da270bd3e862e43af072f0b1ee3b8
    bin: kubectl-tree.exe
