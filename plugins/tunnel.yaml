apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: tunnel
spec:
  version: v3.0.0
  homepage: https://github.com/appmana/ktunnel
  shortDescription: Reverse tunneling between cluster and your machine
  description: |
      This plugin establishes a reverse tunnel between the Kubernetes cluster
      and your local machine. It lets you expose your machine as a service in
      the cluster or expose it to a specific deployment as a local host.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/appmana/ktunnel/releases/download/v3.0.0/ktunnel_3.0.0_Darwin_x86_64.tar.gz
    sha256: 31e94bc15744dc6946579e017ccd62f09c949fd9ff01dcf91f3b4ad27af2e423
    bin: ktunnel
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/appmana/ktunnel/releases/download/v3.0.0/ktunnel_3.0.0_Darwin_arm64.tar.gz
    sha256: be954ec2f45811de75c55b09d16bde539ac6c05ca6f01084d28f960dd27e8da8
    bin: ktunnel
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/appmana/ktunnel/releases/download/v3.0.0/ktunnel_3.0.0_Linux_x86_64.tar.gz
    sha256: 0ee80896df9f7deb01fd49e249a2b4b7b4a47cafd465f4e09c8c70485bcfcd48
    bin: ktunnel
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/appmana/ktunnel/releases/download/v3.0.0/ktunnel_3.0.0_Linux_arm64.tar.gz
    sha256: 89259b9e42672f706001c76c54a75d4ca9a540faf12f1cee47cd433ec3e2f419
    bin: ktunnel
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/appmana/ktunnel/releases/download/v3.0.0/ktunnel_3.0.0_Windows_x86_64.tar.gz
    sha256: bf4bcf7dad507c5a7796c354966b6c9b80ed59c3bd27b8d6656ab2830e82f0a4
    bin: ktunnel.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/appmana/ktunnel/releases/download/v3.0.0/ktunnel_3.0.0_Windows_arm64.tar.gz
    sha256: 79bf560dd924954cca43ffdb504f67fa430d0cabeb57440305e8da8c4d60147b
    bin: ktunnel.exe

