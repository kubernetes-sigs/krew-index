        arch: amd64
    uri: https://github.com/oam-dev/kubevela/releases/download/v1.11.0/kubectl-vela-v1.11.0-darwin-amd64.tar.gz
    sha256: f5c8b65f915a1233ff062f736944b17c84ab1c93eb40adfc25b708431de5784e
