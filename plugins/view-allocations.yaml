apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: view-allocations
spec:
  version: "v1.1.0"
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/davidB/kubectl-view-allocations/releases/download/1.1.0/kubectl-view-allocations_1.1.0-x86_64-apple-darwin.tar.gz
      sha256: 9997c0c1fb58f4be20d204eb60a4f26d993e7e44d94e09cf399bdc9751766154
      bin: "./kubectl-view-allocations"
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/davidB/kubectl-view-allocations/releases/download/1.1.0/kubectl-view-allocations_1.1.0-aarch64-apple-darwin.tar.gz
      sha256: 85aa919e473aec6abf8707b340e8d1ccb107b540e4c581544a2d8dd91b0b8490
      bin: "./kubectl-view-allocations"
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/davidB/kubectl-view-allocations/releases/download/1.1.0/kubectl-view-allocations_1.1.0-x86_64-unknown-linux-musl.tar.gz
      sha256: 47ef3333f9845aab19a619ddce33e84ed5f2a0cd4ece5473377d9f16189fd210
      bin: "./kubectl-view-allocations"
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/davidB/kubectl-view-allocations/releases/download/1.1.0/kubectl-view-allocations_1.1.0-aarch64-unknown-linux-musl.tar.gz
      sha256: 0d5f29d0d6d199d479a4a3af779ca0f35b2951086783d5d76f667c65cc9a8d8f
      bin: "./kubectl-view-allocations"
  shortDescription: List allocations per resources, nodes, pods.
  homepage: https://github.com/davidB/kubectl-view-allocations
  description: |
    This plugin lists resources (cpu, memory, gpu,...) allocations (requested,
    limit, allocatable) as defined in the manifest of nodes and running pods,
    and utilization from metrics-server.
    try `kubectl view-allocations -h`, `kubectl view-allocations`
