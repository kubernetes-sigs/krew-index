apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: view-allocations
spec:
  version: "v3.0.1"
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/davidB/kubectl-view-allocations/releases/download/3.0.1/kubectl-view-allocations_3.0.1-x86_64-apple-darwin.tar.gz
      sha256: 88bd0a9ecb23e002b22986ce7f60e95184397307bb6e6be2843df159aae28f3a
      bin: "./kubectl-view-allocations"
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/davidB/kubectl-view-allocations/releases/download/3.0.1/kubectl-view-allocations_3.0.1-aarch64-apple-darwin.tar.gz
      sha256: b0591937c08fc82f962e1a4a92b40b9e3ca8ce7e5d74f6bbe9535ab2e0082b05
      bin: "./kubectl-view-allocations"
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/davidB/kubectl-view-allocations/releases/download/3.0.1/kubectl-view-allocations_3.0.1-x86_64-unknown-linux-musl.tar.gz
      sha256: e2a12809e775e50d16b21284b4b36d7e0bdf6b6640b8083afa2eeaa12b52a44a
      bin: "./kubectl-view-allocations"
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/davidB/kubectl-view-allocations/releases/download/3.0.1/kubectl-view-allocations_3.0.1-aarch64-unknown-linux-musl.tar.gz
      sha256: 8e42ade254c8f78be19a9ac143f20d9456b2434659625f811628ff2b2ff1cf5a
      bin: "./kubectl-view-allocations"
  shortDescription: List allocations per resources, nodes, pods.
  homepage: https://github.com/davidB/kubectl-view-allocations
  description: |
    This plugin lists resources (cpu, memory, gpu,...) allocations (requested,
    limit, allocatable) as defined in the manifest of nodes and running pods,
    and utilization from metrics-server.
    try `kubectl view-allocations -h`, `kubectl view-allocations`
