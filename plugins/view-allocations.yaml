apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: view-allocations
spec:
  version: "v3.0.2"
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/davidB/kubectl-view-allocations/releases/download/3.0.2/kubectl-view-allocations_3.0.2-x86_64-apple-darwin.tar.gz
      sha256: cfa934e48b23dd98b85b92dbce3e51fc0984f13604691a5af6b92c66db82bddc
      bin: "./kubectl-view-allocations"
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/davidB/kubectl-view-allocations/releases/download/3.0.2/kubectl-view-allocations_3.0.2-aarch64-apple-darwin.tar.gz
      sha256: 11ac5605d62933f36b38d8070e8c859b8ca807b9a2e7472ccbddd36cd59e2775
      bin: "./kubectl-view-allocations"
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/davidB/kubectl-view-allocations/releases/download/3.0.2/kubectl-view-allocations_3.0.2-x86_64-unknown-linux-musl.tar.gz
      sha256: 6968eb7a9204e436ec7d3e131b6d5c8ae14c87fa1c208d8da18f9cae19485943
      bin: "./kubectl-view-allocations"
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/davidB/kubectl-view-allocations/releases/download/3.0.2/kubectl-view-allocations_3.0.2-aarch64-unknown-linux-musl.tar.gz
      sha256: 83fb963de12f19310dfea450a14014801b8a788e671fa28c715c0063902b1465
      bin: "./kubectl-view-allocations"
  shortDescription: List allocations per resources, nodes, pods.
  homepage: https://github.com/davidB/kubectl-view-allocations
  description: |
    This plugin lists resources (cpu, memory, gpu,...) allocations (requested,
    limit, allocatable) as defined in the manifest of nodes and running pods,
    and utilization from metrics-server.
    try `kubectl view-allocations -h`, `kubectl view-allocations`
