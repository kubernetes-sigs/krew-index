apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: view-secret
spec:
  version: v0.16.0
  homepage: https://github.com/elsesiy/kubectl-view-secret
  shortDescription: Decode Kubernetes secrets
  description: |+2
    Base64 decode by key or all key/value pairs in a given secret.

    # print secret keys
    $ kubectl view-secret <secret>

    # decode specific entry
    $ kubectl view-secret <secret> <key>

    # decode all secret contents
    $ kubectl view-secret <secret> -a/--all

    # print keys for secret in different namespace
    $ kubectl view-secret <secret> -n/--namespace foo

    # print keys for secret in different context
    $ kubectl view-secret <secret> -c/--context ctx

    # print keys for secret by providing kubeconfig
    $ kubectl view-secret <secret> -k/--kubeconfig <cfg>

    # suppress info output
    $ kubectl view-secret <secret> -q/--quiet
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/elsesiy/kubectl-view-secret/releases/download/v0.16.0/kubectl-view-secret_v0.16.0_darwin_amd64.tar.gz
    sha256: 090d96a5a9728171ecebba42a15ab2c7835d3b63fb4fdc6d76e615ea0b7fb7e1
    bin: kubectl-view-secret
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/elsesiy/kubectl-view-secret/releases/download/v0.16.0/kubectl-view-secret_v0.16.0_darwin_arm64.tar.gz
    sha256: 53ab023f7b60396c790a396f6a3bc33e173b5ebf14081cfac18354a0d23264d4
    bin: kubectl-view-secret
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/elsesiy/kubectl-view-secret/releases/download/v0.16.0/kubectl-view-secret_v0.16.0_linux_amd64.tar.gz
    sha256: dad8f7d257e17e0a382f139bd756cdb437268d77973ad8ba3c55b346ce5bdd92
    bin: kubectl-view-secret
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/elsesiy/kubectl-view-secret/releases/download/v0.16.0/kubectl-view-secret_v0.16.0_linux_arm64.tar.gz
    sha256: 04644e43378f74a09cf60a081759e8b8bbe8281924c0dc20dab31e9d00ab0f37
    bin: kubectl-view-secret
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/elsesiy/kubectl-view-secret/releases/download/v0.16.0/kubectl-view-secret_v0.16.0_windows_amd64.tar.gz
    sha256: 5e1401d5438524b93661cb360d3763967bfd9a9bc00ed859783e03dec09915a1
    bin: kubectl-view-secret.exe
