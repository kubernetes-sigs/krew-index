apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: viewnode
spec:
  version: v0.9.6
  homepage: https://github.com/NTTDATA-DACH/viewnode
  shortDescription: Displays nodes with their pods and containers and provides metrics for resources
  description: |
    This plugin displays nodes with their pods and containers.
    It provides information about requested and used resources, e.g. memory.
    It supports filtering of nodes and pods.
    It is very useful when you need to monitor multiple resources like nodes, pods or containers
    in a dynamic environment like a CI/CD platform where pods live and die frequently.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v0.9.6/viewnode_v0.9.6_darwin_amd64.tar.gz
      sha256: 40a8428f40210919ffd5370b7c595b9fdf953a85c72bb98e855effee418a53d8
      bin: viewnode
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v0.9.6/viewnode_v0.9.6_darwin_arm64.tar.gz
      sha256: e5eb687d0cc317357814814a54047645de37b307d42e78e9eb9b22c7fd36a6d1
      bin: viewnode
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v0.9.6/viewnode_v0.9.6_linux_amd64.tar.gz
      sha256: 939f196e40e05a39c77aa4f29b8c07952d0b21f68a23ee9987aec032e63b97c9
      bin: viewnode
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v0.9.6/viewnode_v0.9.6_windows_amd64.tar.gz
      sha256: fedd3302ca8f706d6ef72e77ea913ed234053e466d400cfea09caaf9dc6af298
      bin: viewnode.exe