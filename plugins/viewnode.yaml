apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: viewnode
spec:
  version: v1.4.5
  homepage: https://github.com/NTTDATA-DACH/viewnode
  shortDescription: Displays nodes with their pods and containers and provides metrics for resources
  description: |
    This plugin displays nodes with their pods and containers.
    It provides information about requested and used resources, e.g. memory.
    It supports filtering of nodes and pods.
    It is very useful when you need to monitor multiple resources like nodes, pods or containers
    in a dynamic environment like a CI/CD platform where pods live and die frequently.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.4.5/viewnode_v1.4.5_darwin_amd64.tar.gz
      sha256: 0e9656cd29efd97be951b80ac3dc287431e34c3c525abe621797d43077ddafe0
      bin: viewnode
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.4.5/viewnode_v1.4.5_darwin_arm64.tar.gz
      sha256: a990df8905654a3e2f73fc96834501e8e59843ee6655cd69eb35e4e8a2bb9014
      bin: viewnode
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.4.5/viewnode_v1.4.5_linux_amd64.tar.gz
      sha256: 31aaa0930723fd0f9679b77f106844559b784088ebf77788de54978d164a7e4c
      bin: viewnode
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.4.5/viewnode_v1.4.5_windows_amd64.tar.gz
      sha256: e9dc8c3b24440842003c42ecb1a818f04b9624b31f1c9dd3a676044c3364aee7
      bin: viewnode.exe