apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: viewnode
spec:
  version: v1.0.0
  homepage: https://github.com/NTTDATA-DACH/viewnode
  shortDescription: Displays nodes with their pods and containers and provides metrics for resources
  description: |
    This plugin displays nodes with their pods and containers.
    It provides information about requested and used resources, e.g. memory.
    It supports filtering of nodes and pods.
    It is very useful when you need to monitor multiple resources like nodes, pods or containers
    in a dynamic environment like a CI/CD platform where pods live and die frequently.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.0.0/viewnode_v1.0.0_darwin_amd64.tar.gz
      sha256: 4bee422f731f9deb94dfffbb5efe3849ab84dd813c7dbc3507b999ee8dcf3b56
      bin: viewnode
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.0.0/viewnode_v1.0.0_darwin_arm64.tar.gz
      sha256: 139fb6483f4d9ba5402f828c403a5cfc677d08dc19c5c1f70ec70831bd58ee7c
      bin: viewnode
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.0.0/viewnode_v1.0.0_linux_amd64.tar.gz
      sha256: 81f5ddbd59f40ba3e05bc3919c9bf956e9e198956033c7110b40d5fb68550025
      bin: viewnode
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.0.0/viewnode_v1.0.0_windows_amd64.tar.gz
      sha256: 9f964fe565092b0ed41f44279bec056fdac56433fd5eef01034bccb0c07b6f4c
      bin: viewnode.exe