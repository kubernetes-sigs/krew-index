apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: viewnode
spec:
  version: v1.3.3
  homepage: https://github.com/NTTDATA-DACH/viewnode
  shortDescription: Displays nodes with their pods and containers and provides metrics for resources
  description: |
    This plugin displays nodes with their pods and containers.
    It provides information about requested and used resources, e.g. memory.
    It supports filtering of nodes and pods.
    It is very useful when you need to monitor multiple resources like nodes, pods or containers
    in a dynamic environment like a CI/CD platform where pods live and die frequently.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.3.3/viewnode_v1.3.3_darwin_amd64.tar.gz
      sha256: da4d00a8bbbbf81822c475c02e4c1d07589d3fa99f78a8673d1c6767269c2d8a
      bin: viewnode
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.3.3/viewnode_v1.3.3_darwin_arm64.tar.gz
      sha256: 613f7b5ca94cdcdaa865a909e8ad153a25574ceb73a807a1ed894ed0623c7fc9
      bin: viewnode
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.3.3/viewnode_v1.3.3_linux_amd64.tar.gz
      sha256: 5b7088095fa2d99a37bb48a1ca012f968e750d140f00a01f5ddbae9665b8e8b9
      bin: viewnode
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.3.3/viewnode_v1.3.3_windows_amd64.tar.gz
      sha256: 963cdf381d9bc4d37f06d509ddc5ce34d6d9d9e728a7aab0b4e70fae8fd1029c
      bin: viewnode.exe