apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: viewnode
spec:
  version: v1.4.0
  homepage: https://github.com/NTTDATA-DACH/viewnode
  shortDescription: Displays nodes with their pods and containers and provides metrics for resources
  description: |
    This plugin displays nodes with their pods and containers.
    It provides information about requested and used resources, e.g. memory.
    It supports filtering of nodes and pods.
    It is very useful when you need to monitor multiple resources like nodes, pods or containers
    in a dynamic environment like a CI/CD platform where pods live and die frequently.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.4.0/viewnode_v1.4.0_darwin_amd64.tar.gz
      sha256: a0dd20aa03edb0b6e977092d0f676a314fe5634425a93e6e5a5b6c130f563c4b
      bin: viewnode
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.4.0/viewnode_v1.4.0_darwin_arm64.tar.gz
      sha256: 61276335cd9f58b747290451902c47ec5390197cf4cd756cd848f1cc8c00256d
      bin: viewnode
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.4.0/viewnode_v1.4.0_linux_amd64.tar.gz
      sha256: 5a34053ed0d223a4494ca31431040f5a19245fcf070fa964e6b7f4747540ba2d
      bin: viewnode
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.4.0/viewnode_v1.4.0_windows_amd64.tar.gz
      sha256: 5ed769b306678ba294acd4fcedbcc182118b98c9b8d03ac7e15f3eac9ca0bb90
      bin: viewnode.exe