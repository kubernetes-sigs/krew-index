apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: viewnode
spec:
  version: v0.9.4
  homepage: https://github.com/NTTDATA-DACH/viewnode
  shortDescription: Displays nodes with their pods and containers and provides metrics for resources
  description: |
    This plugin displays nodes with their pods and containers.
    It provides information about requested and used resources, e.g. memory.
    It supports filtering of nodes and pods.
    It is very useful when you need to monitor multiple resources like nodes, pods or containers
    in a dynamic environment like a CI/CD platform where pods live and die frequently.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v0.9.4/viewnode_v0.9.4_darwin_amd64.tar.gz
      sha256: 22ad892620ed3d8e272d8ece0c216e1d5f748164088d913fdc6d1ee607b721b9
      bin: viewnode
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v0.9.4/viewnode_v0.9.4_darwin_arm64.tar.gz
      sha256: ac76a1a584e7075f44846714a4695e6e4a02286d85334b5f59a2d94ef28523c4
      bin: viewnode
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v0.9.4/viewnode_v0.9.4_linux_amd64.tar.gz
      sha256: e06796e06afabd0c744782ad1f53ab8b9bc0048cf3a68b01d35014e11544caf2
      bin: viewnode
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v0.9.4/viewnode_v0.9.4_windows_amd64.tar.gz
      sha256: ab3dad47b93e2c22a4eb81bd51a55e932da75ede4de1acf9e234aa1dbaf71189
      bin: viewnode.exe