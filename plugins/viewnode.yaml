apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: viewnode
spec:
  version: v1.2.0
  homepage: https://github.com/NTTDATA-DACH/viewnode
  shortDescription: Displays nodes with their pods and containers and provides metrics for resources
  description: |
    This plugin displays nodes with their pods and containers.
    It provides information about requested and used resources, e.g. memory.
    It supports filtering of nodes and pods.
    It is very useful when you need to monitor multiple resources like nodes, pods or containers
    in a dynamic environment like a CI/CD platform where pods live and die frequently.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.2.0/viewnode_v1.2.0_darwin_amd64.tar.gz
      sha256: 44019c18d817f6c5699106d573c1bbc8131fa9e4df7d07070fd66b5e7dfdf605
      bin: viewnode
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.2.0/viewnode_v1.2.0_darwin_arm64.tar.gz
      sha256: 2c11c60d97239f0101e93119ea79c7245b75b184f23bf9fe43acf3e654a2052d
      bin: viewnode
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.2.0/viewnode_v1.2.0_linux_amd64.tar.gz
      sha256: c092c8acae4579d0a502f1fc2d1a3b1330a0935d6e87e4130a104473b5e0a8c2
      bin: viewnode
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.2.0/viewnode_v1.2.0_windows_amd64.tar.gz
      sha256: 6bb7ea1c0340ace9aa47ba09e97eee8aef0708c5493240ef51d53a4db6e2b585
      bin: viewnode.exe