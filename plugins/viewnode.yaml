apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: viewnode
spec:
  version: v1.1.0
  homepage: https://github.com/NTTDATA-DACH/viewnode
  shortDescription: Displays nodes with their pods and containers and provides metrics for resources
  description: |
    This plugin displays nodes with their pods and containers.
    It provides information about requested and used resources, e.g. memory.
    It supports filtering of nodes and pods.
    It is very useful when you need to monitor multiple resources like nodes, pods or containers
    in a dynamic environment like a CI/CD platform where pods live and die frequently.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.1.0/viewnode_v1.1.0_darwin_amd64.tar.gz
      sha256: a35ae7b3a231b3df9caf5a6c2edf1709185f862d5c1000aa0fc37092ddd59256
      bin: viewnode
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.1.0/viewnode_v1.1.0_darwin_arm64.tar.gz
      sha256: b618fef30ddfe0b042a21075d5e1f946daf2c8d9cdea350b70a7492b006a928b
      bin: viewnode
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.1.0/viewnode_v1.1.0_linux_amd64.tar.gz
      sha256: 99d45afec05c400c3f21cfd489e40a4318f808bc969b3e758bc7cd01f89d5968
      bin: viewnode
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.1.0/viewnode_v1.1.0_windows_amd64.tar.gz
      sha256: fedbb1d4d053d210acffe46a1a4bd975b0e7c61d896ec21d9d667b3ffb25cb89
      bin: viewnode.exe