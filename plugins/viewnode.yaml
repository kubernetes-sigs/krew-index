apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: viewnode
spec:
  version: v1.3.2
  homepage: https://github.com/NTTDATA-DACH/viewnode
  shortDescription: Displays nodes with their pods and containers and provides metrics for resources
  description: |
    This plugin displays nodes with their pods and containers.
    It provides information about requested and used resources, e.g. memory.
    It supports filtering of nodes and pods.
    It is very useful when you need to monitor multiple resources like nodes, pods or containers
    in a dynamic environment like a CI/CD platform where pods live and die frequently.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.3.2/viewnode_v1.3.2_darwin_amd64.tar.gz
      sha256: ac6015a8455b6aa1806b04768185bc29bbb1b9cc2a73943075e32d8d8be829d3
      bin: viewnode
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.3.2/viewnode_v1.3.2_darwin_arm64.tar.gz
      sha256: 0133e0d31dec9fe83609052e1b6b1f681de6ebc836906dee893697fbfc3f653e
      bin: viewnode
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.3.2/viewnode_v1.3.2_linux_amd64.tar.gz
      sha256: e0c87f774c01079b9023b99a7f87a9c896e7bab7cbadae8b542b9e8ff43e0081
      bin: viewnode
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v1.3.2/viewnode_v1.3.2_windows_amd64.tar.gz
      sha256: 9b20039f61cd15487c7e56deefb507b398e5b9d7889593f1010b3e8b44b5f577
      bin: viewnode.exe