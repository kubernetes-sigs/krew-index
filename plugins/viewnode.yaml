apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: viewnode
spec:
  version: v0.9.5
  homepage: https://github.com/NTTDATA-DACH/viewnode
  shortDescription: Displays nodes with their pods and containers and provides metrics for resources
  description: |
    This plugin displays nodes with their pods and containers.
    It provides information about requested and used resources, e.g. memory.
    It supports filtering of nodes and pods.
    It is very useful when you need to monitor multiple resources like nodes, pods or containers
    in a dynamic environment like a CI/CD platform where pods live and die frequently.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v0.9.5/viewnode_v0.9.5_darwin_amd64.tar.gz
      sha256: adf43eca72c6e2007485011e64c197ae4f5f02431c16a5c205db51af2c8a2a60
      bin: viewnode
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v0.9.5/viewnode_v0.9.5_darwin_arm64.tar.gz
      sha256: 3c2a6cf792d8a7bbdabbaa88f23cf13af6f22aaee654a3ab88eb6abb09af2852
      bin: viewnode
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v0.9.5/viewnode_v0.9.5_linux_amd64.tar.gz
      sha256: 3f10947fc1676e83a5924e86222623282ba57875b66f7d17ced4d58df22c5d7e
      bin: viewnode
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/NTTDATA-DACH/viewnode/releases/download/v0.9.5/viewnode_v0.9.5_windows_amd64.tar.gz
      sha256: cbce6dfc751c4db3dd535b37ddac3acc6b93b96b90e6d330ebd9afa8ce4c3161
      bin: viewnode.exe