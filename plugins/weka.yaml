        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.2.6/kubectl-weka_v0.2.6_linux_amd64.tar.gz
      sha256: c6d3d5b9fb0ca8210e195921ace523b56da2d2f1b71ce1e189bf486ac57f7602
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.2.6/kubectl-weka_v0.2.6_linux_arm64.tar.gz
      sha256: e3de885af97a909e5824302166c5f799637df009146700df9a69ae7db70882b6
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.2.6/kubectl-weka_v0.2.6_darwin_amd64.tar.gz
