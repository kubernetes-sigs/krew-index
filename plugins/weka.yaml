apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: weka
spec:
  version: "v0.2.5"
  homepage: https://github.com/weka/kubectl-weka
  shortDescription: "Manage WEKA deployments in Kubernetes"
  description: |
    Kubectl plugin for WEKA operator and cluster planning, deployment, management and maintenance (status, preflight, logs, instances, support bundles).

  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.2.5/kubectl-weka_v0.2.5_linux_amd64.tar.gz
      sha256: c33315aae571a6db0d0fe9ed8097d02ea0855352e4dd209cf0c3f3ba211b78cc
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.2.5/kubectl-weka_v0.2.5_linux_arm64.tar.gz
      sha256: c79189f6f47708285855d711c04f518e12decd7c596e1813c39fd957e23eda56
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.2.5/kubectl-weka_v0.2.5_darwin_amd64.tar.gz
      sha256: 0fe88ef7e41c658415a2e18a7364bd78a13a9eac4e79f28348ddba8ab6363fab
