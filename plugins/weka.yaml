apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: weka
spec:
  version: "v0.3.2"
  homepage: https://github.com/weka/kubectl-weka
  shortDescription: "Manage WEKA deployments in Kubernetes"
  description: |
    Kubectl plugin for WEKA operator and cluster planning, deployment, management and maintenance (status, preflight, logs, instances, support bundles).

  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.3.2/kubectl-weka_v0.3.2_linux_amd64.tar.gz
      sha256: f6c893bbfb24ff2cef46b46dfc3352b78872f21f43503358c285f79a91c5297e
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.3.2/kubectl-weka_v0.3.2_linux_arm64.tar.gz
      sha256: 4d112dab53e7ca00de2eefa1e834b984262e7ca695b267c74c0d20b4c69e3212
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.3.2/kubectl-weka_v0.3.2_darwin_amd64.tar.gz
