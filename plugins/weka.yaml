        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.2.4/kubectl-weka_v0.2.4_linux_amd64.tar.gz
      sha256: 1881ef987a546692d74a6b9c026dd296e96db2e7286efe9f101d43bb2ec65ac9
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.2.4/kubectl-weka_v0.2.4_linux_arm64.tar.gz
      sha256: 21727bc2790a33983b0e3bb506333e5fbd9f0d24c700eeb07ada68624caadd39
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.2.4/kubectl-weka_v0.2.4_darwin_amd64.tar.gz
