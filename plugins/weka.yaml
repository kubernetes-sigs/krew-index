apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: weka
spec:
  version: "v0.3.0"
  homepage: https://github.com/weka/kubectl-weka
  shortDescription: "Manage WEKA deployments in Kubernetes"
  description: |
    Kubectl plugin for WEKA operator and cluster planning, deployment, management and maintenance (status, preflight, logs, instances, support bundles).

  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.3.0/kubectl-weka_v0.3.0_linux_amd64.tar.gz
      sha256: d2413a32a90443edfc01f33633777e8c1a2f68da6662389350804c21a511ef5d
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.3.0/kubectl-weka_v0.3.0_linux_arm64.tar.gz
      sha256: 70d1017443cb9a06c7df5c002f3ddb3d8a869d0769fa2ee65da845343911bcf9
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.3.0/kubectl-weka_v0.3.0_darwin_amd64.tar.gz
      sha256: 577c3e1e3c28617372c0e5bf22d1c9a29d85b8d4d6bf3d2dbef85314ce59132d
      bin: "kubectl-weka"

    - selector:
