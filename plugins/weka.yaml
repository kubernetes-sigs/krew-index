apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: weka
spec:
  version: "v0.3.1"
  homepage: https://github.com/weka/kubectl-weka
  shortDescription: "Manage WEKA deployments in Kubernetes"
  description: |
    Kubectl plugin for WEKA operator and cluster planning, deployment, management and maintenance (status, preflight, logs, instances, support bundles).

  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.3.1/kubectl-weka_v0.3.1_linux_amd64.tar.gz
      sha256: c7d344dc1eb8dc9e3ed43e5641322bd4cc9ef3bfeb8786f91217f62c9d0be74f
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.3.1/kubectl-weka_v0.3.1_linux_arm64.tar.gz
      sha256: 80c7d8eac6f41b9a09ae5b732525fe5d3ed16b751a282309890d898214233fc8
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.3.1/kubectl-weka_v0.3.1_darwin_amd64.tar.gz
      sha256: a7ccc0b419b8d85fd1516cf27edb0cdd8f06bff1c368c97a410a7a0b6f11b44b
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.3.1/kubectl-weka_v0.3.1_darwin_arm64.tar.gz
      sha256: a29dd117f82e91584abe3f44c84c32a9f215cf51492dc87f611decfc3e2e9e25
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.3.1/kubectl-weka_v0.3.1_windows_amd64.zip
      sha256: 08c8a9eb26437397c28c574919766131128ba27878ff8e031aea1517a56b4af1
