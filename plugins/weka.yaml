apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: weka
spec:
  version: "v0.1.0"
  homepage: https://github.com/weka/kubectl-weka
  shortDescription: "Manage WEKA deployments in Kubernetes"
  description: |
    Kubectl plugin for WEKA operator and cluster planning, deployment, management and maintenance (status, preflight, logs, instances, support bundles).

  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.1.0/kubectl-weka_v0.1.0_linux_amd64.tar.gz
      sha256: 838fe6a0cdfc9b84c0e29fa7a44d4e0d83158b16d42b5c3e3a629cc28673bd23
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.1.0/kubectl-weka_v0.1.0_linux_arm64.tar.gz
      sha256: 500d055a9128836c53447ba3cc297a14ec59f9a7f61a2f198ac8bff954ed5179
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.1.0/kubectl-weka_v0.1.0_darwin_amd64.tar.gz
      sha256: 336a889e8896b4a635af2cbdda1441cefd5267af5dc9e15cbadaa9778ef0e779
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.1.0/kubectl-weka_v0.1.0_darwin_arm64.tar.gz
      sha256: 25bbdddaab2afd0495b3241fd85f57d97a066d46e9dba1067b3383c542a2cf0a
      bin: "kubectl-weka"

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.1.0/kubectl-weka_v0.1.0_windows_amd64.zip
      sha256: 27e83ae075fbb6149177e0a17caab5d71633a039e9facce7c84349bf1e309040
