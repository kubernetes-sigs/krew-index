        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/weka/kubectl-weka/releases/download/v0.1.0/kubectl-weka_v0.1.0_linux_arm64.tar.gz
      sha256: 73abea97fd3b98d1afbe52f5fc4ad77a325779e2e99ca65aaf2dc606508c1ed4
