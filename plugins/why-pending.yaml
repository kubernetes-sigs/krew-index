    uri: https://github.com/SaiRohithGuntupally/kubectl-why-pending/releases/download/v0.2.1/kubectl-why-pending_linux_arm64.tar.gz
    sha256: 500ba8e3c550aa71f8517f2835f610012f9d577b22dd9e3043a189920acb3394
    bin: kubectl-why_pending
