      uri: https://github.com/SaiRohithGuntupally/kubectl-why-pending/releases/download/v0.2.0/kubectl-why-pending_linux_amd64.tar.gz
      sha256: "7b5f778bb9555dcfae6354c70751ecd420d68c8f395473d69693ff4f8a25ae76"
