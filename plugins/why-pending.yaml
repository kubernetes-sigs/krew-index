# Template for krew-release-bot (https://github.com/rajatjindal/krew-release-bot).
# On each tag push, the release workflow runs the bot, which renders this template,
# fills in every platform's uri + sha256 from the published release assets, and
# opens an auto-approved PR to kubernetes-sigs/krew-index. Do not hard-code the
# version or sums here — v0.2.1 and addURIAndSha handle that per release.
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: why-pending
spec:
  version: v0.2.1
  homepage: https://github.com/SaiRohithGuntupally/kubectl-why-pending
  shortDescription: Explain why a pod is stuck Pending.
  description: |
    why-pending re-runs the scheduler's filtering logic locally and explains, in
    plain English, why a pod cannot be scheduled — and what to change.

    It calls out the causes bare-metal / on-prem clusters hit that cloud clusters
    hide behind the autoscaler: resource fragmentation (capacity exists, but not
    on any single node), control-plane taints eating a small cluster, topology
    spread skew, anti-affinity running out of hosts, a pod larger than any node,
    nodeSelector / nodeAffinity mismatches, cordoned / NotReady nodes, and unbound
    PersistentVolumeClaims. When no static blocker is found it points at the
    dynamic causes it doesn't model and shows the raw scheduler event.

    Usage:
      kubectl why-pending                 # every Pending pod in the namespace
      kubectl why-pending my-pod -n data  # a specific pod
      kubectl why-pending -A              # all namespaces
  caveats: |
    Best-effort static analysis. It models the common scheduler predicates but not
    priority/preemption, extended/custom resources (GPUs, hugepages), or topology
    spread minDomains/nodeAffinityPolicy. It reads cluster state (nodes, pods,
    events, PVCs) and makes no changes.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/SaiRohithGuntupally/kubectl-why-pending/releases/download/v0.2.1/kubectl-why-pending_darwin_arm64.tar.gz
    sha256: 3b363b94225b647dbdaefdf60d37eb9e21adfb58a9b0cf87d71e38deafbb7020
    bin: kubectl-why_pending
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/SaiRohithGuntupally/kubectl-why-pending/releases/download/v0.2.1/kubectl-why-pending_darwin_amd64.tar.gz
    sha256: 21ecff9a7fa26b88f797ad100bfcc69fd94fb4b34d6c758fa126826ad0a5ea57
    bin: kubectl-why_pending
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/SaiRohithGuntupally/kubectl-why-pending/releases/download/v0.2.1/kubectl-why-pending_linux_amd64.tar.gz
    sha256: d2a0f37a9ff90912ac7a9255b64163ad7f20c47d50cce28d30d693cb2c53945d
    bin: kubectl-why_pending
  - selector:
      matchLabels:
        os: linux
